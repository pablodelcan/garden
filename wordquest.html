<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Río Reads</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#fff8f0;--accent:#f97316;--accent2:#fb923c;
  --green:#22c55e;--red:#ef4444;--blue:#3b82f6;--purple:#a855f7;
  --text:#1e293b;--text2:#64748b;--card:#fff;--shadow:0 4px 20px rgba(0,0,0,.08);
  --coin:#fbbf24;
}
html{font-size:16px}
body{font-family:'Nunito',sans-serif;background:#e2e0dc;color:var(--text);min-height:100vh;overflow-x:hidden}
.game-shell{max-width:600px;margin:0 auto;background:var(--bg);min-height:100vh;position:relative;overflow-x:hidden}
@media(min-width:601px){.game-shell{box-shadow:0 0 60px rgba(0,0,0,.15);border-left:1px solid #d6d3d1;border-right:1px solid #d6d3d1}}
h1,h2,h3,.fredoka{font-family:'Fredoka One',cursive}

/* HEADER */
.header{background:linear-gradient(135deg,var(--accent),#ea580c);padding:8px 12px 4px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:4px}
.header-logo{height:42px;filter:drop-shadow(2px 3px 0 rgba(0,0,0,.3));flex-shrink:0}
@media(min-width:500px){.header-logo{height:56px}}
.hud{display:flex;gap:3px;flex-wrap:wrap;justify-content:flex-end}
.pill{background:rgba(255,255,255,.25);color:#fff;padding:3px 7px;border-radius:16px;font-weight:700;font-size:.7rem;display:flex;align-items:center;gap:3px;backdrop-filter:blur(4px);flex-shrink:0;white-space:nowrap}
.pill svg{width:14px;height:14px}
.hud-icon{width:14px;height:14px}

/* XP BAR */
.xp-wrap{width:100%;margin-top:4px}
.xp-bar{background:rgba(255,255,255,.3);border-radius:10px;height:8px;overflow:hidden}
.xp-fill{background:linear-gradient(90deg,#fbbf24,#f59e0b);height:100%;border-radius:10px;transition:width .5s ease}
.xp-label{color:rgba(255,255,255,.8);font-size:.65rem;font-weight:700;text-align:center;margin-top:2px}

/* STREAK DOTS */
.streak-wrap{display:flex;gap:6px;align-items:center;padding:8px 16px}
.streak-dot{width:20px;height:20px;border-radius:50%;border:3px solid rgba(249,115,22,.25);background:transparent;transition:all .3s ease}
.streak-dot.filled{background:var(--accent);border-color:var(--accent);transform:scale(1.15);box-shadow:0 0 8px rgba(249,115,22,.4)}
.streak-label{font-size:.75rem;font-weight:700;color:var(--text2)}

/* BATTLE SCENE */
.battle{background:linear-gradient(180deg,#e0f2fe 0%,#bae6fd 40%,#86efac 40%,#4ade80 100%);background-size:cover;background-position:center bottom;border-radius:20px;margin:8px 12px;padding:14px 20px;min-height:220px;position:relative;overflow:hidden;box-shadow:var(--shadow);transition:background-image .5s ease}
.battle-ground{display:flex;justify-content:space-between;align-items:flex-end;min-height:180px;position:relative;padding:0 10px}
.fighter{display:flex;flex-direction:column;align-items:center;gap:4px;position:relative;z-index:2}
.sprite-box{transition:transform .5s ease}
.sprite-box svg,.sprite-box img{width:110px;height:110px;filter:drop-shadow(2px 4px 6px rgba(0,0,0,.25))}
.fighter.player .sprite-box{animation:bounce 1.5s ease-in-out infinite}
.fighter.enemy .sprite-box{animation:bounce 1.5s ease-in-out infinite .3s}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.hp-bar-wrap{width:130px;text-align:center}
.hp-name{font-family:'Fredoka One',cursive;font-size:.8rem;color:#fff;text-shadow:1px 1px 3px rgba(0,0,0,.7);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hp-bar{background:#e2e8f0;border-radius:6px;height:8px;overflow:hidden;border:2px solid #cbd5e1}
.hp-fill{height:100%;border-radius:4px;transition:width .4s ease}
.hp-fill.green{background:linear-gradient(90deg,#22c55e,#4ade80)}
.hp-fill.yellow{background:linear-gradient(90deg,#eab308,#facc15)}
.hp-fill.red{background:linear-gradient(90deg,#ef4444,#f87171)}
.hp-text{font-size:.6rem;font-weight:700;color:#fff;text-shadow:1px 1px 2px rgba(0,0,0,.6)}
.battle-msg{position:absolute;top:45%;left:50%;transform:translate(-50%,-50%);font-family:'Fredoka One',cursive;font-size:1.3rem;color:#fff;text-shadow:2px 2px 0 rgba(0,0,0,.3);opacity:0;pointer-events:none;z-index:10;white-space:nowrap}
.battle-msg.show{animation:msgPop .8s ease forwards}
@keyframes msgPop{0%{opacity:0;transform:translate(-50%,-50%) scale(.5)}20%{opacity:1;transform:translate(-50%,-50%) scale(1.2)}40%{transform:translate(-50%,-50%) scale(1)}80%{opacity:1}100%{opacity:0;transform:translate(-50%,-70%) scale(1)}}
.hit-flash{position:absolute;inset:0;background:rgba(255,255,255,.7);opacity:0;pointer-events:none;z-index:5;border-radius:20px}
.hit-flash.show{animation:flash .3s ease}
@keyframes flash{0%{opacity:.7}100%{opacity:0}}
@keyframes attackRight{0%{transform:translateX(0)}30%{transform:translateX(50px)}60%{transform:translateX(50px) scale(1.1)}100%{transform:translateX(0)}}
@keyframes attackLeft{0%{transform:translateX(0)}30%{transform:translateX(-50px)}60%{transform:translateX(-50px) scale(1.1)}100%{transform:translateX(0)}}
@keyframes hurt{0%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}100%{transform:translateX(0)}}
.shake .sprite-box{animation:hurt .4s ease!important}
.atk-right .sprite-box{animation:attackRight .5s ease!important}
.atk-left .sprite-box{animation:attackLeft .5s ease!important}
.vs-badge{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Fredoka One',cursive;font-size:1rem;color:var(--accent);background:#fff;width:38px;height:38px;display:flex;align-items:center;justify-content:center;border-radius:50%;border:3px solid var(--accent);z-index:3;box-shadow:0 2px 8px rgba(0,0,0,.2)}

/* TABS */
.tabs{display:flex;gap:4px;padding:6px 12px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tabs::-webkit-scrollbar{display:none}
.tab{font-family:'Fredoka One',cursive;font-size:.75rem;padding:7px 12px;border-radius:12px;border:none;cursor:pointer;white-space:nowrap;transition:all .2s;background:#fff;color:var(--text2);box-shadow:0 2px 8px rgba(0,0,0,.05)}
.tab.active{background:var(--accent);color:#fff;box-shadow:0 4px 12px rgba(249,115,22,.3);transform:translateY(-1px)}
.tab:hover:not(.active){background:#fff7ed}
.mode-indicator{font-family:'Fredoka One',cursive;font-size:1rem;color:var(--accent);background:#fff7ed;padding:7px 14px;border-radius:12px;border:2px solid var(--accent);white-space:nowrap}
.mode-progress{font-family:'Nunito',sans-serif;font-size:.8rem;font-weight:700;color:var(--text2);background:#f1f5f9;padding:6px 12px;border-radius:10px;white-space:nowrap}
.tab.quiz-tab{background:#ede9fe;color:#6d28d9;border:2px solid #a78bfa}
.tab.quiz-tab.active{background:#7c3aed;color:#fff;border-color:#7c3aed}
.tab.shop-tab{background:#fef3c7;color:#92400e;border:2px solid #fbbf24}
.tab.shop-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.mode-icon{width:20px;height:20px;vertical-align:middle;margin-right:2px}

/* GAME AREA */
.game-area{padding:10px 12px;min-height:180px}
.card{background:var(--card);border-radius:20px;padding:20px;box-shadow:var(--shadow);max-width:500px;margin:0 auto;position:relative}
.card.wrong-shake{animation:cardShake .5s ease}
@keyframes cardShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-10px)}40%{transform:translateX(10px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}}
.question-text{font-size:1.8rem;font-weight:800;text-align:center;margin-bottom:16px;line-height:1.5}
.question-text .blank{display:inline-block;min-width:70px;border-bottom:4px solid var(--accent);color:var(--accent);font-family:'Fredoka One',cursive;padding:0 4px}
.choices{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.choice-btn{font-family:'Nunito',sans-serif;font-size:1.6rem;font-weight:700;padding:16px 12px;border-radius:14px;border:3px solid #e2e8f0;background:#fff;cursor:pointer;transition:all .15s;color:var(--text);text-align:center;min-height:60px;display:flex;align-items:center;justify-content:center}
.choice-btn:hover{border-color:var(--accent);background:#fff7ed;transform:translateY(-2px)}
.choice-btn:active{transform:translateY(0)}
.choice-btn.correct{background:#dcfce7;border-color:var(--green);color:#15803d}
.choice-btn.wrong-pick{background:#fef2f2;border-color:var(--red);color:#b91c1c}
.choice-btn.disabled{pointer-events:none;opacity:.7}
.choices.think-first{position:relative;pointer-events:none}
.choices.think-first .choice-btn{opacity:.3;filter:blur(2px);transition:all .3s}
.think-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:5;font-family:'Fredoka One',cursive;font-size:1.1rem;color:var(--accent);text-align:center;animation:thinkPulse 1s ease-in-out infinite}
@keyframes thinkPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}

/* SPELL IT */
.spell-hint{font-size:1.4rem;text-align:center;color:var(--text2);margin-bottom:8px}
.spell-display{display:flex;justify-content:center;gap:5px;margin:14px 0;min-height:48px;flex-wrap:wrap}
.spell-slot{width:52px;height:60px;border-radius:10px;border:3px dashed #cbd5e1;display:flex;align-items:center;justify-content:center;font-family:'Fredoka One',cursive;font-size:2rem;color:var(--accent);background:#fff7ed;transition:all .2s}
.spell-slot.filled{border-style:solid;border-color:var(--accent);background:#fff;transform:scale(1.05)}
.letter-tiles{display:flex;gap:5px;justify-content:center;flex-wrap:wrap;margin-top:14px}
.letter-tile{width:52px;height:56px;border-radius:10px;border:2px solid #cbd5e1;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:'Fredoka One',cursive;font-size:1.7rem;color:var(--text);transition:all .15s;box-shadow:0 3px 0 #e2e8f0}
.letter-tile:hover{transform:translateY(-2px);border-color:var(--accent)}
.letter-tile:active{transform:translateY(1px);box-shadow:none}
.letter-tile.used{opacity:.25;pointer-events:none}
.spell-actions{display:flex;gap:8px;justify-content:center;margin-top:12px}
.spell-actions button{font-family:'Nunito',sans-serif;font-weight:700;font-size:.85rem;padding:8px 18px;border-radius:10px;border:none;cursor:pointer;transition:all .15s}
.backspace-btn{background:#fef2f2;color:var(--red)}
.submit-spell{background:var(--accent);color:#fff}
.submit-spell:hover{background:#ea580c}

/* DECODE */
.clues{display:flex;flex-direction:column;gap:6px;margin:12px 0}
.clue{display:flex;align-items:center;gap:8px;padding:12px 14px;background:#f8fafc;border-radius:10px;font-weight:700;font-size:1.3rem}
.clue-icon{font-size:1.2rem}
.decode-input{width:100%;padding:14px;border-radius:14px;border:3px solid #e2e8f0;font-family:'Fredoka One',cursive;font-size:1.6rem;text-align:center;color:var(--accent);letter-spacing:4px;text-transform:lowercase}
.decode-input:focus{outline:none;border-color:var(--accent)}
.decode-submit{display:block;margin:10px auto 0;font-family:'Fredoka One',cursive;font-size:1rem;padding:10px 36px;border-radius:14px;border:none;background:var(--accent);color:#fff;cursor:pointer;transition:all .15s}
.decode-submit:hover{background:#ea580c;transform:translateY(-2px)}

/* STORY */
.story-box{background:#f8fafc;border-radius:14px;padding:16px;margin-bottom:12px;line-height:2}
.story-word{display:inline;cursor:pointer;padding:3px 4px;border-radius:4px;font-size:1.6rem;font-weight:600;transition:all .15s;line-height:2}
.story-word:hover{background:#fed7aa}
.story-word.highlighted{background:#fdba74;color:#9a3412}
.story-question{font-size:1.5rem;font-weight:700;text-align:center;margin:12px 0}

/* JOKE */
.joke-box{margin-top:14px;padding:12px;background:linear-gradient(135deg,#fef3c7,#fde68a);border-radius:14px;text-align:center;animation:jokeIn .4s ease}
.joke-box .joke-emoji{font-size:1.4rem}
.joke-box p{font-size:.9rem;font-weight:700;color:#92400e;margin-top:4px}
@keyframes jokeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* COIN DISPLAY */
.coin-reward{margin-top:10px;padding:8px 14px;background:linear-gradient(135deg,#fffbeb,#fef3c7);border-radius:12px;text-align:center;font-weight:800;color:#92400e;font-size:.95rem;animation:jokeIn .4s ease .2s both;display:flex;align-items:center;justify-content:center;gap:6px}
.coin-icon{display:inline-block;width:22px;height:22px;background:linear-gradient(135deg,#fbbf24,#f59e0b);border-radius:50%;border:2px solid #d97706;font-size:.7rem;line-height:18px;text-align:center;color:#92400e;font-weight:900}

/* ROSTER */
.roster-section{padding:10px 12px}
.roster-title{font-family:'Fredoka One',cursive;font-size:1rem;color:var(--text);margin-bottom:6px;display:flex;align-items:center;gap:6px}
.roster-grid{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;-webkit-overflow-scrolling:touch}
.roster-grid::-webkit-scrollbar{height:4px}
.roster-grid::-webkit-scrollbar-thumb{background:#ddd;border-radius:4px}
.roster-card{background:#fff;border-radius:14px;padding:8px;min-width:90px;text-align:center;box-shadow:0 2px 10px rgba(0,0,0,.05);flex-shrink:0;border:2px solid transparent;transition:all .2s;cursor:pointer}
.roster-card:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(0,0,0,.08)}
.roster-card.active{border-color:var(--accent);background:#fff7ed}
.roster-card.locked{opacity:.35;filter:grayscale(1);cursor:default}
.roster-card svg{width:55px;height:55px}
.roster-card .rc-name{font-family:'Fredoka One',cursive;font-size:.65rem;color:var(--text);margin-top:2px}
.roster-card .rc-type{font-size:.55rem;color:var(--text2);font-weight:700}

/* POKÉDEX MODAL */
.pokedex-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:none;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px)}
.pokedex-overlay.open{display:flex}
.pokedex-modal{background:var(--bg);border-radius:24px;max-width:560px;width:100%;max-height:85vh;overflow-y:auto;padding:20px;box-shadow:0 20px 60px rgba(0,0,0,.3);position:relative}
.pokedex-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.pokedex-header h2{font-family:'Fredoka One',cursive;font-size:1.3rem;color:var(--text);display:flex;align-items:center;gap:8px}
.pokedex-close{background:var(--accent);color:#fff;border:none;width:36px;height:36px;border-radius:50%;font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(249,115,22,.3)}
.pokedex-close:hover{transform:scale(1.1)}
.pokedex-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:10px}
.pdex-card{background:#fff;border-radius:16px;padding:10px 6px;text-align:center;box-shadow:0 2px 10px rgba(0,0,0,.06);border:2px solid transparent;transition:all .2s;cursor:pointer;position:relative}
.pdex-card:hover{transform:translateY(-3px);box-shadow:0 8px 20px rgba(0,0,0,.1)}
.pdex-card.active{border-color:var(--accent);background:#fff7ed}
.pdex-card.locked{opacity:.3;filter:grayscale(1);cursor:default}
.pdex-card.locked:hover{transform:none;box-shadow:0 2px 10px rgba(0,0,0,.06)}
.pdex-card img,.pdex-card svg{width:70px;height:70px;margin:0 auto 4px;display:block}
.pdex-card .pdex-name{font-family:'Fredoka One',cursive;font-size:.7rem;color:var(--text);margin-top:4px}
.pdex-card .pdex-type{font-size:.6rem;color:#fff;background:var(--accent);border-radius:8px;padding:1px 6px;display:inline-block;margin-top:2px}
.pdex-card .pdex-type.locked-type{background:#cbd5e1}
.pdex-card .pdex-num{position:absolute;top:4px;right:6px;font-size:.55rem;color:var(--text2);font-weight:700}
.pdex-card .pdex-xp{font-size:.55rem;color:var(--text2);font-weight:700;margin-top:2px}

/* SHOP SECTION */
.shop-section{padding:10px 12px 30px}
.shop-banner{background:linear-gradient(135deg,#fef3c7,#fde68a);border-radius:16px;padding:16px;margin-bottom:12px;text-align:center;border:2px solid #fbbf24}
.shop-banner h2{font-family:'Fredoka One',cursive;font-size:1.2rem;color:#92400e;margin-bottom:4px}
.shop-banner p{font-size:.85rem;font-weight:700;color:#a16207;line-height:1.4}
.shop-banner .real-deal{background:#fff;border-radius:10px;padding:8px 12px;margin-top:8px;font-size:.8rem;color:#92400e;font-weight:800;border:2px dashed #f59e0b}
.shop-title{font-family:'Fredoka One',cursive;font-size:1rem;color:var(--text);margin-bottom:4px;display:flex;align-items:center;gap:6px}
.shop-subtitle{font-size:.8rem;color:var(--text2);font-weight:600;margin-bottom:10px}
.shop-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding-bottom:10px}
@media(min-width:600px){.shop-grid{grid-template-columns:repeat(3,1fr)}}
.shop-item{background:#fff;border-radius:16px;padding:12px;text-align:center;box-shadow:0 2px 12px rgba(0,0,0,.06);border:2px solid #e2e8f0;transition:all .2s;position:relative}
.shop-item:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(0,0,0,.1)}
.shop-item.purchased{border-color:var(--green);background:#f0fdf4}
.shop-item.locked{border-color:#e2e8f0;background:#f8fafc}
.shop-item.purchased::after{content:'✅ EARNED!';position:absolute;top:6px;right:6px;font-size:.6rem;font-weight:800;color:#16a34a;background:#dcfce7;padding:2px 6px;border-radius:6px}
.shop-item svg,.shop-item img{width:90px;height:90px;margin:0 auto 6px;display:block}
.shop-item .item-name{font-family:'Fredoka One',cursive;font-size:.8rem;color:var(--text)}
.shop-item .item-desc{font-size:.65rem;color:var(--text2);font-weight:600;margin:2px 0}
.shop-item .item-price{font-size:.8rem;font-weight:800;color:#92400e;margin-top:4px;display:flex;align-items:center;justify-content:center;gap:4px}
.shop-item .item-price .coin-icon{width:18px;height:18px;font-size:.65rem;line-height:14px}
.progress-bar{background:#e2e8f0;border-radius:6px;height:6px;margin:6px 0 4px;overflow:hidden}
.progress-fill{height:100%;border-radius:6px;background:linear-gradient(90deg,#fbbf24,#f59e0b);transition:width .4s}
.progress-text{font-size:.6rem;color:var(--text2);font-weight:700}
.shop-buy{margin-top:6px;font-family:'Fredoka One',cursive;font-size:.75rem;padding:8px 20px;border-radius:10px;border:none;background:var(--accent);color:#fff;cursor:pointer;transition:all .15s}
.shop-buy:hover{background:#ea580c;transform:translateY(-1px)}
.shop-buy:disabled{background:#cbd5e1;cursor:default;transform:none}
.shop-buy.bought{background:var(--green)}
.wallet-bar{display:flex;align-items:center;justify-content:center;gap:8px;padding:8px 16px;font-family:'Fredoka One',cursive;font-size:1.1rem;color:#92400e;background:linear-gradient(135deg,#fffbeb,#fef3c7);border-radius:12px;margin-bottom:12px;border:2px solid #fde68a}
.wallet-bar .coin-icon{width:28px;height:28px;font-size:.9rem;line-height:24px}

/* CONFETTI */
.confetti-container{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1000;overflow:hidden}
.confetti-piece{position:absolute;width:10px;height:10px;top:-20px;animation:confettiFall 2s ease forwards}
@keyframes confettiFall{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}

/* CATCH MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s}
.modal-overlay.show{opacity:1;pointer-events:all}
.modal-box{background:#fff;border-radius:24px;padding:28px;text-align:center;max-width:320px;width:90%;transform:scale(.8);transition:transform .3s;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-overlay.show .modal-box{transform:scale(1)}
.modal-box h2{font-family:'Fredoka One',cursive;font-size:1.4rem;color:var(--accent);margin-bottom:6px}
.modal-box p{color:var(--text2);font-weight:600;margin-bottom:12px;font-size:.9rem}
.modal-box svg{width:100px;height:100px;margin:8px auto}
.modal-btn{font-family:'Fredoka One',cursive;font-size:1rem;padding:10px 32px;border-radius:14px;border:none;background:var(--accent);color:#fff;cursor:pointer;transition:all .15s}
.modal-btn:hover{background:#ea580c;transform:translateY(-2px)}

/* RESULT BANNERS */
.result-banner{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:10;border-radius:20px;animation:bannerIn .5s ease}

<script>
// ========================================================
// SOUND ENGINE (Web Audio API — no files needed)
// ========================================================
const SFX = {
  ctx: null,
  init(){ if(!this.ctx) this.ctx = new (window.AudioContext||window.webkitAudioContext)(); },
  play(type){
    this.init();
    const c=this.ctx, now=c.currentTime;
    switch(type){
      case'correct':{
        const o=c.createOscillator(),g=c.createGain();
        o.connect(g);g.connect(c.destination);
        o.type='sine';o.frequency.setValueAtTime(523,now);o.frequency.setValueAtTime(659,now+.08);o.frequency.setValueAtTime(784,now+.16);
        g.gain.setValueAtTime(.3,now);g.gain.exponentialRampToValueAtTime(.01,now+.35);
        o.start(now);o.stop(now+.35);break;
      }
      case'wrong':{
        const o=c.createOscillator(),g=c.createGain();
        o.connect(g);g.connect(c.destination);
        o.type='square';o.frequency.setValueAtTime(200,now);o.frequency.setValueAtTime(150,now+.15);
        g.gain.setValueAtTime(.2,now);g.gain.exponentialRampToValueAtTime(.01,now+.3);
        o.start(now);o.stop(now+.3);break;
      }
      case'attack':{
        const o=c.createOscillator(),g=c.createGain();
        o.connect(g);g.connect(c.destination);
        o.type='sawtooth';o.frequency.setValueAtTime(300,now);o.frequency.exponentialRampToValueAtTime(80,now+.15);
        g.gain.setValueAtTime(.25,now);g.gain.exponentialRampToValueAtTime(.01,now+.2);
        o.start(now);o.stop(now+.2);break;
      }
      case'hurt':{
        const o=c.createOscillator(),g=c.createGain();
        o.connect(g);g.connect(c.destination);
        o.type='sawtooth';o.frequency.setValueAtTime(400,now);o.frequency.exponentialRampToValueAtTime(100,now+.25);
        g.gain.setValueAtTime(.2,now);g.gain.exponentialRampToValueAtTime(.01,now+.25);
        o.start(now);o.stop(now+.25);break;
      }
      case'coin':{
        const o=c.createOscillator(),g=c.createGain();
        o.connect(g);g.connect(c.destination);
        o.type='sine';o.frequency.setValueAtTime(1200,now);o.frequency.setValueAtTime(1600,now+.06);
        g.gain.setValueAtTime(.2,now);g.gain.exponentialRampToValueAtTime(.01,now+.2);
        o.start(now);o.stop(now+.2);break;
      }
      case'victory':{
        [523,659,784,1047].forEach((f,i)=>{
          const o=c.createOscillator(),g=c.createGain();
          o.connect(g);g.connect(c.destination);
          o.type='sine';o.frequency.setValueAtTime(f,now+i*.12);
          g.gain.setValueAtTime(.25,now+i*.12);g.gain.exponentialRampToValueAtTime(.01,now+i*.12+.3);
          o.start(now+i*.12);o.stop(now+i*.12+.3);
        });break;
      }
      case'levelup':{
        [392,494,587,784,988].forEach((f,i)=>{
          const o=c.createOscillator(),g=c.createGain();
          o.connect(g);g.connect(c.destination);
          o.type='sine';o.frequency.setValueAtTime(f,now+i*.1);
          g.gain.setValueAtTime(.3,now+i*.1);g.gain.exponentialRampToValueAtTime(.01,now+i*.1+.25);
          o.start(now+i*.1);o.stop(now+i*.1+.25);
        });break;
      }
      case'catch':{
        [660,880,1100,1320,1100,1320].forEach((f,i)=>{
          const o=c.createOscillator(),g=c.createGain();
          o.connect(g);g.connect(c.destination);
          o.type='sine';o.frequency.setValueAtTime(f,now+i*.08);
          g.gain.setValueAtTime(.2,now+i*.08);g.gain.exponentialRampToValueAtTime(.01,now+i*.08+.15);
          o.start(now+i*.08);o.stop(now+i*.08+.15);
        });break;
      }
      case'click':{
        const o=c.createOscillator(),g=c.createGain();
        o.connect(g);g.connect(c.destination);
        o.type='sine';o.frequency.setValueAtTime(800,now);
        g.gain.setValueAtTime(.1,now);g.gain.exponentialRampToValueAtTime(.01,now+.06);
        o.start(now);o.stop(now+.06);break;
      }
      case'buy':{
        [523,659,784,1047,784,1047].forEach((f,i)=>{
          const o=c.createOscillator(),g=c.createGain();
          o.connect(g);g.connect(c.destination);
          o.type='triangle';o.frequency.setValueAtTime(f,now+i*.1);
          g.gain.setValueAtTime(.25,now+i*.1);g.gain.exponentialRampToValueAtTime(.01,now+i*.1+.2);
          o.start(now+i*.1);o.stop(now+i*.1+.2);
        });break;
      }
      case'whoosh':{
        const o=c.createOscillator(),g=c.createGain();
        const n=c.createBufferSource(),nb=c.createBuffer(1,c.sampleRate*.15,c.sampleRate);
        const d=nb.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*.3;
        n.buffer=nb;const ng=c.createGain();n.connect(ng);ng.connect(c.destination);
        ng.gain.setValueAtTime(.15,now);ng.gain.exponentialRampToValueAtTime(.01,now+.15);
        n.start(now);
        o.connect(g);g.connect(c.destination);
        o.type='sine';o.frequency.setValueAtTime(400,now);o.frequency.exponentialRampToValueAtTime(1200,now+.12);
        g.gain.setValueAtTime(.1,now);g.gain.exponentialRampToValueAtTime(.01,now+.15);
        o.start(now);o.stop(now+.15);break;
      }
      case'modeSwitch':{
        [440,554,659,880].forEach((f,i)=>{
          const o=c.createOscillator(),g=c.createGain();
          o.connect(g);g.connect(c.destination);
          o.type='triangle';o.frequency.setValueAtTime(f,now+i*.08);
          g.gain.setValueAtTime(.2,now+i*.08);g.gain.exponentialRampToValueAtTime(.01,now+i*.08+.2);
          o.start(now+i*.08);o.stop(now+i*.08+.2);
        });break;
      }
      case'fanfare':{
        // epic ascending fanfare for big milestones
        const notes=[392,494,587,698,784,880,988,1047,1175,1318];
        notes.forEach((f,i)=>{
          const o=c.createOscillator(),g=c.createGain();
          o.connect(g);g.connect(c.destination);
          o.type=i<5?'sine':'triangle';
          o.frequency.setValueAtTime(f,now+i*.08);
          g.gain.setValueAtTime(.25,now+i*.08);g.gain.exponentialRampToValueAtTime(.01,now+i*.08+.3);
          o.start(now+i*.08);o.stop(now+i*.08+.3);
        });
        // add a final chord
        [1047,1318,1568].forEach((f,i)=>{
          const o=c.createOscillator(),g=c.createGain();
          o.connect(g);g.connect(c.destination);
          o.type='sine';o.frequency.setValueAtTime(f,now+.8);
          g.gain.setValueAtTime(.2,now+.8);g.gain.exponentialRampToValueAtTime(.01,now+1.5);
          o.start(now+.8);o.stop(now+1.5);
        });
        break;
      }
      case'drumroll':{
        for(let i=0;i<20;i++){
          const n=c.createBufferSource(),nb=c.createBuffer(1,Math.floor(c.sampleRate*.03),c.sampleRate);
          const d=nb.getChannelData(0);for(let j=0;j<d.length;j++)d[j]=(Math.random()*2-1);
          n.buffer=nb;const g=c.createGain();n.connect(g);g.connect(c.destination);
          g.gain.setValueAtTime(.08+i*.008,now+i*.04);g.gain.exponentialRampToValueAtTime(.01,now+i*.04+.05);
          n.start(now+i*.04);
        }break;
      }
    }
  }
};

// ========================================================
// SMART VOICE PICKER — prefer natural/enhanced voices
// ========================================================
let _bestVoice=null;
let _voicesLoaded=false;
function getBestVoice(){
  if(_bestVoice&&_voicesLoaded) return _bestVoice;
  const voices=speechSynthesis.getVoices();
  if(!voices.length) return null;
  _voicesLoaded=true;
  // Priority order: enhanced/premium > natural > local English > any English
  const prefs=[
    v=>v.name.includes('Enhanced')&&v.lang.startsWith('en'),
    v=>v.name.includes('Premium')&&v.lang.startsWith('en'),
    v=>v.name==='Samantha'&&v.localService,
    v=>v.name==='Karen'&&v.localService,
    v=>v.name==='Moira'&&v.localService,
    v=>v.name==='Tessa'&&v.localService,
    v=>v.name==='Rishi'&&v.localService,
    v=>/Natural/.test(v.name)&&v.lang.startsWith('en'),
    v=>v.name.includes('Google')&&v.lang.startsWith('en'),
    v=>v.lang.startsWith('en-US')&&v.localService,
    v=>v.lang.startsWith('en')&&v.localService,
    v=>v.lang.startsWith('en'),
  ];
  for(const test of prefs){
    const found=voices.find(test);
    if(found){_bestVoice=found;return found;}
  }
  return voices[0]||null;
}
// preload voices (some browsers load async)
if('speechSynthesis' in window){
  speechSynthesis.getVoices();
  speechSynthesis.addEventListener('voiceschanged',()=>{_bestVoice=null;_voicesLoaded=false;getBestVoice();});
}

// ========================================================
// WORDMONS — custom creatures (NOT real Pokémon)
// ========================================================

const G = {
  score:0, streak:0, lives:3, xp:0, level:1, xpNeeded:50, coins:0,
  mode:'fill', activeWordmon:0, caughtWordmons:[0],
  wordmonXP:{}, // {0: 12, 1: 5, ...} tracks XP per wordmon
  currentEnemy:null, enemyHp:0, enemyMaxHp:0, playerHp:0, playerMaxHp:0,
  answering:false, enemyIdx:0, modeWins:0, totalCorrect:0,
  usedWords:[], usedStories:[],
  purchased:[],
  // new features
  maxStreak:0, bossesDefeated:0, secretsCaught:0, popQuizWins:0,
  unlockedAchievements:[], isBossBattle:false,
  currentZone:0,
  ZONES:['Forest','Ocean','Volcano','Crystal Cave','Sky Kingdom','Snowlands','Castle','Space'],
  // word stats tracking for parent dashboard
  wordStats:{}, // {word: {correct:0, wrong:0, lastSeen:timestamp}}

  // get evolution stage for a wordmon (0=baby, 1=mid, 2=final)
  getStage(idx){ const xp=this.wordmonXP[idx]||0; return xp>=25?2:xp>=10?1:0; },
  getWordmon(idx){ const wm=WORDMONS[idx]; const s=this.getStage(idx); const d={...wm,...wm.stages[s],stage:s}; d.spriteImg='sprites/'+wm.id+'_'+(s+1)+'.png'; return d; },
  spriteHtml(wm,size){
    size=size||80;
    return '<img src="'+wm.spriteImg+'" alt="'+wm.name+'" style="width:'+size+'px;height:'+size+'px;object-fit:contain;image-rendering:pixelated" onerror="this.style.display=\'none\'">';
  },

  // ---- INIT ----
  init(){
    this.loadGame();
    this.setupTabs();
    this.spawnEnemy();
    this.renderRoster();
    this.updateHUD();
    this.updateBackpack();
    this.loadMode(this.mode);
    this.updateModeBar();
    // auto-save every 30s
    setInterval(()=>this.saveGame(),30000);
  },

  // ---- SAVE / LOAD (localStorage) ----
  saveGame(){
    const d={score:this.score,streak:this.streak,lives:this.lives,xp:this.xp,level:this.level,
      xpNeeded:this.xpNeeded,coins:this.coins,activeWordmon:this.activeWordmon,
      caughtWordmons:this.caughtWordmons,purchased:this.purchased,wordmonXP:this.wordmonXP,
      mode:this.mode,modeWins:this.modeWins,totalCorrect:this.totalCorrect||0,
      maxStreak:this.maxStreak||0,bossesDefeated:this.bossesDefeated||0,
      secretsCaught:this.secretsCaught||0,unlockedAchievements:this.unlockedAchievements||[],
      currentZone:this.currentZone||0,wordStats:this.wordStats||{},popQuizWins:this.popQuizWins||0};
    try{localStorage.setItem('rio_reads_save',JSON.stringify(d));}catch(e){}
  },
  loadGame(){
    try{
      const s=localStorage.getItem('rio_reads_save');
      if(!s)return;
      const d=JSON.parse(s);
      if(d.score!==undefined) this.score=d.score;
      if(d.streak!==undefined) this.streak=d.streak;
      if(d.lives!==undefined) this.lives=d.lives;
      if(d.xp!==undefined) this.xp=d.xp;
      if(d.level!==undefined) this.level=d.level;
      if(d.xpNeeded!==undefined) this.xpNeeded=d.xpNeeded;
      if(d.coins!==undefined) this.coins=d.coins;
      if(d.activeWordmon!==undefined) this.activeWordmon=d.activeWordmon;
      if(d.caughtWordmons) this.caughtWordmons=d.caughtWordmons;
      if(d.purchased) this.purchased=d.purchased;
      if(d.wordmonXP) this.wordmonXP=d.wordmonXP;
      if(d.mode && d.mode!=='shop') this.mode=d.mode;
      if(d.modeWins!==undefined) this.modeWins=d.modeWins;
      if(d.totalCorrect!==undefined) this.totalCorrect=d.totalCorrect;
      if(d.maxStreak!==undefined) this.maxStreak=d.maxStreak;
      if(d.bossesDefeated!==undefined) this.bossesDefeated=d.bossesDefeated;
      if(d.secretsCaught!==undefined) this.secretsCaught=d.secretsCaught;
      if(d.unlockedAchievements) this.unlockedAchievements=d.unlockedAchievements;
      if(d.currentZone!==undefined) this.currentZone=d.currentZone;
      if(d.wordStats) this.wordStats=d.wordStats;
      if(d.popQuizWins!==undefined) this.popQuizWins=d.popQuizWins;
    }catch(e){}
  },

  updateBackpack(){
    document.getElementById('bpBadge').textContent=this.coins;
  },

  MODE_ICONS:{fill:'mode_fillin',spell:'mode_spell',tricky:'mode_tricky',hear:'mode_hear',flash:'mode_flash',decode:'mode_decode',story:'mode_story',shop:'mode_shop'},
  MODE_NAMES:{fill:'Fill In',spell:'Spell It',tricky:'Tricky Letters',hear:'Hear It',flash:'Flash',decode:'Decode',story:'Story',readalong:'Read Along',popquiz:'Pop Quiz',shop:'Shop'},
  GAME_MODES:['fill','spell','tricky','hear','flash','decode','story','readalong'],

  updateModeBar(){

  // ---- HUD ----
  updateHUD(){
    document.getElementById('scoreVal').textContent = this.score;
    document.getElementById('streakVal').textContent = this.streak;
    document.getElementById('livesVal').textContent = this.lives;
    document.getElementById('levelVal').textContent = this.level;
    document.getElementById('coinVal').textContent = this.coins;
    const wv=document.getElementById('walletVal');if(wv)wv.textContent=this.coins;
    const iw=document.getElementById('inlineWallet');if(iw)iw.textContent=this.coins;
    this.updateBackpack();
    const pct = Math.min(100,(this.xp/this.xpNeeded)*100);
    document.getElementById('xpFill').style.width = pct+'%';
    document.getElementById('xpLabel').textContent = this.xp+' / '+this.xpNeeded+' XP';
    // streak dots
    const catchAt = this.caughtWordmons.length < 8 ? 10 : 15;
    const streakMod = this.streak % catchAt;
    for(let i=0;i<5;i++){
      const threshold = Math.floor((i+1) * catchAt / 5);
      document.getElementById('sd'+i).classList.toggle('filled', streakMod >= threshold);
    }
    // player
    const wm = this.getWordmon(this.activeWordmon);
    document.getElementById('playerName').textContent = wm.name;
    document.getElementById('playerSprite').innerHTML = this.spriteHtml(wm,110);
    this.updateHpBar('player');
    // enemy
    if(this.currentEnemy){
      document.getElementById('enemyName').textContent = this.currentEnemy.name;
      const eSize=this.isBossBattle?140:110;
      document.getElementById('enemySprite').innerHTML = '<img src="'+this.currentEnemy.sprite+'" style="width:'+eSize+'px;height:'+eSize+'px;object-fit:contain;image-rendering:pixelated">';
      this.updateHpBar('enemy');
    }
    document.getElementById('rosterCount').textContent = this.caughtWordmons.length;
    document.getElementById('rosterTotal').textContent = WORDMONS.length;
  },

  updateHpBar(who){
    const hp = who==='player'?this.playerHp:this.enemyHp;
    const max = who==='player'?this.playerMaxHp:this.enemyMaxHp;
    const pct = Math.max(0,(hp/max)*100);
    const bar = document.getElementById(who+'HpBar');
    bar.style.width = pct+'%';
    bar.className = 'hp-fill '+(pct>50?'green':pct>25?'yellow':'red');
    document.getElementById(who+'HpText').textContent = Math.max(0,hp)+'/'+max+' HP';
  },

  // ---- BATTLE ----
  spawnEnemy(){
    // Don't overwrite boss enemy
    if(this.isBossBattle) return;
    this.enemyIdx = (this.enemyIdx+1) % ENEMIES.length;
    this.currentEnemy = ENEMIES[this.enemyIdx];
    const bonus = Math.floor(this.level*2);
    this.enemyMaxHp = this.currentEnemy.hp + bonus;

    scene.style.backgroundImage = 'url(sprites/'+bg+'.png)';
    scene.style.backgroundSize = 'cover';
    scene.style.backgroundPosition = 'center bottom';

  addXP(n){
    this.xp+=n;
    while(this.xp>=this.xpNeeded){
      this.xp-=this.xpNeeded;
      this.level++;
      this.xpNeeded=Math.floor(this.xpNeeded*1.3);
      this.levelUp();
    }
    this.updateHUD();
  },

    SFX.play('levelup');
    const el=document.createElement('div');
    el.className='levelup-text';
    el.textContent='LEVEL UP! Lv'+this.level;
    document.body.appendChild(el);
    this.fireConfetti();
    setTimeout(()=>el.remove(),1600);

    this.coins+=n;

  // ---- STREAK / CATCH ----
  checkCatch(){
    // need 10-streak for catches; harder ones need 15
    const catchAt = this.caughtWordmons.length < 8 ? 10 : 15;
    if(this.streak>0 && this.streak%catchAt===0){
      const uncaught=WORDMONS.map((_,i)=>i).filter(i=>!this.caughtWordmons.includes(i));
      if(uncaught.length>0){
        const pick=uncaught[Math.floor(Math.random()*uncaught.length)];
        this.caughtWordmons.push(pick);
        SFX.play('catch');
        this.showCatchModal(this.getWordmon(pick));
        this.fireConfetti();
      }
    }
    setTimeout(()=>this.updateHUD(),100);

  // ---- PICK WORD ----
  pickWord(){
    // If there's a pending word the player hasn't answered yet, force them to do it
    if(this._pendingWord) return this._pendingWord;
    if(this.usedWords.length>=WORDS.length) this.usedWords=[];
    // 50% chance to pick a priority (teacher's K list) word
    let idx;
    const priorityIndices=WORDS.map((w,i)=>w.priority?i:null).filter(i=>i!==null&&!this.usedWords.includes(i));
    if(priorityIndices.length>0 && Math.random()<0.5){
      idx=priorityIndices[Math.floor(Math.random()*priorityIndices.length)];
    } else {
      do{idx=Math.floor(Math.random()*WORDS.length);}while(this.usedWords.includes(idx));
    }
    this.usedWords.push(idx);
    const wd=WORDS[idx];
    this._pendingWord=wd;
    return wd;
  },
  clearPendingWord(){
    this._pendingWord=null;
  },

  pickStory(){
    if(this.usedStories.length>=STORIES.length) this.usedStories=[];
    let idx;
    do{idx=Math.floor(Math.random()*STORIES.length);}while(this.usedStories.includes(idx));
    this.usedStories.push(idx);
    return STORIES[idx];
  },

  // ---- LOAD MODE ----
  loadMode(mode){
    this.answering=false;
    // clean up mini-game timers
    if(this._blockTimer){clearInterval(this._blockTimer);this._blockTimer=null;}
    if(this._blockKeys){document.removeEventListener('keydown',this._blockKeys);this._blockKeys=null;}
    if(this._dodgeTimer){clearInterval(this._dodgeTimer);this._dodgeTimer=null;}
    if(this._dodgeKeys){document.removeEventListener('keydown',this._dodgeKeys);this._dodgeKeys=null;}
    const area=document.getElementById('gameArea');
    area.innerHTML='';
    if(mode==='shop'){
      this.loadShopView();
      return;
    }
    switch(mode){
      case'fill':this.loadFillIn();break;
      case'spell':this.loadSpellIt();break;
      case'tricky':this.loadTricky();break;
      case'hear':this.loadHearIt();break;
      case'flash':this.loadFlash();break;
      case'decode':this.loadDecode();break;
      case'story':this.loadStory();break;
      case'readalong':this.loadReadAlong();break;
      case'popquiz':this.loadPopQuiz();break;
    }
  },

  // ---- THINK FIRST (anti-guessing) ----
  thinkFirst(container, seconds=2){
    const choices=container.querySelector('.choices');
    if(!choices) return;
    choices.classList.add('think-first');
    const overlay=document.createElement('div');
    overlay.className='think-overlay';
    overlay.innerHTML='👀 Read first! ('+seconds+'s)';
    choices.appendChild(overlay);
    let t=seconds;
    const iv=setInterval(()=>{
      t--;
      if(t>0){overlay.innerHTML='👀 Read first! ('+t+'s)';}
      else{
        clearInterval(iv);
        choices.classList.remove('think-first');
        overlay.remove();
      }
    },1000);
  },

  // ---- FILL IN ----
  loadFillIn(){
    const wd=this.pickWord();
    const area=document.getElementById('gameArea');
    const sent=wd.sent.replace('___','<span class="blank">_____</span>');
    const wrongs=WORDS.filter(x=>x.w!==wd.w).sort(()=>Math.random()-.5).slice(0,3).map(x=>x.w);
    const choices=shuffle([wd.w,...wrongs]);
    area.innerHTML='<div class="card" id="qCard"><div class="question-text">'+sent+'</div><div class="choices">'+
      choices.map(c=>'<button class="choice-btn" data-val="'+c+'">'+c+'</button>').join('')+
      '</div><div id="jokeArea"></div></div>';
    area.querySelectorAll('.choice-btn').forEach(btn=>{
      btn.addEventListener('click',()=>{
        if(this.answering)return;
        this.answering=true;
        const card=document.getElementById('qCard');
        card.querySelectorAll('.choice-btn').forEach(b=>b.classList.add('disabled'));
        if(btn.dataset.val===wd.w){
          btn.classList.add('correct');
          card.querySelector('.blank').textContent=wd.w;
          this.onCorrect(wd);
        }else{
          btn.classList.add('wrong-pick');
          card.querySelectorAll('.choice-btn').forEach(b=>{if(b.dataset.val===wd.w)b.classList.add('correct');});
          card.classList.add('wrong-shake');
          card.querySelector('.blank').textContent=wd.w;

  loadSpellIt(){

    const extras='abcdefghiklmnoprstuw'.split('').filter(l=>!letters.includes(l)).sort(()=>Math.random()-.5).slice(0,Math.max(2,5-letters.length));
    const allLetters=shuffle([...letters,...extras]);
    area.innerHTML='<div class="card" id="qCard">'+
      '<div class="question-text">Spell the word!</div>'+
      '<div class="spell-hint">'+wd.sent.replace('___','<strong style="color:var(--accent)">???</strong>')+'</div>'+
      '<div class="spell-display" id="spellDisplay">'+letters.map(()=>'<div class="spell-slot"></div>').join('')+'</div>'+
      '<div class="letter-tiles" id="letterTiles">'+allLetters.map((l,i)=>'<button class="letter-tile" data-idx="'+i+'" data-letter="'+l+'">'+l+'</button>').join('')+'</div>'+
      '<div class="spell-actions">'+
      '<button class="backspace-btn" id="spellBack">⬅ Back</button>'+
      '<button class="submit-spell" id="spellSubmit">Check ✓</button>'+
      '</div><div id="jokeArea"></div></div>';
    let typed=[];
    const slots=document.querySelectorAll('.spell-slot');
    const tiles=document.querySelectorAll('.letter-tile');
    tiles.forEach(t=>{
      t.addEventListener('click',()=>{
        if(this.answering||typed.length>=letters.length)return;
        typed.push({letter:t.dataset.letter,idx:t.dataset.idx});
        t.classList.add('used');
        upd();
      });
    });
    document.getElementById('spellBack').addEventListener('click',()=>{
      if(this.answering||typed.length===0)return;
      const rem=typed.pop();
      tiles.forEach(t=>{if(t.dataset.idx===rem.idx)t.classList.remove('used');});
      upd();
    });
    document.getElementById('spellSubmit').addEventListener('click',()=>{
      if(this.answering)return;
      this.answering=true;
      const attempt=typed.map(t=>t.letter).join('');
      const card=document.getElementById('qCard');
      if(attempt===wd.w){
        slots.forEach(s=>s.style.borderColor='var(--green)');
        this.onCorrect(wd);
      }else{
        slots.forEach((s,i)=>{s.textContent=letters[i];s.style.borderColor='var(--green)';});
        card.classList.add('wrong-shake');
        this.onWrong(wd);
      }
    });
    function upd(){
      slots.forEach((s,i)=>{
        if(typed[i]){s.textContent=typed[i].letter;s.classList.add('filled');}
        else{s.textContent='';s.classList.remove('filled');}
      });
    }
  },

  // ---- CORRECT / WRONG ----
  onCorrect(wd){
    this.clearPendingWord();
    if(wd&&wd.w){if(!this.wordStats[wd.w])this.wordStats[wd.w]={correct:0,wrong:0};this.wordStats[wd.w].correct++;this.wordStats[wd.w].lastSeen=Date.now();}
    SFX.play('correct');
    this.score+=5;
    this.streak++;
    if(this.streak>this.maxStreak) this.maxStreak=this.streak;
    this.modeWins++;
    this.totalCorrect++;
    this.addXP(10);
    this.addCoins(1);
    this.showMoneyAnimation(1);
    this.playerAttack();
    this.checkCatch();
    this.addWordmonXP(1);
    this.showJoke(wd);
    this.checkAchievements();
    const willKill = this.enemyHp <= 0;
    // update zone based on total correct (every 30 = new zone)
    const newZone=Math.min(Math.floor(this.totalCorrect/30), this.ZONES.length-1);
    if(newZone>this.currentZone){this.currentZone=newZone;}
    this.updateModeBar();
    // BOSS BATTLE every 50 correct
    if(this.totalCorrect>0 && this.totalCorrect%50===0 && !this.isBossBattle){
      if(this._autoTimer)clearTimeout(this._autoTimer);
      this._autoTimer=setTimeout(()=>{this._autoTimer=null;this.startBossBattle();},willKill?3000:2000);
      this.saveGame();
      return;
    }
    // Silly Mad Libs every 10 correct (but not on boss multiples or bonus multiples)
    if(this.totalCorrect>0 && this.totalCorrect%10===0 && this.totalCorrect%20!==0 && this.totalCorrect%50!==0){
      if(this._autoTimer)clearTimeout(this._autoTimer);
      this._autoTimer=setTimeout(()=>{this._autoTimer=null;this.showMadLib();},willKill?3000:2000);
      this.saveGame();
      return;
    }
    // bonus mini-game every 20 correct (but not on boss multiples)
    if(this.totalCorrect>0 && this.totalCorrect%20===0 && this.totalCorrect%50!==0){
      if(this._autoTimer)clearTimeout(this._autoTimer);
      this._autoTimer=setTimeout(()=>{this._autoTimer=null;this.loadBonusGame();},willKill?3000:2000);
      this.saveGame();
      return;
    }
    // Río trainer appears randomly (5% chance) with encouragement
    if(Math.random()<0.05 && !willKill) this.showRioTrainer();
    // check for streak milestones
    const milestones=[10,20,30,50,100];
    if(milestones.includes(this.streak)){
      this.showMilestone(this.streak);
      this.autoNext(willKill?5500:4500, this.modeWins>=15);
    } else if(this.modeWins>=15){
      this.autoNext(willKill?3000:2000,true);
    } else {
      this.autoNext(willKill?3000:2000);
    }
    this.saveGame();
  },

  // ---- TIC TAC TOE (Pokéball vs Berry) ----
  loadTicTacToe(){
    const mg=document.getElementById('miniGameArea');
    const board=Array(9).fill(null);
    const PLAYER='⚡'; // player is lightning bolt
    const CPU='🔴'; // cpu is pokeball
    let gameOver=false;

    const render=()=>{
      mg.innerHTML='<div style="font-family:Fredoka One,cursive;font-size:1.1rem;margin-bottom:10px">Tic-Tac-Toe! You are ⚡</div>'+
        '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;max-width:240px;margin:0 auto">'+
        board.map((v,i)=>'<button class="ttt-cell" data-i="'+i+'" style="width:74px;height:74px;border-radius:12px;border:3px solid #e2e8f0;background:#fff;font-size:2rem;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center'+(v?';pointer-events:none':'')+'">'+(v||'')+'</button>').join('')+
        '</div><div id="tttResult" style="margin-top:12px;font-family:Fredoka One,cursive;font-size:1.2rem"></div>';
      if(!gameOver){
        mg.querySelectorAll('.ttt-cell').forEach(btn=>{
          btn.addEventListener('click',()=>{
            const idx=parseInt(btn.dataset.i);
            if(board[idx]||gameOver)return;
            board[idx]=PLAYER;
            SFX.play('click');
            const w=checkWin(board);
            if(w){endGame(w);return;}
            if(!board.includes(null)){endGame('draw');return;}
            // CPU move
            setTimeout(()=>{
              const empty=board.map((v,i)=>v===null?i:null).filter(v=>v!==null);
              // try to win first, then block, then random
              let move=findWinMove(board,CPU)||findWinMove(board,PLAYER);
              if(move===null||move===undefined) move=empty.includes(4)?4:empty[Math.floor(Math.random()*empty.length)];
              board[move]=CPU;
              const w2=checkWin(board);
              if(w2){render();endGame(w2);return;}
              if(!board.includes(null)){render();endGame('draw');return;}
              render();
            },400);
            render();
          });
        });
      }
    };

    function checkWin(b){
      const lines=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
      for(const[a,bb,cc]of lines){
        if(b[a]&&b[a]===b[bb]&&b[a]===b[cc])return b[a];
      }
      return null;
    }
    function findWinMove(b,p){
      const lines=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
      for(const[a,bb,cc]of lines){
        const vals=[b[a],b[bb],b[cc]];
        if(vals.filter(v=>v===p).length===2&&vals.includes(null)){
          return [a,bb,cc][vals.indexOf(null)];
        }
      }
      return null;
    }
    const endGame=(result)=>{
      gameOver=true;
      render();
      const res=document.getElementById('tttResult');
      if(result===PLAYER){
        res.innerHTML='<span style="color:#22c55e">YOU WIN! ⚡ Super trainer!</span>';
        SFX.play('victory');this.fireConfetti();
      }else if(result===CPU){
        res.innerHTML='<span style="color:#ef4444">The wild Pokémon wins! Try again!</span>';
        SFX.play('wrong');
      }else{
        res.innerHTML='<span style="color:var(--accent)">Draw! Good battle!</span>';
        SFX.play('coin');
      }
      setTimeout(()=>{
        const btn=document.createElement('button');
        btn.textContent='Back to Reading! →';
        btn.style.cssText='display:block;margin:12px auto;font-family:Fredoka One,cursive;font-size:1rem;padding:10px 24px;border-radius:12px;border:none;background:var(--accent);color:#fff;cursor:pointer';
        btn.onclick=()=>this.loadMode(this.mode);
        document.getElementById('tttResult').appendChild(btn);
      },1500);
    };
    render();
  },

  // ---- BLOCK STACK (Tetris-like catch game) ----
  loadBlockStack(){
    const mg=document.getElementById('miniGameArea');
    const W=8,H=10;
    let grid=Array(H).fill(null).map(()=>Array(W).fill(0));
    let score=0,dropping=true,px=3,py=0;
    let piece=newPiece();
    const colors=['','#ef4444','#3b82f6','#22c55e','#fbbf24','#a855f7','#f97316','#ec4899'];

    function newPiece(){
      const shapes=[
        [[1,1],[1,1]], // square
        [[1,1,1,1]],   // line
        [[1,1,0],[0,1,1]], // z
        [[0,1,1],[1,1,0]], // s
        [[1,1,1],[0,1,0]], // t
        [[1,1,1],[1,0,0]], // l
        [[1,1,1],[0,0,1]], // j
      ];
      const s=shapes[Math.floor(Math.random()*shapes.length)];
      const c=1+Math.floor(Math.random()*7);
      return {shape:s.map(r=>r.map(v=>v?c:0)),w:s[0].length,h:s.length};
    }

    function canPlace(gd,p,x,y){
      for(let r=0;r<p.h;r++)for(let c=0;c<p.w;c++){
        if(p.shape[r][c]){
          const nx=x+c,ny=y+r;
          if(nx<0||nx>=W||ny>=H)return false;
          if(ny>=0&&gd[ny][nx])return false;
        }
      }
      return true;
    }

    function place(gd,p,x,y){
      for(let r=0;r<p.h;r++)for(let c=0;c<p.w;c++){
        if(p.shape[r][c]&&y+r>=0) gd[y+r][x+c]=p.shape[r][c];
      }
    }

    function clearLines(gd){
      let cleared=0;
      for(let r=H-1;r>=0;r--){
        if(gd[r].every(v=>v)){
          gd.splice(r,1);
          gd.unshift(Array(W).fill(0));
          cleared++;r++;
        }
      }
      return cleared;
    }

    const render=()=>{
      let html='<div style="font-family:Fredoka One,cursive;font-size:1.1rem;margin-bottom:6px">Block Stack! Score: '+score+'</div>';
      html+='<div style="display:inline-grid;grid-template-columns:repeat('+W+',28px);gap:1px;background:#e2e8f0;border:3px solid #cbd5e1;border-radius:8px;padding:2px">';
      // merge piece into display
      const disp=grid.map(r=>[...r]);
      if(dropping)for(let r=0;r<piece.h;r++)for(let c=0;c<piece.w;c++){
        if(piece.shape[r][c]&&py+r>=0&&py+r<H&&px+c>=0&&px+c<W)disp[py+r][px+c]=piece.shape[r][c];
      }
      for(let r=0;r<H;r++)for(let c=0;c<W;c++){
        const v=disp[r][c];
        html+='<div style="width:28px;height:28px;border-radius:4px;background:'+(v?colors[v]:'#f8fafc')+'"></div>';
      }
      html+='</div>';
      html+='<div style="display:flex;gap:8px;justify-content:center;margin-top:10px">'+
        '<button id="bsL" style="width:50px;height:50px;border-radius:12px;border:2px solid #e2e8f0;background:#fff;font-size:1.4rem;cursor:pointer">←</button>'+
        '<button id="bsD" style="width:50px;height:50px;border-radius:12px;border:2px solid #e2e8f0;background:#fff;font-size:1.4rem;cursor:pointer">↓</button>'+
        '<button id="bsR" style="width:50px;height:50px;border-radius:12px;border:2px solid #e2e8f0;background:#fff;font-size:1.4rem;cursor:pointer">→</button>'+
        '</div>';
      html+='<div id="bsResult" style="margin-top:8px;font-family:Fredoka One,cursive;font-size:1rem"></div>';
      mg.innerHTML=html;
      if(dropping){
        mg.querySelector('#bsL').onclick=()=>{if(canPlace(grid,piece,px-1,py)){px--;render();}};
        mg.querySelector('#bsR').onclick=()=>{if(canPlace(grid,piece,px+1,py)){px++;render();}};
        mg.querySelector('#bsD').onclick=()=>drop();
      }
    };

    const drop=()=>{
      if(!dropping)return;
      if(canPlace(grid,piece,px,py+1)){
        py++;render();
      }else{
        place(grid,piece,px,py);
        const lines=clearLines(grid);
        score+=lines*10+(lines?0:1);
        if(lines)SFX.play('correct');
        // check game over
        if(py<=0){
          dropping=false;
          render();
          document.getElementById('bsResult').innerHTML='<div style="color:var(--accent)">Game Over! Score: '+score+'! Nice building!</div>';
          SFX.play('victory');
          if(score>=30)this.fireConfetti();
          setTimeout(()=>{
            const btn=document.createElement('button');
            btn.textContent='Back to Reading! →';
            btn.style.cssText='display:block;margin:8px auto;font-family:Fredoka One,cursive;font-size:1rem;padding:10px 24px;border-radius:12px;border:none;background:var(--accent);color:#fff;cursor:pointer';
            btn.onclick=()=>this.loadMode(this.mode);
            document.getElementById('bsResult').appendChild(btn);
          },1200);
          return;
        }
        piece=newPiece();px=3;py=0;
        render();
      }
    };

    render();
    // auto-drop timer
    this._blockTimer=setInterval(()=>{if(dropping)drop();},800);
    // keyboard controls
    this._blockKeys=(e)=>{
      if(!dropping)return;
      if(e.key==='ArrowLeft'&&canPlace(grid,piece,px-1,py)){px--;render();}
      if(e.key==='ArrowRight'&&canPlace(grid,piece,px+1,py)){px++;render();}
      if(e.key==='ArrowDown')drop();
    };
    document.addEventListener('keydown',this._blockKeys);
  },

  // ---- POP QUIZ (hear word, spell it with letter tiles) ----
  loadPopQuiz(){
    const wd=this.pickWord();
    const area=document.getElementById('gameArea');
    const word=wd.w.toLowerCase();
    const letters=word.split('');
    const wins=this.popQuizWins||0;

    // DIFFICULTY LEVELS based on total pop quiz wins
    // Level 0 (0-4 wins): 2 distractors, slow TTS, sentence hint, first letter shown
    // Level 1 (5-14): 3 distractors, slow TTS, sentence hint
    // Level 2 (15-29): 4 distractors, medium TTS, sentence hint
    // Level 3 (30-49): 5 distractors, medium TTS, NO sentence hint
    // Level 4 (50+): FREE TYPE — no tiles, just type the word, normal TTS speed
    const diff = wins<5?0 : wins<15?1 : wins<30?2 : wins<50?3 : 4;
    const diffLabel=['🟢 Easy','🟡 Medium','🟠 Hard','🔴 Expert','💀 Master'][diff];
    const extraCount=[2,3,4,5,0][diff];
    const ttsRate=[0.55,0.6,0.7,0.75,0.85][diff];
    const showSentence=diff<3;
    const showFirstLetter=diff===0;
    const freeType=diff>=4;

    const alphabet='abcdefghijklmnopqrstuvwxyz';
    const extras=[];
    if(!freeType){
      while(extras.length<extraCount){
        const l=alphabet[Math.floor(Math.random()*26)];
        if(!letters.includes(l)&&!extras.includes(l)) extras.push(l);
      }
    }
    const allTiles=freeType?[]:shuffle([...letters,...extras]);
    let built=[];
    let submitted=false;

    // Pre-fill first letter at easiest difficulty
    if(showFirstLetter && letters.length>1) built.push(letters[0]);

    const render=()=>{
      const slots=letters.map((_,i)=>{
        const filled=built[i]||'';
        return '<span style="display:inline-block;width:36px;height:44px;border-bottom:3px solid '+(filled?'var(--accent)':'#cbd5e1')+';margin:0 3px;font-family:Fredoka One,cursive;font-size:1.8rem;text-align:center;line-height:44px;color:var(--text)">'+filled+'</span>';

      } else {

              }

            // simpler: check if this specific tile index is used

                  if(t===i && count===bi) return true;

                }

        '<div class="question-text" style="font-size:1.1rem;margin-bottom:4px">🎧 Pop Quiz! <span style="font-size:.7rem;background:'+(diff<2?'#dcfce7':diff<4?'#fef3c7':'#fef2f2')+';padding:2px 8px;border-radius:8px;color:'+(diff<2?'#15803d':diff<4?'#92400e':'#b91c1c')+'">'+diffLabel+'</span></div>'+
        '<div style="text-align:center;margin-bottom:8px"><button id="pqPlay" style="font-size:2.5rem;background:none;border:none;cursor:pointer;animation:speakerPulse 2s ease-in-out infinite">🔊</button></div>'+
        (showSentence?'<div style="text-align:center;margin-bottom:4px;font-size:.8rem;color:var(--text2);font-weight:600">'+wd.sent.replace('___','<span style="color:var(--accent);font-weight:800">???</span>')+'</div>':
        '<div style="text-align:center;margin-bottom:4px;font-size:.8rem;color:var(--text2);font-weight:600;font-style:italic">No hint! Just listen! 👂</div>')+
        (showFirstLetter&&letters.length>1?'<div style="text-align:center;font-size:.75rem;color:var(--green);font-weight:700;margin-bottom:4px">💡 First letter given!</div>':'')+
        '<div style="text-align:center;font-size:.65rem;color:var(--text2);margin-bottom:6px">'+word.length+' letters</div>'+
        '<div style="text-align:center;margin:8px 0">'+slots+'</div>'+
        inputArea+
        '<div id="jokeArea"></div></div>';

      // Wire events
      document.getElementById('pqPlay').addEventListener('click',speakWord);

      if(freeType){
        const input=document.getElementById('pqInput');
        setTimeout(()=>input.focus(),100);
        const doCheck=()=>{
          if(submitted) return;
          submitted=true; this.answering=true;
          const val=input.value.trim().toLowerCase();
          if(val===word){
            input.style.borderColor='var(--green)';input.style.background='#dcfce7';
            this.popQuizWins++;this.onCorrect(wd);
          }else{
            input.style.borderColor='var(--red)';input.style.background='#fef2f2';
            input.value=word;
            document.getElementById('jokeArea').innerHTML='<div style="text-align:center;margin-top:8px;font-family:Fredoka One,cursive;font-size:1.3rem;color:var(--accent)">The word was: '+word+'</div>';
            this.onWrong(wd);
          }
        };
        document.getElementById('pqCheck').addEventListener('click',doCheck);
        input.addEventListener('keydown',e=>{if(e.key==='Enter')doCheck();});
      } else {
        area.querySelectorAll('.pq-tile').forEach(btn=>{
          btn.addEventListener('click',()=>{
            if(submitted||built.length>=letters.length) return;
            built.push(btn.dataset.letter);
            SFX.play('click');
            render();
          });
        });
        const undoBtn=document.getElementById('pqUndo');
        if(undoBtn) undoBtn.addEventListener('click',()=>{
          if(submitted||built.length===0||(showFirstLetter&&built.length<=1)) return;
          built.pop(); SFX.play('click'); render();
        });
        document.getElementById('pqCheck').addEventListener('click',()=>{
          if(submitted||built.length<letters.length) return;
          submitted=true; this.answering=true;
          const correct=built.join('')===word;
          if(correct){
            area.querySelectorAll('#qCard span').forEach(s=>{if(s.textContent.trim()&&s.style.borderBottom)s.style.color='var(--green)';});
            this.popQuizWins++;this.onCorrect(wd);
          } else {
            letters.forEach((l,i)=>{
              const spans=area.querySelectorAll('#qCard span');
              if(spans[i]) spans[i].style.color=built[i]===l?'var(--green)':'var(--red)';
            });
            document.getElementById('jokeArea').innerHTML='<div style="text-align:center;margin-top:8px;font-family:Fredoka One,cursive;font-size:1.3rem;color:var(--accent)">The word was: '+word+'</div>';
            this.onWrong(wd);
          }
        });
      }
    };

    const speakWord=()=>{
      if(!('speechSynthesis' in window)) return;
      speechSynthesis.cancel();
      const u=new SpeechSynthesisUtterance(word);
      u.rate=ttsRate; u.pitch=1.0;
      const good=getBestVoice();
      if(good) u.voice=good;
      speechSynthesis.speak(u);
    };

    render();
    setTimeout(speakWord, 500);
  },

  // ---- DODGE ATTACK (tap to dodge falling attacks) ----
  loadDodgeAttack(){
    const mg=document.getElementById('miniGameArea');
    const W=5,ROWS=6;
    let playerX=2,score=0,lives=3,gameOver=false;
    let attacks=[];
    const ATTACKS=['🔥','💧','⚡','🗿','❄️','🌿','💀'];
    const PLAYER='⚡';

    const render=()=>{
      let html='<div style="font-family:Fredoka One,cursive;font-size:1rem;margin-bottom:6px">Dodge Attack! ❤️×'+lives+' Score: '+score+'</div>';
      html+='<div style="display:grid;grid-template-columns:repeat('+W+',50px);gap:3px;justify-content:center;margin:0 auto">';
      for(let r=0;r<ROWS;r++){
        for(let c=0;c<W;c++){
          const atk=attacks.find(a=>a.x===c&&a.y===r);
          const isPlayer=r===ROWS-1&&c===playerX;
          let content='';let bg='#f1f5f9';
          if(isPlayer){content=PLAYER;bg='#fef3c7';}
          if(atk){content=atk.emoji;bg='#fef2f2';}
          if(isPlayer&&atk){content='💥';bg='#fca5a5';}
          html+='<div style="width:50px;height:50px;border-radius:8px;background:'+bg+';display:flex;align-items:center;justify-content:center;font-size:1.6rem;border:2px solid #e2e8f0">'+content+'</div>';
        }
      }
      html+='</div>';
      html+='<div style="display:flex;gap:10px;justify-content:center;margin-top:10px">'+
        '<button id="daL" style="width:60px;height:50px;border-radius:12px;border:2px solid #e2e8f0;background:#fff;font-size:1.4rem;cursor:pointer">⬅️</button>'+
        '<button id="daR" style="width:60px;height:50px;border-radius:12px;border:2px solid #e2e8f0;background:#fff;font-size:1.4rem;cursor:pointer">➡️</button>'+
        '</div><div id="daResult" style="margin-top:6px;font-family:Fredoka One,cursive;font-size:1rem"></div>';
      mg.innerHTML=html;
      if(!gameOver){
        mg.querySelector('#daL').onclick=()=>{if(playerX>0){playerX--;render();}};
        mg.querySelector('#daR').onclick=()=>{if(playerX<W-1){playerX++;render();}};
      }
    };

    const tick=()=>{
      if(gameOver)return;
      // move attacks down
      attacks.forEach(a=>a.y++);
      // check hits
      attacks=attacks.filter(a=>{
        if(a.y===ROWS-1&&a.x===playerX){lives--;SFX.play('hurt');return false;}
        if(a.y>=ROWS){score++;return false;}
        return true;
      });
      // spawn new attack
      if(Math.random()<0.5){
        attacks.push({x:Math.floor(Math.random()*W),y:0,emoji:ATTACKS[Math.floor(Math.random()*ATTACKS.length)]});
      }
      render();
      if(lives<=0){
        gameOver=true;
        document.getElementById('daResult').innerHTML='<div style="color:var(--accent)">Game Over! You dodged '+score+' attacks!</div>';
        if(score>=8){SFX.play('victory');this.fireConfetti();}else SFX.play('coin');
        setTimeout(()=>{
          const btn=document.createElement('button');
          btn.textContent='Back to Reading! →';
          btn.style.cssText='display:block;margin:8px auto;font-family:Fredoka One,cursive;font-size:1rem;padding:10px 24px;border-radius:12px;border:none;background:var(--accent);color:#fff;cursor:pointer';
          btn.onclick=()=>{clearInterval(this._dodgeTimer);this._dodgeTimer=null;this.loadMode(this.mode);};
          document.getElementById('daResult').appendChild(btn);
        },1200);
      }
    };

    render();
    this._dodgeTimer=setInterval(()=>tick(),700);
    // keyboard
    this._dodgeKeys=(e)=>{
      if(gameOver)return;
      if(e.key==='ArrowLeft'&&playerX>0){playerX--;render();}
      if(e.key==='ArrowRight'&&playerX<W-1){playerX++;render();}
    };
    document.addEventListener('keydown',this._dodgeKeys);
  },

  // ---- READ ALONG (TTS reads sentence but pauses for target word) ----
  loadReadAlong(){
    const wd=this.pickWord();
    const area=document.getElementById('gameArea');
    const sent=wd.sent.replace('___',wd.w);
    const words=sent.split(/\s+/);
    // pick which word(s) Río must read (the target word + maybe 1 more)
    const targetIdx=words.findIndex(w=>w.toLowerCase().replace(/[^a-z]/g,'')===wd.w);
    const gapIndices=new Set([targetIdx>=0?targetIdx:0]);
    // add another gap if sentence is long enough
    if(words.length>5){
      let extra;
      do{extra=Math.floor(Math.random()*words.length);}while(gapIndices.has(extra)||words[extra].length<2);
      gapIndices.add(extra);
    }
    // build display — gap words shown as blanks, NOT the actual word
    const displayWords=words.map((w,i)=>{
      if(gapIndices.has(i)) return '<span class="ra-gap" data-word="'+w.toLowerCase().replace(/[^a-z]/g,'')+'" style="background:var(--accent);color:#fff;padding:4px 12px;border-radius:10px;font-weight:800;display:inline-block;margin:2px">???</span>';
      return '<span class="ra-word" style="display:inline-block;margin:2px">'+w+'</span>';
    });
    const wrongs=WORDS.filter(x=>x.w!==wd.w).sort(()=>Math.random()-.5).slice(0,3).map(x=>x.w);
    const choices=shuffle([wd.w,...wrongs]);
    area.innerHTML='<div class="card" id="qCard">'+
      '<div class="question-text" style="font-size:1.1rem;margin-bottom:6px">Listen! What word is missing?</div>'+
      '<div style="text-align:center;margin-bottom:8px"><button id="raPlay" style="font-size:2.5rem;background:none;border:none;cursor:pointer;animation:speakerPulse 2s ease-in-out infinite">🔊</button></div>'+
      '<div id="raSentence" style="font-size:1.5rem;font-weight:700;text-align:center;line-height:2;margin-bottom:12px">'+displayWords.join(' ')+'</div>'+
      '<div class="question-text" style="font-size:1rem;margin-bottom:8px">Which word goes in the orange spot?</div>'+
      '<div class="choices">'+choices.map(c=>'<button class="choice-btn" data-val="'+c+'">'+c+'</button>').join('')+'</div>'+
      '<div id="jokeArea"></div></div>';
    // TTS: read all words but pause/skip the gap words
    const speakSentence=()=>{
      if(!('speechSynthesis' in window)) return;
      speechSynthesis.cancel();
      const before=words.slice(0,targetIdx>=0?targetIdx:0).join(' ');
      const after=words.slice((targetIdx>=0?targetIdx:0)+1).join(' ');
      // read words before gap
      if(before){
        const u1=new SpeechSynthesisUtterance(before);
        u1.rate=0.7;u1.pitch=1.0;
        const good=getBestVoice();
        if(good)u1.voice=good;
        u1.onend=()=>{
          // pause then say "your turn!"
          setTimeout(()=>{
            const uPause=new SpeechSynthesisUtterance('... your turn! ...');
            uPause.rate=0.8;uPause.pitch=1.2;
            if(good)uPause.voice=good;
            uPause.onend=()=>{
              if(after){
                setTimeout(()=>{
                  const u2=new SpeechSynthesisUtterance(after);
                  u2.rate=0.7;u2.pitch=1.0;if(good)u2.voice=good;
                  speechSynthesis.speak(u2);
                },800);
              }
            };
            speechSynthesis.speak(uPause);
          },500);
        };
        speechSynthesis.speak(u1);
      } else {
        const uPause=new SpeechSynthesisUtterance('Your turn! ... '+after);
        uPause.rate=0.7;uPause.pitch=1.0;
        const good=getBestVoice();
        if(good)uPause.voice=good;
        speechSynthesis.speak(uPause);
      }
    };
    setTimeout(speakSentence,600);
    document.getElementById('raPlay').addEventListener('click',speakSentence);
    // answer handling
    area.querySelectorAll('.choice-btn').forEach(btn=>{
      btn.addEventListener('click',()=>{
        if(this.answering)return;
        this.answering=true;
        const card=document.getElementById('qCard');
        card.querySelectorAll('.choice-btn').forEach(b=>b.classList.add('disabled'));
        if(btn.dataset.val===wd.w){
          btn.classList.add('correct');
          this.onCorrect(wd);
        }else{
          btn.classList.add('wrong-pick');
          card.querySelectorAll('.choice-btn').forEach(b=>{if(b.dataset.val===wd.w)b.classList.add('correct');});
          card.classList.add('wrong-shake');
          this.onWrong(wd);
        }
      });
    });
    this.thinkFirst(document.getElementById('qCard'),3);
  },
