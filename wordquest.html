  // =========================================================
  // 🔀 SENTENCE SCRAMBLE — tap words in correct order
  // =========================================================
  loadScramble(){
    const level=this.getReadingLevel();
    const pool=SCRAMBLES[level]||SCRAMBLES[1];
    const pick=pool[Math.floor(Math.random()*pool.length)];
    this._pendingWord={w:'scramble_'+pick.s.slice(0,8)};
    // split sentence into word tokens (keep punctuation on last)
    const words=pick.s.split(/\s+/);
    const target=words.map(w=>w.toLowerCase().replace(/[^a-z]/g,''));
    const shuffled=shuffle(words.map((w,i)=>({w,i})));
    const area=document.getElementById('gameArea');
    const picked=[]; // array of {w,i} in order tapped
    const render=()=>{
      const remaining=shuffled.filter(t=>!picked.find(p=>p.i===t.i));
      const correctSoFar=picked.every((p,idx)=>p.i===idx);
      area.innerHTML='<div class="card" id="qCard" style="padding:18px">'+
        '<div style="text-align:center;font-family:Fredoka One,cursive;font-size:1rem;color:var(--accent);margin-bottom:4px">🔀 Put the words in order!</div>'+
        '<div style="text-align:center;font-size:.8rem;color:var(--text2);font-weight:700;margin-bottom:12px">Read the sentence in your head, then tap the words.</div>'+
        '<div id="scrSlots" style="min-height:56px;border:3px dashed #cbd5e1;border-radius:14px;padding:10px;margin-bottom:14px;display:flex;flex-wrap:wrap;gap:6px;align-items:center;justify-content:center;background:#fff7ed">'+
          (picked.length===0?'<span style="color:var(--text2);font-size:.9rem;font-style:italic">tap words below ↓</span>':
            picked.map((p,i)=>'<span class="scr-slot" data-i="'+i+'" style="background:'+(correctSoFar?'var(--accent)':'#fbbf24')+';color:#fff;padding:8px 12px;border-radius:10px;font-family:Fredoka One,cursive;font-size:1.1rem;cursor:pointer">'+p.w+'</span>').join(''))+
        '</div>'+
        '<div id="scrBank" style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:12px">'+
          remaining.map(t=>'<button class="scr-tile" data-i="'+t.i+'" style="font-family:Fredoka One,cursive;font-size:1.05rem;padding:10px 14px;border-radius:10px;border:2px solid #cbd5e1;background:#fff;color:var(--text);cursor:pointer">'+t.w+'</button>').join('')+
        '</div>'+
        '<div style="display:flex;gap:8px;justify-content:center">'+
          '<button id="scrClear" style="font-family:Nunito,sans-serif;font-weight:700;font-size:.85rem;padding:8px 16px;border-radius:10px;border:2px solid #e2e8f0;background:#fff;color:var(--text2);cursor:pointer">⬅ Clear</button>'+
          '<button id="scrCheck" '+(picked.length===words.length?'':'disabled')+' style="font-family:Fredoka One,cursive;font-size:.95rem;padding:8px 20px;border-radius:10px;border:none;background:'+(picked.length===words.length?'var(--accent)':'#cbd5e1')+';color:#fff;cursor:'+(picked.length===words.length?'pointer':'default')+'">Check ✓</button>'+
        '</div>'+
        '<div id="jokeArea"></div></div>';
      area.querySelectorAll('.scr-tile').forEach(btn=>{
        btn.addEventListener('click',()=>{
          SFX.play('click');
          const i=parseInt(btn.dataset.i);
          const item=shuffled.find(t=>t.i===i);
          picked.push(item);
          this._speak(item.w,0.7);
          render();
        });
      });
      area.querySelectorAll('.scr-slot').forEach(sp=>{
        sp.addEventListener('click',()=>{
          const idx=parseInt(sp.dataset.i);
          picked.splice(idx,1);
          render();
        });
      });
      document.getElementById('scrClear').addEventListener('click',()=>{
        picked.length=0;render();
      });
      const checkBtn=document.getElementById('scrCheck');
      if(checkBtn) checkBtn.addEventListener('click',()=>{
        if(this.answering||picked.length!==words.length)return;
        this.answering=true;
        const built=picked.map(p=>p.w).join(' ');
        const card=document.getElementById('qCard');
        if(built===pick.s){
          document.getElementById('scrSlots').style.borderColor='var(--green)';
          this._speak(pick.s,0.7);
          this.onCorrect({w:'scramble',joke:'"'+pick.s+'" — that is the one! 🎉'});
        } else {
          card.classList.add('wrong-shake');
          // show the right answer highlighted
          document.getElementById('scrSlots').innerHTML=words.map(w=>'<span style="background:var(--green);color:#fff;padding:8px 12px;border-radius:10px;font-family:Fredoka One,cursive;font-size:1.1rem;margin:2px">'+w+'</span>').join('');
          document.getElementById('scrSlots').style.borderColor='var(--green)';
          this._speak('The right way is: '+pick.s,0.7);
          this.onWrong({w:'scramble',joke:'Close! Read it out loud: "'+pick.s+'"'});
        }
      });
    };
    render();
  },

      'I like red and blue.',
      'She can read very well.',
      'Do you have a dog?',
      'The cat is on the bed.',
      'We are going to play.',
      'I want to go home.',
      'He is my best friend.',
    ];
    const sentence=SENTENCES[Math.floor(Math.random()*SENTENCES.length)];
    const words=sentence.replace(/[.?!]/g,'').split(/\s+/);
    const punctuation=sentence.match(/[.?!]$/)?.[0]||'.';
    const scrambled=shuffle([...words]);
    let built=[];
    let remaining=[...scrambled];

    const render=()=>{
      area.innerHTML='<div class="card" id="qCard">'+
        '<div class="question-text" style="font-size:1.1rem;margin-bottom:6px">Build the sentence!</div>'+
        '<div style="text-align:center;font-size:.9rem;color:var(--text2);margin-bottom:12px">Tap the words in the right order</div>'+
        // Built sentence area
        '<div style="min-height:60px;background:#f8fafc;border-radius:14px;padding:12px;margin-bottom:12px;display:flex;flex-wrap:wrap;gap:6px;align-items:center;border:2px dashed #d6d3d1" id="builtArea">'+
        (built.length===0?'<div style="color:#a8a29e;font-style:italic;font-size:1rem;width:100%;text-align:center">Tap words below...</div>':
        built.map((w,i)=>'<span style="font-family:Fredoka One,cursive;font-size:1.4rem;color:var(--navy);background:#fff;padding:6px 12px;border-radius:10px;box-shadow:0 2px 0 #e7e5e4;cursor:pointer;transition:all .15s" data-built="'+i+'">'+w+'</span>').join(''))+
        (built.length>0?'<span style="font-family:Fredoka One,cursive;font-size:1.4rem;color:var(--text2)">'+punctuation+'</span>':'')+
        '</div>'+
        // Remaining words to choose from
        '<div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center" id="wordPool">'+
        remaining.map((w,i)=>'<button class="choice-btn" data-idx="'+i+'" style="font-size:1.3rem;padding:12px 16px;min-height:auto">'+w+'</button>').join('')+
        '</div>'+
        // Undo button
        '<div style="text-align:center;margin-top:10px">'+
        (built.length>0?'<button id="undoBtn" style="font-family:Fredoka One,cursive;font-size:.85rem;padding:6px 16px;border-radius:10px;border:2px solid #d6d3d1;background:#fff;color:var(--text2);cursor:pointer">Undo</button>':'')+
        '</div>'+
        '<div id="sentResult" style="text-align:center;margin-top:8px;min-height:24px"></div>'+
        '</div>';

      // Wire up word pool buttons
      area.querySelectorAll('#wordPool .choice-btn').forEach(btn=>{
        btn.addEventListener('click',()=>{
          const idx=parseInt(btn.dataset.idx);
          built.push(remaining[idx]);
          remaining.splice(idx,1);
          SFX.play('click');
          // Check if sentence is complete
          if(remaining.length===0){
            const builtSentence=built.join(' ');
            const correctSentence=words.join(' ');
            if(builtSentence===correctSentence){
              // CORRECT!
              render();
              document.getElementById('builtArea').style.borderColor='var(--green)';
              document.getElementById('builtArea').style.background='#dcfce7';
              document.getElementById('sentResult').innerHTML='<div style="font-family:Fredoka One,cursive;font-size:1.2rem;color:#22c55e">Perfect sentence!</div>';
              this.onCorrect({w:words[0]});
            } else {
              // WRONG ORDER
              render();
              document.getElementById('builtArea').style.borderColor='#dc2626';
              document.getElementById('builtArea').style.background='#fef2f2';
              document.getElementById('sentResult').innerHTML='<div style="font-family:Fredoka One,cursive;font-size:.9rem;color:#dc2626">Not quite! The correct sentence is:</div><div style="font-family:Fredoka One,cursive;font-size:1.1rem;color:var(--navy);margin-top:4px">'+sentence+'</div>';
              this.onWrong({w:words[0]});
            }
          } else {
            render();
          }
        });
      });

      // Undo button
      const undo=document.getElementById('undoBtn');
      if(undo){
        undo.addEventListener('click',()=>{
          if(built.length>0){
            remaining.push(built.pop());
            SFX.play('click');
            render();
          }
        });
      }

      // Tap built words to remove them
      area.querySelectorAll('[data-built]').forEach(el=>{
        el.addEventListener('click',()=>{
          const idx=parseInt(el.dataset.built);
          remaining.push(built[idx]);
          built.splice(idx,1);
          SFX.play('click');
          render();
        });
      });
    };

    render();
    // Speak the sentence first so they know what to build
    speak("Put the words in order! "+sentence, 0.75, 1.1);
  },

  loadReadAlong(){
    const wd=this.pickWord();
    const area=document.getElementById('gameArea');
    const sent=wd.sent.replace('___',wd.w);
    const words=sent.split(/\s+/);
    // pick which word(s) Río must read (the target word + maybe 1 more)
    const targetIdx=words.findIndex(w=>w.toLowerCase().replace(/[^a-z]/g,'')===wd.w);
    const gapIndices=new Set([targetIdx>=0?targetIdx:0]);
    // add another gap if sentence is long enough
    if(words.length>5){
      let extra;
      do{extra=Math.floor(Math.random()*words.length);}while(gapIndices.has(extra)||words[extra].length<2);
      gapIndices.add(extra);
    }
    // build display — gap words shown as blanks, NOT the actual word
    const displayWords=words.map((w,i)=>{
      if(gapIndices.has(i)) return '<span class="ra-gap" data-word="'+w.toLowerCase().replace(/[^a-z]/g,'')+'" style="background:var(--accent);color:#fff;padding:4px 12px;border-radius:10px;font-weight:800;display:inline-block;margin:2px">???</span>';
      return '<span class="ra-word" style="display:inline-block;margin:2px">'+w+'</span>';
    });
    const wrongs=WORDS.filter(x=>x.w!==wd.w).sort(()=>Math.random()-.5).slice(0,3).map(x=>x.w);
    const choices=shuffle([wd.w,...wrongs]);
    area.innerHTML='<div class="card" id="qCard">'+
      '<div class="question-text" style="font-size:1.1rem;margin-bottom:6px">Listen! What word is missing?</div>'+
      '<div style="text-align:center;margin-bottom:8px"><button id="raPlay" style="font-size:2.5rem;background:none;border:none;cursor:pointer;animation:speakerPulse 2s ease-in-out infinite">🔊</button></div>'+
      '<div id="raSentence" style="font-size:1.5rem;font-weight:700;text-align:center;line-height:2;margin-bottom:12px">'+displayWords.join(' ')+'</div>'+
      '<div class="question-text" style="font-size:1rem;margin-bottom:8px">Which word goes in the orange spot?</div>'+
      '<div class="choices">'+choices.map(c=>'<button class="choice-btn" data-val="'+c+'">'+c+'</button>').join('')+'</div>'+
      '<div id="jokeArea"></div></div>';
    // TTS: read all words but pause/skip the gap words
    const speakSentence=()=>{
      if(!('speechSynthesis' in window)) return;
      speechSynthesis.cancel();
      const before=words.slice(0,targetIdx>=0?targetIdx:0).join(' ');
      const after=words.slice((targetIdx>=0?targetIdx:0)+1).join(' ');
      // read words before gap
      if(before){
        const u1=new SpeechSynthesisUtterance(before);
        u1.rate=0.7;u1.pitch=1.0;
        const good=getBestVoice();
        if(good)u1.voice=good;
        u1.onend=()=>{
          // pause then say "your turn!"
          setTimeout(()=>{
            const uPause=new SpeechSynthesisUtterance('... your turn! ...');
            uPause.rate=0.8;uPause.pitch=1.2;
            if(good)uPause.voice=good;
            uPause.onend=()=>{
              if(after){
                setTimeout(()=>{
                  const u2=new SpeechSynthesisUtterance(after);
                  u2.rate=0.7;u2.pitch=1.0;if(good)u2.voice=good;
                  speechSynthesis.speak(u2);
                },800);
              }
            };
            speechSynthesis.speak(uPause);
          },500);
        };
        speechSynthesis.speak(u1);
      } else {
        const uPause=new SpeechSynthesisUtterance('Your turn! ... '+after);
        uPause.rate=0.7;uPause.pitch=1.0;
        const good=getBestVoice();
        if(good)uPause.voice=good;
        speechSynthesis.speak(uPause);
      }
    };
    setTimeout(speakSentence,600);
    document.getElementById('raPlay').addEventListener('click',speakSentence);
    // answer handling
    area.querySelectorAll('.choice-btn').forEach(btn=>{
      btn.addEventListener('click',()=>{
        if(this.answering)return;
        this.answering=true;
        const card=document.getElementById('qCard');
        card.querySelectorAll('.choice-btn').forEach(b=>b.classList.add('disabled'));
        if(btn.dataset.val===wd.w){
          btn.classList.add('correct');
          this.onCorrect(wd);
        }else{
          btn.classList.add('wrong-pick');
          card.querySelectorAll('.choice-btn').forEach(b=>{if(b.dataset.val===wd.w)b.classList.add('correct');});
          card.classList.add('wrong-shake');
          this.onWrong(wd);
        }
      });
    });
    this.thinkFirst(document.getElementById('qCard'),3);
  },

  // Pick a phonics word appropriate to difficulty
  pickPhonicsWord(){
    const round=this.phonicsRound;
    const pool=this.PHONICS_WORDS;
    // First 10 rounds: only 3-letter words
    // 10-25: mix of 3-4 letter words
    // 25+: include all words including irregular sight words
    let filtered;
    if(round<10) filtered=pool.filter(p=>p.w.length<=3&&p.sounds.length<=3);
    else if(round<25) filtered=pool.filter(p=>p.w.length<=4);
    else filtered=pool;
    if(filtered.length===0) filtered=pool;
    return filtered[Math.floor(Math.random()*filtered.length)];
  },

  loadPhonics(){
    const area=document.getElementById('gameArea');
    const exercises=['blend','segment','build','chain'];
    const ex=exercises[this.phonicsRound%4];
    this.phonicsRound++;

    if(ex==='blend') this.loadPhonicsBlend(area);
    else if(ex==='segment') this.loadPhonicsSegment(area);
    else if(ex==='chain') this.loadPhonicsChain(area);
    else this.loadPhonicsBuild(area);
  },

    // Pick SIMILAR wrong choices (same length, share some letters)
    const sameLen=this.PHONICS_WORDS.filter(x=>x.w!==pw.w&&x.w.length===pw.w.length);
    const similar=sameLen.length>=3?sameLen:this.PHONICS_WORDS.filter(x=>x.w!==pw.w);
    const wrongs=similar.sort(()=>Math.random()-.5).slice(0,3).map(x=>x.w);
    const choices=shuffle([pw.w,...wrongs]);
    const numSounds=pw.sounds.length;

    area.innerHTML='<div class="card" id="qCard">'+
      '<div style="text-align:center;font-family:Fredoka One,cursive;font-size:1rem;color:#2563eb;margin-bottom:4px">📖 Sound Blending</div>'+

      '<div style="text-align:center;margin-bottom:8px"><button id="phPlay" style="font-size:2.5rem;background:none;border:none;cursor:pointer;animation:speakerPulse 2s ease-in-out infinite">🔊</button></div>'+
      '<div id="soundBoxes" style="display:flex;justify-content:center;gap:8px;margin-bottom:12px">'+
      pw.sounds.map((_,i)=>'<div class="sound-box" style="background:#dbeafe;border:2px solid #93c5fd;border-radius:12px;padding:14px 16px;font-size:1.8rem;min-width:48px;text-align:center;opacity:.3;transition:all .3s">🔉</div>').join('')+
      '</div>'+
      '<div style="text-align:center;font-size:.75rem;color:var(--text2);margin-bottom:6px">'+numSounds+' sounds — tap 🔊 to listen again</div>'+
      '<div style="text-align:center;font-family:Fredoka One,cursive;font-size:1.2rem;margin-bottom:8px;color:var(--text)">→ What word? ←</div>'+
      '<div class="choices">'+choices.map(c=>'<button class="choice-btn" data-val="'+c+'">'+c+'</button>').join('')+'</div>'+
      '<div id="jokeArea"></div></div>';

    // Speak each sound with a pause, highlighting the box
    const speakSounds=()=>{
      const boxes=document.querySelectorAll('.sound-box');
      let i=0;
      const sayNext=()=>{
        if(i>=pw.sounds.length){
          setTimeout(()=>{
            speak('What word?',0.8,1.1);
            boxes.forEach(b=>{b.style.opacity='1';b.textContent='🔊';});
          },400);
          return;
        }
        boxes.forEach((b,j)=>{b.style.opacity=j===i?'1':'0.3';b.textContent='🔉';});
        boxes[i].textContent='🔊';
        boxes[i].style.transform='scale(1.15)';
        speak(pw.sounds[i],0.55,1.0,()=>{
          boxes[i].style.transform='';
          i++;
          setTimeout(sayNext,400);
        });
      };
      sayNext();
    };

    setTimeout(speakSounds,600);
    document.getElementById('phPlay').addEventListener('click',speakSounds);

    area.querySelectorAll('.choice-btn').forEach(btn=>{
      btn.addEventListener('click',()=>{
        if(this.answering)return;
        this.answering=true;
        const card=document.getElementById('qCard');
        card.querySelectorAll('.choice-btn').forEach(b=>b.classList.add('disabled'));
        if(btn.dataset.val===pw.w){
          btn.classList.add('correct');
          this.onCorrect({w:pw.w,sent:'___ is a word.',joke:'Great blending!'});
        }else{
          btn.classList.add('wrong-pick');
          card.querySelectorAll('.choice-btn').forEach(b=>{if(b.dataset.val===pw.w)b.classList.add('correct');});
          card.classList.add('wrong-shake');
          this.onWrong({w:pw.w,sent:'___ is a word.',joke:''});
        }
      });
    });
    this.thinkFirst(document.getElementById('qCard'),3);
  },

  // Exercise 3: WORD BUILDING — hear the word, tap letters in order to build it
  loadPhonicsBuild(area){
    const pw=this.pickPhonicsWord();
    const word=pw.w;
    const letters=word.split('');
    const extras=[];
    const alphabet='abcdefghijklmnopqrstuvwxyz';
    while(extras.length<3){
      const l=alphabet[Math.floor(Math.random()*26)];
      if(!letters.includes(l)&&!extras.includes(l)) extras.push(l);
    }
    const allTiles=shuffle([...letters,...extras]);
    let built=[];
    let submitted=false;

    const render=()=>{
      const slots=letters.map((_,i)=>{
        const filled=built[i]||'';
        return '<span style="display:inline-block;width:40px;height:50px;border-bottom:3px solid '+(filled?'#2563eb':'#cbd5e1')+';margin:0 4px;font-family:Fredoka One,cursive;font-size:2rem;text-align:center;line-height:50px;color:var(--text)">'+filled+'</span>';
      }).join('');

      area.innerHTML='<div class="card" id="qCard">'+
        '<div style="text-align:center;font-family:Fredoka One,cursive;font-size:1rem;color:#2563eb;margin-bottom:4px">📖 Word Building</div>'+
        '<div style="text-align:center;font-size:.85rem;color:var(--text2);font-weight:600;margin-bottom:6px">Listen to the word and build it!</div>'+
        '<div style="text-align:center;margin-bottom:6px"><button id="phPlay" style="font-size:2rem;background:none;border:none;cursor:pointer;animation:speakerPulse 2s ease-in-out infinite">🔊</button></div>'+
        '<div style="text-align:center;margin:10px 0">'+slots+'</div>'+
        '<div style="display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin:10px 0">'+
        allTiles.map(l=>'<button class="choice-btn pq-tile" data-letter="'+l+'" style="width:48px;height:56px;font-size:1.6rem;font-family:Fredoka One,cursive;padding:4px;min-height:auto">'+l+'</button>').join('')+
        '</div>'+
        '<div style="display:flex;gap:8px;justify-content:center;margin-top:6px">'+
        '<button id="phUndo" style="font-family:Fredoka One,cursive;font-size:.9rem;padding:8px 14px;border-radius:10px;border:2px solid #e2e8f0;background:#fff;cursor:pointer;color:var(--text2)">⬅ Undo</button>'+
        '<button id="phCheck" style="font-family:Fredoka One,cursive;font-size:.9rem;padding:8px 14px;border-radius:10px;border:none;background:#2563eb;color:#fff;cursor:pointer'+(built.length<letters.length?';opacity:.4;pointer-events:none':'')+'">Check! ✓</button>'+
        '</div><div id="jokeArea"></div></div>';

      document.getElementById('phPlay').addEventListener('click',()=>speak(word,0.5,1.0));
      area.querySelectorAll('.pq-tile').forEach(btn=>{
        btn.addEventListener('click',()=>{
          if(submitted||built.length>=letters.length) return;
          built.push(btn.dataset.letter);
          SFX.play('click');
          render();
        });
      });
      document.getElementById('phUndo').addEventListener('click',()=>{
        if(submitted||built.length===0) return;
        built.pop(); SFX.play('click'); render();
      });
      document.getElementById('phCheck').addEventListener('click',()=>{
        if(submitted||built.length<letters.length) return;
        submitted=true; this.answering=true;
        if(built.join('')===word){
          SFX.play('correct');
          this.onCorrect({w:word,sent:'___ is spelled!',joke:'You built it!'});
        }else{
          SFX.play('wrong');
          document.getElementById('jokeArea').innerHTML='<div style="text-align:center;margin-top:8px;font-family:Fredoka One,cursive;font-size:1.3rem;color:#2563eb">The word was: '+word+'</div>';
          this.onWrong({w:word,sent:'___ is spelled!',joke:''});
        }
      });
    };

    render();
    setTimeout(()=>speak(word,0.5,1.0),500);
  },

  // Exercise 4: WORD CHAINS — change one letter at a time
  WORD_CHAINS:[
    ['cat','hat','hit','sit','sat','sad','mad','map'],
    ['dog','log','lot','hot','hop','mop','mop','top'],
    ['fun','run','bun','bus','but','bat','bag','big'],
    ['can','man','men','hen','ten','tin','pin','pig'],
    ['bed','red','rid','lid','lip','tip','tap','map'],
    ['cup','pup','pop','hop','hot','got','get','set'],
    ['bug','rug','run','sun','sit','bit','big','dig'],
    ['fan','pan','pen','hen','him','hug','mug','mud'],
  ],

  loadPhonicsChain(area){
    const chain=this.WORD_CHAINS[Math.floor(Math.random()*this.WORD_CHAINS.length)];
    // Pick a starting point (not the last 2)
    const startIdx=Math.floor(Math.random()*Math.max(1,chain.length-3));
    const currentWord=chain[startIdx];
    const nextWord=chain[startIdx+1];
    if(!nextWord){this.loadPhonicsBlend(area);return;}

    // Find which letter changed
    const letters1=currentWord.split('');
    const letters2=nextWord.split('');
    let changeIdx=-1;
    for(let i=0;i<Math.max(letters1.length,letters2.length);i++){
      if(letters1[i]!==letters2[i]){changeIdx=i;break;}
    }
    if(changeIdx===-1){this.loadPhonicsBlend(area);return;}

    const oldLetter=letters1[changeIdx]||'';
    const newLetter=letters2[changeIdx];
    // Generate wrong choices
    const wrongLetters=[];
    const alphabet='abcdefghijklmnopqrstuvwxyz';
    while(wrongLetters.length<3){
      const l=alphabet[Math.floor(Math.random()*26)];
      if(l!==newLetter&&l!==oldLetter&&!wrongLetters.includes(l)) wrongLetters.push(l);
    }
    const choices=shuffle([newLetter,...wrongLetters]);

    // Build display with highlighted change position
    const displayLetters=letters1.map((l,i)=>{
      if(i===changeIdx) return '<span style="display:inline-block;width:44px;height:52px;background:#fef3c7;border:3px dashed #f59e0b;border-radius:10px;font-family:Fredoka One,cursive;font-size:2rem;line-height:52px;text-align:center;color:#f59e0b">?</span>';
      return '<span style="display:inline-block;width:44px;height:52px;background:#dbeafe;border:2px solid #93c5fd;border-radius:10px;font-family:Fredoka One,cursive;font-size:2rem;line-height:52px;text-align:center;color:#1d4ed8">'+l+'</span>';
    }).join(' ');

    area.innerHTML='<div class="card" id="qCard">'+
      '<div style="text-align:center;font-family:Fredoka One,cursive;font-size:1rem;color:#2563eb;margin-bottom:4px">📖 Word Chain</div>'+
      '<div style="text-align:center;font-size:.85rem;color:var(--text2);font-weight:600;margin-bottom:10px">Change one letter to make a new word!</div>'+
      '<div style="text-align:center;margin-bottom:6px;font-size:.8rem;color:var(--text2)"><strong>'+currentWord+'</strong> → <strong style="color:var(--accent)">'+nextWord+'</strong></div>'+
      '<div style="text-align:center;margin-bottom:6px"><button id="phPlay" style="font-size:1.5rem;background:none;border:none;cursor:pointer">🔊 hear it</button></div>'+
      '<div style="text-align:center;margin:10px 0;display:flex;justify-content:center;gap:6px">'+displayLetters+'</div>'+
      '<div style="text-align:center;font-size:.9rem;color:var(--text);font-weight:700;margin:8px 0">Which letter goes in the <span style="color:#f59e0b">yellow</span> spot?</div>'+
      '<div class="choices">'+choices.map(c=>'<button class="choice-btn" data-val="'+c+'" style="font-size:1.8rem;font-family:Fredoka One,cursive">'+c+'</button>').join('')+'</div>'+
      '<div id="jokeArea"></div></div>';

    const speakIt=()=>{speak(currentWord+' ... becomes ... '+nextWord,0.65,1.0);};
    setTimeout(speakIt,500);
    document.getElementById('phPlay').addEventListener('click',speakIt);

    area.querySelectorAll('.choice-btn').forEach(btn=>{
      btn.addEventListener('click',()=>{
        if(this.answering)return;
        this.answering=true;
        const card=document.getElementById('qCard');
        card.querySelectorAll('.choice-btn').forEach(b=>b.classList.add('disabled'));
        if(btn.dataset.val===newLetter){
          btn.classList.add('correct');
          // Replace the ? with the correct letter
          card.querySelector('[style*="dashed"]').textContent=newLetter;
          card.querySelector('[style*="dashed"]').style.background='#dcfce7';
          card.querySelector('[style*="dashed"]').style.borderColor='#22c55e';
          card.querySelector('[style*="dashed"]').style.color='#15803d';
          card.querySelector('[style*="dashed"]').style.borderStyle='solid';
          this.onCorrect({w:nextWord,sent:'___ comes from '+currentWord+'.',joke:'Great chain!'});
        }else{
          btn.classList.add('wrong-pick');
          card.querySelectorAll('.choice-btn').forEach(b=>{if(b.dataset.val===newLetter)b.classList.add('correct');});
          card.classList.add('wrong-shake');
          this.onWrong({w:nextWord,sent:'___ comes from '+currentWord+'.',joke:''});
        }
      });
    });
    this.thinkFirst(document.getElementById('qCard'),2);
  },

  // ---- HEALING CENTER ----
  loadHealingCenter(){
    const area=document.getElementById('gameArea');
    const hurt=this.getHurtWordmons();

    if(hurt.length===0){
      area.innerHTML='<div class="card" style="text-align:center;padding:24px">'+
        '<div style="font-size:3rem;margin-bottom:8px">🏥</div>'+
        '<div style="font-family:Fredoka One,cursive;font-size:1.3rem;color:#ec4899;margin-bottom:8px">Healing Center</div>'+
        '<div style="font-size:1rem;color:var(--text2);font-weight:600;margin-bottom:16px">All your Wordmons are healthy! 💚<br>No one needs healing right now.</div>'+
        '<button onclick="G.backToGame()" style="font-family:Fredoka One,cursive;font-size:1rem;padding:10px 24px;border-radius:12px;border:none;background:var(--accent);color:#fff;cursor:pointer">← Back to Game</button></div>';
      return;
    }

    // Show hurt Wordmons and let player pick one to heal
    let html='<div class="card" style="padding:16px">'+
      '<div style="text-align:center;font-size:2.5rem;margin-bottom:4px">🏥</div>'+
      '<div style="text-align:center;font-family:Fredoka One,cursive;font-size:1.2rem;color:#ec4899;margin-bottom:4px">Healing Center</div>'+
      '<div style="text-align:center;font-size:.85rem;color:var(--text2);font-weight:600;margin-bottom:12px">Your Wordmons are hurt! Answer correctly to heal them.</div>'+
      '<div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:12px">';
    hurt.forEach(h=>{
      const pct=Math.round(h.hp/h.maxHp*100);
      const barColor=pct>50?'#22c55e':pct>25?'#eab308':'#ef4444';
      html+='<div class="heal-card" onclick="G.startHealing('+h.idx+')" style="background:#fff;border-radius:14px;padding:10px;width:110px;text-align:center;box-shadow:0 2px 10px rgba(0,0,0,.06);cursor:pointer;border:2px solid #fce7f3;transition:all .2s">'+
        this.spriteHtml(h.wm,60)+
        '<div style="font-family:Fredoka One,cursive;font-size:.7rem;margin-top:4px">'+h.wm.name+'</div>'+
        '<div style="background:#f1f5f9;border-radius:4px;height:8px;overflow:hidden;margin-top:4px"><div style="background:'+barColor+';height:100%;width:'+pct+'%;border-radius:4px"></div></div>'+
        '<div style="font-size:.6rem;color:var(--text2);font-weight:700">'+h.hp+'/'+h.maxHp+' HP</div>'+
        '</div>';
    });
    html+='</div>'+
      '<div style="text-align:center"><button onclick="G.backToGame()" style="font-family:Fredoka One,cursive;font-size:.85rem;padding:8px 18px;border-radius:10px;border:2px solid #e2e8f0;background:#fff;color:var(--text2);cursor:pointer">← Back to Game</button></div></div>';
    area.innerHTML=html;
  },

  startHealing(idx){
    const wm=this.getWordmon(idx);
    const maxHp=wm.hp;
    const currentHp=this.getWordmonHp(idx);
    const failedWords=this.getFailedWords();
    const area=document.getElementById('gameArea');
    let healed=currentHp;
    let round=0;
    const totalRounds=Math.min(5, Math.ceil((maxHp-currentHp)/3));

    const loadHealQuestion=()=>{
      if(round>=totalRounds || healed>=maxHp){
        // Healing complete!
        this.wordmonHpMap[idx]=Math.min(healed,maxHp);
        if(healed>=maxHp) delete this.wordmonHpMap[idx]; // fully healed = remove from map
        this.saveGame();
        SFX.play('victory');
        if(healed>=maxHp) this.fireConfetti();
        area.innerHTML='<div class="card" style="text-align:center;padding:20px">'+
          '<div style="font-size:2rem;margin-bottom:8px">'+(healed>=maxHp?'💚':'💛')+'</div>'+
          this.spriteHtml(wm,90)+
          '<div style="font-family:Fredoka One,cursive;font-size:1.2rem;color:'+(healed>=maxHp?'#22c55e':'#eab308')+';margin:8px 0">'+(healed>=maxHp?wm.name+' is fully healed!':wm.name+' feels better! ('+healed+'/'+maxHp+' HP)')+'</div>'+
          '<div style="font-size:.9rem;color:var(--text2);margin-bottom:12px">'+(healed>=maxHp?'"Thank you for healing me!"':'"I need a bit more rest..."')+'</div>'+
          '<button onclick="G.loadHealingCenter()" style="font-family:Fredoka One,cursive;font-size:.9rem;padding:10px 20px;border-radius:12px;border:none;background:#ec4899;color:#fff;cursor:pointer">Back to Healing Center</button></div>';
        return;
      }

      // Pick a failed word or random word
      const wordStr=failedWords[round%failedWords.length]||'the';
      const wd=WORDS.find(w=>w.w===wordStr)||WORDS[Math.floor(Math.random()*WORDS.length)];
      const sent=wd.sent.replace('___','<span class="blank">_____</span>');
      const wrongs=WORDS.filter(x=>x.w!==wd.w).sort(()=>Math.random()-.5).slice(0,3).map(x=>x.w);
      const choices=shuffle([wd.w,...wrongs]);
      const hpPct=Math.round(healed/maxHp*100);

      area.innerHTML='<div class="card" id="qCard">'+
        '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;justify-content:center">'+
        '<span style="font-size:1.5rem">🏥</span>'+
        '<span style="font-family:Fredoka One,cursive;font-size:1rem;color:#ec4899">Healing '+wm.name+'</span>'+
        '<span style="font-size:.75rem;color:var(--text2);font-weight:700">('+Math.round(round+1)+'/'+totalRounds+')</span>'+
        '</div>'+
        '<div style="display:flex;align-items:center;gap:8px;justify-content:center;margin-bottom:10px">'+
        this.spriteHtml(wm,50)+
        '<div style="width:120px">'+
        '<div style="background:#f1f5f9;border-radius:6px;height:12px;overflow:hidden;border:2px solid #e2e8f0"><div style="background:'+(hpPct>50?'#22c55e':hpPct>25?'#eab308':'#ef4444')+';height:100%;width:'+hpPct+'%;border-radius:4px;transition:width .5s"></div></div>'+
        '<div style="font-size:.65rem;font-weight:700;color:var(--text2);text-align:center;margin-top:2px">'+healed+'/'+maxHp+' HP</div>'+
        '</div></div>'+
        '<div class="question-text">'+sent+'</div>'+
        '<div class="choices">'+choices.map(c=>'<button class="choice-btn" data-val="'+c+'">'+c+'</button>').join('')+'</div></div>';

      area.querySelectorAll('.choice-btn').forEach(btn=>{
        btn.addEventListener('click',()=>{
          const card=document.getElementById('qCard');
          card.querySelectorAll('.choice-btn').forEach(b=>b.classList.add('disabled'));
          if(btn.dataset.val===wd.w){
            btn.classList.add('correct');
            card.querySelector('.blank').textContent=wd.w;
            SFX.play('correct');
            healed=Math.min(maxHp, healed+Math.ceil(maxHp/totalRounds));
            // track stats
            if(!this.wordStats[wd.w])this.wordStats[wd.w]={correct:0,wrong:0};
            this.wordStats[wd.w].correct++;
          }else{
            btn.classList.add('wrong-pick');
            card.querySelectorAll('.choice-btn').forEach(b=>{if(b.dataset.val===wd.w)b.classList.add('correct');});
            card.classList.add('wrong-shake');
            SFX.play('wrong');
            if(!this.wordStats[wd.w])this.wordStats[wd.w]={correct:0,wrong:0};
            this.wordStats[wd.w].wrong++;
          }
          round++;
          setTimeout(loadHealQuestion, 1500);
        });
      });
      this.thinkFirst(document.getElementById('qCard'));
    };

    loadHealQuestion();
  },

  // ---- VOICE HELP ----
  speakHelp(){
    if(!('speechSynthesis' in window)) return;
    speechSynthesis.cancel();
    const btn=document.getElementById('helpSpeaker');
    btn.classList.add('speaking');
    const instructions={
      fill:"Fill in the blank! Read the sentence and pick the missing word. Tap the right answer!",
      spell:"Spell it! Look at the picture and the hint. Then tap the letters in the right order to spell the word!",
      tricky:"Tricky letters! Some letters look alike, like b and d, or p and d, or u and n. Look at the picture and pick the right letter!",
      hear:"Hear it! Listen to the word, then find it from the choices. You can press the speaker button to hear it again!",
      flash:"Flash! A word will appear on screen for a moment, then disappear. Try to remember it and pick the right one!",
      decode:"Mystery word! Use the clues to figure out the secret word. Look at the first letter, how many letters it has, and the sentence. Then type the word!",
      story:"Story time! Read the short story, then answer the question about it. Tap the right answer!",
      readalong:"Read along! I will read the sentence out loud, but I will stop at some words. You need to read those words! Then tap the word you read.",
      sentence:"Build the sentence! The words are all mixed up. Tap them in the right order to make a sentence that makes sense!",
      popquiz:"Pop quiz! I will say a word out loud. You need to spell it by tapping the letters in the right order. Listen carefully!",
      shop:"This is the shop! You earn coins by playing the game. Save up your coins to buy real Pokémon toys!"
    };
    const text=instructions[this.mode]||"Pick a game from the tabs at the top! Each one helps you practice reading. You earn coins when you beat monsters!";
    const u=new SpeechSynthesisUtterance(text);
    u.rate=0.85;
    u.pitch=1.1;
    const good=getBestVoice();
    if(good) u.voice=good;
    u.onend=()=>btn.classList.remove('speaking');
    u.onerror=()=>btn.classList.remove('speaking');
    speechSynthesis.speak(u);
  }
};

// ---- UTILS ----
function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

// SERVICE WORKER — offline play for airplane mode!
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/sw-wordquest.js').then(()=>{
    // Pre-cache all sprites on first load
    if(!localStorage.getItem('rio_precached')){
      const imgs=document.querySelectorAll('img[src*="sprites/"]');
      const srcs=new Set();
      imgs.forEach(i=>srcs.add(i.src));
      // Also cache all wordmon + enemy sprites
      WORDMONS.forEach(wm=>{for(let s=1;s<=3;s++)srcs.add('/sprites/'+wm.id+'_'+s+'.png');});
      ENEMIES.forEach(e=>srcs.add(e.sprite));
      // Cache battle backgrounds
      ['forest','volcano','ocean','cave','sky','snow','castle','space'].forEach(b=>srcs.add('/sprites/bg_'+b+'.png'));
      // Preload all
      srcs.forEach(src=>{const i=new Image();i.src=src;});
      localStorage.setItem('rio_precached','1');
    }
  }).catch(()=>{});
}

// Tracks reads per book (via localStorage). After 3 reads of a book,
// it rotates to the next one in the library.
// ========================================================
function getBookReads(){
  try{return JSON.parse(localStorage.getItem('rio_book_reads')||'{}');}catch(e){return {};}
}
function saveBookReads(r){
  try{localStorage.setItem('rio_book_reads',JSON.stringify(r));}catch(e){}
}
function getCurrentBook(){
  const reads=getBookReads();
  // find first book with < 3 successful reads
  for(const b of ILLUSTRATED_BOOKS){
    if((reads[b.id]||0)<3) return b;
  }
  // all read 3x — reset and loop back
  saveBookReads({});
  return ILLUSTRATED_BOOKS[0];
}
function openBookshelf(){
  const book=getCurrentBook();
  const reads=(getBookReads()[book.id])||0;
  // overlay
  let ov=document.getElementById('bookOverlay');
  if(!ov){
    ov=document.createElement('div');
    ov.id='bookOverlay';
    ov.style.cssText='position:fixed;inset:0;background:rgba(15,23,42,.88);z-index:9999;display:flex;align-items:center;justify-content:center;padding:10px;overflow-y:auto';

function trySecretCode(){
  const input=document.getElementById('secretCodeInput');
  const code=input.value.trim().toLowerCase();
  const res=document.getElementById('secretResult');
  const found=SECRET_WORDMONS.find(s=>s.code===code);
  if(!found){
    res.innerHTML='<span style="color:#ef4444">Hmm, not a valid code. Keep trying!</span>';
    SFX.play('wrong');
    return;
  }
  // Check if already caught
  if(G._secretsCaughtList && G._secretsCaughtList.includes(code)){
    res.innerHTML='<span style="color:var(--accent)">You already have '+found.name+'!</span>';
    return;
  }
  if(!G._secretsCaughtList) G._secretsCaughtList=[];
  G._secretsCaughtList.push(code);
  G.secretsCaught=(G.secretsCaught||0)+1;
  res.innerHTML='<span style="color:#22c55e">🎉 You found '+found.name+'! Secret Wordmon unlocked!</span>';
  SFX.play('fanfare');
  G.fireConfetti();
  G.checkAchievements();
  G.saveGame();
  input.value='';
}

function exportSave(){
  const data=localStorage.getItem('rio_reads_save');
  if(!data){alert('No save data found!');return;}
  const blob=new Blob([data],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download='rio-reads-save-'+new Date().toISOString().slice(0,10)+'.json';
  a.click();
  URL.revokeObjectURL(url);
}
function importSave(input){
  const file=input.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      // Validate it looks like a save file
      if(data.score!==undefined && data.coins!==undefined){
        localStorage.setItem('rio_reads_save',JSON.stringify(data));
        alert('Save imported! Reloading...');
        location.reload();
      } else {
        alert('This doesn\'t look like a valid save file.');
      }
    }catch(err){
      alert('Error reading file: '+err.message);
    }
  };
  reader.readAsText(file);
}

      // Generate a simple player ID
      this.playerId='rio_'+Date.now()+'_'+Math.random().toString(36).slice(2,8);
      localStorage.setItem('rio_player_id',this.playerId);
    }
    // Auto-sync on load
    this.pull();
  },

  async push(){
    if(!this.enabled) return;
    const data=localStorage.getItem('rio_reads_save');
    if(!data) return;
    try{
      await fetch(SUPABASE_URL+'/rest/v1/game_saves',{
        method:'POST',
        headers:{
          'Content-Type':'application/json',
          'apikey':SUPABASE_ANON_KEY,
          'Authorization':'Bearer '+SUPABASE_ANON_KEY,
          'Prefer':'resolution=merge-duplicates'
        },
        body:JSON.stringify({
          player_id:this.playerId,
          game:'rio_reads',
          save_data:JSON.parse(data),
          updated_at:new Date().toISOString()
        })
      });
    }catch(e){console.warn('Cloud sync push failed:',e);}
  },

  async pull(){
    if(!this.enabled) return;
    try{
      const res=await fetch(SUPABASE_URL+'/rest/v1/game_saves?player_id=eq.'+this.playerId+'&game=eq.rio_reads&select=save_data,updated_at&limit=1',{
        headers:{
          'apikey':SUPABASE_ANON_KEY,
          'Authorization':'Bearer '+SUPABASE_ANON_KEY,
        }
      });
      const rows=await res.json();
      if(rows.length>0 && rows[0].save_data){
        const cloud=rows[0].save_data;
        const local=JSON.parse(localStorage.getItem('rio_reads_save')||'{}');
        // Use whichever has more progress (higher score)
        if((cloud.score||0)>(local.score||0)){
          localStorage.setItem('rio_reads_save',JSON.stringify(cloud));
          console.log('Cloud save restored (more progress)');
          location.reload();
        }
      }
    }catch(e){console.warn('Cloud sync pull failed:',e);}
  }
};

function openParentDashboard(){
  // PIN gate
  const pin=prompt('Parent PIN:');
  if(pin!==PARENT_PIN){if(pin!==null)alert('Wrong PIN!');return;}

  const overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px)';
  overlay.onclick=e=>{if(e.target===overlay)overlay.remove();};

  const stats=G.wordStats||{};
  const kWords=['the','I','and','a','like','is','as','said','to','do','of','see','he','be','we','me','from','look','book','are','was','you','what','have'];
  const firstGradeWords=['the','a','is','it','in','can','see','my','go','on','up','big','we','he','she','was','for','at','not','with','are','all','like','have','they','said','come','some','get','one','her','but','had','him','his','from','make','very','been','just','your','into','down','out','over','then','them','when','this','stop','help','read','that','play','good','here','yes','did','how','back','much','put','old','too','did','let','its','off'];
  const teacherWords=[...new Set([...kWords,...firstGradeWords])];

  // Build word stats table
  let rows='';
  const allWords=[...new Set([...teacherWords,...Object.keys(stats)])];
  allWords.sort((a,b)=>{
    const sa=stats[a]||{correct:0,wrong:0};
    const sb=stats[b]||{correct:0,wrong:0};
    const ra=sa.correct+sa.wrong>0?sa.correct/(sa.correct+sa.wrong):0;
    const rb=sb.correct+sb.wrong>0?sb.correct/(sb.correct+sb.wrong):0;
    return ra-rb;// worst first
  });

  allWords.forEach(w=>{
    const s=stats[w]||{correct:0,wrong:0};
    const total=s.correct+s.wrong;
    const pct=total>0?Math.round(s.correct/total*100):0;
    const isK=kWords.includes(w)||kWords.includes(w.toLowerCase());
    const is1st=firstGradeWords.includes(w)||firstGradeWords.includes(w.toLowerCase());
    const gradeTag=isK?'<span style="background:#dbeafe;color:#1d4ed8;font-size:.5rem;padding:1px 4px;border-radius:4px;margin-left:3px">K</span>':
      is1st?'<span style="background:#fef3c7;color:#92400e;font-size:.5rem;padding:1px 4px;border-radius:4px;margin-left:3px">1st</span>':'';
    const color=pct>=80?'#22c55e':pct>=50?'#f59e0b':'#ef4444';
    const barW=Math.max(5,pct);
    rows+='<tr style="border-bottom:1px solid #f1f5f9">'+
      '<td style="padding:4px 8px;font-weight:700;font-size:.9rem">'+w+gradeTag+'</td>'+

      '<td style="padding:4px;text-align:center;font-size:.8rem;font-weight:700;color:'+color+'">'+pct+'%</td>'+
      '</tr>';
  });

  const notSeen=teacherWords.filter(w=>!stats[w]&&!stats[w.toLowerCase()]);

  overlay.innerHTML='<div style="background:#fff;border-radius:20px;max-width:500px;width:100%;max-height:85vh;overflow-y:auto;padding:20px;box-shadow:0 20px 60px rgba(0,0,0,.3)">'+

    '<div style="background:#fef2f2;border-radius:12px;padding:10px;text-align:center"><div style="font-size:1.4rem;font-weight:800;color:#ef4444">'+Object.values(stats).reduce((a,s)=>a+s.wrong,0)+'</div><div style="font-size:.7rem;color:#b91c1c;font-weight:600">Wrong</div></div>'+

  // Tile colors (fallback when sprites not loaded)
  // 0=grass,1=path,2=tallgrass,3=water,4=tree,5=house,6=pokecenter,7=shop,8=sign,9=fence,10=crystal,11=lava,12=ice,13=void,14=cosmic,15=mushroom

  init(){
    this.canvas=document.getElementById('adventureCanvas');
    this.ctx=this.canvas.getContext('2d');
    this.resize();
    window.addEventListener('resize',()=>this.resize());
    // Load tile images
    ['grass','path','tallgrass','water','tree','house','pokecenter','shop','sign','fence','crystal','lava','ice','void','cosmic','mushroom'].forEach((name,i)=>{
      const img=new Image();
      img.src='sprites/tile_'+name+'.png';
      img.onload=()=>{this.tileImgs[i]=img;};
    });
    // Load player sprites
    ['down','up','left','right'].forEach(dir=>{
      const img=new Image();
      img.src='sprites/rio_'+dir+'.png';
      img.onload=()=>{this.playerImgs[dir]=img;};
    });
    // D-pad controls
    document.querySelectorAll('.dpad-btn').forEach(btn=>{
      const dir=btn.dataset.dir;
      let interval=null;
      const doMove=()=>{
        if(dir==='action') this.interact();
        else this.tryMove(dir);
      };
      btn.addEventListener('touchstart',e=>{e.preventDefault();doMove();interval=setInterval(doMove,200);});
      btn.addEventListener('touchend',()=>clearInterval(interval));
      btn.addEventListener('mousedown',()=>{doMove();interval=setInterval(doMove,200);});
      btn.addEventListener('mouseup',()=>clearInterval(interval));
      btn.addEventListener('mouseleave',()=>clearInterval(interval));
    });
    // Keyboard controls
    document.addEventListener('keydown',e=>{
      if(!document.getElementById('adventureOverlay').style.display||document.getElementById('adventureOverlay').style.display==='none') return;
      if(this.dialogOpen){if(e.key==='Enter'||e.key===' ')this.closeDialog();return;}
      const keyMap={ArrowUp:'up',ArrowDown:'down',ArrowLeft:'left',ArrowRight:'right',w:'up',s:'down',a:'left',d:'right'};
      if(keyMap[e.key]) this.tryMove(keyMap[e.key]);
      if(e.key==='Enter'||e.key===' '||e.key==='z') this.interact();
    });
    // Start render loop
    this.render();
  },

  resize(){
    // Fill the entire screen — camera follows player
    const maxW=Math.min(window.innerWidth,600);
    const maxH=window.innerHeight;
    this.TILE=Math.max(32,Math.min(48,Math.floor(maxW/13))); // ~13 tiles visible across
    this.viewW=Math.ceil(maxW/this.TILE)+2; // tiles visible horizontally
    this.viewH=Math.ceil(maxH/this.TILE)+2; // tiles visible vertically
    this.canvas.width=maxW;
    this.canvas.height=maxH;
    this.canvas.style.width=maxW+'px';
    this.canvas.style.height=maxH+'px';
    this.canvas.style.marginTop='0';
  },

  getMap(){return this.MAPS[this.currentMap];},

  getTile(x,y){
    const map=this.getMap();
    if(x<0||y<0||x>=map.w||y>=map.h) return 4; // out of bounds = tree (solid)
    return map.data[y*map.w+x];
  },

  tryMove(dir){
    if(this.moving||this.dialogOpen) return;
    this.facing=dir;
    const dx={left:-1,right:1,up:0,down:0}[dir];
    const dy={left:0,right:0,up:-1,down:1}[dir];
    const nx=this.px+dx,ny=this.py+dy;
    const tile=this.getTile(nx,ny);
    // Check for exits
    const map=this.getMap();
    const exit=(map.exits||[]).find(e=>e.x===nx&&e.y===ny);
    if(exit){
      // Reading gates — deeper zones require answering a question to enter
      const GATED_ZONES=['cave','volcano','frozen','shadow','cosmic'];
      if(GATED_ZONES.includes(exit.to) && !this._gatesPassed){this._gatesPassed={};}
      if(GATED_ZONES.includes(exit.to) && !(this._gatesPassed||{})[exit.to]){
        // Show a reading gate challenge!
        this.dialogOpen=true;
        const wd=WORDS[Math.floor(Math.random()*WORDS.length)];
        const sent=wd.sent.replace('___','<span style="color:#dc2626;font-weight:800;border-bottom:3px solid #dc2626">???</span>');
        const wrongs=WORDS.filter(x=>x.w!==wd.w).sort(()=>Math.random()-.5).slice(0,3).map(x=>x.w);
        const choices=shuffle([wd.w,...wrongs]);
        const dialog=document.getElementById('advDialog');
        dialog.style.display='block';
        document.getElementById('advDialogText').innerHTML=
          '<div style="font-family:Fredoka One,cursive;font-size:1.1rem;color:#dc2626;margin-bottom:6px">Reading Gate!</div>'+
          '<div style="font-size:.85rem;color:var(--text2);margin-bottom:8px">Answer correctly to enter '+this.MAPS[exit.to].name+'!</div>'+
          '<div style="font-size:1.1rem;font-weight:700;margin-bottom:8px">'+sent+'</div>'+
          '<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">'+
          choices.map(c=>'<button class="gate-btn" data-val="'+c+'" style="font-family:Fredoka One,cursive;font-size:1rem;padding:10px;border-radius:10px;border:2px solid #d6d3d1;background:#fff;cursor:pointer;transition:all .15s">'+c+'</button>').join('')+'</div>';
        document.getElementById('advDialogOK').style.display='none';
        // Wire up gate buttons
        dialog.querySelectorAll('.gate-btn').forEach(btn=>{
          btn.addEventListener('click',()=>{
            dialog.querySelectorAll('.gate-btn').forEach(b=>b.style.pointerEvents='none');
            if(btn.dataset.val===wd.w){
              btn.style.background='#dcfce7';btn.style.borderColor='#22c55e';
              SFX.play('correct');
              if(!this._gatesPassed) this._gatesPassed={};
              this._gatesPassed[exit.to]=true;
              speak("Correct! The gate opens!",0.85,1.15);
              setTimeout(()=>{
                this.dialogOpen=false;dialog.style.display='none';
                document.getElementById('advDialogOK').style.display='';
                this.currentMap=exit.to;this.px=exit.spawnX;this.py=exit.spawnY;
                this.resize();
                document.getElementById('advZoneName').textContent=this.getMap().name;
                SFX.play('whoosh');
              },1500);
            } else {
              btn.style.background='#fef2f2';btn.style.borderColor='#dc2626';
              SFX.play('wrong');
              speak("Not quite! The gate stays locked. Try again!",0.85,1.0);
              setTimeout(()=>{
                this.dialogOpen=false;dialog.style.display='none';
                document.getElementById('advDialogOK').style.display='';
              },2000);
            }
          });
        });
        return;
      }
      // Normal exit (no gate or already passed)
      this.currentMap=exit.to;
      this.px=exit.spawnX;
      this.py=exit.spawnY;
      this.resize();
      document.getElementById('advZoneName').textContent=this.getMap().name;
      SFX.play('whoosh');
      return;
    }
    if(this.SOLID.includes(tile)) return; // can't walk on solid tiles
    // Move!
    this.moving=true;
    this.px=nx;this.py=ny;
    this.stepCount++;
    SFX.play('click');
    setTimeout(()=>{this.moving=false;},120);
    // Check for tall grass encounter
    if(tile===2 && map.encounterRate){
      if(Math.random()<map.encounterRate){
        setTimeout(()=>this.wildEncounter(),200);
      }
    }
  },

  interact(){
    if(this.dialogOpen){this.closeDialog();return;}
    const map=this.getMap();
    const dx={left:-1,right:1,up:0,down:0}[this.facing];
    const dy={left:0,right:0,up:-1,down:1}[this.facing];
    const fx=this.px+dx,fy=this.py+dy;
    // Check NPCs
    const npc=(map.npcs||[]).find(n=>n.x===fx&&n.y===fy);
    if(npc){this.showDialog(npc.name+': '+npc.msg);return;}
    // Check signs
    const sign=(map.signs||[]).find(s=>s.x===fx&&s.y===fy);
    if(sign){this.showDialog(sign.msg);return;}
    // Check special buildings
    const tile=this.getTile(fx,fy);
    if(tile===6){this.showDialog('Welcome to the Healing Station! Your Wordmons will be healed!');return;}
    if(tile===7){this.showDialog('Welcome to the Mart! Check the Shop tab to buy toys!');return;}
    if(tile===5){this.showDialog('Home sweet home! Río lives here.');return;}
  },

  showDialog(text){
    this.dialogOpen=true;
    document.getElementById('advDialog').style.display='block';
    // Make words tappable
    const tappable=text.split(/(\s+)/).map(w=>{
      const clean=w.trim();
      if(!clean) return w;
      return '<span class="tap-word" data-say="'+clean.replace(/"/g,'&quot;')+'" style="cursor:pointer;padding:1px 2px;border-radius:4px;transition:all .2s">'+w+'</span>';
    }).join('');
    document.getElementById('advDialogText').innerHTML=tappable;
    // Wire up tappable words
    document.querySelectorAll('#advDialogText .tap-word').forEach(el=>{
      el.addEventListener('click',function(e){
        e.stopPropagation();
        if(!window.speechSynthesis) return;
        speechSynthesis.cancel();
        const u=new SpeechSynthesisUtterance(this.dataset.say);
        u.rate=0.7;u.pitch=1.1;
        const v=getBestVoice();if(v)u.voice=v;
        speechSynthesis.speak(u);
        this.style.background='#fbbf24';this.style.color='var(--navy)';
        setTimeout(()=>{this.style.background='';this.style.color='';},800);
      });
    });
    // Also read the whole thing aloud
    if(window.speechSynthesis){
      speechSynthesis.cancel();
      const u=new SpeechSynthesisUtterance(text);
      u.rate=0.7;u.pitch=1.1;
      const v=getBestVoice();if(v)u.voice=v;
      speechSynthesis.speak(u);
    }
  },

  closeDialog(){
    this.dialogOpen=false;
    document.getElementById('advDialog').style.display='none';
    speechSynthesis.cancel();
  },

  wildEncounter(){
    // Zone-specific Wordmon pools — deeper zones have stronger/rarer Wordmons
    const ZONE_WORDMONS={
      town:[0,1,2,3],     // Sparky, Flamepup, Bubblefin, Leafwhisk (basic)
      route1:[0,1,2,3,4,5,6,7],  // + Spookle, Titanfist, Frostbite, Giggleslime
      forest:[4,5,6,7,8,9,10,11], // mid-tier
      cave:[8,9,10,11,16,17],     // + Crystalix, Magmawyrm (Rock zone)
      volcano:[16,17,12,13],       // Crystalix, Magmawyrm, Sandsnap, Starpix (fire zone)
      frozen:[18,14,15,10,11],     // Frostwisp + others (ice zone)
      shadow:[19,8,9,12,13],       // Gloomfang + dark types
      cosmic:[20,16,17,18,19],     // Nebulark + all deep zone mons
    };
    const pool=ZONE_WORDMONS[this.currentMap]||ZONE_WORDMONS.route1;
    // Prefer uncaught from this zone's pool
    const uncaughtInZone=pool.filter(i=>i<WORDMONS.length&&!G.caughtWordmons.includes(i));
    const uncaughtAny=WORDMONS.map((_,i)=>i).filter(i=>!G.caughtWordmons.includes(i));
    let pickIdx;
    if(uncaughtInZone.length>0) pickIdx=uncaughtInZone[Math.floor(Math.random()*uncaughtInZone.length)];
    else if(uncaughtAny.length>0) pickIdx=uncaughtAny[Math.floor(Math.random()*uncaughtAny.length)];
    else pickIdx=pool[Math.floor(Math.random()*pool.length)];
    // Set zone battle background
    const map=this.getMap();
    if(map.bg) G.changeBattleBg(map.bg);
    const wild=G.getWordmon(pickIdx);
    this.dialogOpen=true;

    // Add encounter animation styles once
    if(!document.getElementById('encounterStyles')){
      const s=document.createElement('style');s.id='encounterStyles';
      s.textContent=`
        @keyframes encFlash{0%{opacity:0}10%{opacity:1}30%{opacity:0}50%{opacity:1}70%{opacity:0}100%{opacity:0}}
        @keyframes encBounceIn{0%{transform:scale(0) rotate(-10deg);opacity:0}60%{transform:scale(1.2) rotate(5deg);opacity:1}100%{transform:scale(1) rotate(0)}}
        @keyframes encSlideUp{0%{transform:translateY(30px);opacity:0}100%{transform:translateY(0);opacity:1}}
        @keyframes encPulse{0%,100%{opacity:.6;transform:scale(1)}50%{opacity:1;transform:scale(1.05)}}
        .enc-screen{position:absolute;inset:0;z-index:60;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#000}
        .enc-flash{position:absolute;inset:0;background:#fff;z-index:61;animation:encFlash .6s ease-out forwards;pointer-events:none}
      `;
      document.head.appendChild(s);
    }

    const overlay=document.getElementById('adventureOverlay');

    // White flash effect
    const flashEl=document.createElement('div');
    flashEl.className='enc-flash';
    overlay.appendChild(flashEl);
    setTimeout(()=>flashEl.remove(),700);

    // After flash, show encounter screen
    setTimeout(()=>{
      const screen=document.createElement('div');
      screen.className='enc-screen';
      screen.id='encounterScreen';
      screen.innerHTML=
        '<div style="font-family:Fredoka One,cursive;font-size:1.5rem;color:#fff;text-shadow:0 0 20px rgba(147,51,234,.8);margin-bottom:20px;animation:encPulse 1s ease-in-out infinite">⚡ Wild Encounter! ⚡</div>'+
        '<div style="animation:encBounceIn 0.6s ease both">'+
          (wild.spriteImg?'<img src="'+wild.spriteImg+'" style="width:160px;height:160px;object-fit:contain;image-rendering:pixelated;filter:drop-shadow(0 0 30px rgba(255,200,50,.6))" onerror="this.style.display=\'none\'">':
          '<div style="width:120px;height:120px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:3rem">?</div>')+
        '</div>'+
        '<div style="font-family:Fredoka One,cursive;font-size:2rem;color:#fbbf24;text-shadow:2px 2px 0 rgba(0,0,0,.5);margin-top:16px;animation:encSlideUp .5s ease .3s both">'+wild.name+'</div>'+
        '<div style="font-size:1rem;color:rgba(255,255,255,.7);font-weight:700;margin-top:4px;animation:encSlideUp .5s ease .4s both">'+wild.type+' Type • HP '+wild.hp+'</div>'+
        '<div style="font-size:.9rem;color:rgba(255,255,255,.5);margin-top:20px;animation:encPulse 1.5s ease-in-out infinite .5s both">Answer 3 questions to catch it!</div>'+
        '<button id="wildBattleBtn" style="margin-top:24px;font-family:Fredoka One,cursive;font-size:1.2rem;padding:14px 32px;border-radius:16px;border:3px solid #fbbf24;background:linear-gradient(135deg,#9333ea,#7c3aed);color:#fff;cursor:pointer;box-shadow:0 6px 20px rgba(147,51,234,.5);animation:encBounceIn .5s ease .6s both;pointer-events:auto">⚔️ BATTLE!</button>';
      overlay.appendChild(screen);
      SFX.play('fanfare');

      // Wire up battle button
      document.getElementById('wildBattleBtn').addEventListener('click',()=>{
        // Remove encounter screen
        screen.remove();
        // Close adventure overlay
        document.getElementById('adventureOverlay').style.display='none';
        ADV.dialogOpen=false;
        // Set wild Wordmon as enemy
        G.currentEnemy={name:wild.name,hp:wild.hp,maxHp:wild.hp,sprite:wild.spriteImg};
        G.enemyHp=wild.hp;
        G.enemyMaxHp=wild.hp;
        G.updateHUD();
        G.showBattleMsg('Wild '+wild.name+'!');
        SFX.play('attack');
      });
    },600);

    G._pendingWildCatch=pickIdx;
    G._wildCatchCount=0;
    G._wildCatchNeeded=3;
  },

  // Helper: draw a single tile at screen position — rich procedural rendering
  drawTile(c,tile,sx,sy,T){
    // Use a hash for pseudo-random per-tile variation
    const h=(sx*7+sy*13)&0xFF;
    const v=h/255; // 0-1 variation

    if(tile===0){// GRASS — varied green with subtle texture
      const g=140+Math.floor(v*30);
      c.fillStyle='rgb(80,'+g+',60)';c.fillRect(sx,sy,T,T);
      // subtle grass blades
      c.fillStyle='rgba(40,120,40,.3)';
      c.fillRect(sx+T*0.2,sy+T*0.3,2,T*0.4);
      c.fillRect(sx+T*0.6,sy+T*0.5,2,T*0.3);
      c.fillRect(sx+T*0.8,sy+T*0.2,2,T*0.35);
    }
    else if(tile===1){// PATH — warm sandy with pebbles
      c.fillStyle='#c9a96e';c.fillRect(sx,sy,T,T);
      c.fillStyle='#b8944f';
      c.fillRect(sx+1,sy+1,T-2,T-2);
      // pebbles
      c.fillStyle='rgba(160,120,70,.4)';
      c.beginPath();c.arc(sx+T*0.3,sy+T*0.4,2,0,Math.PI*2);c.fill();
      c.beginPath();c.arc(sx+T*0.7,sy+T*0.6,1.5,0,Math.PI*2);c.fill();
    }
    else if(tile===2){// TALL GRASS — darker with visible blades
      c.fillStyle='rgb(50,120,50)';c.fillRect(sx,sy,T,T);
      c.fillStyle='#2d8a2d';
      for(let i=0;i<4;i++){
        const bx=sx+T*0.15+i*(T*0.2);
        c.fillRect(bx,sy+T*0.1,3,T*0.8);
        c.fillRect(bx-1,sy+T*0.05,5,3);
      }
      // exclamation hint
      if(v>0.7){c.fillStyle='rgba(255,200,0,.3)';c.font='bold '+(T/3)+'px sans-serif';c.textAlign='center';c.fillText('!',sx+T/2,sy+T/2);}
    }
    else if(tile===3){// WATER — animated blue
      const wave=Math.sin(this.animFrame/15+sx/30)*3;
      c.fillStyle='#2980b9';c.fillRect(sx,sy,T,T);
      c.fillStyle='#3498db';c.fillRect(sx+2,sy+2,T-4,T-4);
      c.fillStyle='rgba(255,255,255,.2)';
      c.fillRect(sx+4,sy+T*0.3+wave,T*0.4,2);
      c.fillRect(sx+T*0.4,sy+T*0.6-wave,T*0.4,2);
    }
    else if(tile===4){// TREE — lush round canopy with trunk
      c.fillStyle='rgb(80,'+(140+Math.floor(v*30))+',60)';c.fillRect(sx,sy,T,T); // grass under
      c.fillStyle='#5a3a1a';c.fillRect(sx+T*0.4,sy+T*0.5,T*0.2,T*0.5); // trunk
      c.fillStyle='#1a7a1a';c.beginPath();c.arc(sx+T/2,sy+T*0.35,T*0.4,0,Math.PI*2);c.fill(); // canopy
      c.fillStyle='#0f5f0f';c.beginPath();c.arc(sx+T*0.4,sy+T*0.3,T*0.25,0,Math.PI*2);c.fill(); // shadow
      c.fillStyle='rgba(255,255,255,.1)';c.beginPath();c.arc(sx+T*0.55,sy+T*0.25,T*0.15,0,Math.PI*2);c.fill(); // highlight
    }
    else if(tile===5){// HOUSE — red roof with walls and door
      c.fillStyle='rgb(80,150,60)';c.fillRect(sx,sy,T,T); // grass
      c.fillStyle='#f5deb3';c.fillRect(sx+2,sy+T*0.35,T-4,T*0.6); // walls
      c.fillStyle='#cc3333';// red roof
      c.beginPath();c.moveTo(sx,sy+T*0.35);c.lineTo(sx+T/2,sy+2);c.lineTo(sx+T,sy+T*0.35);c.fill();
      c.fillStyle='#8b4513';c.fillRect(sx+T*0.4,sy+T*0.6,T*0.2,T*0.35); // door
      c.fillStyle='#87ceeb';c.fillRect(sx+T*0.15,sy+T*0.45,T*0.2,T*0.15); // window
    }
    else if(tile===6){// HEALING STATION — pink/red roof
      c.fillStyle='rgb(80,150,60)';c.fillRect(sx,sy,T,T);
      c.fillStyle='#fff';c.fillRect(sx+2,sy+T*0.35,T-4,T*0.6);
      c.fillStyle='#ff6b9d';
      c.beginPath();c.moveTo(sx,sy+T*0.35);c.lineTo(sx+T/2,sy+2);c.lineTo(sx+T,sy+T*0.35);c.fill();
      c.fillStyle='#ff0000';// red cross
      c.fillRect(sx+T*0.35,sy+T*0.1,T*0.3,T*0.08);
      c.fillRect(sx+T*0.45,sy+T*0.05,T*0.1,T*0.18);
      c.fillStyle='#8b4513';c.fillRect(sx+T*0.4,sy+T*0.6,T*0.2,T*0.35);
    }
    else if(tile===7){// SHOP — blue roof
      c.fillStyle='rgb(80,150,60)';c.fillRect(sx,sy,T,T);
      c.fillStyle='#f5deb3';c.fillRect(sx+2,sy+T*0.35,T-4,T*0.6);
      c.fillStyle='#4488cc';
      c.beginPath();c.moveTo(sx,sy+T*0.35);c.lineTo(sx+T/2,sy+2);c.lineTo(sx+T,sy+T*0.35);c.fill();
      c.fillStyle='#fbbf24';c.font='bold '+(T/4)+'px sans-serif';c.textAlign='center';c.fillText('$',sx+T/2,sy+T*0.25);
      c.fillStyle='#8b4513';c.fillRect(sx+T*0.4,sy+T*0.6,T*0.2,T*0.35);
    }
    else if(tile===8){// SIGN — wooden post
      c.fillStyle='rgb(80,150,60)';c.fillRect(sx,sy,T,T);
      c.fillStyle='#8b4513';c.fillRect(sx+T*0.45,sy+T*0.4,T*0.1,T*0.6); // post
      c.fillStyle='#deb887';c.fillRect(sx+T*0.15,sy+T*0.2,T*0.7,T*0.3); // sign board
      c.fillStyle='#654321';c.fillRect(sx+T*0.15,sy+T*0.2,T*0.7,2); // top edge
      c.fillStyle='#333';c.font='bold '+(T/5)+'px sans-serif';c.textAlign='center';c.fillText('!',sx+T/2,sy+T*0.42);
    }
    else if(tile===9){// FENCE
      c.fillStyle='rgb(80,150,60)';c.fillRect(sx,sy,T,T);
      c.fillStyle='#c8a050';
      c.fillRect(sx,sy+T*0.3,T,T*0.08); // top rail
      c.fillRect(sx,sy+T*0.6,T,T*0.08); // bottom rail
      c.fillRect(sx+T*0.1,sy+T*0.15,T*0.08,T*0.65); // left post
      c.fillRect(sx+T*0.5,sy+T*0.15,T*0.08,T*0.65); // mid post
      c.fillRect(sx+T*0.85,sy+T*0.15,T*0.08,T*0.65); // right post
    }
    else if(tile===10){// CRYSTAL
      c.fillStyle='#2a1a4a';c.fillRect(sx,sy,T,T);
      c.fillStyle='#8b5cf6';
      c.beginPath();c.moveTo(sx+T/2,sy+3);c.lineTo(sx+T-4,sy+T-3);c.lineTo(sx+4,sy+T-3);c.fill();
      c.fillStyle='rgba(200,180,255,.4)';
      c.beginPath();c.moveTo(sx+T*0.4,sy+T*0.2);c.lineTo(sx+T*0.55,sy+T*0.2);c.lineTo(sx+T*0.45,sy+T*0.5);c.fill();
    }
    else if(tile===11){// LAVA
      const lavaShift=Math.sin(this.animFrame/10+sx/20)*2;
      c.fillStyle='#8b2500';c.fillRect(sx,sy,T,T);
      c.fillStyle='#ff4500';c.fillRect(sx+3,sy+3,T-6,T-6);
      c.fillStyle='#ffa500';c.beginPath();c.arc(sx+T/2,sy+T/2+lavaShift,T*0.2,0,Math.PI*2);c.fill();
    }
    else if(tile===12){// ICE
      c.fillStyle='#a8d8ea';c.fillRect(sx,sy,T,T);
      c.fillStyle='rgba(255,255,255,.3)';c.fillRect(sx+2,sy+2,T*0.4,T*0.3);
      c.fillStyle='rgba(255,255,255,.15)';c.fillRect(sx+T*0.5,sy+T*0.5,T*0.4,T*0.3);
    }
    else if(tile===13){// VOID
      c.fillStyle='#0d0221';c.fillRect(sx,sy,T,T);
      c.fillStyle='rgba(100,50,200,.3)';
      c.beginPath();c.arc(sx+T*v,sy+T*(1-v),T*0.15,0,Math.PI*2);c.fill();
    }
    else if(tile===14){// COSMIC
      c.fillStyle='#0a0a2e';c.fillRect(sx,sy,T,T);
      c.fillStyle='rgba(150,100,255,.2)';c.fillRect(sx,sy,T,T);
      // stars
      c.fillStyle='#fff';
      c.beginPath();c.arc(sx+T*v,sy+T*0.3,1,0,Math.PI*2);c.fill();
      c.beginPath();c.arc(sx+T*0.7,sy+T*(1-v),1,0,Math.PI*2);c.fill();
      if(v>0.5){c.fillStyle='#fbbf24';c.beginPath();c.arc(sx+T*0.5,sy+T*0.5,1.5,0,Math.PI*2);c.fill();}
    }
    else if(tile===15){// MUSHROOM
      c.fillStyle='#1a3a1a';c.fillRect(sx,sy,T,T);
      c.fillStyle='#8b5cf6';
      c.beginPath();c.arc(sx+T/2,sy+T*0.4,T*0.25,Math.PI,0);c.fill(); // cap
      c.fillStyle='#d4b5ff';c.fillRect(sx+T*0.45,sy+T*0.4,T*0.1,T*0.35); // stem
    }
    else{// unknown
      c.fillStyle='#666';c.fillRect(sx,sy,T,T);
    }
  },

  render(){
    const c=this.ctx;
    const T=this.TILE;
    const map=this.getMap();
    const CW=this.canvas.width, CH=this.canvas.height;
    this.animFrame++;

    // Camera: center on player
    const camX=this.px*T-CW/2+T/2;
    const camY=this.py*T-CH/2+T/2;
    // Clamp camera to map bounds
    const maxCamX=Math.max(0,map.w*T-CW);
    const maxCamY=Math.max(0,map.h*T-CH);
    const cx=Math.max(0,Math.min(camX,maxCamX));
    const cy=Math.max(0,Math.min(camY,maxCamY));

    // Clear
    c.fillStyle='#1a2744';
    c.fillRect(0,0,CW,CH);

    // Only draw visible tiles (performance)
    const startX=Math.floor(cx/T);
    const startY=Math.floor(cy/T);
    const endX=Math.min(map.w,startX+Math.ceil(CW/T)+2);
    const endY=Math.min(map.h,startY+Math.ceil(CH/T)+2);

    for(let y=startY;y<endY;y++){
      for(let x=startX;x<endX;x++){
        const tile=map.data[y*map.w+x];
        const sx=x*T-cx, sy=y*T-cy;
        this.drawTile(c,tile,sx,sy,T);
      }
    }

    // Draw NPCs — proper character sprites
    (map.npcs||[]).forEach(npc=>{
      const nx=npc.x*T-cx, ny=npc.y*T-cy;
      if(nx<-T*2||nx>CW+T||ny<-T*2||ny>CH+T) return;
      const npcBob=Math.sin(this.animFrame/12+npc.x)*2;
      // Shadow
      c.fillStyle='rgba(0,0,0,.12)';c.beginPath();c.ellipse(nx+T/2,ny+T*0.95,T*0.3,T*0.07,0,0,Math.PI*2);c.fill();
      // Body
      const isProf=npc.sprite==='npc_prof';
      c.fillStyle=isProf?'#f5f5f5':'#3b82f6'; // white coat or blue shirt
      c.fillRect(nx+T*0.25,ny+T*0.4+npcBob,T*0.5,T*0.4);
      // Head
      c.fillStyle=isProf?'#f5deb3':'#c68642';
      c.beginPath();c.arc(nx+T/2,ny+T*0.3+npcBob,T*0.22,0,Math.PI*2);c.fill();
      // Hair
      c.fillStyle=isProf?'#ccc':'#5a3a1a';
      c.beginPath();c.arc(nx+T/2,ny+T*0.22+npcBob,T*0.24,Math.PI,0);c.fill();
      // Eyes
      c.fillStyle='#1a1a1a';
      c.beginPath();c.arc(nx+T*0.42,ny+T*0.32+npcBob,2,0,Math.PI*2);c.fill();
      c.beginPath();c.arc(nx+T*0.58,ny+T*0.32+npcBob,2,0,Math.PI*2);c.fill();
      if(isProf){// glasses
        c.strokeStyle='#666';c.lineWidth=1;
        c.beginPath();c.arc(nx+T*0.42,ny+T*0.32+npcBob,4,0,Math.PI*2);c.stroke();
        c.beginPath();c.arc(nx+T*0.58,ny+T*0.32+npcBob,4,0,Math.PI*2);c.stroke();
      }
      // Legs
      c.fillStyle='#4a4a4a';
      c.fillRect(nx+T*0.3,ny+T*0.75+npcBob,T*0.15,T*0.2);
      c.fillRect(nx+T*0.55,ny+T*0.75+npcBob,T*0.15,T*0.2);
      // Name tag — floating above with background
      c.fillStyle='rgba(0,0,0,.6)';
      const name=npc.name.split(' ').pop();
      c.font='bold '+(T/3)+'px Fredoka One';c.textAlign='center';
      const tw=c.measureText(name).width;
      c.fillRect(nx+T/2-tw/2-4,ny-T*0.15+npcBob,tw+8,T*0.2);
      c.fillStyle='#fff';
      c.fillText(name,nx+T/2,ny+npcBob);
      // Interaction hint (!)
      c.fillStyle='#fbbf24';c.font='bold '+(T/2.5)+'px sans-serif';
      c.fillText('!',nx+T/2,ny-T*0.25+npcBob+Math.sin(this.animFrame/8)*3);
    });

    // Draw player — proper character sprite
    const playerBob=Math.sin(this.animFrame/10)*2;
    const psx=this.px*T-cx, psy=this.py*T-cy+playerBob;
    const PT=T*1.2; // player is slightly bigger than a tile
    const pox=(T-PT)/2, poy=(T-PT); // offset so feet align with tile bottom
    if(this.playerImgs[this.facing]){
      c.drawImage(this.playerImgs[this.facing],psx+pox,psy+poy,PT,PT);
    } else {
      // Rich fallback: green hoodie boy
      const px=psx+T*0.2,py2=psy+T*0.05;
      // Shadow
      c.fillStyle='rgba(0,0,0,.15)';c.beginPath();c.ellipse(psx+T/2,psy+T*0.95,T*0.3,T*0.08,0,0,Math.PI*2);c.fill();
      // Body (green hoodie)
      c.fillStyle='#22c55e';
      c.fillRect(psx+T*0.25,psy+T*0.4,T*0.5,T*0.4);
      // Head (brown skin)
      c.fillStyle='#c68642';
      c.beginPath();c.arc(psx+T/2,psy+T*0.3,T*0.22,0,Math.PI*2);c.fill();
      // Hair (curly brown)
      c.fillStyle='#3e2723';
      c.beginPath();c.arc(psx+T/2,psy+T*0.22,T*0.24,Math.PI,0);c.fill();
      c.beginPath();c.arc(psx+T*0.35,psy+T*0.2,T*0.08,0,Math.PI*2);c.fill();
      c.beginPath();c.arc(psx+T*0.65,psy+T*0.2,T*0.08,0,Math.PI*2);c.fill();
      // Eyes
      c.fillStyle='#1a1a1a';
      c.beginPath();c.arc(psx+T*0.42,psy+T*0.32,2,0,Math.PI*2);c.fill();
      c.beginPath();c.arc(psx+T*0.58,psy+T*0.32,2,0,Math.PI*2);c.fill();
      // Legs (jeans)
      c.fillStyle='#1e3a5a';
      c.fillRect(psx+T*0.3,psy+T*0.75,T*0.15,T*0.2);
      c.fillRect(psx+T*0.55,psy+T*0.75,T*0.15,T*0.2);
      // Direction indicator
      c.fillStyle='rgba(255,255,255,.5)';c.font='bold '+(T/4)+'px sans-serif';c.textAlign='center';
      const arrows={down:'▼',up:'▲',left:'◀',right:'▶'};
      c.fillText(arrows[this.facing],psx+T/2,psy+T*0.55);
    }

    // Draw active Wordmon following behind player — with sprite image
    const wm=G.getWordmon(G.activeWordmon);
    const followBob=Math.sin(this.animFrame/10+1)*2;
    const followOffsets={down:{x:0,y:-1},up:{x:0,y:1},left:{x:1,y:0},right:{x:-1,y:0}};
    const fo=followOffsets[this.facing];
    const wmX=(this.px+fo.x)*T-cx,wmY=(this.py+fo.y)*T-cy+followBob;
    // Try to draw the Wordmon sprite image
    const wmKey='wm_'+wm.id+'_'+((wm.stage||0)+1);
    if(!this._wmImgs) this._wmImgs={};
    if(!this._wmImgs[wmKey]){
      const img=new Image();img.src=wm.spriteImg;
      this._wmImgs[wmKey]=img;
    }
    const wmImg=this._wmImgs[wmKey];
    if(wmImg&&wmImg.complete&&wmImg.naturalWidth>0){
      // Shadow
      c.fillStyle='rgba(0,0,0,.12)';c.beginPath();c.ellipse(wmX+T/2,wmY+T*0.9,T*0.25,T*0.06,0,0,Math.PI*2);c.fill();
      c.drawImage(wmImg,wmX+T*0.1,wmY+T*0.1,T*0.8,T*0.8);
    } else {
      // Fallback: colored circle with face
      c.fillStyle='rgba(0,0,0,.1)';c.beginPath();c.ellipse(wmX+T/2,wmY+T*0.9,T*0.25,T*0.06,0,0,Math.PI*2);c.fill();
      c.fillStyle=wm.color||'#fbbf24';
      c.beginPath();c.arc(wmX+T/2,wmY+T/2,T/3,0,Math.PI*2);c.fill();
      c.fillStyle='#1e293b';
      c.beginPath();c.arc(wmX+T/2-3,wmY+T/2-2,2,0,Math.PI*2);c.fill();
      c.beginPath();c.arc(wmX+T/2+3,wmY+T/2-2,2,0,Math.PI*2);c.fill();
    }

    // Draw minimap in top-right corner
    const MM=3; // minimap tile size
    const mmW=map.w*MM, mmH=map.h*MM;
    const mmX=CW-mmW-10, mmY=40;
    c.fillStyle='rgba(0,0,0,.5)';c.fillRect(mmX-2,mmY-2,mmW+4,mmH+4);
    for(let y=0;y<map.h;y++){
      for(let x=0;x<map.w;x++){
        const t=map.data[y*map.w+x];
        c.fillStyle=t===0?'#4a8':'t===1'?'#c9a':'#4a8';
        if(t===1)c.fillStyle='#c9a96e';
        else if(t===2)c.fillStyle='#2a6a2a';
        else if(t===3)c.fillStyle='#2980b9';
        else if(t===4)c.fillStyle='#0a5a0a';
        else if(t===5||t===6||t===7)c.fillStyle='#cc3333';
        else if(t>=10)c.fillStyle=this.TILE_COLORS[t]||'#666';
        else c.fillStyle='#4a8a4a';
        c.fillRect(mmX+x*MM,mmY+y*MM,MM,MM);
      }
    }
    // Player dot on minimap
    c.fillStyle='#fff';c.fillRect(mmX+this.px*MM-1,mmY+this.py*MM-1,MM+2,MM+2);
    c.fillStyle='#22c55e';c.fillRect(mmX+this.px*MM,mmY+this.py*MM,MM,MM);

    requestAnimationFrame(()=>this.render());
  },
};

// Wire up adventure mode to game object
G.adventure=ADV;
G.openAdventure=function(){
  document.getElementById('adventureOverlay').style.display='block';
  if(!ADV.canvas) ADV.init();
  else ADV.resize();
  document.getElementById('advZoneName').textContent=ADV.getMap().name;
};
G.closeAdventure=function(){
  document.getElementById('adventureOverlay').style.display='none';
};

// GO!
G.init();
CloudSync.init();
ADV.init();
</script>
