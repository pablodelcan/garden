    {name:'Phantomflame',hp:24,svg:`<svg viewBox="0 0 100 100"><path d="M30 50 Q30 25 50 25 Q70 25 70 50 L70 70 Q65 64 60 70 Q55 76 50 70 Q45 64 40 70 Q35 76 30 70Z" fill="#6366f1"/><circle cx="42" cy="44" r="5" fill="#93c5fd"/><circle cx="58" cy="44" r="5" fill="#93c5fd"/></svg>`},
    {name:'Blazespecter',hp:36,svg:`<svg viewBox="0 0 100 100"><path d="M25 48 Q25 18 50 18 Q75 18 75 48 L75 76 Q70 68 64 76 Q58 84 50 76 Q42 68 36 76 Q30 84 25 76Z" fill="#4f46e5"/><circle cx="40" cy="42" r="6" fill="#93c5fd"/><circle cx="60" cy="42" r="6" fill="#93c5fd"/></svg>`},
    {name:'Infernogeist',hp:52,svg:`<svg viewBox="0 0 100 100"><path d="M20 46 Q20 8 50 8 Q80 8 80 46 L80 82 Q74 72 68 82 Q62 92 56 82 Q50 72 44 82 Q38 92 32 82 Q26 72 20 82Z" fill="#3730a3"/><circle cx="38" cy="38" r="7" fill="#93c5fd"/><circle cx="62" cy="38" r="7" fill="#93c5fd"/></svg>`}
  ]},
  {id:'cosmojelly',type:'Psychic',color:'#d946ef',bio:'Cosmojelly is a jellyfish from space! She can float up high. She said "I can see the stars!" She glows pink at night. She is soft and squishy. Do you like her?',stages:[
    {name:'Cosmojelly',hp:26,svg:`<svg viewBox="0 0 100 100"><ellipse cx="50" cy="40" rx="22" ry="18" fill="#d946ef"/><circle cx="42" cy="38" r="4" fill="#1e293b"/><circle cx="58" cy="38" r="4" fill="#1e293b"/><path d="M38 56 Q38 72 36 80" stroke="#d946ef" stroke-width="3" fill="none"/><path d="M50 56 Q50 72 50 80" stroke="#d946ef" stroke-width="3" fill="none"/><path d="M62 56 Q62 72 64 80" stroke="#d946ef" stroke-width="3" fill="none"/></svg>`},
    {name:'Nebularis',hp:38,svg:`<svg viewBox="0 0 100 100"><ellipse cx="50" cy="38" rx="26" ry="22" fill="#c026d3"/><circle cx="40" cy="36" r="5" fill="#1e293b"/><circle cx="60" cy="36" r="5" fill="#1e293b"/><path d="M34 54 Q32 74 30 84" stroke="#c026d3" stroke-width="3.5" fill="none"/><path d="M42 56 Q42 76 40 86" stroke="#c026d3" stroke-width="3" fill="none"/><path d="M58 56 Q58 76 60 86" stroke="#c026d3" stroke-width="3" fill="none"/><path d="M66 54 Q68 74 70 84" stroke="#c026d3" stroke-width="3.5" fill="none"/></svg>`},
    {name:'Galaximind',hp:54,svg:`<svg viewBox="0 0 100 100"><ellipse cx="50" cy="36" rx="32" ry="26" fill="#a21caf"/><circle cx="38" cy="34" r="6" fill="#1e293b"/><circle cx="62" cy="34" r="6" fill="#1e293b"/><path d="M30 52 Q26 76 24 90" stroke="#a21caf" stroke-width="4" fill="none"/><path d="M38 54 Q36 78 34 90" stroke="#a21caf" stroke-width="3" fill="none"/><path d="M50 56 Q50 80 50 92" stroke="#a21caf" stroke-width="3" fill="none"/><path d="M62 54 Q64 78 66 90" stroke="#a21caf" stroke-width="3" fill="none"/><path d="M70 52 Q74 76 76 90" stroke="#a21caf" stroke-width="4" fill="none"/></svg>`}
  ]},
  // ---- BATCH 4: 8 MORE WORDMONS (rare catches!) ----
  {id:'critterpaw',type:'Normal',color:'#a8a29e',bio:'Critterpaw is just a regular little guy. But he said "I can do big things too!" He is brown and fuzzy. He likes to run and play with all his friends.',stages:[
    {name:'Critterpaw',hp:26,svg:`<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="22" fill="#a8a29e"/><circle cx="42" cy="46" r="4" fill="#1e293b"/><circle cx="58" cy="46" r="4" fill="#1e293b"/><path d="M44 56 Q50 60 56 56" stroke="#1e293b" stroke-width="2" fill="none"/></svg>`},
    {name:'Scoutmask',hp:38,svg:`<svg viewBox="0 0 100 100"><circle cx="50" cy="48" r="26" fill="#78716c"/><circle cx="40" cy="44" r="5" fill="#1e293b"/><circle cx="60" cy="44" r="5" fill="#1e293b"/><rect x="34" y="36" width="32" height="12" rx="6" fill="#57534e" opacity=".6"/></svg>`},
    {name:'Bandiking',hp:54,svg:`<svg viewBox="0 0 100 100"><circle cx="50" cy="46" r="30" fill="#57534e"/><circle cx="38" cy="42" r="6" fill="#fbbf24"/><circle cx="62" cy="42" r="6" fill="#fbbf24"/><rect x="30" y="34" width="40" height="14" rx="7" fill="#44403c" opacity=".7"/></svg>`}
  ]},
  {id:'crystalkit',type:'Crystal',color:'#c084fc',bio:'Crystalkit is a kitten made of gems! She sparkles in the light. She said "Look how I shine!" She is purple and her fur is made of tiny crystals. So pretty!',stages:[
    {name:'Crystalkit',hp:28,svg:`<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="20" fill="#c084fc"/><polygon points="50,20 44,35 56,35" fill="#e9d5ff"/><circle cx="44" cy="48" r="3" fill="#7c3aed"/><circle cx="56" cy="48" r="3" fill="#7c3aed"/></svg>`},
    {name:'Gemstalker',hp:40,svg:`<svg viewBox="0 0 100 100"><circle cx="50" cy="48" r="24" fill="#a855f7"/><polygon points="50,16 42,30 58,30" fill="#e9d5ff"/><polygon points="35,30 28,42 42,38" fill="#d8b4fe"/><polygon points="65,30 72,42 58,38" fill="#d8b4fe"/><circle cx="42" cy="46" r="4" fill="#6d28d9"/><circle cx="58" cy="46" r="4" fill="#6d28d9"/></svg>`},
    {name:'Amethystlord',hp:56,svg:`<svg viewBox="0 0 100 100"><circle cx="50" cy="46" r="28" fill="#9333ea"/><polygon points="50,10 40,28 60,28" fill="#e9d5ff"/><polygon points="30,26 20,42 40,36" fill="#d8b4fe"/><polygon points="70,26 80,42 60,36" fill="#d8b4fe"/><circle cx="40" cy="44" r="5" fill="#581c87"/><circle cx="60" cy="44" r="5" fill="#581c87"/></svg>`}
  ]},
  {id:'melodine',type:'Sound',color:'#f472b6',bio:'Melodine can sing! She said "Do you want to hear my song?" She is pink and has music notes all around her. When she sings, all the animals come to listen.',stages:[
    {name:'Melodine',hp:24,svg:`<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="20" fill="#f472b6"/><circle cx="44" cy="46" r="3" fill="#1e293b"/><circle cx="56" cy="46" r="3" fill="#1e293b"/><path d="M44 56 Q50 60 56 56" stroke="#1e293b" stroke-width="2" fill="none"/><text x="30" y="30" font-size="14">♪</text><text x="65" y="28" font-size="10">♫</text></svg>`},
    {name:'Harmonette',hp:36,svg:`<svg viewBox="0 0 100 100"><circle cx="50" cy="48" r="24" fill="#ec4899"/><circle cx="42" cy="44" r="4" fill="#1e293b"/><circle cx="58" cy="44" r="4" fill="#1e293b"/><text x="22" y="26" font-size="16">♪</text><text x="68" y="24" font-size="12">♫</text><text x="50" y="80" font-size="14" text-anchor="middle">♩</text></svg>`},
    {name:'Symphonix',hp:52,svg:`<svg viewBox="0 0 100 100"><circle cx="50" cy="46" r="28" fill="#db2777"/><circle cx="40" cy="42" r="5" fill="#1e293b"/><circle cx="60" cy="42" r="5" fill="#1e293b"/><text x="16" y="22" font-size="18">♪</text><text x="72" y="20" font-size="14">♫</text><text x="10" y="70" font-size="12">♩</text><text x="80" y="68" font-size="16">♬</text></svg>`}
  ]},
  {id:'cosmopup',type:'Cosmic',color:'#312e81',bio:'Cosmopup is a puppy from the stars! He is dark blue like space. He said "I can take you to see the moon!" He has little stars on his fur. He is out of this world!',stages:[
    {name:'Cosmopup',hp:30,svg:`<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="22" fill="#312e81"/><circle cx="42" cy="46" r="4" fill="#c7d2fe"/><circle cx="58" cy="46" r="4" fill="#c7d2fe"/><circle cx="30" cy="30" r="2" fill="#fbbf24"/><circle cx="70" cy="35" r="1.5" fill="#fbbf24"/><circle cx="40" cy="20" r="1" fill="#fbbf24"/></svg>`},
    {name:'Starfang',hp:42,svg:`<svg viewBox="0 0 100 100"><circle cx="50" cy="48" r="26" fill="#1e1b4b"/><circle cx="40" cy="44" r="5" fill="#a5b4fc"/><circle cx="60" cy="44" r="5" fill="#a5b4fc"/><circle cx="28" cy="28" r="2.5" fill="#fbbf24"/><circle cx="72" cy="32" r="2" fill="#fbbf24"/><circle cx="50" cy="18" r="3" fill="#fbbf24"/></svg>`},
    {name:'Galaxywolf',hp:58,svg:`<svg viewBox="0 0 100 100"><circle cx="50" cy="46" r="30" fill="#0f0a2e"/><circle cx="38" cy="42" r="6" fill="#818cf8"/><circle cx="62" cy="42" r="6" fill="#818cf8"/><circle cx="24" cy="24" r="3" fill="#fbbf24"/><circle cx="76" cy="28" r="2.5" fill="#fbbf24"/><circle cx="50" cy="14" r="3.5" fill="#fbbf24"/><circle cx="34" cy="72" r="2" fill="#c084fc"/><circle cx="66" cy="70" r="1.5" fill="#c084fc"/></svg>`}
  ]},
  {id:'sugarsnap',type:'Candy',color:'#fb7185',bio:'Sugarsnap is made of candy! She is so sweet. She said "Do you want a treat?" She smells like cake. But do not eat her! She is a friend, not a snack!',stages:[
    {name:'Sugarsnap',hp:24,svg:`<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="22" fill="#fda4af"/><circle cx="42" cy="46" r="4" fill="#be123c"/><circle cx="58" cy="46" r="4" fill="#be123c"/><path d="M44 56 Q50 62 56 56" stroke="#be123c" stroke-width="2" fill="none"/><circle cx="38" cy="38" r="2" fill="#f9a8d4"/><circle cx="55" cy="36" r="1.5" fill="#fbcfe8"/></svg>`},
    {name:'Lollibun',hp:36,svg:`<svg viewBox="0 0 100 100"><circle cx="50" cy="48" r="26" fill="#fb7185"/><circle cx="40" cy="44" r="5" fill="#9f1239"/><circle cx="60" cy="44" r="5" fill="#9f1239"/><circle cx="34" cy="34" r="3" fill="#fda4af"/><circle cx="58" cy="32" r="2" fill="#fecdd3"/><circle cx="66" cy="50" r="2.5" fill="#fda4af"/></svg>`},
    {name:'Cakequeen',hp:52,svg:`<svg viewBox="0 0 100 100"><circle cx="50" cy="46" r="30" fill="#e11d48"/><circle cx="38" cy="42" r="6" fill="#881337"/><circle cx="62" cy="42" r="6" fill="#881337"/><circle cx="30" cy="30" r="3.5" fill="#fda4af"/><circle cx="60" cy="28" r="2.5" fill="#fecdd3"/><circle cx="70" cy="48" r="3" fill="#fda4af"/><circle cx="35" cy="60" r="2" fill="#fecdd3"/></svg>`}
  ]},
  {id:'magmaslug',type:'Lava',color:'#dc2626',bio:'Magmaslug is a slug made of hot lava! He is slow but very strong. He said "I like to take my time." He leaves a trail of warm goo. He is a warm friend!',stages:[
    {name:'Magmaslug',hp:28,svg:`<svg viewBox="0 0 100 100"><ellipse cx="50" cy="56" rx="24" ry="16" fill="#dc2626"/><ellipse cx="50" cy="58" rx="18" ry="10" fill="#fbbf24"/><circle cx="44" cy="52" r="3" fill="#1e293b"/><circle cx="56" cy="52" r="3" fill="#1e293b"/></svg>`},
    {name:'Lavashell',hp:40,svg:`<svg viewBox="0 0 100 100"><ellipse cx="50" cy="54" rx="28" ry="18" fill="#991b1b"/><ellipse cx="50" cy="56" rx="22" ry="12" fill="#fbbf24"/><circle cx="42" cy="50" r="4" fill="#1e293b"/><circle cx="58" cy="50" r="4" fill="#1e293b"/><path d="M38 34 Q44 24 50 34 Q56 24 62 34" fill="#ef4444"/></svg>`},
    {name:'Volcanotitan',hp:56,svg:`<svg viewBox="0 0 100 100"><ellipse cx="50" cy="52" rx="32" ry="22" fill="#7f1d1d"/><ellipse cx="50" cy="54" rx="26" ry="16" fill="#f59e0b"/><circle cx="40" cy="48" r="5" fill="#1e293b"/><circle cx="60" cy="48" r="5" fill="#1e293b"/><path d="M34 30 Q42 16 50 30 Q58 16 66 30" fill="#ef4444"/><path d="M40 28 Q46 20 52 28" fill="#fbbf24"/></svg>`}
  ]},
  {id:'cloudpuff',type:'Storm',color:'#7dd3fc',bio:'Cloudpuff is a cloud who can make rain! He said "I am not just a cloud — I make thunder!" He is fluffy and white. When he is mad, he makes a big storm!',stages:[
    {name:'Cloudpuff',hp:26,svg:`<svg viewBox="0 0 100 100"><ellipse cx="50" cy="45" rx="28" ry="18" fill="#e0f2fe"/><ellipse cx="38" cy="40" rx="14" ry="14" fill="#bae6fd"/><ellipse cx="62" cy="42" rx="14" ry="12" fill="#bae6fd"/><circle cx="44" cy="44" r="3" fill="#1e293b"/><circle cx="56" cy="44" r="3" fill="#1e293b"/><path d="M40 66 L38 76" stroke="#60a5fa" stroke-width="2"/><path d="M50 66 L50 76" stroke="#60a5fa" stroke-width="2"/><path d="M60 66 L62 76" stroke="#60a5fa" stroke-width="2"/></svg>`},
    {name:'Thundercloud',hp:38,svg:`<svg viewBox="0 0 100 100"><ellipse cx="50" cy="42" rx="32" ry="22" fill="#94a3b8"/><ellipse cx="36" cy="38" rx="16" ry="16" fill="#64748b"/><ellipse cx="64" cy="40" rx="16" ry="14" fill="#64748b"/><circle cx="42" cy="42" r="4" fill="#fbbf24"/><circle cx="58" cy="42" r="4" fill="#fbbf24"/><polygon points="44,64 38,80 48,72 42,88" fill="#fbbf24"/></svg>`},
    {name:'Stormtitan',hp:56,svg:`<svg viewBox="0 0 100 100"><ellipse cx="50" cy="40" rx="36" ry="26" fill="#475569"/><ellipse cx="34" cy="36" rx="18" ry="18" fill="#334155"/><ellipse cx="66" cy="38" rx="18" ry="16" fill="#334155"/><circle cx="40" cy="40" r="5" fill="#fbbf24"/><circle cx="60" cy="40" r="5" fill="#fbbf24"/><polygon points="40,66 32,86 44,74 36,96" fill="#fbbf24"/><polygon points="60,66 68,86 56,74 64,96" fill="#fbbf24"/></svg>`}
  ]},
  {id:'botbyte',type:'Tech',color:'#6366f1',bio:'Botbyte is a little robot! He said "I can do math!" He likes to beep and boop. He is blue and has blinking lights. He is the smartest Wordmon of all!',stages:[
    {name:'Botbyte',hp:28,svg:`<svg viewBox="0 0 100 100"><rect x="32" y="30" width="36" height="32" rx="6" fill="#6366f1"/><rect x="36" y="34" width="28" height="20" rx="4" fill="#312e81"/><circle cx="44" cy="44" r="3" fill="#22d3ee"/><circle cx="56" cy="44" r="3" fill="#22d3ee"/><rect x="46" y="16" width="8" height="14" rx="4" fill="#6366f1"/><circle cx="50" cy="14" r="4" fill="#818cf8"/></svg>`},
    {name:'Megadroid',hp:40,svg:`<svg viewBox="0 0 100 100"><rect x="28" y="26" width="44" height="38" rx="8" fill="#4f46e5"/><rect x="32" y="30" width="36" height="26" rx="5" fill="#1e1b4b"/><circle cx="42" cy="42" r="4" fill="#22d3ee"/><circle cx="58" cy="42" r="4" fill="#22d3ee"/><rect x="44" y="12" width="12" height="14" rx="5" fill="#4f46e5"/><circle cx="50" cy="10" r="5" fill="#818cf8"/><rect x="18" y="36" width="10" height="6" rx="3" fill="#4f46e5"/><rect x="72" y="36" width="10" height="6" rx="3" fill="#4f46e5"/></svg>`},
    {name:'Ultramech',hp:58,svg:`<svg viewBox="0 0 100 100"><rect x="24" y="22" width="52" height="44" rx="10" fill="#3730a3"/><rect x="28" y="26" width="44" height="32" rx="6" fill="#0f0a2e"/><circle cx="40" cy="40" r="5" fill="#f43f5e"/><circle cx="60" cy="40" r="5" fill="#f43f5e"/><rect x="42" y="8" width="16" height="14" rx="6" fill="#3730a3"/><circle cx="50" cy="6" r="6" fill="#818cf8"/><rect x="12" y="32" width="12" height="8" rx="4" fill="#3730a3"/><rect x="76" y="32" width="12" height="8" rx="4" fill="#3730a3"/><polygon points="50,66 42,80 50,74 58,80" fill="#4f46e5"/></svg>`}
  ]},
  // --- DEEP ZONE WORDMONS (stronger, weirder) ---
  {id:'crystalix',type:'Rock',color:'#a855f7',bio:'Crystalix was born deep in a cave. She is made of purple crystals! She said "I am so pretty!" She can glow in the dark. She likes to sing but it sounds like glass!',stages:[
    {name:'Crystalix',hp:34,bio:'Crystalix was born deep in a cave. She is made of purple crystals!',svg:`<svg viewBox="0 0 100 100"><polygon points="50,10 20,50 35,90 65,90 80,50" fill="#a855f7"/><polygon points="50,10 20,50 50,45" fill="#c084fc"/><circle cx="40" cy="50" r="5" fill="#fff"/><circle cx="60" cy="50" r="5" fill="#fff"/><circle cx="40" cy="50" r="3" fill="#1e293b"/><circle cx="60" cy="50" r="3" fill="#1e293b"/><path d="M45 65 Q50 70 55 65" stroke="#1e293b" stroke-width="2" fill="none"/></svg>`},
    {name:'Prismoth',hp:46,bio:'Prismoth has rainbow light inside! She said "Look at my colors!" She is bigger now and very strong.',svg:`<svg viewBox="0 0 100 100"><polygon points="50,5 15,45 25,95 75,95 85,45" fill="#7c3aed"/><polygon points="50,5 15,45 50,40" fill="#a78bfa"/><polygon points="50,40 85,45 75,95" fill="#6d28d9"/><circle cx="38" cy="48" r="6" fill="#fff"/><circle cx="62" cy="48" r="6" fill="#fff"/><circle cx="38" cy="48" r="4" fill="#1e293b"/><circle cx="62" cy="48" r="4" fill="#1e293b"/><path d="M43 68 Q50 74 57 68" stroke="#1e293b" stroke-width="2.5" fill="none"/></svg>`},
    {name:'Diamondcore',hp:62,bio:'Diamondcore is the hardest Wordmon! She said "You can not break me!" She shines like a star and all the cave lights up!',svg:`<svg viewBox="0 0 100 100"><polygon points="50,2 10,40 20,98 80,98 90,40" fill="#6d28d9"/><polygon points="50,2 10,40 50,35" fill="#a78bfa"/><polygon points="50,35 90,40 80,98" fill="#4c1d95"/><polygon points="50,2 30,20 50,35 70,20" fill="#c084fc"/><circle cx="36" cy="46" r="7" fill="#fff"/><circle cx="64" cy="46" r="7" fill="#fff"/><circle cx="36" cy="46" r="4" fill="#1e293b"/><circle cx="64" cy="46" r="4" fill="#1e293b"/><path d="M42 70 Q50 78 58 70" stroke="#1e293b" stroke-width="3" fill="none"/></svg>`}
  ]},
  {id:'magmawyrm',type:'Fire',color:'#9333ea',bio:'Magmawyrm is a hot hot worm! He lives in the lava. He said "I am too hot to touch!" He is orange and red. Do not get too close or you will get burned!',stages:[
    {name:'Magmawyrm',hp:36,bio:'Magmawyrm is a tiny lava worm. He is very hot!',svg:`<svg viewBox="0 0 100 100"><ellipse cx="50" cy="60" rx="20" ry="28" fill="#9333ea"/><ellipse cx="50" cy="62" rx="14" ry="20" fill="#fbbf24"/><circle cx="44" cy="52" r="4" fill="#1e293b"/><circle cx="56" cy="52" r="4" fill="#1e293b"/><path d="M46 64 Q50 68 54 64" stroke="#1e293b" stroke-width="2" fill="none"/><path d="M42 32 Q38 18 48 28" fill="#ef4444"/><path d="M58 32 Q62 18 52 28" fill="#ef4444"/></svg>`},
    {name:'Lavafang',hp:48,bio:'Lavafang got bigger! He has fangs made of lava. He said "I can melt rocks!"',svg:`<svg viewBox="0 0 100 100"><ellipse cx="50" cy="55" rx="26" ry="32" fill="#7c3aed"/><ellipse cx="50" cy="57" rx="18" ry="24" fill="#fbbf24"/><circle cx="42" cy="48" r="5" fill="#1e293b"/><circle cx="58" cy="48" r="5" fill="#1e293b"/><path d="M44 64 Q50 70 56 64" stroke="#1e293b" stroke-width="2.5" fill="none"/><path d="M38 24 Q30 4 46 22" fill="#ef4444"/><path d="M62 24 Q70 4 54 22" fill="#ef4444"/><path d="M50 22 Q50 6 56 20" fill="#fbbf24"/></svg>`},
    {name:'Infernodrake',hp:64,bio:'Infernodrake is the king of the volcano! He said "I am made of fire!" He can fly and breathe flames!',svg:`<svg viewBox="0 0 100 100"><ellipse cx="50" cy="50" rx="30" ry="36" fill="#dc2626"/><ellipse cx="50" cy="52" rx="22" ry="28" fill="#9333ea"/><circle cx="40" cy="44" r="6" fill="#1e293b"/><circle cx="60" cy="44" r="6" fill="#1e293b"/><circle cx="42" cy="42" r="2" fill="#fbbf24"/><circle cx="62" cy="42" r="2" fill="#fbbf24"/><path d="M42 64 Q50 72 58 64" stroke="#1e293b" stroke-width="3" fill="none"/><path d="M32 18 Q22 -6 42 14" fill="#ef4444"/><path d="M68 18 Q78 -6 58 14" fill="#ef4444"/><polygon points="20,40 6,30 14,48" fill="#dc2626"/><polygon points="80,40 94,30 86,48" fill="#dc2626"/></svg>`}
  ]},
  {id:'frostwisp',type:'Ice',color:'#7dd3fc',bio:'Frostwisp is a tiny ice spirit. She floats like a snowflake! She said "I am cold but I am nice!" She can freeze water with one touch.',stages:[
    {name:'Frostwisp',hp:32,bio:'Frostwisp is a tiny floating ice spirit. She is very cold!',svg:`<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="24" fill="#bae6fd"/><circle cx="50" cy="50" r="16" fill="#e0f2fe"/><circle cx="44" cy="46" r="4" fill="#0ea5e9"/><circle cx="56" cy="46" r="4" fill="#0ea5e9"/><path d="M46 58 Q50 62 54 58" stroke="#0ea5e9" stroke-width="2" fill="none"/><polygon points="50,26 47,18 53,18" fill="#7dd3fc"/><polygon points="30,38 22,36 26,42" fill="#7dd3fc"/><polygon points="70,38 78,36 74,42" fill="#7dd3fc"/></svg>`},
    {name:'Glaciara',hp:44,bio:'Glaciara got ice armor! She said "Now I am strong!" She can make a blizzard.',svg:`<svg viewBox="0 0 100 100"><circle cx="50" cy="48" r="28" fill="#7dd3fc"/><circle cx="50" cy="48" r="20" fill="#bae6fd"/><circle cx="42" cy="44" r="5" fill="#0284c7"/><circle cx="58" cy="44" r="5" fill="#0284c7"/><path d="M44 58 Q50 64 56 58" stroke="#0284c7" stroke-width="2.5" fill="none"/><polygon points="50,20 46,8 54,8" fill="#38bdf8"/><polygon points="24,34 14,30 20,40" fill="#38bdf8"/><polygon points="76,34 86,30 80,40" fill="#38bdf8"/><polygon points="50,76 46,88 54,88" fill="#38bdf8"/></svg>`},
    {name:'Blizzardon',hp:60,bio:'Blizzardon is the ice queen! She said "I rule the frozen peaks!" She can freeze anything!',svg:`<svg viewBox="0 0 100 100"><circle cx="50" cy="46" r="32" fill="#0ea5e9"/><circle cx="50" cy="46" r="24" fill="#7dd3fc"/><circle cx="50" cy="46" r="16" fill="#e0f2fe"/><circle cx="40" cy="42" r="6" fill="#0369a1"/><circle cx="60" cy="42" r="6" fill="#0369a1"/><path d="M42 60 Q50 68 58 60" stroke="#0369a1" stroke-width="3" fill="none"/><polygon points="50,14 44,0 56,0" fill="#38bdf8"/><polygon points="18,30 6,24 14,38" fill="#38bdf8"/><polygon points="82,30 94,24 86,38" fill="#38bdf8"/><polygon points="18,62 6,68 14,56" fill="#38bdf8"/><polygon points="82,62 94,68 86,56" fill="#38bdf8"/></svg>`}
  ]},
  {id:'gloomfang',type:'Dark',color:'#4c1d95',bio:'Gloomfang hides in the shadows. He is very sneaky! He said "You can not see me!" He has big yellow eyes that glow. He likes the dark.',stages:[
    {name:'Gloomfang',hp:34,bio:'Gloomfang is a tiny shadow with glowing eyes!',svg:`<svg viewBox="0 0 100 100"><ellipse cx="50" cy="55" rx="22" ry="26" fill="#1e1b4b"/><ellipse cx="50" cy="58" rx="16" ry="18" fill="#312e81"/><circle cx="42" cy="50" r="5" fill="#fbbf24"/><circle cx="58" cy="50" r="5" fill="#fbbf24"/><circle cx="42" cy="50" r="2.5" fill="#1e293b"/><circle cx="58" cy="50" r="2.5" fill="#1e293b"/><path d="M46 64 Q50 60 54 64" stroke="#a855f7" stroke-width="2" fill="none"/><path d="M36 30 Q30 18 44 28" fill="#4c1d95"/><path d="M64 30 Q70 18 56 28" fill="#4c1d95"/></svg>`},
    {name:'Duskterror',hp:48,bio:'Duskterror is bigger and scarier! He said "I am the night!" He has sharp claws.',svg:`<svg viewBox="0 0 100 100"><ellipse cx="50" cy="52" rx="28" ry="30" fill="#1e1b4b"/><ellipse cx="50" cy="54" rx="20" ry="22" fill="#312e81"/><circle cx="40" cy="46" r="6" fill="#ef4444"/><circle cx="60" cy="46" r="6" fill="#ef4444"/><circle cx="40" cy="46" r="3" fill="#1e293b"/><circle cx="60" cy="46" r="3" fill="#1e293b"/><path d="M44 64 Q50 58 56 64" stroke="#a855f7" stroke-width="2.5" fill="none"/><polygon points="24,36 14,20 30,32" fill="#4c1d95"/><polygon points="76,36 86,20 70,32" fill="#4c1d95"/></svg>`},
    {name:'Voidreaper',hp:66,bio:'Voidreaper is the darkest Wordmon! He said "I am the shadow king!" He can vanish and appear anywhere!',svg:`<svg viewBox="0 0 100 100"><ellipse cx="50" cy="50" rx="32" ry="34" fill="#0f0a2e"/><ellipse cx="50" cy="52" rx="24" ry="26" fill="#1e1b4b"/><circle cx="38" cy="44" r="7" fill="#ef4444"/><circle cx="62" cy="44" r="7" fill="#ef4444"/><circle cx="38" cy="44" r="3.5" fill="#fbbf24"/><circle cx="62" cy="44" r="3.5" fill="#fbbf24"/><path d="M42 66 Q50 58 58 66" stroke="#a855f7" stroke-width="3" fill="none"/><polygon points="18,32 4,14 24,28" fill="#312e81"/><polygon points="82,32 96,14 76,28" fill="#312e81"/><polygon points="50,18 44,4 56,4" fill="#4c1d95"/></svg>`}
  ]},
  {id:'nebulark',type:'Psychic',color:'#6366f1',bio:'Nebulark is from outer space! She is made of stars! She said "I come from far away!" She can read your mind and she knows all the words!',stages:[
    {name:'Nebulark',hp:36,bio:'Nebulark is a tiny star creature from space!',svg:`<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="24" fill="#4338ca"/><circle cx="50" cy="50" r="16" fill="#6366f1"/><circle cx="44" cy="46" r="5" fill="#e0e7ff"/><circle cx="56" cy="46" r="5" fill="#e0e7ff"/><circle cx="44" cy="46" r="3" fill="#1e293b"/><circle cx="56" cy="46" r="3" fill="#1e293b"/><path d="M46 58 Q50 62 54 58" stroke="#1e293b" stroke-width="2" fill="none"/><circle cx="30" cy="32" r="3" fill="#fbbf24" opacity=".6"/><circle cx="70" cy="36" r="2" fill="#fbbf24" opacity=".5"/><circle cx="50" cy="22" r="2" fill="#fbbf24" opacity=".7"/></svg>`},
    {name:'Cosmoglide',hp:50,bio:'Cosmoglide has a ring of stars! She said "I am bigger now!" She can fly through space.',svg:`<svg viewBox="0 0 100 100"><circle cx="50" cy="48" r="28" fill="#3730a3"/><circle cx="50" cy="48" r="20" fill="#4f46e5"/><ellipse cx="50" cy="48" rx="40" ry="8" fill="none" stroke="#a5b4fc" stroke-width="2" opacity=".5"/><circle cx="42" cy="44" r="6" fill="#e0e7ff"/><circle cx="58" cy="44" r="6" fill="#e0e7ff"/><circle cx="42" cy="44" r="3.5" fill="#1e293b"/><circle cx="58" cy="44" r="3.5" fill="#1e293b"/><path d="M44 58 Q50 64 56 58" stroke="#1e293b" stroke-width="2.5" fill="none"/><circle cx="26" cy="28" r="3" fill="#fbbf24" opacity=".7"/><circle cx="74" cy="32" r="3" fill="#fbbf24" opacity=".6"/><circle cx="50" cy="18" r="3" fill="#fbbf24" opacity=".8"/></svg>`},
    {name:'Galaxion',hp:70,bio:'Galaxion is the most powerful Wordmon! She said "I am the universe!" She has galaxies inside her! She is the final challenge!',svg:`<svg viewBox="0 0 100 100"><circle cx="50" cy="46" r="32" fill="#1e1b4b"/><circle cx="50" cy="46" r="24" fill="#3730a3"/><circle cx="50" cy="46" r="16" fill="#4f46e5"/><ellipse cx="50" cy="46" rx="44" ry="10" fill="none" stroke="#a5b4fc" stroke-width="3" opacity=".5"/><ellipse cx="50" cy="46" rx="30" ry="6" fill="none" stroke="#818cf8" stroke-width="2" opacity=".4" transform="rotate(30 50 46)"/><circle cx="40" cy="42" r="7" fill="#e0e7ff"/><circle cx="60" cy="42" r="7" fill="#e0e7ff"/><circle cx="40" cy="42" r="4" fill="#1e293b"/><circle cx="60" cy="42" r="4" fill="#1e293b"/><circle cx="42" cy="40" r="1.5" fill="#a5b4fc"/><circle cx="62" cy="40" r="1.5" fill="#a5b4fc"/><path d="M42 60 Q50 68 58 60" stroke="#1e293b" stroke-width="3" fill="none"/><circle cx="22" cy="24" r="4" fill="#fbbf24" opacity=".8"/><circle cx="78" cy="28" r="3" fill="#fbbf24" opacity=".7"/><circle cx="50" cy="12" r="4" fill="#fbbf24"/></svg>`}
  ]},
  {id:'snowpuff',type:'Ice',color:'#67e8f9',bio:'Snowpuff is a tiny snow ball with big eyes! She said "Hi! I am cold but I am nice!" She likes to roll down hills and make little snow friends everywhere.',stages:[
    {name:'Snowpuff',hp:30,bio:'Snowpuff is a tiny snow ball with big eyes! She said "Hi! I am cold but I am nice!" She likes to roll down hills and make little snow friends everywhere.',svg:`<svg viewBox="0 0 100 100"><circle cx="50" cy="55" r="28" fill="#e0f2fe"/><circle cx="50" cy="55" r="22" fill="#fff"/><circle cx="42" cy="50" r="5" fill="#1e293b"/><circle cx="58" cy="50" r="5" fill="#1e293b"/><circle cx="43" cy="48" r="2" fill="#fff"/><circle cx="59" cy="48" r="2" fill="#fff"/><path d="M44 62 Q50 67 56 62" stroke="#1e293b" stroke-width="2" fill="none" stroke-linecap="round"/><polygon points="50,28 48,18 52,18" fill="#67e8f9"/><polygon points="34,30 28,22 36,24" fill="#67e8f9"/><polygon points="66,30 72,22 64,24" fill="#67e8f9"/><circle cx="36" cy="58" r="2" fill="#bae6fd"/><circle cx="64" cy="58" r="2" fill="#bae6fd"/></svg>`},
    {name:'Frostpaw',hp:42,bio:'Frostpaw got bigger! Now she has paws and a tail made of ice. She said "I can jump very high!" She can make a frozen path for you to walk on!',svg:`<svg viewBox="0 0 100 100"><ellipse cx="50" cy="52" rx="32" ry="28" fill="#bae6fd"/><ellipse cx="50" cy="54" rx="24" ry="20" fill="#fff"/><circle cx="40" cy="46" r="6" fill="#1e293b"/><circle cx="60" cy="46" r="6" fill="#1e293b"/><circle cx="42" cy="44" r="2.5" fill="#fff"/><circle cx="62" cy="44" r="2.5" fill="#fff"/><path d="M44 58 Q50 64 56 58" stroke="#1e293b" stroke-width="2.5" fill="none" stroke-linecap="round"/><polygon points="30,28 22,18 30,22" fill="#67e8f9"/><polygon points="50,22 46,10 54,10" fill="#67e8f9"/><polygon points="70,28 78,18 70,22" fill="#67e8f9"/><rect x="26" y="70" width="12" height="14" rx="6" fill="#bae6fd"/><rect x="62" y="70" width="12" height="14" rx="6" fill="#bae6fd"/><polygon points="82,56 92,48 86,62" fill="#67e8f9"/></svg>`},
    {name:'Glacierfang',hp:58,bio:'Glacierfang is the ICE KING! He said "I am made of a thousand years of snow!" His fangs are like icicles and his roar can freeze a whole lake!',svg:`<svg viewBox="0 0 100 100"><ellipse cx="50" cy="48" rx="36" ry="32" fill="#7dd3fc"/><ellipse cx="50" cy="50" rx="28" ry="24" fill="#e0f2fe"/><circle cx="38" cy="42" r="7" fill="#1e293b"/><circle cx="62" cy="42" r="7" fill="#1e293b"/><circle cx="40" cy="40" r="3" fill="#fff"/><circle cx="64" cy="40" r="3" fill="#fff"/><circle cx="41" cy="39" r="1" fill="#67e8f9"/><circle cx="65" cy="39" r="1" fill="#67e8f9"/><path d="M40 58 Q50 66 60 58" stroke="#1e293b" stroke-width="3" fill="none" stroke-linecap="round"/><polygon points="42,60 44,68 46,60" fill="#fff"/><polygon points="54,60 56,68 58,60" fill="#fff"/><polygon points="24,22 14,4 24,16" fill="#67e8f9"/><polygon points="50,14 46,0 54,0" fill="#67e8f9"/><polygon points="76,22 86,4 76,16" fill="#67e8f9"/><polygon points="12,44 0,34 8,50" fill="#bae6fd"/><polygon points="88,44 100,34 92,50" fill="#bae6fd"/><rect x="22" y="72" width="14" height="16" rx="7" fill="#7dd3fc"/><rect x="64" y="72" width="14" height="16" rx="7" fill="#7dd3fc"/></svg>`}
  ]},
  {id:'buzzlet',type:'Bug',color:'#fde047',bio:'Buzzlet is a tiny bug with big wings. She said "Bzzzz! I can fly!" She loves flowers and she buzzes a happy song when the sun comes up.',stages:[
    {name:'Buzzlet',hp:28,bio:'Buzzlet is a tiny bug with big wings. She said "Bzzzz! I can fly!" She loves flowers and she buzzes a happy song when the sun comes up.',svg:`<svg viewBox="0 0 100 100"><ellipse cx="50" cy="55" rx="22" ry="20" fill="#fde047"/><rect x="42" y="50" width="16" height="3" fill="#1e293b"/><rect x="42" y="58" width="16" height="3" fill="#1e293b"/><circle cx="42" cy="42" r="5" fill="#1e293b"/><circle cx="58" cy="42" r="5" fill="#1e293b"/><circle cx="43" cy="40" r="2" fill="#fff"/><circle cx="59" cy="40" r="2" fill="#fff"/><ellipse cx="30" cy="40" rx="10" ry="14" fill="#fef3c7" opacity=".8"/><ellipse cx="70" cy="40" rx="10" ry="14" fill="#fef3c7" opacity=".8"/><path d="M44 66 Q50 70 56 66" stroke="#1e293b" stroke-width="2" fill="none" stroke-linecap="round"/><line x1="42" y1="30" x2="38" y2="22" stroke="#1e293b" stroke-width="2"/><line x1="58" y1="30" x2="62" y2="22" stroke="#1e293b" stroke-width="2"/></svg>`},
    {name:'Stingwhirl',hp:40,bio:'Stingwhirl grew a stinger! She said "Do not be bad, or I will sting you!" She zooms around so fast you only see a yellow blur!',svg:`<svg viewBox="0 0 100 100"><ellipse cx="50" cy="50" rx="26" ry="24" fill="#fde047"/><rect x="38" y="44" width="24" height="4" fill="#1e293b"/><rect x="38" y="54" width="24" height="4" fill="#1e293b"/><circle cx="40" cy="38" r="6" fill="#1e293b"/><circle cx="60" cy="38" r="6" fill="#1e293b"/><circle cx="42" cy="36" r="2.5" fill="#fff"/><circle cx="62" cy="36" r="2.5" fill="#fff"/><ellipse cx="26" cy="36" rx="12" ry="18" fill="#fef3c7" opacity=".85"/><ellipse cx="74" cy="36" rx="12" ry="18" fill="#fef3c7" opacity=".85"/><path d="M44 64 Q50 68 56 64" stroke="#1e293b" stroke-width="2.5" fill="none" stroke-linecap="round"/><polygon points="50,76 46,90 54,90" fill="#1e293b"/><line x1="40" y1="26" x2="34" y2="16" stroke="#1e293b" stroke-width="2.5"/><line x1="60" y1="26" x2="66" y2="16" stroke="#1e293b" stroke-width="2.5"/></svg>`},
    {name:'Hivequeen',hp:56,bio:'Hivequeen is the ruler of all the bees! She said "I lead the hive with kindness!" She has a crown made of honey and wings like windows of gold.',svg:`<svg viewBox="0 0 100 100"><ellipse cx="50" cy="50" rx="30" ry="28" fill="#fde047"/><rect x="34" y="40" width="32" height="5" fill="#1e293b"/><rect x="34" y="52" width="32" height="5" fill="#1e293b"/><circle cx="38" cy="34" r="7" fill="#1e293b"/><circle cx="62" cy="34" r="7" fill="#1e293b"/><circle cx="40" cy="32" r="3" fill="#fff"/><circle cx="64" cy="32" r="3" fill="#fff"/><ellipse cx="20" cy="32" rx="14" ry="22" fill="#fef3c7" opacity=".9"/><ellipse cx="80" cy="32" rx="14" ry="22" fill="#fef3c7" opacity=".9"/><path d="M42 64 Q50 70 58 64" stroke="#1e293b" stroke-width="3" fill="none" stroke-linecap="round"/><polygon points="40,18 40,10 44,14 48,8 52,14 56,8 60,14 60,18" fill="#f59e0b" stroke="#d97706" stroke-width="1"/><polygon points="50,78 44,96 56,96" fill="#1e293b"/><line x1="36" y1="20" x2="28" y2="6" stroke="#1e293b" stroke-width="3"/><line x1="64" y1="20" x2="72" y2="6" stroke="#1e293b" stroke-width="3"/></svg>`}
  ]},
  {id:'drakle',type:'Dragon',color:'#10b981',bio:'Drakle is a baby dragon! He said "I can make a tiny puff of smoke!" He is green and has little wings. He is going to be very big one day!',stages:[
    {name:'Drakle',hp:34,bio:'Drakle is a baby dragon! He said "I can make a tiny puff of smoke!" He is green and has little wings. He is going to be very big one day!',svg:`<svg viewBox="0 0 100 100"><ellipse cx="50" cy="54" rx="26" ry="24" fill="#10b981"/><ellipse cx="50" cy="56" rx="20" ry="18" fill="#6ee7b7"/><circle cx="40" cy="48" r="5" fill="#1e293b"/><circle cx="60" cy="48" r="5" fill="#1e293b"/><circle cx="41" cy="46" r="2" fill="#fff"/><circle cx="61" cy="46" r="2" fill="#fff"/><path d="M44 60 Q50 65 56 60" stroke="#1e293b" stroke-width="2" fill="none" stroke-linecap="round"/><polygon points="42,62 44,68 46,62" fill="#fff"/><polygon points="54,62 56,68 58,62" fill="#fff"/><path d="M22 46 Q10 34 16 52Z" fill="#059669"/><path d="M78 46 Q90 34 84 52Z" fill="#059669"/><polygon points="50,32 46,22 54,22" fill="#6ee7b7"/><polygon points="42,34 38,26 44,28" fill="#6ee7b7"/><polygon points="58,34 62,26 56,28" fill="#6ee7b7"/><rect x="32" y="72" width="10" height="12" rx="5" fill="#059669"/><rect x="58" y="72" width="10" height="12" rx="5" fill="#059669"/></svg>`},
    {name:'Wyvernell',hp:48,bio:'Wyvernell has strong wings! She said "I can fly over the mountains!" She can make a small fire now. Her scales shine like green gems.',svg:`<svg viewBox="0 0 100 100"><ellipse cx="50" cy="50" rx="30" ry="26" fill="#10b981"/><ellipse cx="50" cy="52" rx="22" ry="20" fill="#6ee7b7"/><circle cx="38" cy="44" r="6" fill="#1e293b"/><circle cx="62" cy="44" r="6" fill="#1e293b"/><circle cx="40" cy="42" r="2.5" fill="#fff"/><circle cx="64" cy="42" r="2.5" fill="#fff"/><path d="M42 58 Q50 64 58 58" stroke="#1e293b" stroke-width="2.5" fill="none" stroke-linecap="round"/><polygon points="40,60 43,68 46,60" fill="#fff"/><polygon points="54,60 57,68 60,60" fill="#fff"/><path d="M16 38 Q-4 22 6 50 Q14 44 16 38Z" fill="#059669"/><path d="M84 38 Q104 22 94 50 Q86 44 84 38Z" fill="#059669"/><polygon points="50,26 44,12 56,12" fill="#6ee7b7"/><polygon points="40,28 34,16 44,20" fill="#6ee7b7"/><polygon points="60,28 66,16 56,20" fill="#6ee7b7"/><path d="M36 12 Q40 2 44 10" fill="#9333ea"/><path d="M56 10 Q60 2 64 12" fill="#9333ea"/><rect x="28" y="74" width="12" height="14" rx="6" fill="#059669"/><rect x="60" y="74" width="12" height="14" rx="6" fill="#059669"/></svg>`},
    {name:'Dragonspire',hp:72,bio:'Dragonspire is the ancient dragon! He said "I have lived a thousand years!" His scales are emerald and his fire can light up the whole sky!',svg:`<svg viewBox="0 0 100 100"><ellipse cx="50" cy="48" rx="36" ry="32" fill="#065f46"/><ellipse cx="50" cy="50" rx="28" ry="24" fill="#10b981"/><ellipse cx="50" cy="52" rx="20" ry="16" fill="#6ee7b7"/><circle cx="36" cy="42" r="8" fill="#1e293b"/><circle cx="64" cy="42" r="8" fill="#1e293b"/><circle cx="38" cy="40" r="4" fill="#fff"/><circle cx="66" cy="40" r="4" fill="#fff"/><circle cx="40" cy="38" r="1.5" fill="#10b981"/><circle cx="68" cy="38" r="1.5" fill="#10b981"/><path d="M40 58 Q50 68 60 58" stroke="#1e293b" stroke-width="3" fill="none" stroke-linecap="round"/><polygon points="40,60 44,72 48,60" fill="#fff"/><polygon points="52,60 56,72 60,60" fill="#fff"/><path d="M10 34 Q-16 12 0 54 Q8 44 10 34Z" fill="#065f46"/><path d="M90 34 Q116 12 100 54 Q92 44 90 34Z" fill="#065f46"/><polygon points="50,18 42,0 58,0" fill="#6ee7b7"/><polygon points="36,22 28,4 40,10" fill="#10b981"/><polygon points="64,22 72,4 60,10" fill="#10b981"/><polygon points="22,16 16,2 26,8" fill="#6ee7b7"/><polygon points="78,16 84,2 74,8" fill="#6ee7b7"/><path d="M30 6 Q34 -8 38 4" fill="#9333ea"/><path d="M50 0 Q54 -10 58 2" fill="#ef4444"/><path d="M66 4 Q70 -8 74 6" fill="#9333ea"/><rect x="22" y="72" width="14" height="18" rx="7" fill="#065f46"/><rect x="64" y="72" width="14" height="18" rx="7" fill="#065f46"/></svg>`}
  ]},
  {id:'shadopup',type:'Dark',color:'#1e293b',bio:'Shadopup is a little shadow puppy! He said "Do not be afraid! I am friendly!" He likes to hide in dark places and pop out to say hi!',stages:[
    {name:'Shadopup',hp:30,bio:'Shadopup is a little shadow puppy! He said "Do not be afraid! I am friendly!" He likes to hide in dark places and pop out to say hi!',svg:`<svg viewBox="0 0 100 100"><ellipse cx="50" cy="55" rx="26" ry="22" fill="#1e293b"/><ellipse cx="50" cy="57" rx="20" ry="16" fill="#475569"/><circle cx="42" cy="50" r="6" fill="#fbbf24"/><circle cx="58" cy="50" r="6" fill="#fbbf24"/><circle cx="42" cy="50" r="2.5" fill="#1e293b"/><circle cx="58" cy="50" r="2.5" fill="#1e293b"/><ellipse cx="50" cy="60" rx="3" ry="2" fill="#fbbf24"/><path d="M44 64 Q50 68 56 64" stroke="#fbbf24" stroke-width="2" fill="none" stroke-linecap="round"/><polygon points="32,32 26,18 38,26" fill="#1e293b"/><polygon points="68,32 74,18 62,26" fill="#1e293b"/><rect x="32" y="72" width="10" height="12" rx="5" fill="#0f172a"/><rect x="58" y="72" width="10" height="12" rx="5" fill="#0f172a"/></svg>`},
    {name:'Nighthowl',hp:44,bio:'Nighthowl is bigger and faster! He said "I howl at the moon!" He can hide in the shadows and jump out. His eyes glow like the stars.',svg:`<svg viewBox="0 0 100 100"><ellipse cx="50" cy="50" rx="30" ry="26" fill="#0f172a"/><ellipse cx="50" cy="52" rx="22" ry="18" fill="#334155"/><circle cx="40" cy="44" r="7" fill="#fbbf24"/><circle cx="60" cy="44" r="7" fill="#fbbf24"/><circle cx="40" cy="44" r="3" fill="#1e293b"/><circle cx="60" cy="44" r="3" fill="#1e293b"/><ellipse cx="50" cy="58" rx="4" ry="3" fill="#fbbf24"/><path d="M42 64 Q50 70 58 64" stroke="#fbbf24" stroke-width="2.5" fill="none" stroke-linecap="round"/><polygon points="42,66 44,72 46,66" fill="#fff"/><polygon points="54,66 56,72 58,66" fill="#fff"/><polygon points="26,26 18,8 34,20" fill="#1e293b"/><polygon points="74,26 82,8 66,20" fill="#1e293b"/><rect x="28" y="74" width="12" height="14" rx="6" fill="#0f172a"/><rect x="60" y="74" width="12" height="14" rx="6" fill="#0f172a"/></svg>`},
    {name:'Voidbeast',hp:62,bio:'Voidbeast is made of pure night! He said "I come from the darkest place!" He is not scary if you are his friend. His eyes are full of stars!',svg:`<svg viewBox="0 0 100 100"><ellipse cx="50" cy="48" rx="36" ry="30" fill="#020617"/><ellipse cx="50" cy="50" rx="28" ry="24" fill="#1e293b"/><ellipse cx="50" cy="52" rx="20" ry="16" fill="#475569"/><circle cx="38" cy="42" r="9" fill="#fbbf24"/><circle cx="62" cy="42" r="9" fill="#fbbf24"/><circle cx="38" cy="42" r="5" fill="#1e293b"/><circle cx="62" cy="42" r="5" fill="#1e293b"/><circle cx="36" cy="40" r="1" fill="#fff"/><circle cx="40" cy="43" r=".8" fill="#fff"/><circle cx="60" cy="40" r="1" fill="#fff"/><circle cx="64" cy="43" r=".8" fill="#fff"/><ellipse cx="50" cy="58" rx="5" ry="3" fill="#fbbf24"/><path d="M40 64 Q50 72 60 64" stroke="#fbbf24" stroke-width="3" fill="none" stroke-linecap="round"/><polygon points="40,66 44,76 48,66" fill="#fff"/><polygon points="52,66 56,76 60,66" fill="#fff"/><polygon points="20,20 8,-2 30,14" fill="#020617"/><polygon points="80,20 92,-2 70,14" fill="#020617"/><path d="M14 38 Q-4 48 12 56" fill="#1e293b"/><path d="M86 38 Q104 48 88 56" fill="#1e293b"/><rect x="22" y="72" width="14" height="18" rx="7" fill="#020617"/><rect x="64" y="72" width="14" height="18" rx="7" fill="#020617"/></svg>`}
  ]},
  {id:'boltbit',type:'Steel',color:'#94a3b8',bio:'Boltbit is a little robot friend! He said "Beep boop! Hi!" He is made of shiny metal. He has a little antenna and he can zap things with static.',stages:[
    {name:'Boltbit',hp:32,bio:'Boltbit is a little robot friend! He said "Beep boop! Hi!" He is made of shiny metal. He has a little antenna and he can zap things with static.',svg:`<svg viewBox="0 0 100 100"><rect x="28" y="32" width="44" height="42" rx="6" fill="#94a3b8"/><rect x="32" y="36" width="36" height="34" rx="4" fill="#cbd5e1"/><circle cx="40" cy="48" r="5" fill="#38bdf8"/><circle cx="60" cy="48" r="5" fill="#38bdf8"/><circle cx="40" cy="48" r="2" fill="#1e293b"/><circle cx="60" cy="48" r="2" fill="#1e293b"/><rect x="42" y="58" width="16" height="4" rx="2" fill="#1e293b"/><line x1="50" y1="32" x2="50" y2="22" stroke="#94a3b8" stroke-width="2"/><circle cx="50" cy="20" r="3" fill="#ef4444"/><rect x="22" y="40" width="6" height="18" rx="3" fill="#64748b"/><rect x="72" y="40" width="6" height="18" rx="3" fill="#64748b"/><rect x="32" y="76" width="10" height="10" rx="2" fill="#64748b"/><rect x="58" y="76" width="10" height="10" rx="2" fill="#64748b"/></svg>`},
    {name:'Ironclad',hp:48,bio:'Ironclad is bigger and stronger! He said "I have armor of iron!" He has thick plates on his body and he can block any attack!',svg:`<svg viewBox="0 0 100 100"><rect x="22" y="26" width="56" height="52" rx="8" fill="#64748b"/><rect x="28" y="32" width="44" height="40" rx="5" fill="#94a3b8"/><rect x="32" y="36" width="36" height="32" rx="3" fill="#cbd5e1"/><circle cx="40" cy="46" r="6" fill="#38bdf8"/><circle cx="60" cy="46" r="6" fill="#38bdf8"/><circle cx="40" cy="46" r="3" fill="#1e293b"/><circle cx="60" cy="46" r="3" fill="#1e293b"/><circle cx="41" cy="45" r="1" fill="#fff"/><circle cx="61" cy="45" r="1" fill="#fff"/><rect x="40" y="56" width="20" height="4" rx="2" fill="#1e293b"/><rect x="42" y="62" width="16" height="3" rx="1" fill="#1e293b"/><line x1="50" y1="26" x2="50" y2="14" stroke="#64748b" stroke-width="3"/><circle cx="50" cy="12" r="4" fill="#ef4444"/><rect x="14" y="36" width="8" height="24" rx="4" fill="#475569"/><rect x="78" y="36" width="8" height="24" rx="4" fill="#475569"/><circle cx="18" cy="48" r="2" fill="#38bdf8"/><circle cx="82" cy="48" r="2" fill="#38bdf8"/><rect x="28" y="78" width="12" height="14" rx="3" fill="#475569"/><rect x="60" y="78" width="12" height="14" rx="3" fill="#475569"/></svg>`},
    {name:'Mechtitan',hp:70,bio:'Mechtitan is the ultimate robot! He said "I am 100 percent metal!" He has rockets and lasers and a shiny chrome body. Nobody can stop him!',svg:`<svg viewBox="0 0 100 100"><rect x="16" y="20" width="68" height="60" rx="10" fill="#475569"/><rect x="22" y="26" width="56" height="48" rx="6" fill="#64748b"/><rect x="28" y="32" width="44" height="36" rx="4" fill="#94a3b8"/><rect x="32" y="36" width="36" height="28" rx="3" fill="#cbd5e1"/><circle cx="38" cy="44" r="7" fill="#38bdf8"/><circle cx="62" cy="44" r="7" fill="#38bdf8"/><circle cx="38" cy="44" r="4" fill="#1e293b"/><circle cx="62" cy="44" r="4" fill="#1e293b"/><circle cx="39" cy="42" r="1.5" fill="#fff"/><circle cx="63" cy="42" r="1.5" fill="#fff"/><rect x="40" y="54" width="20" height="5" rx="2" fill="#1e293b"/><rect x="42" y="60" width="16" height="3" rx="1" fill="#1e293b"/><line x1="50" y1="20" x2="50" y2="8" stroke="#475569" stroke-width="4"/><circle cx="50" cy="6" r="5" fill="#ef4444"/><circle cx="50" cy="6" r="2" fill="#fff"/><rect x="8" y="30" width="10" height="30" rx="5" fill="#334155"/><rect x="82" y="30" width="10" height="30" rx="5" fill="#334155"/><circle cx="13" cy="42" r="2.5" fill="#ef4444"/><circle cx="87" cy="42" r="2.5" fill="#ef4444"/><circle cx="13" cy="54" r="2.5" fill="#fbbf24"/><circle cx="87" cy="54" r="2.5" fill="#fbbf24"/><rect x="24" y="80" width="14" height="16" rx="4" fill="#334155"/><rect x="62" y="80" width="14" height="16" rx="4" fill="#334155"/><polygon points="50,16 46,8 54,8" fill="#94a3b8"/></svg>`}
  ]},
  {id:'turboroar',type:'Speed',color:'#9333ea',bio:'Turboroar is a Wordmon shaped like a race car! He said "Vrooom! I am the fastest!" He has big wheels and a tiny engine that goes PUT PUT PUT!',stages:[
    {name:'Turboroar',hp:28,bio:'Turboroar is a Wordmon shaped like a race car! He said "Vrooom! I am the fastest!" He has big wheels and a tiny engine that goes PUT PUT PUT!',svg:`<svg viewBox="0 0 100 100"><rect x="18" y="46" width="64" height="22" rx="10" fill="#9333ea"/><rect x="30" y="30" width="40" height="22" rx="6" fill="#a855f7"/><circle cx="36" cy="40" r="4" fill="#1e293b"/><circle cx="64" cy="40" r="4" fill="#1e293b"/><circle cx="37" cy="39" r="1.5" fill="#fff"/><circle cx="65" cy="39" r="1.5" fill="#fff"/><path d="M42 46 Q50 50 58 46" stroke="#1e293b" stroke-width="2" fill="none"/><circle cx="28" cy="72" r="10" fill="#1e293b"/><circle cx="28" cy="72" r="5" fill="#94a3b8"/><circle cx="72" cy="72" r="10" fill="#1e293b"/><circle cx="72" cy="72" r="5" fill="#94a3b8"/><rect x="80" y="52" width="8" height="6" rx="2" fill="#ef4444"/></svg>`},
    {name:'Nitrofang',hp:42,bio:'Nitrofang is faster and meaner! He said "I have nitro boosts!" He has flames on his sides and a big scoop on his back. ZOOM ZOOM!',svg:`<svg viewBox="0 0 100 100"><rect x="12" y="44" width="76" height="26" rx="12" fill="#7c3aed"/><rect x="26" y="24" width="48" height="24" rx="8" fill="#9333ea"/><circle cx="36" cy="34" r="5" fill="#1e293b"/><circle cx="64" cy="34" r="5" fill="#1e293b"/><circle cx="38" cy="32" r="2" fill="#fff"/><circle cx="66" cy="32" r="2" fill="#fff"/><path d="M42 42 Q50 48 58 42" stroke="#1e293b" stroke-width="2.5" fill="none"/><polygon points="42,44 46,52 50,44" fill="#fff"/><polygon points="50,44 54,52 58,44" fill="#fff"/><circle cx="26" cy="74" r="12" fill="#1e293b"/><circle cx="26" cy="74" r="6" fill="#94a3b8"/><circle cx="74" cy="74" r="12" fill="#1e293b"/><circle cx="74" cy="74" r="6" fill="#94a3b8"/><path d="M8 50 Q0 54 4 62 Q10 56 14 58" fill="#fbbf24"/><path d="M8 50 Q-4 58 2 66" fill="#ef4444"/><rect x="30" y="14" width="40" height="10" rx="3" fill="#b45309"/></svg>`},
    {name:'Velocitron',hp:60,bio:'Velocitron is the FASTEST Wordmon ever! He said "I break the sound wall!" He has jet engines and gold wheels. Do not blink or you will miss him!',svg:`<svg viewBox="0 0 100 100"><rect x="6" y="42" width="88" height="30" rx="14" fill="#c2410c"/><rect x="20" y="18" width="60" height="28" rx="10" fill="#7c3aed"/><rect x="26" y="22" width="48" height="20" rx="6" fill="#9333ea"/><circle cx="34" cy="30" r="6" fill="#1e293b"/><circle cx="66" cy="30" r="6" fill="#1e293b"/><circle cx="36" cy="28" r="2.5" fill="#fff"/><circle cx="68" cy="28" r="2.5" fill="#fff"/><path d="M40 38 Q50 46 60 38" stroke="#1e293b" stroke-width="3" fill="none"/><polygon points="42,40 46,50 50,40" fill="#fff"/><polygon points="50,40 54,50 58,40" fill="#fff"/><circle cx="24" cy="76" r="14" fill="#1e293b"/><circle cx="24" cy="76" r="8" fill="#fbbf24"/><circle cx="24" cy="76" r="3" fill="#1e293b"/><circle cx="76" cy="76" r="14" fill="#1e293b"/><circle cx="76" cy="76" r="8" fill="#fbbf24"/><circle cx="76" cy="76" r="3" fill="#1e293b"/><path d="M0 48 Q-12 56 -2 68 Q6 60 12 60" fill="#fbbf24"/><path d="M0 48 Q-16 60 -4 72" fill="#ef4444"/><path d="M-2 52 Q-18 64 -6 76" fill="#fde047"/><rect x="40" y="6" width="20" height="14" rx="3" fill="#78350f"/><rect x="44" y="10" width="12" height="6" fill="#fbbf24"/></svg>`}
  ]},
  // ===== 20 NEW WORDMONS (sprites generated via Nano Banana) =====
  {id:'sproutkin',type:'Grass',color:'#86efac',bio:'Sproutkin just popped out of the ground! She is a tiny green plant with a smile. She said "I am new!" and she likes the sun on her face.',stages:[
    {name:'Sproutkin',hp:28,bio:'Sproutkin just popped out of the ground! She is a tiny green plant with a smile. She likes sunshine.',svg:`<svg viewBox="0 0 100 100"><ellipse cx="50" cy="65" rx="20" ry="18" fill="#86efac"/><circle cx="44" cy="62" r="3" fill="#1e293b"/><circle cx="56" cy="62" r="3" fill="#1e293b"/><path d="M44 72 Q50 76 56 72" stroke="#1e293b" stroke-width="2" fill="none"/><path d="M50 48 Q42 28 32 38 Q42 36 50 48Z" fill="#22c55e"/><path d="M50 48 Q58 28 68 38 Q58 36 50 48Z" fill="#22c55e"/></svg>`},
    {name:'Bloomstar',hp:42,bio:'Bloomstar has a big pink flower on her head! She said "I can smell the bees coming!" She is green and pink and she glows in the sun.',svg:`<svg viewBox="0 0 100 100"><ellipse cx="50" cy="62" rx="24" ry="22" fill="#86efac"/><circle cx="42" cy="58" r="4" fill="#1e293b"/><circle cx="58" cy="58" r="4" fill="#1e293b"/><path d="M44 70 Q50 75 56 70" stroke="#1e293b" stroke-width="2" fill="none"/><circle cx="50" cy="30" r="12" fill="#f472b6"/><circle cx="50" cy="30" r="5" fill="#fde047"/><path d="M40 25 L35 18Z M60 25 L65 18Z M50 18 L50 10Z" stroke="#ec4899" stroke-width="3"/></svg>`},
    {name:'Florawarden',hp:56,bio:'Florawarden is the queen of the garden! She said "every flower listens to me!" She is big and green with a crown of flowers. All the bugs are her friends.',svg:`<svg viewBox="0 0 100 100"><ellipse cx="50" cy="56" rx="32" ry="30" fill="#22c55e"/><circle cx="40" cy="48" r="5" fill="#1e293b"/><circle cx="60" cy="48" r="5" fill="#1e293b"/><path d="M42 62 Q50 70 58 62" stroke="#1e293b" stroke-width="2.5" fill="none"/><circle cx="30" cy="20" r="8" fill="#f472b6"/><circle cx="50" cy="14" r="9" fill="#ec4899"/><circle cx="70" cy="20" r="8" fill="#f472b6"/><circle cx="30" cy="20" r="3" fill="#fde047"/><circle cx="50" cy="14" r="3" fill="#fde047"/><circle cx="70" cy="20" r="3" fill="#fde047"/></svg>`}
  ]},
  {id:'pebblet',type:'Rock',color:'#a8a29e',bio:'Pebblet is a tiny rock with eyes. He is quiet but kind. He said "I am small but strong!" He is the youngest of all the rocks in the hills.',stages:[
    {name:'Pebblet',hp:32,bio:'Pebblet is a tiny round rock with eyes. He is small but strong.',svg:`<svg viewBox="0 0 100 100"><ellipse cx="50" cy="58" rx="22" ry="20" fill="#a8a29e"/><ellipse cx="50" cy="60" rx="16" ry="14" fill="#d6d3d1"/><circle cx="43" cy="56" r="3" fill="#1e293b"/><circle cx="57" cy="56" r="3" fill="#1e293b"/><path d="M45 66 L55 66" stroke="#1e293b" stroke-width="2"/></svg>`},
    {name:'Mossboulder',hp:46,bio:'Mossboulder has a top of green moss! He said "I am a boulder now!" He rolls down the hill so fast. Do not get in his way.',svg:`<svg viewBox="0 0 100 100"><ellipse cx="50" cy="58" rx="28" ry="26" fill="#78716c"/><ellipse cx="50" cy="60" rx="22" ry="18" fill="#a8a29e"/><path d="M30 42 Q50 28 70 42 Q60 34 50 36 Q40 34 30 42Z" fill="#22c55e"/><circle cx="42" cy="56" r="4" fill="#1e293b"/><circle cx="58" cy="56" r="4" fill="#1e293b"/><path d="M44 68 L56 68" stroke="#1e293b" stroke-width="2.5"/></svg>`},
    {name:'Mountainguard',hp:64,bio:'Mountainguard is a living mountain! He said "I guard the whole valley!" He has crystals on his back and his fists can shake the ground.',svg:`<svg viewBox="0 0 100 100"><polygon points="12,80 50,10 88,80" fill="#57534e"/><polygon points="20,80 50,22 80,80" fill="#78716c"/><polygon points="30,80 50,36 70,80" fill="#a8a29e"/><circle cx="42" cy="56" r="5" fill="#fbbf24"/><circle cx="58" cy="56" r="5" fill="#fbbf24"/><path d="M44 68 L56 68" stroke="#1e293b" stroke-width="3"/><polygon points="40,30 44,20 48,32" fill="#06b6d4"/><polygon points="56,28 60,18 64,30" fill="#06b6d4"/></svg>`}
  ]},
  {id:'chirpy',type:'Flying',color:'#fde047',bio:'Chirpy is a little yellow bird! She said "tweet tweet hi!" She has tiny wings and big eyes. She likes to sing at sunrise.',stages:[
    {name:'Chirpy',hp:26,bio:'Chirpy is a little yellow bird. She likes to sing at sunrise.',svg:`<svg viewBox="0 0 100 100"><circle cx="50" cy="55" r="22" fill="#fde047"/><circle cx="42" cy="50" r="4" fill="#1e293b"/><circle cx="58" cy="50" r="4" fill="#1e293b"/><polygon points="50,58 44,64 56,64" fill="#f97316"/><path d="M30 55 Q22 50 28 60Z" fill="#fbbf24"/><path d="M70 55 Q78 50 72 60Z" fill="#fbbf24"/></svg>`},
    {name:'Featherjet',hp:40,bio:'Featherjet has big wings and can zoom across the sky! She said "watch me loop!" Her feathers are yellow and blue and she loves to race.',svg:`<svg viewBox="0 0 100 100"><ellipse cx="50" cy="54" rx="26" ry="22" fill="#fde047"/><path d="M20 48 Q2 36 14 62 Q22 56 20 48Z" fill="#38bdf8"/><path d="M80 48 Q98 36 86 62 Q78 56 80 48Z" fill="#38bdf8"/><circle cx="42" cy="48" r="5" fill="#1e293b"/><circle cx="58" cy="48" r="5" fill="#1e293b"/><polygon points="50,58 42,66 58,66" fill="#f97316"/></svg>`},
    {name:'Skyraptor',hp:58,bio:'Skyraptor is the king of the sky! He said "I see every cloud!" He has golden wings and sharp claws. Birds everywhere bow to him.',svg:`<svg viewBox="0 0 100 100"><ellipse cx="50" cy="52" rx="30" ry="26" fill="#fbbf24"/><path d="M14 44 Q-12 24 8 70 Q22 58 14 44Z" fill="#f59e0b"/><path d="M86 44 Q112 24 92 70 Q78 58 86 44Z" fill="#f59e0b"/><circle cx="40" cy="46" r="6" fill="#ef4444"/><circle cx="60" cy="46" r="6" fill="#ef4444"/><circle cx="40" cy="46" r="3" fill="#1e293b"/><circle cx="60" cy="46" r="3" fill="#1e293b"/><polygon points="50,58 40,70 60,70" fill="#b91c1c"/><polygon points="50,18 46,8 54,8" fill="#fbbf24"/></svg>`}
  ]},
  {id:'munchy',type:'Normal',color:'#fb923c',bio:'Munchy is always so hungry! He said "gimme a snack!" He is a round orange blob with a big mouth. He will eat anything that is not nailed down.',stages:[
    {name:'Munchy',hp:30,bio:'Munchy is always hungry! He will eat anything.',svg:`<svg viewBox="0 0 100 100"><circle cx="50" cy="55" r="26" fill="#fb923c"/><circle cx="42" cy="50" r="4" fill="#1e293b"/><circle cx="58" cy="50" r="4" fill="#1e293b"/><ellipse cx="50" cy="66" rx="10" ry="6" fill="#1e293b"/><rect x="48" y="64" width="2" height="4" fill="#fff"/><rect x="52" y="64" width="2" height="4" fill="#fff"/></svg>`},
    {name:'Biteball',hp:44,bio:'Biteball has huge teeth and he is still always hungry! He said "I need more snacks!" He can chomp through a pizza in one big bite.',svg:`<svg viewBox="0 0 100 100"><circle cx="50" cy="54" r="30" fill="#f97316"/><circle cx="40" cy="46" r="5" fill="#1e293b"/><circle cx="60" cy="46" r="5" fill="#1e293b"/><ellipse cx="50" cy="66" rx="16" ry="10" fill="#1e293b"/><polygon points="40,60 42,70 44,60" fill="#fff"/><polygon points="46,60 48,72 50,60" fill="#fff"/><polygon points="52,60 54,72 56,60" fill="#fff"/><polygon points="58,60 60,70 62,60" fill="#fff"/></svg>`},
    {name:'Gobbleking',hp:62,bio:'Gobbleking is the king of snacks! He said "bow down and feed me!" He has a crown and his mouth is the size of a door.',svg:`<svg viewBox="0 0 100 100"><circle cx="50" cy="54" r="34" fill="#ea580c"/><polygon points="30,24 34,14 38,22 42,10 46,20 50,8 54,20 58,10 62,22 66,14 70,24 50,30" fill="#fbbf24" stroke="#d97706" stroke-width="1"/><circle cx="38" cy="48" r="6" fill="#1e293b"/><circle cx="62" cy="48" r="6" fill="#1e293b"/><ellipse cx="50" cy="68" rx="22" ry="14" fill="#1e293b"/><polygon points="36,60 38,74 40,60" fill="#fff"/><polygon points="44,60 46,76 48,60" fill="#fff"/><polygon points="52,60 54,76 56,60" fill="#fff"/><polygon points="60,60 62,74 64,60" fill="#fff"/></svg>`}
  ]},
  {id:'fluffle',type:'Fairy',color:'#f9a8d4',bio:'Fluffle is a soft pink cloud of fluff! She said "pet me please!" She has big eyes and a little tail and she smells like cotton candy.',stages:[
    {name:'Fluffle',hp:28,bio:'Fluffle is a soft pink cloud of fluff. She smells like cotton candy.',svg:`<svg viewBox="0 0 100 100"><ellipse cx="50" cy="55" rx="24" ry="22" fill="#f9a8d4"/><ellipse cx="50" cy="57" rx="18" ry="15" fill="#fbcfe8"/><circle cx="43" cy="52" r="3" fill="#1e293b"/><circle cx="57" cy="52" r="3" fill="#1e293b"/><path d="M45 62 Q50 66 55 62" stroke="#1e293b" stroke-width="2" fill="none"/></svg>`},
    {name:'Cottonhop',hp:42,bio:'Cottonhop hops so high! She said "I bounce on clouds!" Her fluff is pink and white and she has little bunny feet.',svg:`<svg viewBox="0 0 100 100"><ellipse cx="50" cy="54" rx="28" ry="24" fill="#f472b6"/><ellipse cx="50" cy="56" rx="22" ry="18" fill="#fbcfe8"/><path d="M30 28 Q28 10 36 26Z" fill="#f9a8d4"/><path d="M70 28 Q72 10 64 26Z" fill="#f9a8d4"/><circle cx="42" cy="48" r="4" fill="#1e293b"/><circle cx="58" cy="48" r="4" fill="#1e293b"/><path d="M44 62 Q50 66 56 62" stroke="#1e293b" stroke-width="2" fill="none"/><circle cx="34" cy="78" r="6" fill="#fbcfe8"/><circle cx="66" cy="78" r="6" fill="#fbcfe8"/></svg>`},
    {name:'Cloudqueen',hp:58,bio:'Cloudqueen is the softest and kindest of all! She said "I make rainbows for the kids!" She floats in the sky and she has a sparkly crown.',svg:`<svg viewBox="0 0 100 100"><ellipse cx="50" cy="54" rx="34" ry="28" fill="#ec4899"/><ellipse cx="50" cy="56" rx="28" ry="22" fill="#f9a8d4"/><polygon points="30,24 34,14 38,22 42,12 46,20 50,10 54,20 58,12 62,22 66,14 70,24 50,30" fill="#fde047"/><circle cx="40" cy="46" r="5" fill="#1e293b"/><circle cx="60" cy="46" r="5" fill="#1e293b"/><path d="M42 60 Q50 66 58 60" stroke="#1e293b" stroke-width="2.5" fill="none"/><path d="M20 70 Q50 80 80 70" stroke="#9333ea" stroke-width="3" fill="none"/><path d="M20 74 Q50 84 80 74" stroke="#3b82f6" stroke-width="3" fill="none"/><path d="M20 78 Q50 88 80 78" stroke="#22c55e" stroke-width="3" fill="none"/></svg>`}
  ]},
  {id:'zappit',type:'Electric',color:'#facc15',bio:'Zappit is tiny but ZAPPY! He said "I will shock you!" He is yellow with a little lightning tail and he sparkles all day.',stages:[
    {name:'Zappit',hp:30,bio:'Zappit is tiny but zappy. He sparkles all day.',svg:`<svg viewBox="0 0 100 100"><polygon points="50,18 38,48 48,48 40,78 62,38 52,38 60,18" fill="#facc15" stroke="#ca8a04" stroke-width="2"/><circle cx="46" cy="40" r="3" fill="#1e293b"/><circle cx="54" cy="40" r="3" fill="#1e293b"/></svg>`},
    {name:'Thundernap',hp:44,bio:'Thundernap is a lightning bolt with legs! He said "run from me!" He zooms around and makes tiny thunder.',svg:`<svg viewBox="0 0 100 100"><polygon points="50,10 34,44 48,44 38,84 66,36 54,36 64,10" fill="#fde047" stroke="#ca8a04" stroke-width="3"/><circle cx="44" cy="36" r="4" fill="#1e293b"/><circle cx="56" cy="36" r="4" fill="#1e293b"/><rect x="38" y="82" width="6" height="12" fill="#ca8a04"/><rect x="58" y="82" width="6" height="12" fill="#ca8a04"/></svg>`},
    {name:'Boltmaster',hp:60,bio:'Boltmaster is the thunder king! He said "hear my mighty CRACK!" His bolts light up the whole sky and make the clouds shake.',svg:`<svg viewBox="0 0 100 100"><polygon points="50,4 28,46 46,46 34,94 72,36 56,36 68,4" fill="#fbbf24" stroke="#92400e" stroke-width="4"/><circle cx="42" cy="36" r="5" fill="#ef4444"/><circle cx="58" cy="36" r="5" fill="#ef4444"/><circle cx="42" cy="36" r="2" fill="#fff"/><circle cx="58" cy="36" r="2" fill="#fff"/><polygon points="20,20 12,38 26,30" fill="#fde047"/><polygon points="80,20 88,38 74,30" fill="#fde047"/></svg>`}
  ]},
  {id:'blubber',type:'Water',color:'#93c5fd',bio:'Blubber is a tiny blue whale! He said "splish splash!" He likes the deep sea and his eyes sparkle under water.',stages:[
    {name:'Blubber',hp:32,bio:'Blubber is a tiny blue whale. He likes deep water.',svg:`<svg viewBox="0 0 100 100"><ellipse cx="50" cy="55" rx="28" ry="20" fill="#93c5fd"/><ellipse cx="50" cy="58" rx="20" ry="12" fill="#bfdbfe"/><circle cx="36" cy="50" r="3" fill="#1e293b"/><circle cx="56" cy="50" r="3" fill="#1e293b"/><path d="M40 62 Q46 66 52 62" stroke="#1e293b" stroke-width="2" fill="none"/><path d="M80 50 Q92 40 86 60Z" fill="#93c5fd"/></svg>`},
    {name:'Splasho',hp:46,bio:'Splasho can shoot water from his mouth! He said "I can make a rainbow!" He is bigger now and his fins are strong.',svg:`<svg viewBox="0 0 100 100"><ellipse cx="50" cy="54" rx="32" ry="24" fill="#3b82f6"/><ellipse cx="50" cy="58" rx="24" ry="16" fill="#93c5fd"/><circle cx="36" cy="48" r="4" fill="#fff"/><circle cx="60" cy="48" r="4" fill="#fff"/><circle cx="36" cy="48" r="2" fill="#1e293b"/><circle cx="60" cy="48" r="2" fill="#1e293b"/><path d="M40 62 Q48 68 56 62" stroke="#1e293b" stroke-width="2.5" fill="none"/><path d="M82 48 Q100 36 92 62Z" fill="#3b82f6"/><path d="M40 22 Q44 10 50 22" fill="#bfdbfe"/></svg>`},
    {name:'Tidalord',hp:66,bio:'Tidalord is the ruler of the sea! He said "one spout and a wave comes!" He is massive with big jaws and a crown of coral.',svg:`<svg viewBox="0 0 100 100"><ellipse cx="50" cy="54" rx="38" ry="28" fill="#1d4ed8"/><ellipse cx="50" cy="58" rx="30" ry="22" fill="#3b82f6"/><ellipse cx="50" cy="60" rx="20" ry="14" fill="#93c5fd"/><circle cx="34" cy="46" r="6" fill="#fff"/><circle cx="62" cy="46" r="6" fill="#fff"/><circle cx="34" cy="46" r="3" fill="#1e293b"/><circle cx="62" cy="46" r="3" fill="#1e293b"/><path d="M38 62 Q50 70 58 62" stroke="#1e293b" stroke-width="3" fill="none"/><polygon points="40,60 44,70 48,60" fill="#fff"/><polygon points="52,60 56,70 60,60" fill="#fff"/><path d="M42 24 Q46 14 50 24 Q54 14 58 24 Q52 18 50 18 Q48 18 42 24Z" fill="#f472b6"/></svg>`}
  ]},
  {id:'mudkin',type:'Ground',color:'#a16207',bio:'Mudkin is a happy mud baby! She said "squish squish!" She likes to make mud pies and her toes are always dirty.',stages:[
    {name:'Mudkin',hp:30,bio:'Mudkin is a mud baby. She likes to make mud pies.',svg:`<svg viewBox="0 0 100 100"><ellipse cx="50" cy="60" rx="26" ry="22" fill="#a16207"/><ellipse cx="50" cy="62" rx="18" ry="14" fill="#ca8a04"/><circle cx="42" cy="54" r="4" fill="#1e293b"/><circle cx="58" cy="54" r="4" fill="#1e293b"/><path d="M44 66 Q50 70 56 66" stroke="#1e293b" stroke-width="2" fill="none"/><rect x="38" y="80" width="8" height="8" fill="#78350f"/><rect x="54" y="80" width="8" height="8" fill="#78350f"/></svg>`},
    {name:'Dirtclod',hp:44,bio:'Dirtclod is a clump of hard mud! He said "I can dig!" He has strong arms and can tunnel under the ground.',svg:`<svg viewBox="0 0 100 100"><ellipse cx="50" cy="56" rx="32" ry="26" fill="#78350f"/><ellipse cx="50" cy="58" rx="24" ry="18" fill="#a16207"/><circle cx="40" cy="50" r="5" fill="#1e293b"/><circle cx="60" cy="50" r="5" fill="#1e293b"/><path d="M42 64 Q50 70 58 64" stroke="#1e293b" stroke-width="2.5" fill="none"/><rect x="16" y="54" width="10" height="18" rx="5" fill="#78350f"/><rect x="74" y="54" width="10" height="18" rx="5" fill="#78350f"/></svg>`},
    {name:'Earthsmash',hp:62,bio:'Earthsmash is a mountain of muscle! He said "ONE punch and the ground SHAKES!" He has huge stone fists and everything around him trembles.',svg:`<svg viewBox="0 0 100 100"><ellipse cx="50" cy="54" rx="38" ry="32" fill="#451a03"/><ellipse cx="50" cy="56" rx="30" ry="24" fill="#78350f"/><ellipse cx="50" cy="58" rx="22" ry="16" fill="#a16207"/><circle cx="38" cy="48" r="6" fill="#fbbf24"/><circle cx="62" cy="48" r="6" fill="#fbbf24"/><circle cx="38" cy="48" r="3" fill="#1e293b"/><circle cx="62" cy="48" r="3" fill="#1e293b"/><path d="M42 66 Q50 74 58 66" stroke="#1e293b" stroke-width="3" fill="none"/><rect x="6" y="50" width="14" height="24" rx="7" fill="#451a03"/><rect x="80" y="50" width="14" height="24" rx="7" fill="#451a03"/></svg>`}
  ]},
  {id:'pyrofly',type:'Bug',color:'#f87171',bio:'Pyrofly is a tiny fire bug! She said "zzzzz I am HOT!" She has red wings and her bug belly glows like a little ember.',stages:[
    {name:'Pyrofly',hp:28,bio:'Pyrofly is a tiny fire bug. Her belly glows like an ember.',svg:`<svg viewBox="0 0 100 100"><ellipse cx="50" cy="56" rx="16" ry="22" fill="#ef4444"/><ellipse cx="26" cy="48" rx="10" ry="16" fill="#fecaca" opacity=".8"/><ellipse cx="74" cy="48" rx="10" ry="16" fill="#fecaca" opacity=".8"/><circle cx="44" cy="48" r="3" fill="#1e293b"/><circle cx="56" cy="48" r="3" fill="#1e293b"/><ellipse cx="50" cy="68" rx="6" ry="8" fill="#fbbf24"/><circle cx="50" cy="68" r="3" fill="#f97316"/></svg>`},
    {name:'Cinderwing',hp:42,bio:'Cinderwing has burning wings! She said "look at me glow!" She shoots tiny sparks when she flies.',svg:`<svg viewBox="0 0 100 100"><ellipse cx="50" cy="54" rx="20" ry="24" fill="#dc2626"/><ellipse cx="22" cy="44" rx="14" ry="22" fill="#fde047" opacity=".85"/><ellipse cx="78" cy="44" rx="14" ry="22" fill="#fde047" opacity=".85"/><path d="M22 48 Q16 40 24 40" fill="#f97316"/><path d="M78 48 Q84 40 76 40" fill="#f97316"/><circle cx="42" cy="46" r="4" fill="#fbbf24"/><circle cx="58" cy="46" r="4" fill="#fbbf24"/><circle cx="42" cy="46" r="2" fill="#1e293b"/><circle cx="58" cy="46" r="2" fill="#1e293b"/><ellipse cx="50" cy="68" rx="8" ry="10" fill="#fbbf24"/></svg>`},
    {name:'Emberstorm',hp:58,bio:'Emberstorm is a storm of fire and wings! She said "FEEL THE HEAT!" Her four wings light up the night and burn bright.',svg:`<svg viewBox="0 0 100 100"><ellipse cx="50" cy="54" rx="22" ry="28" fill="#991b1b"/><ellipse cx="18" cy="36" rx="12" ry="22" fill="#fbbf24"/><ellipse cx="82" cy="36" rx="12" ry="22" fill="#fbbf24"/><ellipse cx="22" cy="70" rx="10" ry="18" fill="#f97316"/><ellipse cx="78" cy="70" rx="10" ry="18" fill="#f97316"/><path d="M18 30 Q10 18 20 24" fill="#fde047"/><path d="M82 30 Q90 18 80 24" fill="#fde047"/><circle cx="40" cy="44" r="6" fill="#fef3c7"/><circle cx="60" cy="44" r="6" fill="#fef3c7"/><circle cx="40" cy="44" r="3" fill="#ef4444"/><circle cx="60" cy="44" r="3" fill="#ef4444"/><ellipse cx="50" cy="70" rx="12" ry="14" fill="#fbbf24"/><circle cx="50" cy="70" r="6" fill="#fef3c7"/></svg>`}
  ]},
  {id:'glimmer',type:'Fairy',color:'#fef9c3',bio:'Glimmer is a tiny ball of light! She said "I sparkle for you!" She is soft and yellow and she floats like a firefly.',stages:[
    {name:'Glimmer',hp:28,bio:'Glimmer is a tiny ball of light. She floats like a firefly.',svg:`<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="26" fill="#fef3c7" opacity=".4"/><circle cx="50" cy="50" r="18" fill="#fde047"/><circle cx="44" cy="46" r="3" fill="#1e293b"/><circle cx="56" cy="46" r="3" fill="#1e293b"/><path d="M45 56 Q50 60 55 56" stroke="#1e293b" stroke-width="2" fill="none"/><circle cx="28" cy="30" r="2" fill="#fde047"/><circle cx="74" cy="32" r="2" fill="#fde047"/></svg>`},
    {name:'Starshine',hp:42,bio:'Starshine is shaped like a little star! She said "wish on me!" She twinkles when she is happy and she glows in the dark.',svg:`<svg viewBox="0 0 100 100"><polygon points="50,14 60,40 88,44 64,58 74,84 50,68 26,84 36,58 12,44 40,40" fill="#facc15" stroke="#ca8a04" stroke-width="2"/><circle cx="44" cy="50" r="4" fill="#1e293b"/><circle cx="56" cy="50" r="4" fill="#1e293b"/><path d="M46 60 Q50 64 54 60" stroke="#1e293b" stroke-width="2" fill="none"/></svg>`},
    {name:'Luminara',hp:58,bio:'Luminara is a walking rainbow! She said "all the colors live in me!" She has wings made of pure light and a crown of stars.',svg:`<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="36" fill="#a855f7" opacity=".3"/><circle cx="50" cy="50" r="28" fill="#c084fc"/><circle cx="50" cy="50" r="20" fill="#fde047"/><polygon points="30,14 36,24 24,24" fill="#ec4899"/><polygon points="50,6 56,18 44,18" fill="#3b82f6"/><polygon points="70,14 76,24 64,24" fill="#22c55e"/><circle cx="42" cy="48" r="5" fill="#1e293b"/><circle cx="58" cy="48" r="5" fill="#1e293b"/><path d="M44 58 Q50 64 56 58" stroke="#1e293b" stroke-width="2.5" fill="none"/></svg>`}
  ]},
  {id:'bramblepup',type:'Grass',color:'#84cc16',bio:'Bramblepup is a grass puppy! He said "woof woof woof!" He is green and has little leaves for ears. He likes to chase butterflies.',stages:[
    {name:'Bramblepup',hp:32,bio:'Bramblepup is a green grass puppy. He chases butterflies.',svg:`<svg viewBox="0 0 100 100"><ellipse cx="50" cy="58" rx="24" ry="20" fill="#84cc16"/><ellipse cx="50" cy="60" rx="18" ry="14" fill="#bef264"/><path d="M30 38 L20 26 L34 32Z" fill="#22c55e"/><path d="M70 38 L80 26 L66 32Z" fill="#22c55e"/><circle cx="42" cy="52" r="4" fill="#1e293b"/><circle cx="58" cy="52" r="4" fill="#1e293b"/><ellipse cx="50" cy="62" rx="3" ry="2" fill="#1e293b"/></svg>`},
    {name:'Thornhound',hp:46,bio:'Thornhound has spikes along his back! He said "I will guard the forest!" He is fast and he can jump over any bush.',svg:`<svg viewBox="0 0 100 100"><ellipse cx="50" cy="56" rx="30" ry="22" fill="#65a30d"/><ellipse cx="50" cy="58" rx="22" ry="16" fill="#84cc16"/><path d="M28 34 L18 22 L32 28Z" fill="#16a34a"/><path d="M72 34 L82 22 L68 28Z" fill="#16a34a"/><polygon points="44,32 46,24 50,32" fill="#16a34a"/><polygon points="52,32 54,24 58,32" fill="#16a34a"/><circle cx="40" cy="50" r="5" fill="#1e293b"/><circle cx="60" cy="50" r="5" fill="#1e293b"/><ellipse cx="50" cy="62" rx="4" ry="2.5" fill="#1e293b"/></svg>`},
    {name:'Wildgrove',hp:62,bio:'Wildgrove is a wolf of the forest! He said "I lead the wild pack!" He is huge and green and his howl makes the trees dance.',svg:`<svg viewBox="0 0 100 100"><ellipse cx="50" cy="54" rx="36" ry="28" fill="#14532d"/><ellipse cx="50" cy="56" rx="28" ry="22" fill="#16a34a"/><ellipse cx="50" cy="58" rx="20" ry="14" fill="#84cc16"/><polygon points="20,24 12,8 30,20" fill="#15803d"/><polygon points="80,24 88,8 70,20" fill="#15803d"/><polygon points="38,22 42,10 46,20" fill="#22c55e"/><polygon points="54,20 58,10 62,22" fill="#22c55e"/><circle cx="38" cy="48" r="6" fill="#fde047"/><circle cx="62" cy="48" r="6" fill="#fde047"/><circle cx="38" cy="48" r="3" fill="#1e293b"/><circle cx="62" cy="48" r="3" fill="#1e293b"/><ellipse cx="50" cy="62" rx="5" ry="3" fill="#1e293b"/><path d="M42 68 Q50 72 58 68" stroke="#1e293b" stroke-width="2.5" fill="none"/><polygon points="46,72 48,82 50,72" fill="#fff"/><polygon points="50,72 52,82 54,72" fill="#fff"/></svg>`}
  ]},
  {id:'squibble',type:'Water',color:'#a855f7',bio:'Squibble is a little purple octopus! She said "shake a tentacle!" She has eight arms and she loves to dance under the sea.',stages:[
    {name:'Squibble',hp:30,bio:'Squibble is a little purple octopus. She loves to dance.',svg:`<svg viewBox="0 0 100 100"><circle cx="50" cy="44" r="22" fill="#a855f7"/><circle cx="44" cy="42" r="4" fill="#1e293b"/><circle cx="56" cy="42" r="4" fill="#1e293b"/><path d="M46 52 Q50 56 54 52" stroke="#1e293b" stroke-width="2" fill="none"/><path d="M32 60 Q28 80 34 82" stroke="#a855f7" stroke-width="6" fill="none"/><path d="M42 62 Q40 84 46 86" stroke="#a855f7" stroke-width="6" fill="none"/><path d="M58 62 Q60 84 54 86" stroke="#a855f7" stroke-width="6" fill="none"/><path d="M68 60 Q72 80 66 82" stroke="#a855f7" stroke-width="6" fill="none"/></svg>`},
    {name:'Inkjet',hp:44,bio:'Inkjet can shoot purple ink! She said "try to catch me!" She zooms around with her eight strong arms.',svg:`<svg viewBox="0 0 100 100"><circle cx="50" cy="40" r="26" fill="#9333ea"/><circle cx="42" cy="38" r="5" fill="#fde047"/><circle cx="58" cy="38" r="5" fill="#fde047"/><circle cx="42" cy="38" r="2.5" fill="#1e293b"/><circle cx="58" cy="38" r="2.5" fill="#1e293b"/><path d="M44 50 Q50 55 56 50" stroke="#1e293b" stroke-width="2.5" fill="none"/><path d="M28 58 Q22 84 32 88" stroke="#9333ea" stroke-width="7" fill="none"/><path d="M38 60 Q34 88 42 92" stroke="#9333ea" stroke-width="7" fill="none"/><path d="M50 62 Q50 90 50 94" stroke="#9333ea" stroke-width="7" fill="none"/><path d="M62 60 Q66 88 58 92" stroke="#9333ea" stroke-width="7" fill="none"/><path d="M72 58 Q78 84 68 88" stroke="#9333ea" stroke-width="7" fill="none"/><circle cx="22" cy="22" r="3" fill="#c084fc" opacity=".6"/><circle cx="80" cy="28" r="3" fill="#c084fc" opacity=".6"/></svg>`},
    {name:'Krakenette',hp:60,bio:'Krakenette is the queen of the deep! She said "bow down to the kraken!" Her arms reach across the whole sea.',svg:`<svg viewBox="0 0 100 100"><circle cx="50" cy="36" r="30" fill="#6b21a8"/><circle cx="50" cy="36" r="22" fill="#9333ea"/><polygon points="30,8 34,-2 38,6 42,-4 46,4 50,-6 54,4 58,-4 62,6 66,-2 70,8 50,14" fill="#fde047"/><circle cx="40" cy="36" r="6" fill="#fef08a"/><circle cx="60" cy="36" r="6" fill="#fef08a"/><circle cx="40" cy="36" r="3" fill="#1e293b"/><circle cx="60" cy="36" r="3" fill="#1e293b"/><path d="M42 50 Q50 58 58 50" stroke="#1e293b" stroke-width="3" fill="none"/><path d="M20 58 Q10 92 26 96" stroke="#6b21a8" stroke-width="8" fill="none"/><path d="M32 62 Q26 96 40 98" stroke="#6b21a8" stroke-width="8" fill="none"/><path d="M50 64 Q50 96 50 98" stroke="#6b21a8" stroke-width="8" fill="none"/><path d="M68 62 Q74 96 60 98" stroke="#6b21a8" stroke-width="8" fill="none"/><path d="M80 58 Q90 92 74 96" stroke="#6b21a8" stroke-width="8" fill="none"/></svg>`}
  ]},
  {id:'moonmoth',type:'Psychic',color:'#818cf8',bio:'Moonmoth is a dreamy little moth! She said "follow me to the moon!" Her wings have tiny stars and she only flies at night.',stages:[
    {name:'Moonmoth',hp:30,bio:'Moonmoth is a dreamy little moth. She only flies at night.',svg:`<svg viewBox="0 0 100 100"><ellipse cx="50" cy="54" rx="10" ry="20" fill="#4338ca"/><path d="M30 40 Q14 28 22 56 Q34 50 40 44Z" fill="#818cf8"/><path d="M70 40 Q86 28 78 56 Q66 50 60 44Z" fill="#818cf8"/><circle cx="24" cy="38" r="2" fill="#fde047"/><circle cx="36" cy="50" r="1.5" fill="#fde047"/><circle cx="64" cy="50" r="1.5" fill="#fde047"/><circle cx="76" cy="38" r="2" fill="#fde047"/><circle cx="46" cy="48" r="3" fill="#fde047"/><circle cx="54" cy="48" r="3" fill="#fde047"/></svg>`},
    {name:'Dreamwing',hp:44,bio:'Dreamwing makes kids have sweet dreams! She said "close your eyes and see!" Her big wings have glowing patterns.',svg:`<svg viewBox="0 0 100 100"><ellipse cx="50" cy="54" rx="12" ry="26" fill="#3730a3"/><path d="M26 34 Q4 14 12 60 Q28 54 40 44Z" fill="#6366f1"/><path d="M74 34 Q96 14 88 60 Q72 54 60 44Z" fill="#6366f1"/><circle cx="20" cy="34" r="3" fill="#fde047"/><circle cx="16" cy="50" r="2" fill="#fde047"/><circle cx="80" cy="34" r="3" fill="#fde047"/><circle cx="84" cy="50" r="2" fill="#fde047"/><circle cx="30" cy="44" r="5" fill="#a5b4fc"/><circle cx="70" cy="44" r="5" fill="#a5b4fc"/><circle cx="44" cy="46" r="4" fill="#fde047"/><circle cx="56" cy="46" r="4" fill="#fde047"/></svg>`},
    {name:'Etherflight',hp:60,bio:'Etherflight is a cosmic moth! She said "I fly in space!" Her wings are filled with tiny galaxies and her eyes glow purple.',svg:`<svg viewBox="0 0 100 100"><ellipse cx="50" cy="54" rx="14" ry="30" fill="#1e1b4b"/><path d="M22 28 Q-6 2 2 64 Q22 56 38 44Z" fill="#4f46e5"/><path d="M78 28 Q106 2 98 64 Q78 56 62 44Z" fill="#4f46e5"/><circle cx="16" cy="26" r="3" fill="#fde047"/><circle cx="8" cy="44" r="2" fill="#fde047"/><circle cx="24" cy="56" r="2" fill="#fde047"/><circle cx="84" cy="26" r="3" fill="#fde047"/><circle cx="92" cy="44" r="2" fill="#fde047"/><circle cx="76" cy="56" r="2" fill="#fde047"/><circle cx="28" cy="40" r="6" fill="#c084fc"/><circle cx="72" cy="40" r="6" fill="#c084fc"/><circle cx="28" cy="40" r="2" fill="#fff"/><circle cx="72" cy="40" r="2" fill="#fff"/><circle cx="44" cy="44" r="5" fill="#fde047"/><circle cx="56" cy="44" r="5" fill="#fde047"/><circle cx="44" cy="44" r="2" fill="#1e1b4b"/><circle cx="56" cy="44" r="2" fill="#1e1b4b"/></svg>`}
  ]},
  {id:'pizzarone',type:'Food',color:'#fde047',bio:'Pizzarone is a SLICE of pizza that can walk! He said "eat me no WAIT do not eat me!" He smells like cheese and he loves to run.',stages:[
    {name:'Pizzarone',hp:28,bio:'Pizzarone is a slice of pizza that can walk. He runs from forks.',svg:`<svg viewBox="0 0 100 100"><polygon points="50,12 20,78 80,78" fill="#fbbf24"/><polygon points="50,20 28,72 72,72" fill="#fef3c7"/><circle cx="42" cy="48" r="4" fill="#ef4444"/><circle cx="58" cy="48" r="4" fill="#ef4444"/><circle cx="50" cy="60" r="4" fill="#ef4444"/><circle cx="44" cy="58" r="3" fill="#1e293b"/><circle cx="56" cy="58" r="3" fill="#1e293b"/><path d="M46 66 Q50 70 54 66" stroke="#1e293b" stroke-width="2" fill="none"/></svg>`},
    {name:'Cheesemelt',hp:40,bio:'Cheesemelt is dripping with cheese! He said "I am so DELICIOUS!" He has little legs and he leaves cheesy footprints.',svg:`<svg viewBox="0 0 100 100"><polygon points="50,8 14,82 86,82" fill="#ca8a04"/><polygon points="50,16 22,76 78,76" fill="#fbbf24"/><polygon points="50,22 28,70 72,70" fill="#fef3c7"/><path d="M22 76 Q24 88 30 82Z" fill="#fde047"/><path d="M78 76 Q76 88 70 82Z" fill="#fde047"/><circle cx="38" cy="48" r="5" fill="#ef4444"/><circle cx="62" cy="48" r="5" fill="#ef4444"/><circle cx="50" cy="56" r="5" fill="#ef4444"/><circle cx="40" cy="58" r="3" fill="#1e293b"/><circle cx="60" cy="58" r="3" fill="#1e293b"/><path d="M44 64 Q50 70 56 64" stroke="#1e293b" stroke-width="2.5" fill="none"/><rect x="32" y="82" width="6" height="10" fill="#78350f"/><rect x="62" y="82" width="6" height="10" fill="#78350f"/></svg>`},
    {name:'Pepperoniking',hp:58,bio:'Pepperoniking is the KING of pizza! He said "I am the BIG CHEESE!" He is a whole pizza with a crown of pepperoni.',svg:`<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="40" fill="#78350f"/><circle cx="50" cy="50" r="34" fill="#ca8a04"/><circle cx="50" cy="50" r="28" fill="#fde047"/><circle cx="30" cy="34" r="5" fill="#ef4444"/><circle cx="62" cy="30" r="5" fill="#ef4444"/><circle cx="72" cy="52" r="5" fill="#ef4444"/><circle cx="60" cy="68" r="5" fill="#ef4444"/><circle cx="34" cy="64" r="5" fill="#ef4444"/><circle cx="24" cy="50" r="5" fill="#ef4444"/><polygon points="30,14 34,4 38,12 42,2 46,10 50,0 54,10 58,2 62,12 66,4 70,14 50,20" fill="#dc2626"/><circle cx="42" cy="48" r="4" fill="#fff"/><circle cx="58" cy="48" r="4" fill="#fff"/><circle cx="42" cy="48" r="2" fill="#1e293b"/><circle cx="58" cy="48" r="2" fill="#1e293b"/><path d="M44 58 Q50 64 56 58" stroke="#1e293b" stroke-width="2.5" fill="none"/></svg>`}
  ]},
  {id:'shadowkit',type:'Dark',color:'#1e293b',bio:'Shadowkit is a little black kitten! She said "meow in the dark!" Her eyes glow bright yellow and she can hide in any shadow.',stages:[
    {name:'Shadowkit',hp:30,bio:'Shadowkit is a little black kitten. Her eyes glow bright yellow.',svg:`<svg viewBox="0 0 100 100"><ellipse cx="50" cy="58" rx="22" ry="20" fill="#1e293b"/><polygon points="34,42 28,28 42,38" fill="#1e293b"/><polygon points="66,42 72,28 58,38" fill="#1e293b"/><circle cx="42" cy="52" r="5" fill="#fde047"/><circle cx="58" cy="52" r="5" fill="#fde047"/><ellipse cx="42" cy="52" rx="1.5" ry="4" fill="#1e293b"/><ellipse cx="58" cy="52" rx="1.5" ry="4" fill="#1e293b"/><path d="M46 62 L50 66 L54 62" stroke="#1e293b" stroke-width="2" fill="none"/></svg>`},
    {name:'Nightfur',hp:44,bio:'Nightfur is big and sleek! She said "I vanish into the dark!" Her fur is black as coal and she can see in total darkness.',svg:`<svg viewBox="0 0 100 100"><ellipse cx="50" cy="54" rx="28" ry="22" fill="#0f172a"/><ellipse cx="50" cy="56" rx="22" ry="16" fill="#1e293b"/><polygon points="28,38 20,20 36,32" fill="#0f172a"/><polygon points="72,38 80,20 64,32" fill="#0f172a"/><circle cx="40" cy="48" r="6" fill="#fde047"/><circle cx="60" cy="48" r="6" fill="#fde047"/><ellipse cx="40" cy="48" rx="1.8" ry="5" fill="#1e293b"/><ellipse cx="60" cy="48" rx="1.8" ry="5" fill="#1e293b"/><path d="M44 60 L50 64 L56 60" stroke="#1e293b" stroke-width="2.5" fill="none"/><path d="M82 56 Q96 62 86 74" stroke="#1e293b" stroke-width="4" fill="none"/></svg>`},
    {name:'Umbracat',hp:60,bio:'Umbracat is the panther of pure shadow! She said "nothing can find me!" Her eyes are like two suns and she moves like smoke.',svg:`<svg viewBox="0 0 100 100"><ellipse cx="50" cy="54" rx="34" ry="26" fill="#020617"/><ellipse cx="50" cy="56" rx="26" ry="20" fill="#0f172a"/><ellipse cx="50" cy="58" rx="18" ry="14" fill="#1e293b"/><polygon points="22,34 12,12 32,28" fill="#020617"/><polygon points="78,34 88,12 68,28" fill="#020617"/><circle cx="38" cy="48" r="7" fill="#f59e0b"/><circle cx="62" cy="48" r="7" fill="#f59e0b"/><ellipse cx="38" cy="48" rx="2" ry="6" fill="#1e293b"/><ellipse cx="62" cy="48" rx="2" ry="6" fill="#1e293b"/><circle cx="38" cy="46" r="1" fill="#fff"/><circle cx="62" cy="46" r="1" fill="#fff"/><path d="M44 62 L50 68 L56 62" stroke="#1e293b" stroke-width="3" fill="none"/><polygon points="46,66 48,74 52,66" fill="#fff"/><polygon points="52,66 54,74 58,66" fill="#fff"/><path d="M86 52 Q106 62 92 80" stroke="#020617" stroke-width="5" fill="none"/></svg>`}
  ]},
  {id:'crunchbite',type:'Fighting',color:'#f97316',bio:'Crunchbite is a tiny dino with HUGE teeth! He said "I wanna fight!" He is orange and he is always ready for a scrap.',stages:[
    {name:'Crunchbite',hp:32,bio:'Crunchbite is a tiny orange dino with huge teeth. He is always ready to fight.',svg:`<svg viewBox="0 0 100 100"><ellipse cx="50" cy="56" rx="24" ry="20" fill="#f97316"/><ellipse cx="50" cy="58" rx="18" ry="14" fill="#fed7aa"/><circle cx="42" cy="50" r="4" fill="#1e293b"/><circle cx="58" cy="50" r="4" fill="#1e293b"/><path d="M38 62 Q50 70 62 62 L62 64 L58 68 L50 62 L42 68 L38 64Z" fill="#fff" stroke="#1e293b" stroke-width="1.5"/><rect x="32" y="74" width="8" height="12" fill="#ea580c"/><rect x="60" y="74" width="8" height="12" fill="#ea580c"/></svg>`},
