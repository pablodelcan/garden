<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Río Reads</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  /* ===== NEW PALETTE: "Arcade Purple" (refreshed April 2026) ===== */
  --bg:#f8f5ff;
  --accent:#9333ea;      /* primary violet */
  --accent2:#a855f7;     /* lighter violet for gradients */
  --accent-dark:#7c3aed; /* deeper violet (replaces old #7c3aed) */
  --accent-light:#c084fc;/* softer violet (replaces old #a855f7) */
  --hot:#ec4899;         /* hot pink highlights */
  --aqua:#06b6d4;        /* cyan for variety */
  --green:#10b981;--red:#ef4444;--blue:#3b82f6;--purple:#a855f7;
  --text:#0f172a;--text2:#64748b;--card:#fff;--shadow:0 4px 20px rgba(147,51,234,.12);
  --coin:#fbbf24;--navy:#1a1033;--gold:#fbbf24;
  --glow:0 0 20px rgba(147,51,234,.15);
}
html{font-size:16px}
body{font-family:'Nunito',sans-serif;background:#e2e0dc;color:var(--text);min-height:100vh;overflow-x:hidden}
.game-shell{max-width:600px;margin:0 auto;background:linear-gradient(180deg,var(--bg) 0%,#f0ebe3 100%);min-height:100vh;position:relative;overflow-x:hidden}
@media(min-width:601px){.game-shell{box-shadow:0 0 60px rgba(0,0,0,.15);border-left:1px solid #d6d3d1;border-right:1px solid #d6d3d1}}
h1,h2,h3,.fredoka{font-family:'Fredoka One',cursive}

/* HEADER */
.header{background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);padding:4px 10px;position:sticky;top:0;z-index:100;box-shadow:0 4px 24px rgba(0,0,0,.3)}
.header::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.15),transparent)}
.header-top{display:flex;align-items:center;justify-content:space-between;gap:8px;min-height:0}
.header-logo{height:52px;width:auto;max-width:50%;filter:drop-shadow(2px 3px 0 rgba(0,0,0,.5));object-fit:contain;object-position:left}
@media(min-width:500px){.header-logo{height:56px}}
.hud{display:flex;gap:3px;flex-wrap:wrap;justify-content:flex-end;align-content:center;max-width:58%}
.pill{background:linear-gradient(180deg,rgba(255,255,255,.12),rgba(0,0,0,.3));color:#fff;padding:3px 9px;border-radius:16px;font-weight:700;font-size:.7rem;display:flex;align-items:center;gap:3px;border:1px solid rgba(255,255,255,.1);flex-shrink:0;white-space:nowrap;backdrop-filter:blur(4px)}
.pill svg{width:14px;height:14px}
.hud-icon{width:14px;height:14px}

/* XP BAR */
.xp-wrap{width:100%;margin-top:0}
.xp-bar{background:rgba(0,0,0,.5);border-radius:8px;height:14px;overflow:hidden;border:1px solid rgba(255,255,255,.08)}
.xp-fill{background:linear-gradient(180deg,#4ade80 0%,#22c55e 50%,#16a34a 100%);height:100%;border-radius:8px;transition:width .5s ease;position:relative;box-shadow:0 0 8px rgba(34,197,94,.3)}
.xp-fill::after{content:'';position:absolute;top:1px;left:4px;right:4px;height:5px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.35),transparent);border-radius:4px}
.xp-label{color:rgba(255,255,255,.85);font-size:.65rem;font-weight:700;text-align:center;margin-top:3px;letter-spacing:.5px}

/* STREAK DOTS */
.streak-wrap{display:flex;gap:6px;align-items:center;padding:8px 16px}
.streak-dot{width:26px;height:26px;border-radius:50%;border:none;background:#e7e5e4;transition:all .3s ease;display:flex;align-items:center;justify-content:center;font-size:.8rem}
.streak-dot::after{content:'☆';color:#a8a29e}
.streak-dot.filled{background:linear-gradient(135deg,#fbbf24,#9333ea);transform:scale(1.15);box-shadow:0 0 16px rgba(147,51,234,.4);animation:dotPop .4s ease}
.streak-dot.filled::after{content:'★';color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.2)}
@keyframes dotPop{0%{transform:scale(0.5)}50%{transform:scale(1.4)}100%{transform:scale(1.15)}}
.streak-label{font-size:.75rem;font-weight:700;color:var(--text2)}

/* BATTLE SCENE */
.battle{background:linear-gradient(180deg,#e0f2fe 0%,#bae6fd 45%,#a7f3d0 45%,#6ee7b7 100%);background-size:cover;background-position:center bottom;border-radius:20px;margin:8px 12px;padding:14px 20px;min-height:220px;position:relative;overflow:hidden;box-shadow:0 8px 32px rgba(147,51,234,.18),inset 0 1px 0 rgba(255,255,255,.35);transition:background .6s ease;border:2px solid rgba(147,51,234,.15)}
/* Battle scene uses AI-generated PNG backgrounds via JS (changeBattleBg) */
/* Subtle sparkle particle overlay for magical feel */
.battle::after{content:'';position:absolute;inset:0;background-image:radial-gradient(circle at 15% 85%,rgba(255,255,255,.4) 1px,transparent 2px),radial-gradient(circle at 85% 75%,rgba(255,255,255,.3) 1px,transparent 2px),radial-gradient(circle at 60% 90%,rgba(255,255,255,.25) 1px,transparent 2px);pointer-events:none;z-index:1}
.battle-ground{display:flex;justify-content:space-between;align-items:flex-end;min-height:180px;position:relative;padding:0 10px}
.fighter{display:flex;flex-direction:column;align-items:center;gap:4px;position:relative;z-index:2}
.sprite-box{transition:transform .5s ease}
.sprite-box svg,.sprite-box img{width:110px;height:110px;filter:drop-shadow(2px 4px 6px rgba(0,0,0,.25))}
.fighter.player .sprite-box{animation:bouncePl 2s ease-in-out infinite}
.fighter.enemy .sprite-box{animation:bounceEn 2s ease-in-out infinite .4s}
@keyframes bouncePl{0%,100%{transform:translateY(0) rotate(-1deg)}50%{transform:translateY(-10px) rotate(1deg)}}
@keyframes bounceEn{0%,100%{transform:translateY(0) rotate(1deg)}50%{transform:translateY(-10px) rotate(-1deg)}}
.hp-bar-wrap{width:130px;text-align:center}
.hp-name{font-family:'Fredoka One',cursive;font-size:.8rem;color:#fff;text-shadow:1px 1px 3px rgba(0,0,0,.7);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hp-bar{background:rgba(0,0,0,.3);border-radius:6px;height:10px;overflow:hidden;border:2px solid rgba(255,255,255,.3)}
.hp-fill{height:100%;border-radius:4px;transition:width .4s ease}
.hp-fill.green{background:repeating-linear-gradient(90deg,#22c55e 0px,#4ade80 8px,#16a34a 8px,#22c55e 10px)}
.hp-fill.yellow{background:repeating-linear-gradient(90deg,#eab308 0px,#facc15 8px,#ca8a04 8px,#eab308 10px)}
.hp-fill.red{background:repeating-linear-gradient(90deg,#ef4444 0px,#f87171 8px,#dc2626 8px,#ef4444 10px)}
.hp-text{font-size:.6rem;font-weight:700;color:#fff;text-shadow:1px 1px 2px rgba(0,0,0,.6)}
.battle-msg{position:absolute;top:45%;left:50%;transform:translate(-50%,-50%);font-family:'Fredoka One',cursive;font-size:1.3rem;color:#fff;text-shadow:2px 2px 0 rgba(0,0,0,.3);opacity:0;pointer-events:none;z-index:10;white-space:nowrap}
.battle-msg.show{animation:msgPop .8s ease forwards}
@keyframes msgPop{0%{opacity:0;transform:translate(-50%,-50%) scale(.5)}20%{opacity:1;transform:translate(-50%,-50%) scale(1.2)}40%{transform:translate(-50%,-50%) scale(1)}80%{opacity:1}100%{opacity:0;transform:translate(-50%,-70%) scale(1)}}
.hit-flash{position:absolute;inset:0;background:rgba(255,255,255,.7);opacity:0;pointer-events:none;z-index:5;border-radius:20px}
.hit-flash.show{animation:flash .3s ease}
@keyframes flash{0%{opacity:.7}100%{opacity:0}}
@keyframes attackRight{0%{transform:translateX(0)}30%{transform:translateX(50px)}60%{transform:translateX(50px) scale(1.1)}100%{transform:translateX(0)}}
@keyframes attackLeft{0%{transform:translateX(0)}30%{transform:translateX(-50px)}60%{transform:translateX(-50px) scale(1.1)}100%{transform:translateX(0)}}
@keyframes hurt{0%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}100%{transform:translateX(0)}}
.shake .sprite-box{animation:hurt .4s ease!important}
.atk-right .sprite-box{animation:attackRight .5s ease!important}
.atk-left .sprite-box{animation:attackLeft .5s ease!important}
.vs-badge{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:70px;height:70px;z-index:3;background:url('sprites/vs_badge_svg.svg') center/contain no-repeat;filter:drop-shadow(0 2px 6px rgba(0,0,0,.3))}

/* TABS */
.tabs{display:flex;gap:4px;padding:6px 12px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tabs::-webkit-scrollbar{display:none}
.tab{font-family:'Fredoka One',cursive;font-size:.75rem;padding:8px 14px;border-radius:14px;border:none;cursor:pointer;white-space:nowrap;transition:all .2s;background:#f5f5f4;color:var(--text2);box-shadow:0 2px 0 #e7e5e4}
.tab.active{background:linear-gradient(135deg,var(--accent),#7c3aed);color:#fff;box-shadow:0 4px 12px rgba(147,51,234,.3);transform:translateY(-1px)}
.tab:hover:not(.active){background:#e7e5e4;transform:translateY(-1px)}
.mode-indicator{font-family:'Fredoka One',cursive;font-size:.9rem;color:#fff;background:linear-gradient(135deg,var(--accent),#7c3aed);padding:8px 16px;border-radius:14px;white-space:nowrap;box-shadow:0 4px 12px rgba(147,51,234,.3)}
.mode-progress{font-family:'Fredoka One',cursive;font-size:.8rem;font-weight:700;color:var(--text2);padding:6px 0;white-space:nowrap}
.tab.quiz-tab{background:#ede9fe;color:#6d28d9}
.tab.quiz-tab.active{background:linear-gradient(135deg,#7c3aed,#6d28d9);color:#fff;box-shadow:0 4px 12px rgba(124,58,237,.3)}
.tab.phonics-tab{background:#dbeafe;color:#1d4ed8}
.tab.phonics-tab.active{background:linear-gradient(135deg,#3b82f6,#2563eb);color:#fff;box-shadow:0 4px 12px rgba(59,130,246,.3)}
.tab.heal-tab{background:#fce7f3;color:#be185d}
.tab.heal-tab.active{background:linear-gradient(135deg,#ec4899,#db2777);color:#fff;box-shadow:0 4px 12px rgba(236,72,153,.3)}
.tab.battle-tab{background:#fef2f2;color:#dc2626;animation:battlePulse 2s ease-in-out infinite}
.tab.battle-tab.active{background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff}
@keyframes battlePulse{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.3)}50%{box-shadow:0 0 12px 4px rgba(239,68,68,.3)}}

/* FULL-SCREEN TRAINER BATTLE */
.battle-overlay{position:fixed;inset:0;z-index:150;display:flex;flex-direction:column;background:#000}
.battle-overlay .battle-bg{position:absolute;inset:0;background-size:cover;background-position:center;opacity:.85}
.battle-overlay .battle-content{position:relative;z-index:2;flex:1;display:flex;flex-direction:column;max-width:600px;margin:0 auto;width:100%;padding:8px}
.battle-overlay .battle-header{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:rgba(0,0,0,.6);border-radius:14px;backdrop-filter:blur(8px);margin-bottom:8px}
.battle-overlay .battle-header .bh-name{font-family:'Fredoka One',cursive;font-size:.85rem;color:#fff}
.battle-overlay .battle-header .bh-hp{background:rgba(0,0,0,.4);border-radius:6px;height:10px;overflow:hidden;width:100px;border:1px solid rgba(255,255,255,.15)}
.battle-overlay .battle-header .bh-hp-fill{height:100%;border-radius:6px;transition:width .4s}
.battle-overlay .battle-header .bh-hp-text{font-size:.55rem;color:rgba(255,255,255,.7);font-weight:700}
.battle-overlay .battle-arena{flex:1;display:flex;justify-content:space-between;align-items:flex-end;padding:0 20px 10px;min-height:200px}
.battle-overlay .battle-fighter{text-align:center}
.battle-overlay .battle-fighter img{width:140px;height:140px;object-fit:contain;filter:drop-shadow(0 4px 12px rgba(0,0,0,.4))}
.battle-overlay .battle-fighter.player img{animation:bouncePl 2s ease-in-out infinite}
.battle-overlay .battle-fighter.enemy img{animation:bounceEn 2s ease-in-out infinite .3s}
.battle-overlay .battle-msg-area{text-align:center;font-family:'Fredoka One',cursive;font-size:1.1rem;color:#fff;text-shadow:2px 2px 4px rgba(0,0,0,.5);padding:4px;min-height:32px}
.battle-overlay .battle-controls{background:rgba(0,0,0,.7);backdrop-filter:blur(8px);border-radius:20px 20px 0 0;padding:14px 12px;border-top:2px solid rgba(255,255,255,.1)}
.battle-overlay .attack-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.battle-overlay .atk-btn{font-family:'Fredoka One',cursive;font-size:1.2rem;padding:14px 10px;border-radius:14px;border:2px solid rgba(255,255,255,.15);background:linear-gradient(180deg,rgba(255,255,255,.12),rgba(255,255,255,.04));color:#fff;cursor:pointer;transition:all .15s;text-align:center;backdrop-filter:blur(4px)}
.battle-overlay .atk-btn:hover{background:rgba(255,255,255,.2);transform:translateY(-2px)}
.battle-overlay .atk-btn:active{transform:translateY(1px)}
.battle-overlay .atk-btn .atk-power{font-size:.65rem;color:#fbbf24;font-weight:700;margin-top:2px}
.battle-overlay .confirm-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.battle-overlay .confirm-btn{font-family:'Fredoka One',cursive;font-size:1.1rem;padding:12px;border-radius:12px;border:2px solid rgba(255,255,255,.15);background:rgba(255,255,255,.08);color:#fff;cursor:pointer;transition:all .15s}
.battle-overlay .confirm-btn:hover{background:rgba(255,255,255,.15)}
.battle-overlay .confirm-btn.correct{background:rgba(34,197,94,.3);border-color:#22c55e}
.battle-overlay .confirm-btn.wrong-pick{background:rgba(220,38,38,.3);border-color:#dc2626}
.battle-overlay .confirm-btn.disabled{pointer-events:none;opacity:.6}
.battle-overlay .battle-close{position:absolute;top:12px;right:12px;z-index:10;background:rgba(0,0,0,.5);color:#fff;border:none;padding:6px 14px;border-radius:10px;font-family:'Fredoka One',cursive;font-size:.75rem;cursor:pointer;backdrop-filter:blur(4px)}
.tab.shop-tab{background:#fef3c7;color:#92400e}
.tab.shop-tab.active{background:linear-gradient(135deg,var(--gold),#f59e0b);color:#92400e;box-shadow:0 4px 12px rgba(251,191,36,.3)}
.mode-icon{width:20px;height:20px;vertical-align:middle;margin-right:2px}
.ico{width:18px;height:18px;vertical-align:middle;margin-right:2px;display:inline-block}
.ico-sm{width:14px;height:14px;vertical-align:middle;display:inline-block}
.ico-lg{width:28px;height:28px;vertical-align:middle;display:inline-block}

/* GAME AREA */
.game-area{padding:10px 12px;min-height:180px}
.card{background:var(--card);border-radius:20px;padding:22px 20px;box-shadow:0 6px 24px rgba(0,0,0,.08),inset 0 1px 0 rgba(255,255,255,.8);max-width:500px;margin:0 auto;position:relative;border:2px solid rgba(26,39,68,.15)}
.card.wrong-shake{animation:cardShake .5s ease}
@keyframes cardShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-10px)}40%{transform:translateX(10px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}}
.question-text{font-size:1.8rem;font-weight:800;text-align:center;margin-bottom:16px;line-height:1.5}
.question-text .blank{display:inline-block;min-width:70px;border-bottom:4px solid var(--accent);color:var(--accent);font-family:'Fredoka One',cursive;padding:0 4px}
.choices{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.choice-btn{font-family:'Fredoka One',cursive;font-size:1.5rem;font-weight:700;padding:18px 14px;border-radius:16px;border:2px solid #d6d3d1;background:#fff;cursor:pointer;transition:all .15s;color:var(--text);text-align:center;min-height:64px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 0 #e7e5e4,0 6px 16px rgba(0,0,0,.06)}
.choice-btn:hover{border-color:var(--accent);background:#fff7ed;transform:translateY(-3px);box-shadow:0 6px 0 #e7e5e4,0 8px 20px rgba(147,51,234,.15)}
.choice-btn:active{transform:translateY(0);box-shadow:0 1px 0 #e7e5e4}
.choice-btn.correct{background:#dcfce7;border-color:var(--green);color:#15803d;animation:correctPulse .5s ease}
@keyframes correctPulse{0%{transform:scale(1)}30%{transform:scale(1.05)}60%{transform:scale(.98)}100%{transform:scale(1)}}
.choice-btn.wrong-pick{animation:wrongShake .4s ease}
@keyframes wrongShake{0%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}100%{transform:translateX(0)}}
.choice-btn.wrong-pick{background:#fef2f2;border-color:var(--red);color:#b91c1c}
.choice-btn.disabled{pointer-events:none;opacity:.7}
.choices.think-first{position:relative;pointer-events:none}
.choices.think-first .choice-btn{opacity:.3;filter:blur(2px);transition:all .3s}
.think-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:5;font-family:'Fredoka One',cursive;font-size:1.1rem;color:var(--accent);text-align:center;animation:thinkPulse 1s ease-in-out infinite}
@keyframes thinkPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}

/* SPELL IT */
.spell-hint{font-size:1.4rem;text-align:center;color:var(--text2);margin-bottom:8px}
.spell-display{display:flex;justify-content:center;gap:5px;margin:14px 0;min-height:48px;flex-wrap:wrap}
.spell-slot{width:52px;height:60px;border-radius:10px;border:3px dashed #cbd5e1;display:flex;align-items:center;justify-content:center;font-family:'Fredoka One',cursive;font-size:2rem;color:var(--accent);background:#fff7ed;transition:all .2s}
.spell-slot.filled{border-style:solid;border-color:var(--accent);background:#fff;transform:scale(1.05)}
.letter-tiles{display:flex;gap:5px;justify-content:center;flex-wrap:wrap;margin-top:14px}
.letter-tile{width:52px;height:58px;border-radius:12px;border:none;background:linear-gradient(180deg,#fff 0%,#f5f5f4 100%);cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:'Fredoka One',cursive;font-size:1.8rem;color:var(--navy);transition:all .15s;box-shadow:0 4px 0 #d6d3d1,0 6px 12px rgba(0,0,0,.08)}
.letter-tile:hover{transform:translateY(-3px);box-shadow:0 6px 0 #d6d3d1,0 8px 16px rgba(0,0,0,.1)}
.letter-tile:active{transform:translateY(0);box-shadow:0 1px 0 #d6d3d1}
.letter-tile:active{transform:translateY(1px);box-shadow:none}
.letter-tile.used{opacity:.25;pointer-events:none}
.spell-actions{display:flex;gap:8px;justify-content:center;margin-top:12px}
.spell-actions button{font-family:'Nunito',sans-serif;font-weight:700;font-size:.85rem;padding:8px 18px;border-radius:10px;border:none;cursor:pointer;transition:all .15s}
.backspace-btn{background:#fef2f2;color:var(--red)}
.submit-spell{background:var(--accent);color:#fff}
.submit-spell:hover{background:#7c3aed}

/* DECODE */
.clues{display:flex;flex-direction:column;gap:6px;margin:12px 0}
.clue{display:flex;align-items:center;gap:8px;padding:12px 14px;background:#f8fafc;border-radius:10px;font-weight:700;font-size:1.3rem}
.clue-icon{font-size:1.2rem}
.decode-input{width:100%;padding:14px;border-radius:14px;border:3px solid #e2e8f0;font-family:'Fredoka One',cursive;font-size:1.6rem;text-align:center;color:var(--accent);letter-spacing:4px;text-transform:lowercase}
.decode-input:focus{outline:none;border-color:var(--accent)}
.decode-submit{display:block;margin:10px auto 0;font-family:'Fredoka One',cursive;font-size:1rem;padding:10px 36px;border-radius:14px;border:none;background:var(--accent);color:#fff;cursor:pointer;transition:all .15s}
.decode-submit:hover{background:#7c3aed;transform:translateY(-2px)}

/* STORY */
.story-box{background:#f8fafc;border-radius:14px;padding:16px;margin-bottom:12px;line-height:2}
.story-word{display:inline;cursor:pointer;padding:3px 4px;border-radius:4px;font-size:1.6rem;font-weight:600;transition:all .15s;line-height:2}
.story-word:hover{background:#e9d5ff}
.story-word.highlighted{background:#c084fc;color:#9a3412}
.story-question{font-size:1.5rem;font-weight:700;text-align:center;margin:12px 0}

/* JOKE */
.joke-box{margin-top:14px;padding:12px;background:linear-gradient(135deg,#fef3c7,#fde68a);border-radius:14px;text-align:center;animation:jokeIn .4s ease}
.joke-box .joke-emoji{font-size:1.4rem}
.joke-box p{font-size:.9rem;font-weight:700;color:#92400e;margin-top:4px}
@keyframes jokeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* COIN DISPLAY */
.coin-reward{margin-top:10px;padding:8px 14px;background:linear-gradient(135deg,#fffbeb,#fef3c7);border-radius:12px;text-align:center;font-weight:800;color:#92400e;font-size:.95rem;animation:jokeIn .4s ease .2s both;display:flex;align-items:center;justify-content:center;gap:6px}
.coin-icon{display:inline-block;width:22px;height:22px;background:linear-gradient(135deg,#fbbf24,#f59e0b);border-radius:50%;border:2px solid #d97706;font-size:.7rem;line-height:18px;text-align:center;color:#92400e;font-weight:900}

/* ROSTER */
.roster-section{padding:10px 12px}
.roster-title{font-family:'Fredoka One',cursive;font-size:1rem;color:var(--text);margin-bottom:6px;display:flex;align-items:center;gap:6px}
.roster-grid{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;-webkit-overflow-scrolling:touch}
.roster-grid::-webkit-scrollbar{height:4px}
.roster-grid::-webkit-scrollbar-thumb{background:#ddd;border-radius:4px}
.roster-card{background:#fff;border-radius:14px;padding:6px 6px 8px;min-width:100px;text-align:center;box-shadow:0 3px 12px rgba(0,0,0,.12);flex-shrink:0;border:3px solid var(--navy);transition:all .2s;cursor:pointer;position:relative;overflow:hidden}
.roster-card::before{content:'';position:absolute;top:0;left:0;right:0;height:50%;border-radius:11px 11px 0 0;opacity:.15;pointer-events:none}
.roster-card:hover{transform:translateY(-3px);box-shadow:0 8px 20px rgba(0,0,0,.15)}
.roster-card.active{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent),0 4px 16px rgba(147,51,234,.3)}
.roster-card.locked{opacity:.3;filter:grayscale(1);cursor:default;border-color:#94a3b8}
.roster-card svg,.roster-card img{width:60px;height:60px}
.roster-card .rc-name{font-family:'Fredoka One',cursive;font-size:.6rem;color:#fff;margin-top:2px;text-shadow:1px 1px 2px rgba(0,0,0,.5)}
.roster-card .rc-type{font-size:.5rem;color:rgba(255,255,255,.9);font-weight:700;text-shadow:1px 1px 1px rgba(0,0,0,.3)}
.roster-card .rc-type-badge{position:absolute;top:4px;right:4px;font-size:.6rem;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.4);border:1px solid rgba(255,255,255,.6)}

/* POKÉDEX MODAL */
.pokedex-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:none;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px)}
.pokedex-overlay.open{display:flex}
.pokedex-modal{background:var(--bg);border-radius:24px;max-width:560px;width:100%;max-height:85vh;overflow-y:auto;padding:20px;box-shadow:0 20px 60px rgba(0,0,0,.3);position:relative}
.pokedex-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.pokedex-header h2{font-family:'Fredoka One',cursive;font-size:1.3rem;color:var(--text);display:flex;align-items:center;gap:8px}
.pokedex-close{background:var(--accent);color:#fff;border:none;width:36px;height:36px;border-radius:50%;font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(147,51,234,.3)}
.pokedex-close:hover{transform:scale(1.1)}
.pokedex-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:10px}
.pdex-card{background:#fff;border-radius:16px;padding:10px 6px;text-align:center;box-shadow:0 2px 10px rgba(0,0,0,.06);border:2px solid transparent;transition:all .2s;cursor:pointer;position:relative}
.pdex-card:hover{transform:translateY(-3px);box-shadow:0 8px 20px rgba(0,0,0,.1)}
.pdex-card.active{border-color:var(--accent);background:#fff7ed}
.pdex-card.locked{opacity:.3;filter:grayscale(1);cursor:default}
.pdex-card.locked:hover{transform:none;box-shadow:0 2px 10px rgba(0,0,0,.06)}
.pdex-card img,.pdex-card svg{width:70px;height:70px;margin:0 auto 4px;display:block}
.pdex-card .pdex-name{font-family:'Fredoka One',cursive;font-size:.7rem;color:var(--text);margin-top:4px}
.pdex-card .pdex-type{font-size:.6rem;color:#fff;background:var(--accent);border-radius:8px;padding:1px 6px;display:inline-block;margin-top:2px}
.pdex-card .pdex-type.locked-type{background:#cbd5e1}
.pdex-card .pdex-num{position:absolute;top:4px;right:6px;font-size:.55rem;color:var(--text2);font-weight:700}
.pdex-card .pdex-xp{font-size:.55rem;color:var(--text2);font-weight:700;margin-top:2px}

/* SHOP SECTION */
.shop-section{padding:10px 12px 30px}
.shop-banner{background:linear-gradient(135deg,#fef3c7,#fde68a);border-radius:16px;padding:16px;margin-bottom:12px;text-align:center;border:2px solid #fbbf24}
.shop-banner h2{font-family:'Fredoka One',cursive;font-size:1.2rem;color:#92400e;margin-bottom:4px}
.shop-banner p{font-size:.85rem;font-weight:700;color:#a16207;line-height:1.4}
.shop-banner .real-deal{background:#fff;border-radius:10px;padding:8px 12px;margin-top:8px;font-size:.8rem;color:#92400e;font-weight:800;border:2px dashed #f59e0b}
.shop-title{font-family:'Fredoka One',cursive;font-size:1rem;color:var(--text);margin-bottom:4px;display:flex;align-items:center;gap:6px}
.shop-subtitle{font-size:.8rem;color:var(--text2);font-weight:600;margin-bottom:10px}
.shop-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding-bottom:10px}
@media(min-width:600px){.shop-grid{grid-template-columns:repeat(3,1fr)}}
.shop-item{background:#fff;border-radius:16px;padding:12px;text-align:center;box-shadow:0 2px 12px rgba(0,0,0,.06);border:2px solid #e2e8f0;transition:all .2s;position:relative}
.shop-item:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(0,0,0,.1)}
.shop-item.purchased{border-color:var(--green);background:#f0fdf4}
.shop-item.locked{border-color:#e2e8f0;background:#f8fafc}
.shop-item.purchased::after{content:'✅ EARNED!';position:absolute;top:6px;right:6px;font-size:.6rem;font-weight:800;color:#16a34a;background:#dcfce7;padding:2px 6px;border-radius:6px}
.shop-item svg,.shop-item img{width:90px;height:90px;margin:0 auto 6px;display:block}
.shop-item .item-name{font-family:'Fredoka One',cursive;font-size:.8rem;color:var(--text)}
.shop-item .item-desc{font-size:.65rem;color:var(--text2);font-weight:600;margin:2px 0}
.shop-item .item-price{font-size:.8rem;font-weight:800;color:#92400e;margin-top:4px;display:flex;align-items:center;justify-content:center;gap:4px}
.shop-item .item-price .coin-icon{width:18px;height:18px;font-size:.65rem;line-height:14px}
.progress-bar{background:#e2e8f0;border-radius:6px;height:6px;margin:6px 0 4px;overflow:hidden}
.progress-fill{height:100%;border-radius:6px;background:linear-gradient(90deg,#fbbf24,#f59e0b);transition:width .4s}
.progress-text{font-size:.6rem;color:var(--text2);font-weight:700}
.shop-buy{margin-top:6px;font-family:'Fredoka One',cursive;font-size:.75rem;padding:8px 20px;border-radius:10px;border:none;background:var(--accent);color:#fff;cursor:pointer;transition:all .15s}
.shop-buy:hover{background:#7c3aed;transform:translateY(-1px)}
.shop-buy:disabled{background:#cbd5e1;cursor:default;transform:none}
.shop-buy.bought{background:var(--green)}
.wallet-bar{display:flex;align-items:center;justify-content:center;gap:8px;padding:8px 16px;font-family:'Fredoka One',cursive;font-size:1.1rem;color:#92400e;background:linear-gradient(135deg,#fffbeb,#fef3c7);border-radius:12px;margin-bottom:12px;border:2px solid #fde68a}
.wallet-bar .coin-icon{width:28px;height:28px;font-size:.9rem;line-height:24px}

/* CONFETTI */
.confetti-container{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1000;overflow:hidden}
.confetti-piece{position:absolute;width:10px;height:10px;top:-20px;animation:confettiFall 2s ease forwards}
@keyframes confettiFall{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}

/* CATCH MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s}
.modal-overlay.show{opacity:1;pointer-events:all}
.modal-box{background:#fff;border-radius:24px;padding:28px;text-align:center;max-width:320px;width:90%;transform:scale(.8);transition:transform .3s;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-overlay.show .modal-box{transform:scale(1)}
.modal-box h2{font-family:'Fredoka One',cursive;font-size:1.4rem;color:var(--accent);margin-bottom:6px}
.modal-box p{color:var(--text2);font-weight:600;margin-bottom:12px;font-size:.9rem}
.modal-box svg{width:100px;height:100px;margin:8px auto}
.modal-btn{font-family:'Fredoka One',cursive;font-size:1rem;padding:10px 32px;border-radius:14px;border:none;background:var(--accent);color:#fff;cursor:pointer;transition:all .15s}
.modal-btn:hover{background:#7c3aed;transform:translateY(-2px)}

/* RESULT BANNERS */
.result-banner{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:10;border-radius:20px;animation:bannerIn .5s ease}
.result-banner.victory{background:rgba(34,197,94,.85)}
.result-banner.defeat{background:rgba(239,68,68,.85)}
.result-banner span{font-family:'Fredoka One',cursive;font-size:1.8rem;color:#fff;text-shadow:2px 3px 0 rgba(0,0,0,.2)}
@keyframes bannerIn{from{opacity:0;transform:scale(.7)}to{opacity:1;transform:scale(1)}}

/* LEVEL UP */
.levelup-text{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Fredoka One',cursive;font-size:2.2rem;color:#fbbf24;text-shadow:3px 3px 0 #92400e;z-index:300;pointer-events:none;animation:levelPop 1.5s ease forwards}
@keyframes levelPop{0%{opacity:0;transform:translate(-50%,-50%) scale(.3)}20%{opacity:1;transform:translate(-50%,-50%) scale(1.3)}40%{transform:translate(-50%,-50%) scale(1)}80%{opacity:1}100%{opacity:0;transform:translate(-50%,-60%) scale(1)}}

/* NEXT BTN */
.next-btn{display:block;margin:14px auto 0;font-family:'Fredoka One',cursive;font-size:1rem;padding:10px 32px;border-radius:14px;border:none;background:var(--accent);color:#fff;cursor:pointer;transition:all .15s;box-shadow:0 4px 12px rgba(147,51,234,.3)}
.next-btn:hover{background:#7c3aed;transform:translateY(-2px)}
.help-speaker{position:fixed;bottom:80px;left:16px;width:52px;height:52px;border-radius:50%;border:none;background:var(--accent);color:#fff;font-size:1.6rem;cursor:pointer;box-shadow:0 4px 16px rgba(147,51,234,.4);z-index:100;display:flex;align-items:center;justify-content:center;transition:all .2s;animation:speakerPulse 2s ease-in-out infinite}
.help-speaker:hover{transform:scale(1.1)}
.help-speaker.speaking{background:#7c3aed;animation:none}
@keyframes speakerPulse{0%,100%{box-shadow:0 4px 16px rgba(147,51,234,.4)}50%{box-shadow:0 4px 24px rgba(147,51,234,.7)}}
.milestone-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.75);z-index:9999;display:flex;align-items:center;justify-content:center;animation:fadeIn .3s ease}
.milestone-card{background:linear-gradient(135deg,#fff8f0,#fff);border-radius:24px;padding:32px;max-width:340px;text-align:center;animation:popIn .5s ease .1s both;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.milestone-number{font-family:'Fredoka One',cursive;font-size:4rem;background:linear-gradient(135deg,#9333ea,#ef4444,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1}
.milestone-label{font-family:'Fredoka One',cursive;font-size:1.4rem;color:var(--text);margin:8px 0}
.milestone-sub{font-size:1rem;color:var(--text2);font-weight:600;margin-bottom:16px}
.milestone-stars{font-size:2.5rem;margin:8px 0;animation:starSpin 1s ease}
@keyframes starSpin{0%{transform:scale(0) rotate(-180deg)}60%{transform:scale(1.3) rotate(10deg)}100%{transform:scale(1) rotate(0)}}
@keyframes evoPulse{0%{transform:scale(1)}25%{transform:scale(1.1);filter:brightness(1.5)}50%{transform:scale(.9);filter:brightness(2) saturate(0)}75%{transform:scale(1.15);filter:brightness(2.5) saturate(0)}100%{transform:scale(1);filter:brightness(3) saturate(0)}}
@keyframes evoFlash{0%{transform:scale(1.2);filter:brightness(3) saturate(0)}100%{transform:scale(0);filter:brightness(4) saturate(0)}}
@keyframes evoPop{0%{transform:scale(0);filter:brightness(3)}50%{transform:scale(1.3);filter:brightness(1.5)}100%{transform:scale(1);filter:brightness(1)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes popIn{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
.hear-play-btn{display:block;margin:0 auto 16px;font-family:'Fredoka One',cursive;font-size:1.4rem;padding:14px 32px;border-radius:16px;border:3px solid var(--accent);background:#fff7ed;color:var(--accent);cursor:pointer;transition:all .15s}
.hear-play-btn:hover{background:var(--accent);color:#fff;transform:scale(1.05)}
.hear-play-btn:active{transform:scale(.95)}

/* BACKPACK + MONEY ANIMATION */
.backpack{position:fixed;bottom:16px;right:16px;z-index:150;width:56px;height:56px;cursor:pointer;filter:drop-shadow(2px 4px 6px rgba(0,0,0,.2));transition:transform .2s;animation:bpBounce 3s ease-in-out infinite}
.backpack:hover{transform:scale(1.1)}
.backpack.pulse{animation:bpPulse .4s ease}
@keyframes bpBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
@keyframes bpPulse{0%{transform:scale(1)}50%{transform:scale(1.3)}100%{transform:scale(1)}}
.backpack-badge{position:absolute;top:-4px;right:-4px;background:var(--accent);color:#fff;font-family:'Fredoka One',cursive;font-size:.6rem;min-width:20px;height:20px;border-radius:10px;display:flex;align-items:center;justify-content:center;border:2px solid #fff;padding:0 4px}
.money-fly{position:fixed;z-index:160;pointer-events:none;font-size:2.5rem;filter:drop-shadow(2px 3px 4px rgba(0,0,0,.3))}
.money-fly.animate{animation:moneyToBackpack 1s cubic-bezier(.2,.8,.3,1) forwards}
@keyframes moneyToBackpack{
  0%{opacity:1;transform:scale(1.5) rotate(-10deg)}
  30%{opacity:1;transform:scale(1.8) rotate(5deg) translateY(-40px)}
  100%{opacity:0;transform:scale(.3) rotate(15deg)}
}
.money-big-flash{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:155;pointer-events:none;display:flex;flex-direction:column;align-items:center;gap:4px;animation:bigFlash 1.2s ease forwards}
.money-big-flash .bill{font-size:4rem;filter:drop-shadow(3px 4px 6px rgba(0,0,0,.3))}
.money-big-flash .amount{font-family:'Fredoka One',cursive;font-size:1.8rem;color:#16a34a;text-shadow:2px 2px 0 rgba(0,0,0,.15)}
@keyframes bigFlash{0%{opacity:0;transform:translate(-50%,-50%) scale(.3)}15%{opacity:1;transform:translate(-50%,-50%) scale(1.2)}30%{transform:translate(-50%,-50%) scale(1)}70%{opacity:1;transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(-50%,-50%) scale(.5) translateY(30px)}}

@media(max-width:400px){
  .header h1{font-size:1.1rem}
  .pill{font-size:.7rem;padding:3px 7px}
  .question-text{font-size:1.1rem}
  .choice-btn{font-size:.95rem;padding:10px 6px}
  .sprite-box svg,.sprite-box img{width:80px!important;height:80px!important}
  .battle{min-height:170px;padding:10px}
  .battle-ground{min-height:140px;padding:0}
  .hp-bar-wrap{width:100px}
}
</style>
</head>
<body>
<div class="game-shell">

<!-- HEADER -->
<div class="header">
  <div class="header-top">
    <img src="sprites/logo_rioreads_v11.png?v=11" alt="Río Reads — Word Quest" class="header-logo">
    <div class="hud">
      <div class="pill"><img src="sprites/hud_star.png" class="hud-icon"><span id="scoreVal">0</span></div>
      <div class="pill"><img src="sprites/hud_fire.png" class="hud-icon"><span id="streakVal">0</span></div>
      <div class="pill"><img src="sprites/hud_heart.png" class="hud-icon"><span id="livesVal">3</span></div>
      <div class="pill"><img src="sprites/hud_level.png" class="hud-icon"><span id="levelVal">1</span></div>
      <div class="pill" style="background:linear-gradient(180deg,rgba(251,191,36,.3),rgba(251,191,36,.15))"><img src="sprites/hud_coin.png" class="hud-icon"><span id="coinVal">0</span></div>
    </div>
  </div>
  <div class="xp-wrap">
    <div class="xp-bar"><div class="xp-fill" id="xpFill" style="width:0%"></div></div>
    <div class="xp-label" id="xpLabel">0 / 50 XP</div>
  </div>
</div>

<!-- STREAK DOTS -->
<div class="streak-wrap">
  <div class="streak-dot" id="sd0"></div>
  <div class="streak-dot" id="sd1"></div>
  <div class="streak-dot" id="sd2"></div>
  <div class="streak-dot" id="sd3"></div>
  <div class="streak-dot" id="sd4"></div>
  <span class="streak-label">5 in a row = Catch!</span>
</div>

<!-- BATTLE -->
<div class="battle" id="battleScene">
  <div class="battle-ground">
    <div class="fighter player" id="playerFighter">
      <div class="hp-bar-wrap">
        <div class="hp-name" id="playerName">Sparky</div>
        <div class="hp-bar"><div class="hp-fill green" id="playerHpBar" style="width:100%"></div></div>
        <div class="hp-text" id="playerHpText">30/30 HP</div>
      </div>
      <div class="sprite-box" id="playerSprite"></div>
    </div>
    <div class="vs-badge"></div>
    <div class="fighter enemy" id="enemyFighter">
      <div class="hp-bar-wrap">
        <div class="hp-name" id="enemyName">Grumblob</div>
        <div class="hp-bar"><div class="hp-fill green" id="enemyHpBar" style="width:100%"></div></div>
        <div class="hp-text" id="enemyHpText">20/20 HP</div>
      </div>
      <div class="sprite-box" id="enemySprite"></div>
    </div>
  </div>
  <div class="battle-msg" id="battleMsg"></div>
  <div class="hit-flash" id="hitFlash"></div>
</div>

<!-- MODE BAR -->
<div class="tabs" id="tabs">
  <div class="mode-indicator" id="modeIndicator"><img src="sprites/mode_fillin.png" class="mode-icon"> Fill In</div>
  <div class="mode-progress" id="modeProgress"><span id="modePoints">0</span> / 6</div>
  <button class="tab quiz-tab" data-mode="popquiz"><img src="sprites/ico_quiz.png" class="ico"> Pop Quiz</button>
  <button class="tab phonics-tab" data-mode="phonics"><img src="sprites/ico_phonics.png" class="ico"> Phonics</button>
  <button class="tab heal-tab" data-mode="heal"><img src="sprites/ico_heal.png" class="ico"> Heal</button>
  <button class="tab battle-tab" data-mode="hardbattle"><img src="sprites/ico_battle.png" class="ico"> Battle!</button>
  <button class="tab shop-tab" data-mode="shop"><img src="sprites/ico_shop.png" class="ico"> Shop</button>
</div>

<!-- GAME AREA -->
<div class="game-area" id="gameArea"></div>

<!-- ROSTER -->
<div class="roster-section">
  <div class="roster-title" onclick="openPokedex()" style="cursor:pointer"><img src="sprites/backpack_detailed.png" style="width:22px;height:22px"> My Wordmons (<span id="rosterCount">1</span> / <span id="rosterTotal">16</span>) <span style="font-family:'Nunito',sans-serif;font-size:.7rem;background:var(--accent);color:#fff;padding:2px 8px;border-radius:10px;margin-left:4px">View All</span></div>
  <div class="roster-grid" id="rosterGrid"></div>
</div>

<!-- POKÉDEX MODAL -->
<div class="pokedex-overlay" id="pokedexOverlay" onclick="if(event.target===this)closePokedex()">
  <div class="pokedex-modal">
    <div class="pokedex-header">
      <h2><img src="sprites/backpack_detailed.png" style="width:28px;height:28px"> Wordmon Collection</h2>
      <button class="pokedex-close" onclick="closePokedex()">✕</button>
    </div>
    <div class="pokedex-grid" id="pokedexGrid"></div>
    <!-- Secret code input -->
    <div style="margin-top:16px;text-align:center;border-top:2px dashed #e2e8f0;padding-top:12px">
      <div style="font-family:Fredoka One,cursive;font-size:.8rem;color:var(--text2);margin-bottom:6px">🔑 Got a secret code?</div>
      <div style="display:flex;gap:6px;justify-content:center;align-items:center">
        <input id="secretCodeInput" type="text" placeholder="type code..." maxlength="10" autocomplete="off" autocapitalize="none" style="font-family:Nunito,sans-serif;font-size:1rem;padding:8px 12px;border:2px solid #e2e8f0;border-radius:10px;width:140px;text-align:center">
        <button onclick="trySecretCode()" style="font-family:Fredoka One,cursive;font-size:.9rem;padding:8px 14px;border-radius:10px;border:none;background:var(--accent);color:#fff;cursor:pointer">Try!</button>
      </div>
      <div id="secretResult" style="margin-top:6px;font-size:.8rem;font-weight:700;min-height:20px"></div>
    </div>
    <!-- Achievement badges -->
    <div style="margin-top:16px;border-top:2px dashed #e2e8f0;padding-top:12px">
      <div style="font-family:Fredoka One,cursive;font-size:1rem;color:var(--text);margin-bottom:8px;text-align:center">🏅 Achievements</div>
      <div id="achievementGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:8px"></div>
    </div>
  </div>
</div>

<!-- SHOP (rendered inline in game area when Shop tab is active) -->

<!-- CATCH MODAL -->
<div class="modal-overlay" id="catchModal">
  <div class="modal-box">
    <h2 id="catchTitle">New Wordmon!</h2>
    <p id="catchDesc">You caught a new friend!</p>
    <div id="catchSprite"></div>
    <p id="catchName" class="fredoka" style="font-size:1.1rem;color:var(--accent);margin:6px 0"></p>
    <button class="modal-btn" onclick="G.closeCatchModal()">Awesome!</button>
  </div>
</div>

<!-- HELP SPEAKER -->

// ========================================================
// SOUND ENGINE (Web Audio API — no files needed)
// ========================================================
const SFX = {
  ctx: null,
  init(){ if(!this.ctx) this.ctx = new (window.AudioContext||window.webkitAudioContext)(); },
  play(type){
    this.init();
    const c=this.ctx, now=c.currentTime;
    switch(type){
      case'correct':{
        const o=c.createOscillator(),g=c.createGain();
        o.connect(g);g.connect(c.destination);
        o.type='sine';o.frequency.setValueAtTime(523,now);o.frequency.setValueAtTime(659,now+.08);o.frequency.setValueAtTime(784,now+.16);
        g.gain.setValueAtTime(.3,now);g.gain.exponentialRampToValueAtTime(.01,now+.35);
        o.start(now);o.stop(now+.35);break;
      }
      case'wrong':{
        const o=c.createOscillator(),g=c.createGain();
        o.connect(g);g.connect(c.destination);
        o.type='square';o.frequency.setValueAtTime(200,now);o.frequency.setValueAtTime(150,now+.15);
        g.gain.setValueAtTime(.2,now);g.gain.exponentialRampToValueAtTime(.01,now+.3);
        o.start(now);o.stop(now+.3);break;
      }
      case'attack':{
        const o=c.createOscillator(),g=c.createGain();
        o.connect(g);g.connect(c.destination);
        o.type='sawtooth';o.frequency.setValueAtTime(300,now);o.frequency.exponentialRampToValueAtTime(80,now+.15);
        g.gain.setValueAtTime(.25,now);g.gain.exponentialRampToValueAtTime(.01,now+.2);
        o.start(now);o.stop(now+.2);break;
      }
      case'hurt':{
        const o=c.createOscillator(),g=c.createGain();
        o.connect(g);g.connect(c.destination);
        o.type='sawtooth';o.frequency.setValueAtTime(400,now);o.frequency.exponentialRampToValueAtTime(100,now+.25);
        g.gain.setValueAtTime(.2,now);g.gain.exponentialRampToValueAtTime(.01,now+.25);
        o.start(now);o.stop(now+.25);break;
      }
      case'coin':{
        const o=c.createOscillator(),g=c.createGain();
        o.connect(g);g.connect(c.destination);
        o.type='sine';o.frequency.setValueAtTime(1200,now);o.frequency.setValueAtTime(1600,now+.06);
        g.gain.setValueAtTime(.2,now);g.gain.exponentialRampToValueAtTime(.01,now+.2);
        o.start(now);o.stop(now+.2);break;
      }
      case'victory':{
        [523,659,784,1047].forEach((f,i)=>{
          const o=c.createOscillator(),g=c.createGain();
          o.connect(g);g.connect(c.destination);
          o.type='sine';o.frequency.setValueAtTime(f,now+i*.12);
          g.gain.setValueAtTime(.25,now+i*.12);g.gain.exponentialRampToValueAtTime(.01,now+i*.12+.3);
          o.start(now+i*.12);o.stop(now+i*.12+.3);
        });break;
      }
      case'levelup':{
        [392,494,587,784,988].forEach((f,i)=>{
          const o=c.createOscillator(),g=c.createGain();
          o.connect(g);g.connect(c.destination);
          o.type='sine';o.frequency.setValueAtTime(f,now+i*.1);
          g.gain.setValueAtTime(.3,now+i*.1);g.gain.exponentialRampToValueAtTime(.01,now+i*.1+.25);
          o.start(now+i*.1);o.stop(now+i*.1+.25);
        });break;
      }
      case'catch':{
        [660,880,1100,1320,1100,1320].forEach((f,i)=>{
          const o=c.createOscillator(),g=c.createGain();
          o.connect(g);g.connect(c.destination);
          o.type='sine';o.frequency.setValueAtTime(f,now+i*.08);
          g.gain.setValueAtTime(.2,now+i*.08);g.gain.exponentialRampToValueAtTime(.01,now+i*.08+.15);
          o.start(now+i*.08);o.stop(now+i*.08+.15);
        });break;
      }
      case'click':{
        const o=c.createOscillator(),g=c.createGain();
        o.connect(g);g.connect(c.destination);
        o.type='sine';o.frequency.setValueAtTime(800,now);
        g.gain.setValueAtTime(.1,now);g.gain.exponentialRampToValueAtTime(.01,now+.06);
        o.start(now);o.stop(now+.06);break;
      }
      case'buy':{
        [523,659,784,1047,784,1047].forEach((f,i)=>{
          const o=c.createOscillator(),g=c.createGain();
          o.connect(g);g.connect(c.destination);
          o.type='triangle';o.frequency.setValueAtTime(f,now+i*.1);
          g.gain.setValueAtTime(.25,now+i*.1);g.gain.exponentialRampToValueAtTime(.01,now+i*.1+.2);
          o.start(now+i*.1);o.stop(now+i*.1+.2);
        });break;
      }
      case'whoosh':{
        const o=c.createOscillator(),g=c.createGain();
        const n=c.createBufferSource(),nb=c.createBuffer(1,c.sampleRate*.15,c.sampleRate);
        const d=nb.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*.3;
        n.buffer=nb;const ng=c.createGain();n.connect(ng);ng.connect(c.destination);
        ng.gain.setValueAtTime(.15,now);ng.gain.exponentialRampToValueAtTime(.01,now+.15);
        n.start(now);
        o.connect(g);g.connect(c.destination);
        o.type='sine';o.frequency.setValueAtTime(400,now);o.frequency.exponentialRampToValueAtTime(1200,now+.12);
        g.gain.setValueAtTime(.1,now);g.gain.exponentialRampToValueAtTime(.01,now+.15);
        o.start(now);o.stop(now+.15);break;
      }
      case'modeSwitch':{
        [440,554,659,880].forEach((f,i)=>{
          const o=c.createOscillator(),g=c.createGain();
          o.connect(g);g.connect(c.destination);
          o.type='triangle';o.frequency.setValueAtTime(f,now+i*.08);
          g.gain.setValueAtTime(.2,now+i*.08);g.gain.exponentialRampToValueAtTime(.01,now+i*.08+.2);
          o.start(now+i*.08);o.stop(now+i*.08+.2);
        });break;
      }
      case'fanfare':{
        // epic ascending fanfare for big milestones
        const notes=[392,494,587,698,784,880,988,1047,1175,1318];
        notes.forEach((f,i)=>{
          const o=c.createOscillator(),g=c.createGain();
          o.connect(g);g.connect(c.destination);
          o.type=i<5?'sine':'triangle';
          o.frequency.setValueAtTime(f,now+i*.08);
          g.gain.setValueAtTime(.25,now+i*.08);g.gain.exponentialRampToValueAtTime(.01,now+i*.08+.3);
          o.start(now+i*.08);o.stop(now+i*.08+.3);
        });
        // add a final chord
        [1047,1318,1568].forEach((f,i)=>{
          const o=c.createOscillator(),g=c.createGain();
          o.connect(g);g.connect(c.destination);
          o.type='sine';o.frequency.setValueAtTime(f,now+.8);
          g.gain.setValueAtTime(.2,now+.8);g.gain.exponentialRampToValueAtTime(.01,now+1.5);
          o.start(now+.8);o.stop(now+1.5);
        });
        break;
      }
      case'drumroll':{
        for(let i=0;i<20;i++){
          const n=c.createBufferSource(),nb=c.createBuffer(1,Math.floor(c.sampleRate*.03),c.sampleRate);
          const d=nb.getChannelData(0);for(let j=0;j<d.length;j++)d[j]=(Math.random()*2-1);
          n.buffer=nb;const g=c.createGain();n.connect(g);g.connect(c.destination);
          g.gain.setValueAtTime(.08+i*.008,now+i*.04);g.gain.exponentialRampToValueAtTime(.01,now+i*.04+.05);
          n.start(now+i*.04);
        }break;
      }
      case'lowHp':{
        // Urgent beeping — Pokémon low HP sound
        for(let i=0;i<4;i++){
          const o=c.createOscillator(),g=c.createGain();
          o.connect(g);g.connect(c.destination);
          o.type='square';o.frequency.setValueAtTime(440,now+i*.25);
          g.gain.setValueAtTime(.15,now+i*.25);g.gain.exponentialRampToValueAtTime(.01,now+i*.25+.1);
          o.start(now+i*.25);o.stop(now+i*.25+.12);
        }break;
      }
      case'faint':{
        // Descending sad tone
        const o=c.createOscillator(),g=c.createGain();
        o.connect(g);g.connect(c.destination);
        o.type='sine';o.frequency.setValueAtTime(600,now);o.frequency.exponentialRampToValueAtTime(150,now+.6);
        g.gain.setValueAtTime(.3,now);g.gain.exponentialRampToValueAtTime(.01,now+.7);
        o.start(now);o.stop(now+.7);break;
      }
    }
  }
};

// ========================================================
// ========================================================
// SMART VOICE PICKER — prefer natural/enhanced voices
// ========================================================
let _bestVoice=null;
let _voicesLoaded=false;
function getBestVoice(){
  if(_bestVoice&&_voicesLoaded) return _bestVoice;
  const voices=speechSynthesis.getVoices();
  if(!voices.length) return null;
  _voicesLoaded=true;
  // Priority order: enhanced/premium > natural > local English > any English
  const prefs=[
    v=>v.name.includes('Enhanced')&&v.lang.startsWith('en'),
    v=>v.name.includes('Premium')&&v.lang.startsWith('en'),
    v=>v.name==='Samantha'&&v.localService,
    v=>v.name==='Karen'&&v.localService,
    v=>v.name==='Moira'&&v.localService,
    v=>v.name==='Tessa'&&v.localService,
    v=>v.name==='Rishi'&&v.localService,
    v=>/Natural/.test(v.name)&&v.lang.startsWith('en'),
    v=>v.name.includes('Google')&&v.lang.startsWith('en'),
    v=>v.lang.startsWith('en-US')&&v.localService,
    v=>v.lang.startsWith('en')&&v.localService,
    v=>v.lang.startsWith('en'),
  ];
  for(const test of prefs){
    const found=voices.find(test);
    if(found){_bestVoice=found;return found;}
  }
  return voices[0]||null;
}
// preload voices (some browsers load async)
if('speechSynthesis' in window){
  speechSynthesis.getVoices();
  speechSynthesis.addEventListener('voiceschanged',()=>{_bestVoice=null;_voicesLoaded=false;getBestVoice();});
}

// ========================================================
// TTS HELPER
// ========================================================
function speak(text, rate=0.7, pitch=1.0, onEnd){
  if(!('speechSynthesis' in window)) return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.rate=rate; u.pitch=pitch;
  const good=getBestVoice();
  if(good) u.voice=good;
  if(onEnd) u.onend=onEnd;
  speechSynthesis.speak(u);
}

    {name:'Flamepup',hp:28,bio:'Flamepup is a hot little pup. He was not like the big dogs. He said "I can do it!" and he did. He is red and he likes to be warm. Look at him go!',svg:`<svg viewBox="0 0 100 100"><ellipse cx="50" cy="50" rx="28" ry="25" fill="#ef4444"/><ellipse cx="50" cy="52" rx="22" ry="18" fill="#fca5a5"/><circle cx="40" cy="45" r="5" fill="#1e293b"/><circle cx="60" cy="45" r="5" fill="#1e293b"/><circle cx="42" cy="43" r="2" fill="#fff"/><circle cx="62" cy="43" r="2" fill="#fff"/><ellipse cx="50" cy="56" rx="4" ry="2.5" fill="#1e293b"/><path d="M44 60 Q50 65 56 60" stroke="#1e293b" stroke-width="2" fill="none" stroke-linecap="round"/><path d="M36 22 Q30 5 42 18" fill="#9333ea"/><path d="M50 18 Q50 0 56 16" fill="#ef4444"/><path d="M64 22 Q70 5 58 18" fill="#9333ea"/><rect x="28" y="68" width="10" height="12" rx="5" fill="#ef4444"/><rect x="62" y="68" width="10" height="12" rx="5" fill="#ef4444"/></svg>`},
    {name:'Blazehound',hp:38,bio:'Blazehound is on fire! He got big and fast. He said "I am not a pup! I am a hound!" He can run and jump over big rocks. His fire is very hot now!',svg:`<svg viewBox="0 0 100 100"><ellipse cx="50" cy="48" rx="32" ry="28" fill="#ef4444"/><ellipse cx="50" cy="50" rx="24" ry="20" fill="#fca5a5"/><circle cx="38" cy="42" r="6" fill="#1e293b"/><circle cx="62" cy="42" r="6" fill="#1e293b"/><circle cx="40" cy="40" r="2.5" fill="#fff"/><circle cx="64" cy="40" r="2.5" fill="#fff"/><path d="M42 58 Q50 64 58 58" stroke="#1e293b" stroke-width="2.5" fill="none" stroke-linecap="round"/><path d="M30 18 Q22 -4 38 14" fill="#9333ea"/><path d="M50 12 Q50 -8 58 10" fill="#ef4444"/><path d="M70 18 Q78 -4 62 14" fill="#9333ea"/><path d="M40 14 Q36 -2 48 12" fill="#fbbf24"/><path d="M60 14 Q64 -2 52 12" fill="#fbbf24"/><rect x="24" y="70" width="12" height="14" rx="6" fill="#ef4444"/><rect x="64" y="70" width="12" height="14" rx="6" fill="#ef4444"/></svg>`},
    {name:'Infernofang',hp:52,bio:'Infernofang is the biggest fire Wordmon! He said "I have fangs of fire!" He can make the ground shake. All said he was the best. You do not want to make him mad!',svg:`<svg viewBox="0 0 100 100"><ellipse cx="50" cy="46" rx="36" ry="32" fill="#ef4444"/><ellipse cx="50" cy="48" rx="28" ry="24" fill="#fca5a5"/><circle cx="36" cy="40" r="7" fill="#1e293b"/><circle cx="64" cy="40" r="7" fill="#1e293b"/><circle cx="38" cy="38" r="3" fill="#fff"/><circle cx="66" cy="38" r="3" fill="#fff"/><circle cx="39" cy="37" r="1" fill="#ef4444"/><circle cx="67" cy="37" r="1" fill="#ef4444"/><path d="M40 58 Q50 66 60 58" stroke="#1e293b" stroke-width="3" fill="none" stroke-linecap="round"/><path d="M42 60 L44 64" stroke="#fff" stroke-width="2" stroke-linecap="round"/><path d="M58 60 L56 64" stroke="#fff" stroke-width="2" stroke-linecap="round"/><path d="M26 14 Q16 -14 36 10" fill="#9333ea"/><path d="M50 8 Q50 -16 58 6" fill="#ef4444"/><path d="M74 14 Q84 -14 64 10" fill="#9333ea"/><path d="M36 10 Q30 -6 46 8" fill="#fbbf24"/><path d="M64 10 Q70 -6 54 8" fill="#fbbf24"/><polygon points="14,44 0,34 6,50" fill="#ef4444"/><polygon points="86,44 100,34 94,50" fill="#ef4444"/><rect x="22" y="72" width="14" height="16" rx="7" fill="#dc2626"/><rect x="64" y="72" width="14" height="16" rx="7" fill="#dc2626"/></svg>`}
  ]},
  {id:'bubblefin',type:'Water',color:'#3b82f6',bio:'Bubblefin likes to be in the water. She can see all the fish! "Come and play with me!" she said. She is blue and she makes big bubbles. We like her!',stages:[
    {name:'Bubblefin',hp:32,bio:'Bubblefin likes to be in the water. She can see all the fish! She said "Come and play with me!" She is blue and she makes big bubbles. We like her!',svg:`<svg viewBox="0 0 100 100"><ellipse cx="50" cy="50" rx="30" ry="24" fill="#3b82f6"/><ellipse cx="50" cy="52" rx="22" ry="16" fill="#93c5fd"/><circle cx="40" cy="46" r="6" fill="#fff"/><circle cx="60" cy="46" r="6" fill="#fff"/><circle cx="42" cy="45" r="3.5" fill="#1e293b"/><circle cx="62" cy="45" r="3.5" fill="#1e293b"/><circle cx="43" cy="44" r="1.5" fill="#fff"/><circle cx="63" cy="44" r="1.5" fill="#fff"/><path d="M44 58 Q50 63 56 58" stroke="#1e293b" stroke-width="2" fill="none" stroke-linecap="round"/><path d="M80 45 Q95 35 88 55 Q82 50 80 45Z" fill="#3b82f6"/><path d="M50 26 L46 16 L54 16Z" fill="#60a5fa"/><circle cx="28" cy="36" r="4" fill="#bfdbfe" opacity=".6"/><circle cx="76" cy="60" r="3" fill="#bfdbfe" opacity=".5"/><rect x="34" y="70" width="10" height="8" rx="5" fill="#3b82f6"/><rect x="56" y="70" width="10" height="8" rx="5" fill="#3b82f6"/></svg>`},
    {name:'Tidalfin',hp:42,bio:'Tidalfin got big fins! She can swim in the deep sea now. She said "I am not scared of the dark water!" She has two fins and she can splash very far!',svg:`<svg viewBox="0 0 100 100"><ellipse cx="50" cy="48" rx="34" ry="28" fill="#3b82f6"/><ellipse cx="50" cy="50" rx="26" ry="20" fill="#93c5fd"/><circle cx="38" cy="44" r="7" fill="#fff"/><circle cx="62" cy="44" r="7" fill="#fff"/><circle cx="40" cy="43" r="4" fill="#1e293b"/><circle cx="64" cy="43" r="4" fill="#1e293b"/><circle cx="41" cy="42" r="1.5" fill="#fff"/><circle cx="65" cy="42" r="1.5" fill="#fff"/><path d="M42 58 Q50 64 58 58" stroke="#1e293b" stroke-width="2.5" fill="none" stroke-linecap="round"/><path d="M84 42 Q102 30 92 56 Q86 48 84 42Z" fill="#3b82f6"/><path d="M16 42 Q-2 30 8 56 Q14 48 16 42Z" fill="#3b82f6"/><path d="M50 20 L44 8 L56 8Z" fill="#60a5fa"/><circle cx="24" cy="32" r="5" fill="#bfdbfe" opacity=".5"/><circle cx="78" cy="58" r="4" fill="#bfdbfe" opacity=".4"/><circle cx="20" cy="56" r="3" fill="#bfdbfe" opacity=".3"/><rect x="30" y="72" width="12" height="10" rx="6" fill="#3b82f6"/><rect x="58" y="72" width="12" height="10" rx="6" fill="#3b82f6"/></svg>`},
    {name:'Tsunamaw',hp:56,bio:'Tsunamaw is the king of the sea! She said "I can make a big wave!" She is huge and blue. All the fish said she was the best swimmer. She is so strong!',svg:`<svg viewBox="0 0 100 100"><ellipse cx="50" cy="46" rx="38" ry="32" fill="#3b82f6"/><ellipse cx="50" cy="48" rx="30" ry="24" fill="#93c5fd"/><circle cx="36" cy="40" r="8" fill="#fff"/><circle cx="64" cy="40" r="8" fill="#fff"/><circle cx="38" cy="39" r="5" fill="#1e293b"/><circle cx="66" cy="39" r="5" fill="#1e293b"/><circle cx="40" cy="37" r="2" fill="#fff"/><circle cx="68" cy="37" r="2" fill="#fff"/><path d="M40 58 Q50 66 60 58" stroke="#1e293b" stroke-width="3" fill="none" stroke-linecap="round"/><path d="M88 40 Q110 24 98 58 Q90 46 88 40Z" fill="#2563eb"/><path d="M12 40 Q-10 24 2 58 Q10 46 12 40Z" fill="#2563eb"/><path d="M50 14 L42 0 L58 0Z" fill="#60a5fa"/><path d="M42 16 L38 4 L46 8Z" fill="#93c5fd"/><path d="M58 16 L62 4 L54 8Z" fill="#93c5fd"/><circle cx="18" cy="28" r="6" fill="#bfdbfe" opacity=".5"/><circle cx="82" cy="56" r="5" fill="#bfdbfe" opacity=".4"/><circle cx="16" cy="56" r="4" fill="#bfdbfe" opacity=".3"/><circle cx="84" cy="30" r="4" fill="#bfdbfe" opacity=".3"/><rect x="26" y="74" width="14" height="12" rx="7" fill="#2563eb"/><rect x="60" y="74" width="14" height="12" rx="7" fill="#2563eb"/></svg>`}
  ]},
  {id:'leafwhisk',type:'Grass',color:'#22c55e',bio:'Leafwhisk is from a big garden. She likes to have fun with the bugs. "Look at me!" she said as she did a flip. She is green like a leaf. Are you her friend?',stages:[
    {name:'Leafwhisk',hp:30,svg:`<svg viewBox="0 0 100 100"><ellipse cx="50" cy="55" rx="25" ry="22" fill="#22c55e"/><ellipse cx="50" cy="57" rx="18" ry="14" fill="#86efac"/><circle cx="42" cy="50" r="5" fill="#1e293b"/><circle cx="58" cy="50" r="5" fill="#1e293b"/><circle cx="43" cy="48" r="2" fill="#fff"/><circle cx="59" cy="48" r="2" fill="#fff"/><path d="M45 62 Q50 66 55 62" stroke="#1e293b" stroke-width="2" fill="none" stroke-linecap="round"/><path d="M50 33 Q40 10 30 25 Q40 20 50 33Z" fill="#4ade80"/><path d="M50 33 Q60 10 70 25 Q60 20 50 33Z" fill="#22c55e"/><rect x="30" y="72" width="10" height="10" rx="5" fill="#22c55e"/><rect x="60" y="72" width="10" height="10" rx="5" fill="#22c55e"/></svg>`},
    {name:'Thornvine',hp:40,svg:`<svg viewBox="0 0 100 100"><ellipse cx="50" cy="52" rx="30" ry="26" fill="#22c55e"/><ellipse cx="50" cy="54" rx="22" ry="18" fill="#86efac"/><circle cx="40" cy="48" r="6" fill="#1e293b"/><circle cx="60" cy="48" r="6" fill="#1e293b"/><circle cx="42" cy="46" r="2.5" fill="#fff"/><circle cx="62" cy="46" r="2.5" fill="#fff"/><path d="M43 62 Q50 68 57 62" stroke="#1e293b" stroke-width="2.5" fill="none" stroke-linecap="round"/><path d="M50 26 Q36 0 24 18 Q36 14 50 26Z" fill="#4ade80"/><path d="M50 26 Q64 0 76 18 Q64 14 50 26Z" fill="#22c55e"/><path d="M30 40 Q16 30 22 48" fill="#4ade80"/><path d="M70 40 Q84 30 78 48" fill="#22c55e"/><rect x="26" y="72" width="12" height="12" rx="6" fill="#22c55e"/><rect x="62" y="72" width="12" height="12" rx="6" fill="#22c55e"/></svg>`},
    {name:'Jungleroar',hp:54,svg:`<svg viewBox="0 0 100 100"><ellipse cx="50" cy="50" rx="34" ry="30" fill="#22c55e"/><ellipse cx="50" cy="52" rx="26" ry="22" fill="#86efac"/><circle cx="38" cy="44" r="7" fill="#1e293b"/><circle cx="62" cy="44" r="7" fill="#1e293b"/><circle cx="40" cy="42" r="3" fill="#fff"/><circle cx="64" cy="42" r="3" fill="#fff"/><path d="M40 62 Q50 70 60 62" stroke="#1e293b" stroke-width="3" fill="none" stroke-linecap="round"/><path d="M50 20 Q32 -10 18 12 Q32 8 50 20Z" fill="#4ade80"/><path d="M50 20 Q68 -10 82 12 Q68 8 50 20Z" fill="#16a34a"/><path d="M42 22 Q36 2 28 16" fill="#22c55e"/><path d="M58 22 Q64 2 72 16" fill="#22c55e"/><path d="M22 38 Q6 26 14 50" fill="#4ade80"/><path d="M78 38 Q94 26 86 50" fill="#16a34a"/><rect x="22" y="74" width="14" height="14" rx="7" fill="#16a34a"/><rect x="64" y="74" width="14" height="14" rx="7" fill="#16a34a"/></svg>`}
  ]},
  {id:'spookle',type:'Ghost',color:'#a855f7',bio:'Spookle is not what you think! He is a nice ghost. He said "I like to be your friend." He can go up and down. Do not be scared of him. He is fun!',stages:[
    {name:'Spookle',hp:26,svg:`<svg viewBox="0 0 100 100"><path d="M25 50 Q25 20 50 20 Q75 20 75 50 L75 75 Q70 68 65 75 Q60 82 55 75 Q50 68 45 75 Q40 82 35 75 Q30 68 25 75Z" fill="#a855f7"/><path d="M32 50 Q32 28 50 28 Q68 28 68 50 L68 65 Q65 60 60 65 Q55 70 50 65 Q45 60 40 65 Q35 70 32 65Z" fill="#d8b4fe"/><circle cx="42" cy="44" r="7" fill="#fff"/><circle cx="58" cy="44" r="7" fill="#fff"/><circle cx="43" cy="44" r="4" fill="#1e293b"/><circle cx="59" cy="44" r="4" fill="#1e293b"/><ellipse cx="50" cy="58" rx="5" ry="6" fill="#1e293b"/></svg>`},

  ]},
  {id:'crunchstone',type:'Rock',color:'#78716c',bio:'Crunchstone is big and strong. He was a small rock but he said "I can get big!" And he did! He likes to sit in the sun. His friends are all rocks from the mountain.',stages:[
    {name:'Crunchstone',hp:35,svg:`<svg viewBox="0 0 100 100"><path d="M25 65 L30 30 L50 22 L70 30 L78 65 L65 78 L35 78Z" fill="#78716c"/><path d="M30 62 L34 35 L50 28 L66 35 L72 62 L62 72 L38 72Z" fill="#a8a29e"/><circle cx="42" cy="48" r="5" fill="#1e293b"/><circle cx="60" cy="48" r="5" fill="#1e293b"/><circle cx="43" cy="46" r="2" fill="#fff"/><circle cx="61" cy="46" r="2" fill="#fff"/><path d="M46 60 L54 60" stroke="#1e293b" stroke-width="3" stroke-linecap="round"/><rect x="20" y="58" width="8" height="14" rx="4" fill="#78716c"/><rect x="72" y="58" width="8" height="14" rx="4" fill="#78716c"/><rect x="38" y="74" width="8" height="10" rx="4" fill="#78716c"/><rect x="54" y="74" width="8" height="10" rx="4" fill="#78716c"/></svg>`},
    {name:'Bouldercrush',hp:46,svg:`<svg viewBox="0 0 100 100"><path d="M20 62 L26 24 L50 16 L74 24 L82 62 L68 80 L32 80Z" fill="#78716c"/><path d="M26 58 L30 30 L50 22 L70 30 L76 58 L65 74 L35 74Z" fill="#a8a29e"/><circle cx="40" cy="44" r="6" fill="#1e293b"/><circle cx="62" cy="44" r="6" fill="#1e293b"/><circle cx="42" cy="42" r="2.5" fill="#fff"/><circle cx="64" cy="42" r="2.5" fill="#fff"/><path d="M44 60 L56 60" stroke="#1e293b" stroke-width="3.5" stroke-linecap="round"/><rect x="14" y="54" width="10" height="18" rx="5" fill="#78716c"/><rect x="76" y="54" width="10" height="18" rx="5" fill="#78716c"/><rect x="34" y="76" width="10" height="12" rx="5" fill="#78716c"/><rect x="56" y="76" width="10" height="12" rx="5" fill="#78716c"/><polygon points="50,16 46,6 54,6" fill="#a8a29e"/></svg>`},
    {name:'Titanfist',hp:60,svg:`<svg viewBox="0 0 100 100"><path d="M16 58 L22 18 L50 8 L78 18 L86 58 L72 82 L28 82Z" fill="#57534e"/><path d="M22 54 L26 24 L50 16 L74 24 L80 54 L68 76 L32 76Z" fill="#78716c"/><path d="M28 50 L32 30 L50 24 L68 30 L72 50 L64 68 L36 68Z" fill="#a8a29e"/><circle cx="40" cy="42" r="7" fill="#1e293b"/><circle cx="62" cy="42" r="7" fill="#1e293b"/><circle cx="42" cy="40" r="3" fill="#fff"/><circle cx="64" cy="40" r="3" fill="#fff"/><path d="M42 58 L58 58" stroke="#1e293b" stroke-width="4" stroke-linecap="round"/><rect x="10" y="48" width="12" height="22" rx="6" fill="#57534e"/><rect x="78" y="48" width="12" height="22" rx="6" fill="#57534e"/><rect x="30" y="78" width="12" height="14" rx="6" fill="#57534e"/><rect x="58" y="78" width="12" height="14" rx="6" fill="#57534e"/><polygon points="50,8 44,-4 56,-4" fill="#a8a29e"/><polygon points="36,12 32,2 40,6" fill="#78716c"/><polygon points="64,12 68,2 60,6" fill="#78716c"/></svg>`}
  ]},
  {id:'frostbite',type:'Ice',color:'#38bdf8',bio:'Frostbite is a cool little guy! He likes the cold. He can make snow with his hands. "Do you want to play in the snow?" he said. He is my friend and we have fun!',stages:[
    {name:'Frostbite',hp:27,svg:`<svg viewBox="0 0 100 100"><ellipse cx="50" cy="52" rx="26" ry="24" fill="#38bdf8"/><ellipse cx="50" cy="54" rx="20" ry="17" fill="#bae6fd"/><circle cx="40" cy="48" r="5" fill="#1e293b"/><circle cx="60" cy="48" r="5" fill="#1e293b"/><circle cx="42" cy="46" r="2" fill="#fff"/><circle cx="62" cy="46" r="2" fill="#fff"/><path d="M44 60 Q50 56 56 60" stroke="#1e293b" stroke-width="2" fill="none" stroke-linecap="round"/><polygon points="42,28 38,14 46,20" fill="#7dd3fc"/><polygon points="50,26 50,10 54,20" fill="#38bdf8"/><polygon points="58,28 62,14 54,20" fill="#7dd3fc"/><rect x="30" y="70" width="10" height="10" rx="5" fill="#38bdf8"/><rect x="60" y="70" width="10" height="10" rx="5" fill="#38bdf8"/><line x1="22" y1="52" x2="14" y2="52" stroke="#7dd3fc" stroke-width="2"/><line x1="78" y1="52" x2="86" y2="52" stroke="#7dd3fc" stroke-width="2"/></svg>`},
    {name:'Glacierfang',hp:38,svg:`<svg viewBox="0 0 100 100"><ellipse cx="50" cy="50" rx="30" ry="28" fill="#38bdf8"/><ellipse cx="50" cy="52" rx="24" ry="20" fill="#bae6fd"/><circle cx="38" cy="46" r="6" fill="#1e293b"/><circle cx="62" cy="46" r="6" fill="#1e293b"/><circle cx="40" cy="44" r="2.5" fill="#fff"/><circle cx="64" cy="44" r="2.5" fill="#fff"/><path d="M42 60 Q50 55 58 60" stroke="#1e293b" stroke-width="2.5" fill="none" stroke-linecap="round"/><polygon points="38,22 32,6 44,14" fill="#7dd3fc"/><polygon points="50,18 50,-2 56,14" fill="#38bdf8"/><polygon points="62,22 68,6 56,14" fill="#7dd3fc"/><polygon points="44,20 40,8 48,14" fill="#bae6fd"/><polygon points="56,20 60,8 52,14" fill="#bae6fd"/><line x1="18" y1="50" x2="6" y2="46" stroke="#7dd3fc" stroke-width="3"/><line x1="82" y1="50" x2="94" y2="46" stroke="#7dd3fc" stroke-width="3"/><rect x="28" y="72" width="12" height="12" rx="6" fill="#38bdf8"/><rect x="60" y="72" width="12" height="12" rx="6" fill="#38bdf8"/></svg>`},
    {name:'Blizzardking',hp:54,svg:`<svg viewBox="0 0 100 100"><ellipse cx="50" cy="48" rx="36" ry="32" fill="#0ea5e9"/><ellipse cx="50" cy="50" rx="28" ry="24" fill="#38bdf8"/><ellipse cx="50" cy="52" rx="22" ry="18" fill="#bae6fd"/><circle cx="36" cy="44" r="7" fill="#1e293b"/><circle cx="64" cy="44" r="7" fill="#1e293b"/><circle cx="38" cy="42" r="3" fill="#fff"/><circle cx="66" cy="42" r="3" fill="#fff"/><path d="M40 60 Q50 54 60 60" stroke="#1e293b" stroke-width="3" fill="none" stroke-linecap="round"/><polygon points="34,16 26,-2 42,8" fill="#7dd3fc"/><polygon points="50,12 50,-10 58,8" fill="#38bdf8"/><polygon points="66,16 74,-2 58,8" fill="#7dd3fc"/><polygon points="42,14 36,0 48,8" fill="#bae6fd"/><polygon points="58,14 64,0 52,8" fill="#bae6fd"/><polygon points="50,10 46,-4 54,-4" fill="#e0f2fe"/><line x1="12" y1="48" x2="-2" y2="42" stroke="#7dd3fc" stroke-width="4"/><line x1="88" y1="48" x2="102" y2="42" stroke="#7dd3fc" stroke-width="4"/><line x1="14" y1="56" x2="4" y2="62" stroke="#7dd3fc" stroke-width="2"/><line x1="86" y1="56" x2="96" y2="62" stroke="#7dd3fc" stroke-width="2"/><rect x="24" y="76" width="14" height="14" rx="7" fill="#0ea5e9"/><rect x="62" y="76" width="14" height="14" rx="7" fill="#0ea5e9"/></svg>`}
  ]},
  {id:'giggleslime',type:'Poison',color:'#84cc16',bio:'Giggleslime is so funny! He is all green and gooey. He said "Look at what I can do!" and he made a silly face. We all like him. He makes us happy!',stages:[

    {name:'Titanmech',hp:60,svg:`<svg viewBox="0 0 100 100"><rect x="16" y="16" width="68" height="68" rx="12" fill="#475569"/><rect x="22" y="22" width="56" height="56" rx="10" fill="#64748b"/><rect x="28" y="28" width="44" height="44" rx="7" fill="#94a3b8"/><rect x="34" y="34" width="32" height="32" rx="5" fill="#cbd5e1"/><circle cx="42" cy="46" r="7" fill="#1e293b"/><circle cx="58" cy="46" r="7" fill="#1e293b"/><circle cx="44" cy="44" r="3" fill="#ef4444"/><circle cx="60" cy="44" r="3" fill="#ef4444"/><path d="M40 62 L60 62" stroke="#1e293b" stroke-width="3.5" stroke-linecap="round"/><rect x="40" y="6" width="20" height="14" rx="5" fill="#475569"/><rect x="40" y="80" width="20" height="14" rx="5" fill="#475569"/><rect x="6" y="40" width="14" height="20" rx="5" fill="#475569"/><rect x="80" y="40" width="14" height="20" rx="5" fill="#475569"/></svg>`}
  ]},
  {id:'psywink',type:'Psychic',color:'#c084fc',bio:'Psywink can read your mind! She said "I know what you are thinking!" She is purple and she has big eyes. She likes books. Do you like books too?',stages:[
    {name:'Psywink',hp:24,svg:`<svg viewBox="0 0 100 100"><circle cx="50" cy="48" r="24" fill="#c084fc"/><circle cx="50" cy="50" r="18" fill="#e9d5ff"/><circle cx="42" cy="46" r="5" fill="#7c3aed"/><circle cx="58" cy="46" r="5" fill="#7c3aed"/><circle cx="42" cy="46" r="2.5" fill="#fff"/><circle cx="58" cy="46" r="2.5" fill="#fff"/><path d="M44 58 Q50 62 56 58" stroke="#7c3aed" stroke-width="2" fill="none"/><circle cx="50" cy="28" r="4" fill="#e9d5ff" opacity=".7"/><circle cx="36" cy="32" r="3" fill="#e9d5ff" opacity=".5"/><circle cx="64" cy="32" r="3" fill="#e9d5ff" opacity=".5"/></svg>`},
    {name:'Mindweaver',hp:34,svg:`<svg viewBox="0 0 100 100"><circle cx="50" cy="46" r="28" fill="#c084fc"/><circle cx="50" cy="48" r="22" fill="#e9d5ff"/><circle cx="40" cy="44" r="6" fill="#7c3aed"/><circle cx="60" cy="44" r="6" fill="#7c3aed"/><circle cx="41" cy="43" r="2.5" fill="#fff"/><circle cx="61" cy="43" r="2.5" fill="#fff"/><path d="M42 58 Q50 64 58 58" stroke="#7c3aed" stroke-width="2.5" fill="none"/><circle cx="50" cy="20" r="6" fill="#e9d5ff" opacity=".6"/><circle cx="30" cy="28" r="4" fill="#e9d5ff" opacity=".4"/><circle cx="70" cy="28" r="4" fill="#e9d5ff" opacity=".4"/><circle cx="22" cy="42" r="3" fill="#e9d5ff" opacity=".3"/><circle cx="78" cy="42" r="3" fill="#e9d5ff" opacity=".3"/></svg>`},
    {name:'Cosmicmind',hp:50,svg:`<svg viewBox="0 0 100 100"><circle cx="50" cy="44" r="34" fill="#7c3aed"/><circle cx="50" cy="46" r="28" fill="#c084fc"/><circle cx="50" cy="48" r="22" fill="#e9d5ff"/><circle cx="38" cy="42" r="7" fill="#7c3aed"/><circle cx="62" cy="42" r="7" fill="#7c3aed"/><circle cx="40" cy="41" r="3" fill="#fff"/><circle cx="64" cy="41" r="3" fill="#fff"/><path d="M40 58 Q50 66 60 58" stroke="#7c3aed" stroke-width="3" fill="none"/><circle cx="50" cy="14" r="8" fill="#e9d5ff" opacity=".5"/><circle cx="26" cy="24" r="5" fill="#e9d5ff" opacity=".4"/><circle cx="74" cy="24" r="5" fill="#e9d5ff" opacity=".4"/><circle cx="16" cy="40" r="4" fill="#e9d5ff" opacity=".3"/><circle cx="84" cy="40" r="4" fill="#e9d5ff" opacity=".3"/><circle cx="50" cy="12" r="3" fill="#fbbf24" opacity=".6"/></svg>`}
  ]},
  {id:'magmabelly',type:'Dragon',color:'#9333ea',bio:'Magmabelly is a dragon! He has a hot belly. He said "I am not just a little guy!" He can fly and spit fire. He is orange and very brave. He is my hero!',stages:[
    {name:'Magmabelly',hp:30,svg:`<svg viewBox="0 0 100 100"><ellipse cx="50" cy="52" rx="28" ry="24" fill="#9333ea"/><ellipse cx="50" cy="54" rx="22" ry="18" fill="#e9d5ff"/><circle cx="40" cy="46" r="5" fill="#1e293b"/><circle cx="60" cy="46" r="5" fill="#1e293b"/><circle cx="42" cy="44" r="2" fill="#fbbf24"/><circle cx="62" cy="44" r="2" fill="#fbbf24"/><path d="M42 60 Q50 66 58 60" stroke="#1e293b" stroke-width="2" fill="none"/><polygon points="34,28 28,14 40,22" fill="#9333ea"/><polygon points="66,28 72,14 60,22" fill="#9333ea"/><rect x="32" y="72" width="10" height="10" rx="5" fill="#9333ea"/><rect x="58" y="72" width="10" height="10" rx="5" fill="#9333ea"/><polygon points="50,76 44,90 50,84 56,90" fill="#9333ea"/></svg>`},
    {name:'Pyroscale',hp:42,svg:`<svg viewBox="0 0 100 100"><ellipse cx="50" cy="50" rx="32" ry="28" fill="#7c3aed"/><ellipse cx="50" cy="52" rx="26" ry="22" fill="#9333ea"/><ellipse cx="50" cy="54" rx="20" ry="16" fill="#e9d5ff"/><circle cx="38" cy="44" r="6" fill="#1e293b"/><circle cx="62" cy="44" r="6" fill="#1e293b"/><circle cx="40" cy="42" r="2.5" fill="#fbbf24"/><circle cx="64" cy="42" r="2.5" fill="#fbbf24"/><path d="M40 60 Q50 68 60 60" stroke="#1e293b" stroke-width="2.5" fill="none"/><polygon points="30,24 22,6 38,18" fill="#7c3aed"/><polygon points="70,24 78,6 62,18" fill="#7c3aed"/><polygon points="50,22 46,8 54,8" fill="#9333ea"/><polygon points="14,48 2,42 8,54" fill="#7c3aed"/><polygon points="86,48 98,42 92,54" fill="#7c3aed"/><rect x="28" y="74" width="12" height="12" rx="6" fill="#7c3aed"/><rect x="60" y="74" width="12" height="12" rx="6" fill="#7c3aed"/><polygon points="50,78 40,98 50,88 60,98" fill="#9333ea"/></svg>`},
    {name:'Dracoflare',hp:58,svg:`<svg viewBox="0 0 100 100"><ellipse cx="50" cy="48" rx="36" ry="32" fill="#c2410c"/><ellipse cx="50" cy="50" rx="30" ry="26" fill="#7c3aed"/><ellipse cx="50" cy="52" rx="24" ry="20" fill="#9333ea"/><ellipse cx="50" cy="54" rx="18" ry="14" fill="#e9d5ff"/><circle cx="36" cy="42" r="7" fill="#1e293b"/><circle cx="64" cy="42" r="7" fill="#1e293b"/><circle cx="38" cy="40" r="3" fill="#fbbf24"/><circle cx="66" cy="40" r="3" fill="#fbbf24"/><path d="M38 60 Q50 70 62 60" stroke="#1e293b" stroke-width="3" fill="none"/><path d="M40 62 L42 66" stroke="#fff" stroke-width="2" stroke-linecap="round"/><path d="M60 62 L58 66" stroke="#fff" stroke-width="2" stroke-linecap="round"/><polygon points="26,20 14,0 34,14" fill="#c2410c"/><polygon points="74,20 86,0 66,14" fill="#c2410c"/><polygon points="50,18 44,0 56,0" fill="#7c3aed"/><polygon points="8,46 -6,36 2,52" fill="#c2410c"/><polygon points="92,46 106,36 98,52" fill="#c2410c"/><rect x="22" y="76" width="14" height="14" rx="7" fill="#c2410c"/><rect x="64" y="76" width="14" height="14" rx="7" fill="#c2410c"/><polygon points="50,80 36,100 50,90 64,100" fill="#7c3aed"/></svg>`}
  ]},
  // ---- BATCH 3: 8 MORE WORDMONS (harder to catch) ----
  {id:'nimbuzz',type:'Normal',color:'#d1d5db',bio:'Nimbuzz is a fluffy cloud! She is soft and white. She said "I just want to be your pal!" She likes to float and nap. She is not fancy but she is the best!',stages:[
    {name:'Nimbuzz',hp:26,svg:`<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="24" fill="#e5e7eb"/><circle cx="42" cy="46" r="4" fill="#1e293b"/><circle cx="58" cy="46" r="4" fill="#1e293b"/><path d="M44 58 Q50 62 56 58" stroke="#1e293b" stroke-width="2" fill="none"/></svg>`},
    {name:'Cloudash',hp:36,svg:`<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="28" fill="#d1d5db"/><circle cx="40" cy="46" r="5" fill="#1e293b"/><circle cx="60" cy="46" r="5" fill="#1e293b"/><path d="M42 58 Q50 64 58 58" stroke="#1e293b" stroke-width="2.5" fill="none"/></svg>`},
    {name:'Zephyrion',hp:52,svg:`<svg viewBox="0 0 100 100"><circle cx="50" cy="46" r="32" fill="#9ca3af"/><circle cx="38" cy="42" r="6" fill="#1e293b"/><circle cx="62" cy="42" r="6" fill="#1e293b"/><path d="M40 58 Q50 66 60 58" stroke="#1e293b" stroke-width="3" fill="none"/></svg>`}
  ]},
  {id:'venomfin',type:'Poison',color:'#7c3aed',bio:'Venomfin is a purple fish from a deep lake. She said "I am not mean!" She has a fin that glows. She can swim very fast. She likes to play hide and seek.',stages:[
    {name:'Venomfin',hp:28,svg:`<svg viewBox="0 0 100 100"><ellipse cx="50" cy="50" rx="24" ry="20" fill="#7c3aed"/><circle cx="42" cy="46" r="4" fill="#fff"/><circle cx="58" cy="46" r="4" fill="#fff"/><path d="M44 58 Q50 54 56 58" stroke="#1e293b" stroke-width="2" fill="none"/></svg>`},
    {name:'Toxilash',hp:38,svg:`<svg viewBox="0 0 100 100"><ellipse cx="50" cy="50" rx="28" ry="24" fill="#6d28d9"/><circle cx="40" cy="46" r="5" fill="#fff"/><circle cx="60" cy="46" r="5" fill="#fff"/><path d="M42 60 Q50 54 58 60" stroke="#1e293b" stroke-width="2.5" fill="none"/></svg>`},
    {name:'Abysserpent',hp:54,svg:`<svg viewBox="0 0 100 100"><ellipse cx="50" cy="48" rx="34" ry="28" fill="#581c87"/><circle cx="38" cy="42" r="6" fill="#fff"/><circle cx="62" cy="42" r="6" fill="#fff"/><path d="M40 60 Q50 52 60 60" stroke="#1e293b" stroke-width="3" fill="none"/></svg>`}
  ]},
  {id:'embercub',type:'Fire',color:'#7c3aed',bio:'Embercub is a baby bear made of fire! He is warm and fuzzy. He said "Can I have a hug?" Yes! But be careful — he is very hot! He likes to eat and sleep.',stages:[
    {name:'Embercub',hp:30,svg:`<svg viewBox="0 0 100 100"><ellipse cx="50" cy="52" rx="24" ry="22" fill="#7c3aed"/><circle cx="42" cy="46" r="4" fill="#1e293b"/><circle cx="58" cy="46" r="4" fill="#1e293b"/><path d="M44 58 Q50 62 56 58" stroke="#1e293b" stroke-width="2" fill="none"/></svg>`},
    {name:'Blazebear',hp:42,svg:`<svg viewBox="0 0 100 100"><ellipse cx="50" cy="50" rx="30" ry="26" fill="#c2410c"/><circle cx="40" cy="44" r="5" fill="#1e293b"/><circle cx="60" cy="44" r="5" fill="#1e293b"/><path d="M42 58 Q50 64 58 58" stroke="#1e293b" stroke-width="2.5" fill="none"/></svg>`},
    {name:'Volcabeast',hp:58,svg:`<svg viewBox="0 0 100 100"><ellipse cx="50" cy="48" rx="36" ry="30" fill="#9a3412"/><circle cx="38" cy="42" r="6" fill="#fbbf24"/><circle cx="62" cy="42" r="6" fill="#fbbf24"/><path d="M40 60 Q50 68 60 60" stroke="#1e293b" stroke-width="3" fill="none"/></svg>`}
  ]},
  {id:'thornpaw',type:'Grass',color:'#16a34a',bio:'Thornpaw is a green cat with thorns! She said "My thorns are not sharp — they are soft!" She likes to climb up trees. She can jump from tree to tree. She is so fast!',stages:[
    {name:'Thornpaw',hp:28,svg:`<svg viewBox="0 0 100 100"><circle cx="50" cy="52" r="22" fill="#16a34a"/><circle cx="42" cy="48" r="4" fill="#1e293b"/><circle cx="58" cy="48" r="4" fill="#1e293b"/><path d="M44 58 Q50 62 56 58" stroke="#1e293b" stroke-width="2" fill="none"/></svg>`},
    {name:'Briarfist',hp:40,svg:`<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="26" fill="#15803d"/><circle cx="40" cy="46" r="5" fill="#1e293b"/><circle cx="60" cy="46" r="5" fill="#1e293b"/><path d="M42 58 Q50 64 58 58" stroke="#1e293b" stroke-width="2.5" fill="none"/></svg>`},
    {name:'Samuraibark',hp:56,svg:`<svg viewBox="0 0 100 100"><circle cx="50" cy="48" r="32" fill="#166534"/><circle cx="38" cy="42" r="6" fill="#1e293b"/><circle cx="62" cy="42" r="6" fill="#1e293b"/><path d="M40 58 Q50 66 60 58" stroke="#1e293b" stroke-width="3" fill="none"/></svg>`}
  ]},
  {id:'crystalwing',type:'Ice',color:'#38bdf8',bio:'Crystalwing has wings made of ice! She can fly in the cold. She said "I am pretty, see?" We said yes! She likes to make snowflakes. Each one is not the same!',stages:[
    {name:'Crystalwing',hp:24,svg:`<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="20" fill="#7dd3fc"/><circle cx="42" cy="46" r="4" fill="#1e293b"/><circle cx="58" cy="46" r="4" fill="#1e293b"/></svg>`},
    {name:'Frostowl',hp:34,svg:`<svg viewBox="0 0 100 100"><circle cx="50" cy="48" r="26" fill="#38bdf8"/><circle cx="40" cy="44" r="5" fill="#1e293b"/><circle cx="60" cy="44" r="5" fill="#1e293b"/></svg>`},
    {name:'Glacialphoenix',hp:52,svg:`<svg viewBox="0 0 100 100"><circle cx="50" cy="46" r="32" fill="#0284c7"/><circle cx="38" cy="40" r="6" fill="#fff"/><circle cx="62" cy="40" r="6" fill="#fff"/></svg>`}
  ]},
  {id:'voltarachnid',type:'Electric',color:'#eab308',bio:'Voltarachnid is a spider who zaps! He is not scary. He said "I can help you see in the dark!" He makes webs that glow. He has eight legs and a big smile.',stages:[
    {name:'Voltarachnid',hp:22,svg:`<svg viewBox="0 0 100 100"><circle cx="50" cy="52" r="20" fill="#eab308"/><circle cx="42" cy="48" r="5" fill="#1e293b"/><circle cx="58" cy="48" r="5" fill="#1e293b"/></svg>`},
    {name:'Sparkweaver',hp:34,svg:`<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="24" fill="#ca8a04"/><circle cx="40" cy="46" r="6" fill="#3b82f6"/><circle cx="60" cy="46" r="6" fill="#3b82f6"/></svg>`},
    {name:'Thundertarantula',hp:50,svg:`<svg viewBox="0 0 100 100"><circle cx="50" cy="48" r="30" fill="#a16207"/><circle cx="38" cy="42" r="7" fill="#3b82f6"/><circle cx="62" cy="42" r="7" fill="#3b82f6"/></svg>`}
  ]},
  {id:'phantomflame',type:'Ghost',color:'#6366f1',bio:'Phantomflame is a ghost with blue fire! She is not hot. Her fire is cold! She said "I like to float and dance." She comes out at night and makes the sky glow.',stages:[
