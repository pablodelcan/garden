      area.innerHTML='<div class="card" style="text-align:center;padding:20px">'+
        '<img src="sprites/rio_trainer_reading.png" style="width:70px;height:70px;margin:0 auto 8px;display:block" onerror="this.style.display=\'none\'">'+
        '<div style="font-family:Fredoka One,cursive;font-size:1.2rem;color:var(--accent);margin-bottom:8px">😂 Silly Story Time!</div>'+
        '<div style="font-size:1.3rem;font-weight:700;line-height:1.6;margin-bottom:16px">'+display+'</div>'+
        choiceHtml+'</div>';
    };

    this._pickMadLib=(w)=>{
      selectedWords.push(w);
      step++;
      SFX.play('click');
      if(step>=totalSlots){SFX.play('fanfare');this.fireConfetti();}
      render();
    };
    render();
  },

  // ---- RÍO TRAINER APPEARANCE ----
  showRioTrainer(){
    const msgs=[
      {img:'rio_trainer_victory',text:"You're doing amazing!"},
      {img:'rio_trainer_idle',text:"Keep going, trainer!"},
      {img:'rio_trainer_pointing',text:"I choose YOU to read!"},
      {img:'rio_trainer_surprised',text:"Wow, you're so smart!"},
      {img:'rio_trainer_thinking',text:"Hmm, what's next..."},
      {img:'rio_trainer_reading',text:"Reading is my superpower!"},
    ];
    const m=msgs[Math.floor(Math.random()*msgs.length)];
    const toast=document.createElement('div');
    toast.style.cssText='position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#fff;border:3px solid var(--accent);border-radius:16px;padding:8px 16px;box-shadow:0 8px 24px rgba(0,0,0,.15);z-index:300;text-align:center;display:flex;align-items:center;gap:8px;animation:msgPop .8s ease forwards';
    toast.innerHTML='<img src="sprites/'+m.img+'.png" style="width:50px;height:50px;object-fit:contain" onerror="this.style.display=\'none\'">'+
      '<div style="font-family:Fredoka One,cursive;font-size:.85rem;color:var(--text)">'+m.text+'</div>';
    document.body.appendChild(toast);
    setTimeout(()=>toast.remove(),2500);
  },

  // ---- VOICE HELP ----
  speakHelp(){
    if(!('speechSynthesis' in window)) return;
    speechSynthesis.cancel();
    const btn=document.getElementById('helpSpeaker');
    btn.classList.add('speaking');
    const instructions={
      fill:"Fill in the blank! Read the sentence and pick the missing word. Tap the right answer!",
      spell:"Spell it! Look at the picture and the hint. Then tap the letters in the right order to spell the word!",
      tricky:"Tricky letters! Some letters look alike, like b and d, or p and d, or u and n. Look at the picture and pick the right letter!",
      hear:"Hear it! Listen to the word, then find it from the choices. You can press the speaker button to hear it again!",
      flash:"Flash! A word will appear on screen for a moment, then disappear. Try to remember it and pick the right one!",
      decode:"Mystery word! Use the clues to figure out the secret word. Look at the first letter, how many letters it has, and the sentence. Then type the word!",
      story:"Story time! Read the short story, then answer the question about it. Tap the right answer!",
      readalong:"Read along! I will read the sentence out loud, but I will stop at some words. You need to read those words! Then tap the word you read.",
      popquiz:"Pop quiz! I will say a word out loud. You need to spell it by tapping the letters in the right order. Listen carefully!",
      shop:"This is the shop! You earn coins by playing the game. Save up your coins to buy real Pokémon toys!"
    };
    const text=instructions[this.mode]||"Pick a game from the tabs at the top! Each one helps you practice reading. You earn coins when you beat monsters!";
    const u=new SpeechSynthesisUtterance(text);
    u.rate=0.85;
    u.pitch=1.1;
    const good=getBestVoice();
    if(good) u.voice=good;
    u.onend=()=>btn.classList.remove('speaking');
    u.onerror=()=>btn.classList.remove('speaking');
    speechSynthesis.speak(u);
  }
};

// ---- UTILS ----
function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

// SERVICE WORKER — offline play for airplane mode!
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/sw-wordquest.js').then(()=>{
    // Pre-cache all sprites on first load
    if(!localStorage.getItem('rio_precached')){
      const imgs=document.querySelectorAll('img[src*="sprites/"]');
      const srcs=new Set();
      imgs.forEach(i=>srcs.add(i.src));
      // Also cache all wordmon + enemy sprites
      WORDMONS.forEach(wm=>{for(let s=1;s<=3;s++)srcs.add('/sprites/'+wm.id+'_'+s+'.png');});
      ENEMIES.forEach(e=>srcs.add(e.sprite));
      // Cache battle backgrounds
      ['forest','volcano','ocean','cave','sky','snow','castle','space'].forEach(b=>srcs.add('/sprites/bg_'+b+'.png'));
      // Preload all
      srcs.forEach(src=>{const i=new Image();i.src=src;});
      localStorage.setItem('rio_precached','1');
    }
  }).catch(()=>{});
}

// POKÉDEX MODAL
function openPokedex(){
  document.getElementById('pokedexOverlay').classList.add('open');
  G.renderPokedex();
  renderAchievements();
  try{SFX.play('catch');}catch(e){}
}
function closePokedex(){
  document.getElementById('pokedexOverlay').classList.remove('open');
}
function trySecretCode(){
  const input=document.getElementById('secretCodeInput');
  const code=input.value.trim().toLowerCase();
  const res=document.getElementById('secretResult');
  const found=SECRET_WORDMONS.find(s=>s.code===code);
  if(!found){
    res.innerHTML='<span style="color:#ef4444">Hmm, not a valid code. Keep trying!</span>';
    SFX.play('wrong');
    return;
  }
  // Check if already caught
  if(G._secretsCaughtList && G._secretsCaughtList.includes(code)){
    res.innerHTML='<span style="color:var(--accent)">You already have '+found.name+'!</span>';
    return;
  }
  if(!G._secretsCaughtList) G._secretsCaughtList=[];
  G._secretsCaughtList.push(code);
  G.secretsCaught=(G.secretsCaught||0)+1;
  res.innerHTML='<span style="color:#22c55e">🎉 You found '+found.name+'! Secret Wordmon unlocked!</span>';
  SFX.play('fanfare');
  G.fireConfetti();
  G.checkAchievements();
  G.saveGame();
  input.value='';
}
function renderAchievements(){
  const grid=document.getElementById('achievementGrid');
  if(!grid)return;
  grid.innerHTML='';
  ACHIEVEMENTS.forEach(a=>{
    const unlocked=G.unlockedAchievements.includes(a.id);
    const div=document.createElement('div');
    div.style.cssText='text-align:center;padding:6px;border-radius:12px;background:'+(unlocked?'#fff7ed':'#f8fafc')+';border:2px solid '+(unlocked?'#fbbf24':'#e2e8f0')+';'+(unlocked?'':'opacity:.4;filter:grayscale(1)');
    div.innerHTML='<img src="'+a.icon+'" style="width:36px;height:36px;margin:0 auto;display:block" onerror="this.style.display=\'none\'">'+
      '<div style="font-family:Fredoka One,cursive;font-size:.55rem;color:var(--text);margin-top:2px">'+a.name+'</div>'+
      '<div style="font-size:.45rem;color:var(--text2)">'+a.desc+'</div>';
    grid.appendChild(div);
  });
}

// ---- PARENT STATS DASHBOARD (type "stats" to open) ----
(function(){
  let buf='';
  document.addEventListener('keydown',e=>{
    buf+=e.key.toLowerCase();
    if(buf.length>10) buf=buf.slice(-10);
    if(buf.includes('stats')){buf='';openParentDashboard();}
  });
})();

function openParentDashboard(){
  const overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px)';
  overlay.onclick=e=>{if(e.target===overlay)overlay.remove();};

  const stats=G.wordStats||{};
  const teacherWords=['the','I','and','a','like','is','as','said','to','do','of','see','he','be','we','me','from','look','book','are','was','you','what','have'];

  // Build word stats table
  let rows='';
  const allWords=[...new Set([...teacherWords,...Object.keys(stats)])];
  allWords.sort((a,b)=>{
    const sa=stats[a]||{correct:0,wrong:0};
    const sb=stats[b]||{correct:0,wrong:0};
    const ra=sa.correct+sa.wrong>0?sa.correct/(sa.correct+sa.wrong):0;
    const rb=sb.correct+sb.wrong>0?sb.correct/(sb.correct+sb.wrong):0;
    return ra-rb;// worst first
  });

  allWords.forEach(w=>{
    const s=stats[w]||{correct:0,wrong:0};
    const total=s.correct+s.wrong;
    const pct=total>0?Math.round(s.correct/total*100):0;
    const isTeacher=teacherWords.includes(w)||teacherWords.includes(w.toLowerCase());
    const color=pct>=80?'#22c55e':pct>=50?'#f59e0b':'#ef4444';
    const barW=Math.max(5,pct);
    rows+='<tr style="border-bottom:1px solid #f1f5f9">'+
      '<td style="padding:4px 8px;font-weight:700;font-size:.9rem">'+w+(isTeacher?' ⭐':'')+'</td>'+
      '<td style="padding:4px;text-align:center;font-size:.8rem;color:#22c55e">'+s.correct+'</td>'+
      '<td style="padding:4px;text-align:center;font-size:.8rem;color:#ef4444">'+s.wrong+'</td>'+
      '<td style="padding:4px;width:100px"><div style="background:#f1f5f9;border-radius:4px;height:14px;overflow:hidden"><div style="background:'+color+';height:100%;width:'+barW+'%;border-radius:4px;transition:width .3s"></div></div></td>'+
      '<td style="padding:4px;text-align:center;font-size:.8rem;font-weight:700;color:'+color+'">'+pct+'%</td>'+
      '</tr>';
  });

  const notSeen=teacherWords.filter(w=>!stats[w]&&!stats[w.toLowerCase()]);

  overlay.innerHTML='<div style="background:#fff;border-radius:20px;max-width:500px;width:100%;max-height:85vh;overflow-y:auto;padding:20px;box-shadow:0 20px 60px rgba(0,0,0,.3)">'+
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">'+
    '<h2 style="font-family:Fredoka One,cursive;font-size:1.2rem;color:var(--accent)">📊 Parent Dashboard</h2>'+
    '<button onclick="this.closest(\'div[style]\').parentElement.remove()" style="background:#ef4444;color:#fff;border:none;width:30px;height:30px;border-radius:50%;font-size:1rem;cursor:pointer">✕</button></div>'+
    '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px">'+
    '<div style="background:#f0fdf4;border-radius:12px;padding:10px;text-align:center"><div style="font-size:1.4rem;font-weight:800;color:#22c55e">'+G.totalCorrect+'</div><div style="font-size:.7rem;color:#15803d;font-weight:600">Correct</div></div>'+
    '<div style="background:#fef2f2;border-radius:12px;padding:10px;text-align:center"><div style="font-size:1.4rem;font-weight:800;color:#ef4444">'+Object.values(stats).reduce((a,s)=>a+s.wrong,0)+'</div><div style="font-size:.7rem;color:#b91c1c;font-weight:600">Wrong</div></div>'+
    '<div style="background:#fff7ed;border-radius:12px;padding:10px;text-align:center"><div style="font-size:1.4rem;font-weight:800;color:var(--accent)">'+G.maxStreak+'</div><div style="font-size:.7rem;color:#c2410c;font-weight:600">Best Streak</div></div></div>'+
    (notSeen.length>0?'<div style="background:#fef3c7;border-radius:12px;padding:10px;margin-bottom:12px"><div style="font-weight:700;font-size:.85rem;color:#92400e;margin-bottom:4px">⚠️ Teacher words NOT YET PRACTICED:</div><div style="font-size:.9rem;color:#a16207;font-weight:600">'+notSeen.join(', ')+'</div></div>':'')+
    '<div style="font-family:Fredoka One,cursive;font-size:.9rem;color:var(--text);margin-bottom:6px">Word-by-Word Stats <span style="font-size:.7rem;color:var(--text2);font-weight:400">(⭐ = teacher list, sorted worst→best)</span></div>'+
    '<table style="width:100%;border-collapse:collapse;font-family:Nunito,sans-serif"><thead><tr style="background:#f8fafc"><th style="padding:4px 8px;text-align:left;font-size:.75rem">Word</th><th style="padding:4px;font-size:.75rem;color:#22c55e">✓</th><th style="padding:4px;font-size:.75rem;color:#ef4444">✗</th><th style="padding:4px;font-size:.75rem">Accuracy</th><th style="padding:4px;font-size:.75rem">%</th></tr></thead><tbody>'+rows+'</tbody></table>'+
    '<div style="margin-top:12px;text-align:center;font-size:.7rem;color:var(--text2)">Type "stats" on keyboard to open this panel anytime</div></div>';
  document.body.appendChild(overlay);
}

G.init();
