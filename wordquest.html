    {name:'Rexclaw',hp:46,bio:'Rexclaw has sharp claws and bigger teeth! He said "I am ALMOST a T-Rex!" He loves to smash rocks and roar at clouds.',svg:`<svg viewBox="0 0 100 100"><ellipse cx="50" cy="54" rx="30" ry="24" fill="#ea580c"/><ellipse cx="50" cy="56" rx="22" ry="18" fill="#fb923c"/><circle cx="40" cy="46" r="5" fill="#1e293b"/><circle cx="60" cy="46" r="5" fill="#1e293b"/><path d="M34 60 Q50 72 66 60 L66 64 L60 70 L54 62 L46 70 L40 62Z" fill="#fff" stroke="#1e293b" stroke-width="1.5"/><path d="M24 34 L14 20 L28 28Z" fill="#ea580c"/><path d="M76 34 L86 20 L72 28Z" fill="#ea580c"/><rect x="28" y="74" width="10" height="16" fill="#c2410c"/><rect x="62" y="74" width="10" height="16" fill="#c2410c"/><polygon points="22,78 14,86 24,82" fill="#fff"/><polygon points="78,78 86,86 76,82" fill="#fff"/></svg>`},
    {name:'Tyrannogod',hp:66,bio:'Tyrannogod is the KING of dinos! He said "BOW BEFORE MY ROAR!" His teeth are the size of bananas and his roar shakes mountains.',svg:`<svg viewBox="0 0 100 100"><ellipse cx="50" cy="50" rx="38" ry="32" fill="#7c2d12"/><ellipse cx="50" cy="52" rx="30" ry="24" fill="#c2410c"/><ellipse cx="50" cy="54" rx="22" ry="18" fill="#f97316"/><circle cx="38" cy="44" r="6" fill="#fde047"/><circle cx="62" cy="44" r="6" fill="#fde047"/><circle cx="38" cy="44" r="3" fill="#1e293b"/><circle cx="62" cy="44" r="3" fill="#1e293b"/><path d="M28 58 Q50 78 72 58 L72 64 L66 74 L58 62 L50 74 L42 62 L34 74 L28 64Z" fill="#fff" stroke="#1e293b" stroke-width="2"/><path d="M16 24 L2 4 L22 18Z" fill="#7c2d12"/><path d="M84 24 L98 4 L78 18Z" fill="#7c2d12"/><polygon points="42,14 46,2 50,14" fill="#ea580c"/><polygon points="50,12 54,0 58,14" fill="#ea580c"/><rect x="22" y="74" width="12" height="20" fill="#451a03"/><rect x="66" y="74" width="12" height="20" fill="#451a03"/><polygon points="14,80 4,92 18,86" fill="#fff"/><polygon points="86,80 96,92 82,86" fill="#fff"/></svg>`}

    setInterval(()=>this.saveGame(),30000);

  // ---- SAVE / LOAD (localStorage) ----
  saveGame(){
    const d={score:this.score,streak:this.streak,lives:this.lives,xp:this.xp,level:this.level,
      xpNeeded:this.xpNeeded,coins:this.coins,activeWordmon:this.activeWordmon,
      caughtWordmons:this.caughtWordmons,purchased:this.purchased,wordmonXP:this.wordmonXP,
      mode:this.mode,modeWins:this.modeWins,totalCorrect:this.totalCorrect||0,
      maxStreak:this.maxStreak||0,bossesDefeated:this.bossesDefeated||0,
      secretsCaught:this.secretsCaught||0,unlockedAchievements:this.unlockedAchievements||[],
      currentZone:this.currentZone||0,wordStats:this.wordStats||{},popQuizWins:this.popQuizWins||0,wordmonHpMap:this.wordmonHpMap||{}};
    try{localStorage.setItem('rio_reads_save',JSON.stringify(d));}catch(e){}
    // Auto-sync to cloud (debounced)
    if(this._cloudSyncTimer) clearTimeout(this._cloudSyncTimer);
    this._cloudSyncTimer=setTimeout(()=>{CloudSync.push();},5000); // sync 5s after last save
  },
  loadGame(){
    try{
      const s=localStorage.getItem('rio_reads_save');
      if(!s)return;
      const d=JSON.parse(s);
      if(d.score!==undefined) this.score=d.score;
      if(d.streak!==undefined) this.streak=d.streak;
      if(d.lives!==undefined) this.lives=d.lives;
      if(d.xp!==undefined) this.xp=d.xp;
      if(d.level!==undefined) this.level=d.level;
      if(d.xpNeeded!==undefined) this.xpNeeded=d.xpNeeded;
      if(d.coins!==undefined) this.coins=d.coins;
      if(d.activeWordmon!==undefined) this.activeWordmon=d.activeWordmon;
      if(d.caughtWordmons) this.caughtWordmons=d.caughtWordmons;
      if(d.purchased) this.purchased=d.purchased;
      if(d.wordmonXP) this.wordmonXP=d.wordmonXP;
      if(d.mode && d.mode!=='shop') this.mode=d.mode;
      if(d.modeWins!==undefined) this.modeWins=d.modeWins;
      if(d.totalCorrect!==undefined) this.totalCorrect=d.totalCorrect;
      if(d.maxStreak!==undefined) this.maxStreak=d.maxStreak;
      if(d.bossesDefeated!==undefined) this.bossesDefeated=d.bossesDefeated;
      if(d.secretsCaught!==undefined) this.secretsCaught=d.secretsCaught;
      if(d.unlockedAchievements) this.unlockedAchievements=d.unlockedAchievements;
      if(d.currentZone!==undefined) this.currentZone=d.currentZone;
      if(d.wordStats) this.wordStats=d.wordStats;
      if(d.popQuizWins!==undefined) this.popQuizWins=d.popQuizWins;
      if(d.wordmonHpMap) this.wordmonHpMap=d.wordmonHpMap;
    }catch(e){}
  },

  updateBackpack(){
    document.getElementById('bpBadge').textContent=this.coins;

  MODE_NAMES:{fill:'Fill In',spell:'Spell It',tricky:'Tricky Letters',hear:'Hear It',flash:'Flash',decode:'Decode',story:'Story',readalong:'Read Along',sentence:'Build It',popquiz:'Pop Quiz',shop:'Shop',storybook:'📖 Storybook',comicchat:'💬 Comic',scramble:'🔀 Scramble',readfind:'🔎 Read & Find',finisher:'📚 What Comes Next'},

  // ---- HUD ----
  updateHUD(){
    document.getElementById('scoreVal').textContent = this.score;
    document.getElementById('streakVal').textContent = this.streak;
    document.getElementById('livesVal').textContent = this.lives;
    document.getElementById('levelVal').textContent = this.level;
    document.getElementById('coinVal').textContent = this.coins;
    const wv=document.getElementById('walletVal');if(wv)wv.textContent=this.coins;
    const iw=document.getElementById('inlineWallet');if(iw)iw.textContent=this.coins;
    this.updateBackpack();
    const pct = Math.min(100,(this.xp/this.xpNeeded)*100);
    document.getElementById('xpFill').style.width = pct+'%';
    document.getElementById('xpLabel').textContent = this.xp+' / '+this.xpNeeded+' XP';
    // streak dots — 5 dots = catch a Wordmon!
    const streakMod = this.streak % 5;
    for(let i=0;i<5;i++){
      document.getElementById('sd'+i).classList.toggle('filled', streakMod > i || (this.streak > 0 && streakMod === 0));
    }
    // Reset dots after catch (streak resets to 0 visually on next wrong)
    if(this.streak>0 && this.streak%5===0){
      // All dots filled — about to catch!
      for(let i=0;i<5;i++) document.getElementById('sd'+i).classList.add('filled');
    }
    // player
    const wm = this.getWordmon(this.activeWordmon);
    document.getElementById('playerName').textContent = wm.name;
    document.getElementById('playerSprite').innerHTML = this.spriteHtml(wm,110);
    this.updateHpBar('player');
    // enemy
    if(this.currentEnemy){
      document.getElementById('enemyName').textContent = this.currentEnemy.name;
      const eSize=this.isBossBattle?140:110;
      document.getElementById('enemySprite').innerHTML = '<img src="'+this.currentEnemy.sprite+'" style="width:'+eSize+'px;height:'+eSize+'px;object-fit:contain;image-rendering:pixelated">';
      this.updateHpBar('enemy');
    }
    document.getElementById('rosterCount').textContent = this.caughtWordmons.length;
    document.getElementById('rosterTotal').textContent = WORDMONS.length;
  },

  updateHpBar(who){
    const hp = who==='player'?this.playerHp:this.enemyHp;
    const max = who==='player'?this.playerMaxHp:this.enemyMaxHp;
    const pct = Math.max(0,(hp/max)*100);
    const bar = document.getElementById(who+'HpBar');
    bar.style.width = pct+'%';
    bar.className = 'hp-fill '+(pct>50?'green':pct>25?'yellow':'red');
    document.getElementById(who+'HpText').textContent = Math.max(0,hp)+'/'+max+' HP';
  },

  // ---- BATTLE ----
  spawnEnemy(){
    // Don't overwrite boss enemy
    if(this.isBossBattle) return;
    this.enemyIdx = (this.enemyIdx+1) % ENEMIES.length;
    this.currentEnemy = ENEMIES[this.enemyIdx];
    const bonus = Math.floor(this.level*2);
    this.enemyMaxHp = this.currentEnemy.hp + bonus;
    this.enemyHp = this.enemyMaxHp;
    const wm = this.getWordmon(this.activeWordmon);
    this.playerMaxHp = wm.hp;
    this.playerHp = this.getWordmonHp(this.activeWordmon);
    // Set battle background
    const bg = this.currentEnemy.bg || this._zoneBg || BATTLE_BGS[this.enemyIdx % BATTLE_BGS.length];
    this.changeBattleBg(bg);
  },
  changeBattleBg(bg){
    this._zoneBg=bg;
    const scene = document.getElementById('battleScene');
    // Use the fresh AI-generated PNG backgrounds (cache-bust v=2 forces reload past old CDN copies)
    scene.style.backgroundImage = 'url(sprites/'+bg+'.png?v=2)';
    scene.style.backgroundSize = 'cover';
    scene.style.backgroundPosition = 'center center';
    // Also apply zone class for any CSS effects
    scene.className = scene.className.replace(/\bzone-\w+\b/g,'').trim();
    const zone = bg.replace(/^bg_/,'zone-');
    scene.classList.add(zone);
    this.updateHUD();
  },

  showBattleMsg(txt){
    const el = document.getElementById('battleMsg');
    el.textContent = txt;
    el.classList.remove('show');
    void el.offsetWidth;
    el.classList.add('show');
  },

  playerAttack(){
    const dmg = 4+Math.floor(Math.random()*3);
    this.enemyHp = Math.max(0, this.enemyHp-dmg);
    const pf = document.getElementById('playerFighter');
    const ef = document.getElementById('enemyFighter');
    pf.classList.add('atk-right');
    setTimeout(()=>{
      SFX.play('attack');
      ef.classList.add('shake');
      document.getElementById('hitFlash').classList.add('show');
      const msgs=['Super effective!','Critical hit!','POW!','WHAM!','Take that!','Boom!','Zap!','Nice one!'];
      this.showBattleMsg(msgs[Math.floor(Math.random()*msgs.length)]);
    },250);
    setTimeout(()=>{
      pf.classList.remove('atk-right');
      ef.classList.remove('shake');
      document.getElementById('hitFlash').classList.remove('show');
      this.updateHUD();
      if(this.enemyHp<=0) this.enemyDefeated();
    },700);
  },

  enemyAttack(){
    const dmg = 3+Math.floor(Math.random()*3);
    this.playerHp = Math.max(0, this.playerHp-dmg);
    // Persist damage to the active Wordmon
    this.wordmonHpMap[this.activeWordmon]=this.playerHp;
    const ef = document.getElementById('enemyFighter');
    const pf = document.getElementById('playerFighter');
    ef.classList.add('atk-left');
    setTimeout(()=>{
      SFX.play('hurt');
      pf.classList.add('shake');
      document.getElementById('hitFlash').classList.add('show');
      const msgs=['Ouch!','Oh no!','Yikes!','Oof!','Watch out!'];
      this.showBattleMsg(msgs[Math.floor(Math.random()*msgs.length)]);
    },250);
    setTimeout(()=>{
      ef.classList.remove('atk-left');
      pf.classList.remove('shake');
      document.getElementById('hitFlash').classList.remove('show');
      this.updateHUD();
      if(this.playerHp<=0){SFX.play('faint');this.playerDefeated();}
      else if(this.playerHp<=Math.floor(this.playerMaxHp*0.3)){SFX.play('lowHp');}
    },700);
  },

  enemyDefeated(){
    SFX.play('victory');
    const b = document.getElementById('battleScene');
    const banner = document.createElement('div');
    banner.className='result-banner victory';
    if(this.isBossBattle){
      banner.innerHTML='<span>BOSS DEFEATED! 🏆</span>';
      b.appendChild(banner);
      setTimeout(()=>{banner.remove();this.endBossBattle();},2000);
      return;
    }
    banner.innerHTML='<span>VICTORY! 🎉</span>';
    b.appendChild(banner);
    this.score+=10; this.addXP(15); this.addCoins(2); this.showMoneyAnimation(2);
    setTimeout(()=>{banner.remove();this.spawnEnemy();},1500);
  },

  playerDefeated(){
    const b = document.getElementById('battleScene');
    const banner = document.createElement('div');
    banner.className='result-banner defeat';
    this.streak=0;
    // Wordmon faints! HP goes to 0
    this.wordmonHpMap[this.activeWordmon]=0;
    this.saveGame();
    // check if any other Wordmon is alive
    const alive=this.caughtWordmons.filter(idx=>this.getWordmonHp(idx)>0);
    if(alive.length>0){
      // Switch to next alive Wordmon
      banner.innerHTML='<span>'+this.getWordmon(this.activeWordmon).name+' fainted! 😵</span>';
      b.appendChild(banner);
      setTimeout(()=>{
        banner.remove();
        this.activeWordmon=alive[0];
        const wm=this.getWordmon(alive[0]);
        this.playerMaxHp=wm.hp;
        this.playerHp=this.getWordmonHp(alive[0]);
        this.spawnEnemy();
        this.renderRoster();
        this.updateHUD();
        // toast telling them what happened
        this.showToast(wm.name+' steps in! Heal '+this.getWordmon(this.caughtWordmons.find(i=>this.getWordmonHp(i)===0)).name+' at the Healing Center!');
      },2000);
    } else {
      // ALL Wordmons fainted! Must heal
      banner.innerHTML='<span>All Wordmons fainted! 😵 Go heal them!</span>';
      b.appendChild(banner);
      SFX.play('hurt');
      setTimeout(()=>{
        banner.remove();
        this.forceHealingCenter();
      },2500);
    }
  },

  forceHealingCenter(){
    // Force open the healing center — can't play until at least one Wordmon is healed

      '<div style="font-size:3rem;margin-bottom:8px">🏥</div>'+

      '<button onclick="G.loadHealingCenter()" style="font-family:Fredoka One,cursive;font-size:1.1rem;padding:12px 28px;border-radius:14px;border:3px solid var(--navy);background:linear-gradient(135deg,#fce7f3,#fbcfe8);color:#be185d;cursor:pointer">🏥 Start Healing!</button>'+
      '</div>';

  // Get a Wordmon's current HP (from persistent map or max)
  getWordmonHp(idx){
    const wm=this.getWordmon(idx);
    if(this.wordmonHpMap[idx]!==undefined) return this.wordmonHpMap[idx];
    return wm.hp;
  },

  // Get words Río has failed (for healing center)
  getFailedWords(){
    const failed=[];
    for(const[w,s] of Object.entries(this.wordStats||{})){
      if(s.wrong>0) failed.push(w);
    }
    // if no failed words yet, use random words
    if(failed.length<4) return WORDS.sort(()=>Math.random()-.5).slice(0,6).map(w=>w.w);
    return shuffle(failed);
  },

  // Get hurt Wordmons
  getHurtWordmons(){
    const hurt=[];
    this.caughtWordmons.forEach(idx=>{
      const wm=this.getWordmon(idx);
      const hp=this.getWordmonHp(idx);
      if(hp<wm.hp) hurt.push({idx,wm,hp,maxHp:wm.hp});
    });
    return hurt;
  },

  // ---- XP / LEVEL ----
  addXP(n){
    this.xp+=n;
    while(this.xp>=this.xpNeeded){
      this.xp-=this.xpNeeded;
      this.level++;
      this.xpNeeded=Math.floor(this.xpNeeded*1.3);
      this.levelUp();
    }
    this.updateHUD();
  },

  levelUp(){
    SFX.play('levelup');
    const el=document.createElement('div');
    el.className='levelup-text';
    el.textContent='LEVEL UP! Lv'+this.level;
    document.body.appendChild(el);
    this.fireConfetti();
    setTimeout(()=>el.remove(),1600);
  },

  // ---- COINS ----
  addCoins(n){
    this.coins+=n;
    this.updateHUD();
    if(this.mode==='shop') this.loadShopView();
  },

  // ---- STREAK / CATCH ----
  checkCatch(){
    // Catch at 5 streak — matches the 5 streak dots!
    const catchAt = 5;
    if(this.streak>0 && this.streak%catchAt===0){
      const uncaught=WORDMONS.map((_,i)=>i).filter(i=>!this.caughtWordmons.includes(i));
      if(uncaught.length>0){
        const pick=uncaught[Math.floor(Math.random()*uncaught.length)];
        // Instant catch — no extra challenge, the streak IS the challenge
        this.caughtWordmons.push(pick);
        SFX.play('catch');
        this.showCatchModal(this.getWordmon(pick));
        this.fireConfetti();
        this.saveGame();
      }
    }
    setTimeout(()=>this.updateHUD(),100);
  },

  // Show a story question that must be answered to complete a catch
  loadCatchStory(wmIdx){
    const wm=this.getWordmon(wmIdx);
    const area=document.getElementById('gameArea');
    const st=this.pickStory();
    const words=st.text.split(/(\s+)/);
    const storyHtml=words.map(w=>{
      const clean=w.replace(/[^a-zA-Z]/g,'');
      if(!clean) return w;
      return '<span class="story-word">'+w+'</span>';
    }).join('');
    area.innerHTML='<div class="card" id="qCard" style="border-color:var(--gold)">'+
      '<div style="text-align:center;margin-bottom:8px">'+
        '<div style="font-family:Fredoka One,cursive;font-size:1.1rem;color:var(--accent)">🎯 Catch Challenge!</div>'+
        '<div style="font-size:.85rem;color:var(--text2);font-weight:600">Read the story to catch <strong>'+wm.name+'</strong>!</div>'+
        this.spriteHtml(wm,60)+
      '</div>'+
      '<div class="question-text" style="font-size:1rem">Read the story!</div>'+
      '<div class="story-box">'+storyHtml+'</div>'+
      '<div style="font-family:Fredoka One,cursive;font-size:1rem;color:var(--text);margin-top:10px">'+st.question+'</div>'+
      '<div class="choices">'+
      shuffle(st.choices).map(c=>'<button class="choice-btn" data-val="'+c+'">'+c+'</button>').join('')+
      '</div></div>';
    // Wire up answer buttons
    area.querySelectorAll('.choice-btn').forEach(btn=>{
      btn.addEventListener('click',()=>{
        if(this.answering) return;
        this.answering=true;
        const card=document.getElementById('qCard');
        card.querySelectorAll('.choice-btn').forEach(b=>b.classList.add('disabled'));
        if(parseInt(btn.dataset.val)===st.answer||btn.dataset.val===String(st.answer)){
          btn.classList.add('correct');
          // CATCH SUCCESS!
          this.caughtWordmons.push(wmIdx);
          this._pendingCatchIdx=null;
          SFX.play('catch');
          this.showCatchModal(wm);
          this.fireConfetti();
          this.saveGame();
        } else {
          btn.classList.add('wrong-pick');
          card.querySelectorAll('.choice-btn').forEach(b=>{if(parseInt(b.dataset.val)===st.answer||b.dataset.val===String(st.answer))b.classList.add('correct');});
          card.classList.add('wrong-shake');
          // Catch failed — they'll need another streak
          this._pendingCatchIdx=null;
          this.showBattleMsg('It escaped!');
          SFX.play('wrong');
          setTimeout(()=>{
            const btn2=document.createElement('button');
            btn2.textContent='Keep playing →';
            btn2.style.cssText='display:block;margin:12px auto;font-family:Fredoka One,cursive;font-size:1rem;padding:10px 24px;border-radius:12px;border:none;background:var(--accent);color:#fff;cursor:pointer';
            btn2.onclick=()=>this.loadMode(this.mode);
            card.appendChild(btn2);
          },1500);
        }
      });
    });
    this.thinkFirst(document.getElementById('qCard'),3);
  },

  showCatchModal(wm){
    document.getElementById('catchTitle').textContent='New Wordmon!';
    document.getElementById('catchDesc').textContent='You caught '+wm.name+' the '+wm.type+' type!';
    document.getElementById('catchSprite').innerHTML=this.spriteHtml(wm,100);
    document.getElementById('catchName').textContent=wm.name;
    document.getElementById('catchModal').classList.add('show');

  closeCatchModal(){

  // ---- CONFETTI ----
  fireSparkles(el){
    // Small sparkle burst around an element (correct answer button)
    if(!el) return;
    const rect=el.getBoundingClientRect();
    const cx=rect.left+rect.width/2;
    const cy=rect.top+rect.height/2;
    const sparkles=['✨','⭐','💫','🌟'];
    for(let i=0;i<8;i++){
      const s=document.createElement('div');
      s.textContent=sparkles[Math.floor(Math.random()*sparkles.length)];
      s.style.cssText='position:fixed;z-index:999;font-size:'+(14+Math.random()*12)+'px;pointer-events:none;transition:all .8s ease-out;';
      s.style.left=cx+'px';s.style.top=cy+'px';
      document.body.appendChild(s);
      const angle=Math.random()*Math.PI*2;
      const dist=40+Math.random()*60;
      requestAnimationFrame(()=>{
        s.style.left=(cx+Math.cos(angle)*dist)+'px';
        s.style.top=(cy+Math.sin(angle)*dist-30)+'px';
        s.style.opacity='0';
        s.style.transform='scale(0.3)';
      });
      setTimeout(()=>s.remove(),900);
    }
  },

  fireConfetti(){
    const box=document.getElementById('confettiBox');
    const colors=['#9333ea','#fbbf24','#22c55e','#3b82f6','#a855f7','#ef4444','#ec4899'];
    for(let i=0;i<40;i++){
      const p=document.createElement('div');
      p.className='confetti-piece';
      p.style.left=Math.random()*100+'%';
      p.style.background=colors[Math.floor(Math.random()*colors.length)];
      p.style.animationDelay=Math.random()*.5+'s';
      p.style.animationDuration=(1.5+Math.random())+'s';
      p.style.width=(6+Math.random()*8)+'px';
      p.style.height=(6+Math.random()*8)+'px';
      p.style.borderRadius=Math.random()>.5?'50%':'2px';
      box.appendChild(p);
      setTimeout(()=>p.remove(),2500);
    }
  },

  // ---- ROSTER ----
  renderRoster(){
    const grid=document.getElementById('rosterGrid');
    grid.innerHTML='';
    WORDMONS.forEach((_,i)=>{
      const wm=this.getWordmon(i);
      const caught=this.caughtWordmons.includes(i);

  // ---- PICK WORD ----
  pickWord(){
    // ANTI-SKIP: If there's a pending word the player hasn't answered yet,
    // force them to do it. Persists across refreshes via localStorage.
    if(this._pendingWord) return this._pendingWord;
    // Check for a word saved from a previous session/refresh
    try{
      const saved=localStorage.getItem('rio_pending_word');
      if(saved){
        const pw=JSON.parse(saved);
        // Verify the word still exists in WORDS array
        const match=WORDS.find(w=>w.w===pw.w);
        if(match){
          this._pendingWord=match;
          // Track refresh attempts — if they refresh 3+ times, they lose a coin
          const skips=parseInt(localStorage.getItem('rio_skip_count')||'0')+1;
          localStorage.setItem('rio_skip_count',String(skips));
          if(skips>=3){
            // Penalty: lose coins for trying to skip
            const penalty=Math.min(this.coins, skips);
            if(penalty>0){
              this.coins-=penalty;
              this.updateHUD();
              this.saveGame();
              setTimeout(()=>{
                const warn=document.createElement('div');
                warn.style.cssText='position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff;padding:20px 32px;border-radius:16px;font-family:Fredoka One,cursive;font-size:1.2rem;z-index:9998;text-align:center;box-shadow:0 8px 32px rgba(239,68,68,.5);animation:popIn .3s ease';
                warn.innerHTML='No skipping! 🚫<br><span style="font-size:.9rem;opacity:.9">-'+penalty+' coin'+(penalty>1?'s':'')+' for refreshing!</span><br><span style="font-size:.8rem;opacity:.7">Answer the word to keep playing!</span>';
                document.body.appendChild(warn);
                setTimeout(()=>warn.remove(),3000);
              },500);
            }
          }
          return match;
        }
      }
    }catch(e){}
    if(this.usedWords.length>=WORDS.length) this.usedWords=[];
    // ADAPTIVE WORD FREQUENCY — weight words by how much the player needs them
    // Words they get wrong a lot appear 4x more often; unseen words 3x; teacher priority 2x
    let idx;
    const weights=WORDS.map((w,i)=>{
      if(this.usedWords.includes(i)) return 0; // already used this round
      const stats=this.wordStats[w.w];
      let weight=1;
      if(w.priority) weight*=2; // teacher's K word list
      if(!stats||(!stats.correct&&!stats.wrong)) weight*=3; // never seen — high priority
      else{
        const total=stats.correct+stats.wrong;
        const accuracy=total>0?stats.correct/total:0;
        if(accuracy<0.33) weight*=4; // struggling hard
        else if(accuracy<0.5) weight*=3; // needs work
        else if(accuracy<0.75) weight*=2; // getting better
        // >75% accuracy = normal weight (1)
        // Also boost words not seen recently
        if(stats.lastSeen&&Date.now()-stats.lastSeen>300000) weight*=1.5; // 5+ min since last seen
      }
      return weight;
    });
    const totalWeight=weights.reduce((a,b)=>a+b,0);
    if(totalWeight>0){
      let r=Math.random()*totalWeight;
      for(let i=0;i<weights.length;i++){
        r-=weights[i];
        if(r<=0){idx=i;break;}
      }
    }
    if(idx===undefined||idx===null){
      do{idx=Math.floor(Math.random()*WORDS.length);}while(this.usedWords.includes(idx));
    }
    this.usedWords.push(idx);
    const wd=WORDS[idx];
    this._pendingWord=wd;
    // Persist to localStorage so refreshing can't skip it
    try{localStorage.setItem('rio_pending_word',JSON.stringify({w:wd.w}));localStorage.setItem('rio_skip_count','0');}catch(e){}
    return wd;
  },
  clearPendingWord(){
    this._pendingWord=null;
    try{localStorage.removeItem('rio_pending_word');localStorage.removeItem('rio_skip_count');}catch(e){}
  },

  pickStory(){
    if(this.usedStories.length>=STORIES.length) this.usedStories=[];
    let idx;
    do{idx=Math.floor(Math.random()*STORIES.length);}while(this.usedStories.includes(idx));
    this.usedStories.push(idx);
    return STORIES[idx];
  },

  // ---- LOAD MODE ----
  loadMode(mode){
    this.answering=false;
    // clean up mini-game timers
    if(this._blockTimer){clearInterval(this._blockTimer);this._blockTimer=null;}
    if(this._blockKeys){document.removeEventListener('keydown',this._blockKeys);this._blockKeys=null;}
    if(this._dodgeTimer){clearInterval(this._dodgeTimer);this._dodgeTimer=null;}
    if(this._dodgeKeys){document.removeEventListener('keydown',this._dodgeKeys);this._dodgeKeys=null;}
    this.stopBattleMusic();
    const area=document.getElementById('gameArea');
    area.innerHTML='';
    if(mode==='shop'){
      this.loadShopView();
      return;
    }
    switch(mode){
      // === ACTIVE READING-FOCUSED MODES ===
      case'storybook':this.loadStorybook();break;
      case'comicchat':this.loadComicChat();break;
      case'scramble':this.loadScramble();break;
      case'readfind':this.loadReadFind();break;
      case'finisher':this.loadStoryFinisher();break;
      case'tricky':this.loadTricky();break; // kept active — helps with b/d n/u
      // === LEGACY (hidden but still callable if forced) ===
      case'fill':this.loadFillIn();break;
      case'spell':this.loadSpellIt();break;
      case'hear':this.loadHearIt();break;
      case'flash':this.loadFlash();break;
      case'decode':this.loadDecode();break;
      case'story':this.loadStory();break;
      case'readalong':this.loadReadAlong();break;
      case'sentence':this.loadSentenceBuilder();break;
      case'popquiz':this.loadPopQuiz();break;
      default:this.loadStorybook();break; // fallback to Storybook if unknown mode
    }
  },

  // ---- THINK FIRST (anti-guessing) ----
  thinkFirst(container, seconds=2){
    const choices=container.querySelector('.choices');
    if(!choices) return;
    choices.classList.add('think-first');
    const overlay=document.createElement('div');
    overlay.className='think-overlay';
    overlay.innerHTML='👀 Read first! ('+seconds+'s)';
    choices.appendChild(overlay);
    let t=seconds;
    const iv=setInterval(()=>{
      t--;
      if(t>0){overlay.innerHTML='👀 Read first! ('+t+'s)';}
      else{
        clearInterval(iv);
        choices.classList.remove('think-first');
        overlay.remove();
      }
    },1000);
  },

  // ---- FILL IN ----
  loadFillIn(){
    const wd=this.pickWord();
    const area=document.getElementById('gameArea');
    const sent=wd.sent.replace('___','<span class="blank">_____</span>');
    const wrongs=WORDS.filter(x=>x.w!==wd.w).sort(()=>Math.random()-.5).slice(0,3).map(x=>x.w);
    const choices=shuffle([wd.w,...wrongs]);
    area.innerHTML='<div class="card" id="qCard"><div class="question-text">'+sent+'</div><div class="choices">'+

  // ---- SPELL IT ----
  loadSpellIt(){
    const wd=this.pickWord();
    const area=document.getElementById('gameArea');
    const letters=wd.w.split('');
    const extras='abcdefghiklmnoprstuw'.split('').filter(l=>!letters.includes(l)).sort(()=>Math.random()-.5).slice(0,Math.max(2,5-letters.length));
    const allLetters=shuffle([...letters,...extras]);
    area.innerHTML='<div class="card" id="qCard">'+
      '<div class="question-text">Spell the word!</div>'+
      '<div class="spell-hint">'+wd.sent.replace('___','<strong style="color:var(--accent)">???</strong>')+'</div>'+
      '<div class="spell-display" id="spellDisplay">'+letters.map(()=>'<div class="spell-slot"></div>').join('')+'</div>'+
      '<div class="letter-tiles" id="letterTiles">'+allLetters.map((l,i)=>'<button class="letter-tile" data-idx="'+i+'" data-letter="'+l+'">'+l+'</button>').join('')+'</div>'+
      '<div class="spell-actions">'+
      '<button class="backspace-btn" id="spellBack">⬅ Back</button>'+
      '<button class="submit-spell" id="spellSubmit">Check ✓</button>'+
      '</div><div id="jokeArea"></div></div>';
    let typed=[];
    const slots=document.querySelectorAll('.spell-slot');
    const tiles=document.querySelectorAll('.letter-tile');
    tiles.forEach(t=>{
      t.addEventListener('click',()=>{
        if(this.answering||typed.length>=letters.length)return;
        typed.push({letter:t.dataset.letter,idx:t.dataset.idx});
        t.classList.add('used');
        upd();
      });
    });
    document.getElementById('spellBack').addEventListener('click',()=>{
      if(this.answering||typed.length===0)return;
      const rem=typed.pop();
      tiles.forEach(t=>{if(t.dataset.idx===rem.idx)t.classList.remove('used');});
      upd();
    });
    document.getElementById('spellSubmit').addEventListener('click',()=>{
      if(this.answering)return;
      this.answering=true;
      const attempt=typed.map(t=>t.letter).join('');
      const card=document.getElementById('qCard');
      if(attempt===wd.w){
        slots.forEach(s=>s.style.borderColor='var(--green)');
        this.onCorrect(wd);
      }else{
        slots.forEach((s,i)=>{s.textContent=letters[i];s.style.borderColor='var(--green)';});
        card.classList.add('wrong-shake');
        this.onWrong(wd);
      }
    });
    function upd(){
      slots.forEach((s,i)=>{
        if(typed[i]){s.textContent=typed[i].letter;s.classList.add('filled');}
        else{s.textContent='';s.classList.remove('filled');}
      });
    }
  },

  // ---- CORRECT / WRONG ----
  onCorrect(wd){
    this.clearPendingWord();
    if(wd&&wd.w){if(!this.wordStats[wd.w])this.wordStats[wd.w]={correct:0,wrong:0};this.wordStats[wd.w].correct++;this.wordStats[wd.w].lastSeen=Date.now();}
    SFX.play('correct');
    // sparkle burst on the correct button
    const correctBtn=document.querySelector('.choice-btn.correct');
    if(correctBtn) this.fireSparkles(correctBtn);
    this.score+=5;
    this.streak++;
    if(this.streak>this.maxStreak) this.maxStreak=this.streak;
    this.modeWins++;
    this.totalCorrect++;
    this.addXP(10);
    this.addCoins(1);
    this.showMoneyAnimation(1);
    this.playerAttack();
    this.checkCatch();
    this.addWordmonXP(1);
    // Pre-generate evolution video if close to evolving
    // Evolution is handled by CSS cinematic (no video generation needed)
    this.showJoke(wd);
    this.checkAchievements();
    const willKill = this.enemyHp <= 0;
    // update zone based on total correct (every 30 = new zone)
    const newZone=Math.min(Math.floor(this.totalCorrect/30), this.ZONES.length-1);
    if(newZone>this.currentZone){this.currentZone=newZone;}
    this.updateModeBar();
    // BOSS BATTLE every 50 correct
    if(this.totalCorrect>0 && this.totalCorrect%50===0 && !this.isBossBattle){
      if(this._autoTimer)clearTimeout(this._autoTimer);
      this._autoTimer=setTimeout(()=>{this._autoTimer=null;this.startBossBattle();},willKill?3000:2000);
      this.saveGame();
      return;
    }
    // Silly Mad Libs every 10 correct (but not on boss multiples or bonus multiples)
    if(this.totalCorrect>0 && this.totalCorrect%10===0 && this.totalCorrect%20!==0 && this.totalCorrect%50!==0){
      if(this._autoTimer)clearTimeout(this._autoTimer);
      this._autoTimer=setTimeout(()=>{this._autoTimer=null;this.showMadLib();},willKill?3000:2000);
      this.saveGame();
      return;
    }
    // bonus mini-game every 20 correct (but not on boss multiples)
    if(this.totalCorrect>0 && this.totalCorrect%20===0 && this.totalCorrect%50!==0){
      if(this._autoTimer)clearTimeout(this._autoTimer);
      this._autoTimer=setTimeout(()=>{this._autoTimer=null;this.loadBonusGame();},willKill?3000:2000);
      this.saveGame();
      return;
    }
    // Río trainer appears randomly (5% chance) with encouragement
    if(Math.random()<0.05 && !willKill) this.showRioTrainer();
    // check for streak milestones
    const milestones=[10,20,30,50,100];
    if(milestones.includes(this.streak)){
      this.showMilestone(this.streak);
      this.autoNext(willKill?5500:4500, this.modeWins>=6);
    } else if(this.modeWins>=6){
      this.autoNext(willKill?3000:2000,true);
    } else {
      this.autoNext(willKill?3000:2000);
    }
    this.saveGame();
  },

  addWordmonXP(n){
    const idx=this.activeWordmon;
    const oldStage=this.getStage(idx);
    if(!this.wordmonXP[idx]) this.wordmonXP[idx]=0;
    this.wordmonXP[idx]+=n;
    const newStage=this.getStage(idx);
    if(newStage>oldStage) this.showEvolution(idx,oldStage,newStage);
    this.renderRoster();
  },

  showEvolution(idx,oldStage,newStage){
    const wm=WORDMONS[idx];
    const oldName=wm.stages[oldStage].name;
    const newData=wm.stages[newStage];
    this.playerMaxHp=newData.hp;
    this.playerHp=newData.hp;
    const typeColors={Electric:'#fbbf24',Fire:'#ef4444',Water:'#3b82f6',Grass:'#22c55e',Ghost:'#a855f7',Rock:'#94a3b8',Dark:'#1e293b',Ice:'#67e8f9',Fairy:'#f9a8d4',Steel:'#94a3b8',Bug:'#84cc16',Psychic:'#c084fc',Dragon:'#818cf8',Flying:'#93c5fd',Poison:'#c084fc',Fighting:'#ef4444',Normal:'#d4d4d4',Ground:'#fbbf24'};
    const glow=typeColors[wm.type]||'#fbbf24';

    // === EPIC CSS-ONLY EVOLUTION CINEMATIC ===
    const overlay=document.createElement('div');
    overlay.style.cssText='position:fixed;inset:0;background:#000;z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;overflow:hidden';

        @keyframes evoSpin{0%{transform:rotate(0) scale(1)}30%{transform:rotate(90deg) scale(1.2)}60%{transform:rotate(270deg) scale(0.6)}100%{transform:rotate(720deg) scale(0)}}

        @keyframes evoShake{0%,100%{transform:translateX(0)}10%{transform:translateX(-4px)}20%{transform:translateX(4px)}30%{transform:translateX(-6px)}40%{transform:translateX(6px)}50%{transform:translateX(-4px)}60%{transform:translateX(4px)}70%{transform:translateX(-2px)}80%{transform:translateX(2px)}}

    // Sound: ascending tones
    SFX.play('levelup');

    // Phase 2 (2s): Energy builds — particles spiral INWARD, screen shakes
    setTimeout(()=>{
      overlay.style.animation='evoShake .8s ease';
      const old=document.getElementById('evoOld');
      if(old) old.style.animation='evoGlow .4s ease-in-out infinite';
      // Inward-spiraling energy particles

    // Phase 3 (3.5s): Old sprite spins away dramatically
    setTimeout(()=>{
      const old=document.getElementById('evoOld');
      if(old) old.style.animation='evoSpin 1.2s ease-in forwards';
      // More particles burst outward

    // Phase 4 (4.5s): MASSIVE white flash — the big moment
    setTimeout(()=>{

      setTimeout(()=>{overlay.style.background='#000';},150);

      setTimeout(()=>{

        if(evoOld) evoOld.remove();

            '<div style="font-size:1rem;color:rgba(255,255,255,.7);margin-top:6px;font-weight:600">HP: '+newData.hp+' | Stage '+(newStage+1)+'/3</div>';

  onWrong(wd){
    this.clearPendingWord();
    if(wd&&wd.w){if(!this.wordStats[wd.w])this.wordStats[wd.w]={correct:0,wrong:0};this.wordStats[wd.w].wrong++;this.wordStats[wd.w].lastSeen=Date.now();}
    SFX.play('wrong');
    this.streak=0;
    this.enemyAttack();
    this.updateHUD();
    this.showJoke(wd);
    this.autoNext(2500);
  },

  autoNext(delay,forceRotate){
    if(this._autoTimer) clearTimeout(this._autoTimer);
    this._autoTimer = setTimeout(()=>{
      this._autoTimer=null;
      if(forceRotate) this.rotateMode();
      else this.loadMode(this.mode);
    },delay);
  },

  rotateMode(){
    SFX.play('modeSwitch');
    // FORCE Rio to play every mode. Use a queue: shuffle all modes once,
    // then pop one off each rotation. When empty, reshuffle. This guarantees
    // he sees every game (including reading!) before any repeats.
    if(!this._modeQueue||this._modeQueue.length===0){
      this._modeQueue=this.GAME_MODES.filter(m=>m!==this.mode).sort(()=>Math.random()-.5);
    }
    const next=this._modeQueue.shift();
    this.modeWins=0;
    const msgs=["You're on fire! 🔥 New challenge!","Too easy! 💪 Mix it up!","15 points! ⭐ New game!","Super smart! 🧠 Switching!","Champion! 🏆 Next game!"];
    const msg=msgs[Math.floor(Math.random()*msgs.length)];
    const banner=document.createElement('div');
    banner.style.cssText='position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:linear-gradient(135deg,#9333ea,#7c3aed);color:#fff;padding:20px 32px;border-radius:16px;font-family:Fredoka One,cursive;font-size:1.3rem;z-index:9998;text-align:center;box-shadow:0 8px 32px rgba(147,51,234,.5);animation:popIn .3s ease';
    banner.innerHTML=msg+'<br><span style="font-size:.9rem;opacity:.8">Next: <img src="sprites/'+(this.MODE_ICONS[next]||'mode_fillin')+'.png" style="width:20px;height:20px;vertical-align:middle"> '+this.MODE_NAMES[next]+'</span>';
    document.body.appendChild(banner);
    setTimeout(()=>{
      banner.remove();
      this.mode=next;
      this.updateModeBar();
      this.loadMode(next);
    },2000);
  },

  showJoke(wd){
    const jokeArea=document.getElementById('jokeArea');
    if(jokeArea&&wd&&wd.joke){
      const tappableJoke=wd.joke.split(/(\s+)/).map(w=>{
        const clean=w.trim();
        if(!clean) return w;
        return '<span class="tap-word" data-say="'+clean.replace(/"/g,'&quot;')+'" style="cursor:pointer;padding:1px 2px;border-radius:4px;transition:all .2s">'+w+'</span>';
      }).join('');
      jokeArea.innerHTML='<div class="joke-box"><span class="joke-emoji">😂</span><p>'+tappableJoke+'</p></div>';
      jokeArea.querySelectorAll('.tap-word').forEach(el=>{
        el.addEventListener('click',function(){
          if(!window.speechSynthesis) return;
          speechSynthesis.cancel();
          const u=new SpeechSynthesisUtterance(this.dataset.say);
          u.rate=0.7;u.pitch=1.1;

          setTimeout(()=>{this.style.background='';this.style.color='';},800);
        });

    }

  // ---- TIC TAC TOE (Pokéball vs Berry) ----
  loadTicTacToe(){
    const mg=document.getElementById('miniGameArea');
    const board=Array(9).fill(null);
    const PLAYER='⚡'; // player is lightning bolt
    const CPU='🔴'; // cpu is pokeball
    let gameOver=false;

    const render=()=>{
      mg.innerHTML='<div style="font-family:Fredoka One,cursive;font-size:1.1rem;margin-bottom:10px">Tic-Tac-Toe! You are ⚡</div>'+
        '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;max-width:240px;margin:0 auto">'+
        board.map((v,i)=>'<button class="ttt-cell" data-i="'+i+'" style="width:74px;height:74px;border-radius:12px;border:3px solid #e2e8f0;background:#fff;font-size:2rem;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center'+(v?';pointer-events:none':'')+'">'+(v||'')+'</button>').join('')+
        '</div><div id="tttResult" style="margin-top:12px;font-family:Fredoka One,cursive;font-size:1.2rem"></div>';
      if(!gameOver){
        mg.querySelectorAll('.ttt-cell').forEach(btn=>{
          btn.addEventListener('click',()=>{
            const idx=parseInt(btn.dataset.i);
            if(board[idx]||gameOver)return;
            board[idx]=PLAYER;
            SFX.play('click');
            const w=checkWin(board);
            if(w){endGame(w);return;}
            if(!board.includes(null)){endGame('draw');return;}
            // CPU move
            setTimeout(()=>{
              const empty=board.map((v,i)=>v===null?i:null).filter(v=>v!==null);
              // try to win first, then block, then random
              let move=findWinMove(board,CPU)||findWinMove(board,PLAYER);
              if(move===null||move===undefined) move=empty.includes(4)?4:empty[Math.floor(Math.random()*empty.length)];
              board[move]=CPU;
              const w2=checkWin(board);
              if(w2){render();endGame(w2);return;}
              if(!board.includes(null)){render();endGame('draw');return;}
              render();
            },400);
            render();
          });
        });
      }
    };

    function checkWin(b){
      const lines=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
      for(const[a,bb,cc]of lines){
        if(b[a]&&b[a]===b[bb]&&b[a]===b[cc])return b[a];
      }
      return null;
    }
    function findWinMove(b,p){
      const lines=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
      for(const[a,bb,cc]of lines){
        const vals=[b[a],b[bb],b[cc]];
        if(vals.filter(v=>v===p).length===2&&vals.includes(null)){
          return [a,bb,cc][vals.indexOf(null)];
        }
      }
      return null;
    }
    const endGame=(result)=>{
      gameOver=true;
      render();
      const res=document.getElementById('tttResult');
      if(result===PLAYER){
        res.innerHTML='<span style="color:#22c55e">YOU WIN! ⚡ Super trainer!</span>';
        SFX.play('victory');this.fireConfetti();
      }else if(result===CPU){
        res.innerHTML='<span style="color:#ef4444">The wild Pokémon wins! Try again!</span>';
        SFX.play('wrong');
      }else{
        res.innerHTML='<span style="color:var(--accent)">Draw! Good battle!</span>';
        SFX.play('coin');
      }
      setTimeout(()=>{
        const btn=document.createElement('button');
        btn.textContent='Back to Reading! →';
        btn.style.cssText='display:block;margin:12px auto;font-family:Fredoka One,cursive;font-size:1rem;padding:10px 24px;border-radius:12px;border:none;background:var(--accent);color:#fff;cursor:pointer';
        btn.onclick=()=>this.loadMode(this.mode);
        document.getElementById('tttResult').appendChild(btn);
      },1500);
    };
    render();
  },

  // ---- BLOCK STACK (Tetris-like catch game) ----
  loadBlockStack(){
    const mg=document.getElementById('miniGameArea');
    const W=8,H=10;
    let grid=Array(H).fill(null).map(()=>Array(W).fill(0));
    let score=0,dropping=true,px=3,py=0;
    let piece=newPiece();
    const colors=['','#ef4444','#3b82f6','#22c55e','#fbbf24','#a855f7','#9333ea','#ec4899'];

    function newPiece(){
      const shapes=[
        [[1,1],[1,1]], // square
        [[1,1,1,1]],   // line
        [[1,1,0],[0,1,1]], // z
        [[0,1,1],[1,1,0]], // s
        [[1,1,1],[0,1,0]], // t
        [[1,1,1],[1,0,0]], // l
        [[1,1,1],[0,0,1]], // j
      ];
      const s=shapes[Math.floor(Math.random()*shapes.length)];
      const c=1+Math.floor(Math.random()*7);
      return {shape:s.map(r=>r.map(v=>v?c:0)),w:s[0].length,h:s.length};
    }

    function canPlace(gd,p,x,y){
      for(let r=0;r<p.h;r++)for(let c=0;c<p.w;c++){
        if(p.shape[r][c]){
          const nx=x+c,ny=y+r;
          if(nx<0||nx>=W||ny>=H)return false;
          if(ny>=0&&gd[ny][nx])return false;
        }
      }
      return true;
    }

    function place(gd,p,x,y){
      for(let r=0;r<p.h;r++)for(let c=0;c<p.w;c++){
        if(p.shape[r][c]&&y+r>=0) gd[y+r][x+c]=p.shape[r][c];
      }
    }

    function clearLines(gd){
      let cleared=0;
      for(let r=H-1;r>=0;r--){
        if(gd[r].every(v=>v)){
          gd.splice(r,1);
          gd.unshift(Array(W).fill(0));
          cleared++;r++;
        }
      }
      return cleared;
    }

    const render=()=>{
      let html='<div style="font-family:Fredoka One,cursive;font-size:1.1rem;margin-bottom:6px">Block Stack! Score: '+score+'</div>';
      html+='<div style="display:inline-grid;grid-template-columns:repeat('+W+',28px);gap:1px;background:#e2e8f0;border:3px solid #cbd5e1;border-radius:8px;padding:2px">';
      // merge piece into display
      const disp=grid.map(r=>[...r]);
      if(dropping)for(let r=0;r<piece.h;r++)for(let c=0;c<piece.w;c++){
        if(piece.shape[r][c]&&py+r>=0&&py+r<H&&px+c>=0&&px+c<W)disp[py+r][px+c]=piece.shape[r][c];
      }
      for(let r=0;r<H;r++)for(let c=0;c<W;c++){
        const v=disp[r][c];
        html+='<div style="width:28px;height:28px;border-radius:4px;background:'+(v?colors[v]:'#f8fafc')+'"></div>';
      }
      html+='</div>';
      html+='<div style="display:flex;gap:8px;justify-content:center;margin-top:10px">'+
        '<button id="bsL" style="width:50px;height:50px;border-radius:12px;border:2px solid #e2e8f0;background:#fff;font-size:1.4rem;cursor:pointer">←</button>'+
        '<button id="bsD" style="width:50px;height:50px;border-radius:12px;border:2px solid #e2e8f0;background:#fff;font-size:1.4rem;cursor:pointer">↓</button>'+
        '<button id="bsR" style="width:50px;height:50px;border-radius:12px;border:2px solid #e2e8f0;background:#fff;font-size:1.4rem;cursor:pointer">→</button>'+
        '</div>';
      html+='<div id="bsResult" style="margin-top:8px;font-family:Fredoka One,cursive;font-size:1rem"></div>';
      mg.innerHTML=html;
      if(dropping){
        mg.querySelector('#bsL').onclick=()=>{if(canPlace(grid,piece,px-1,py)){px--;render();}};
        mg.querySelector('#bsR').onclick=()=>{if(canPlace(grid,piece,px+1,py)){px++;render();}};
        mg.querySelector('#bsD').onclick=()=>drop();
      }
    };

    const drop=()=>{
      if(!dropping)return;
      if(canPlace(grid,piece,px,py+1)){
        py++;render();
      }else{
        place(grid,piece,px,py);
        const lines=clearLines(grid);
        score+=lines*10+(lines?0:1);
        if(lines)SFX.play('correct');
        // check game over
        if(py<=0){
          dropping=false;
          render();
          document.getElementById('bsResult').innerHTML='<div style="color:var(--accent)">Game Over! Score: '+score+'! Nice building!</div>';
          SFX.play('victory');
          if(score>=30)this.fireConfetti();
          setTimeout(()=>{
            const btn=document.createElement('button');
            btn.textContent='Back to Reading! →';
            btn.style.cssText='display:block;margin:8px auto;font-family:Fredoka One,cursive;font-size:1rem;padding:10px 24px;border-radius:12px;border:none;background:var(--accent);color:#fff;cursor:pointer';
            btn.onclick=()=>this.loadMode(this.mode);
            document.getElementById('bsResult').appendChild(btn);
          },1200);
          return;
        }
        piece=newPiece();px=3;py=0;
        render();
      }
    };

    render();
    // auto-drop timer
    this._blockTimer=setInterval(()=>{if(dropping)drop();},800);
    // keyboard controls
    this._blockKeys=(e)=>{
      if(!dropping)return;
      if(e.key==='ArrowLeft'&&canPlace(grid,piece,px-1,py)){px--;render();}
      if(e.key==='ArrowRight'&&canPlace(grid,piece,px+1,py)){px++;render();}
      if(e.key==='ArrowDown')drop();
    };
    document.addEventListener('keydown',this._blockKeys);
  },

  // ---- MEMORY MATCH (flip cards to find word pairs) ----
  loadMemoryMatch(){
    const mg=document.getElementById('miniGameArea');
    const icons=['🌟','⚡','🔥','💧','🌿','👻','🗿','❄️','🐛','🧚','🌙','⚙️'];
    const pairs=icons.slice(0,6);
    const cards=shuffle([...pairs,...pairs]);
    let flipped=[],matched=[],moves=0,busy=false;
    const render=()=>{
      mg.innerHTML='<div style="font-family:Fredoka One,cursive;font-size:1.1rem;margin-bottom:8px">Memory Match! Moves: '+moves+'</div>'+
        '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;max-width:280px;margin:0 auto">'+
        cards.map((c,i)=>{
          const isFlip=flipped.includes(i)||matched.includes(i);
          return '<button class="mm-card" data-i="'+i+'" style="width:62px;height:62px;border-radius:12px;border:3px solid '+(matched.includes(i)?'var(--green)':'#e2e8f0')+';background:'+(isFlip?'#fff':'linear-gradient(135deg,var(--accent),#7c3aed)')+';font-size:'+(isFlip?'1.8rem':'.9rem')+';cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;color:#fff;font-family:Fredoka One,cursive">'+(isFlip?c:'?')+'</button>';
        }).join('')+

      if(matched.length<cards.length){
        mg.querySelectorAll('.mm-card').forEach(btn=>{
          btn.addEventListener('click',()=>{
            const idx=parseInt(btn.dataset.i);
            if(busy||flipped.includes(idx)||matched.includes(idx)||flipped.length>=2)return;
            flipped.push(idx);
            SFX.play('click');
            render();
            if(flipped.length===2){
              moves++;
              busy=true;
              setTimeout(()=>{
                if(cards[flipped[0]]===cards[flipped[1]]){
                  matched.push(flipped[0],flipped[1]);
                  SFX.play('correct');
                  flipped=[];
                  busy=false;
                  render();
                  if(matched.length===cards.length) endMM();
                }else{
                  SFX.play('wrong');
                  flipped=[];
                  busy=false;
                  render();
                }
              },800);
            }
          });
        });
      }
    };
    const endMM=()=>{
      document.getElementById('mmResult').innerHTML='<div style="color:#22c55e">You did it in '+moves+' moves! Great memory! 🎉</div>';

        btn.textContent='Back to Reading! →';
        btn.style.cssText='display:block;margin:8px auto;font-family:Fredoka One,cursive;font-size:1rem;padding:10px 24px;border-radius:12px;border:none;background:var(--accent);color:#fff;cursor:pointer';
        btn.onclick=()=>this.loadMode(this.mode);
        document.getElementById('mmResult').appendChild(btn);
      },1200);
    };
    render();
  },

  // ---- POP QUIZ (hear word, spell it with letter tiles) ----
  loadPopQuiz(){
    const wd=this.pickWord();
    const area=document.getElementById('gameArea');
    const word=wd.w.toLowerCase();
    const letters=word.split('');
    const wins=this.popQuizWins||0;

    // DIFFICULTY LEVELS based on total pop quiz wins
    // Level 0 (0-4 wins): 2 distractors, slow TTS, sentence hint, first letter shown
    // Level 1 (5-14): 3 distractors, slow TTS, sentence hint
    // Level 2 (15-29): 4 distractors, medium TTS, sentence hint
    // Level 3 (30-49): 5 distractors, medium TTS, NO sentence hint
    // Level 4 (50+): FREE TYPE — no tiles, just type the word, normal TTS speed
    const diff = wins<5?0 : wins<15?1 : wins<30?2 : wins<50?3 : 4;
    const diffLabel=['🟢 Easy','🟡 Medium','🟠 Hard','🔴 Expert','💀 Master'][diff];
    const extraCount=[2,3,4,5,0][diff];
    const ttsRate=[0.55,0.6,0.7,0.75,0.85][diff];
    const showSentence=diff<3;
    const showFirstLetter=diff===0;
    const freeType=diff>=4;

    const alphabet='abcdefghijklmnopqrstuvwxyz';
    const extras=[];
    if(!freeType){
      while(extras.length<extraCount){
        const l=alphabet[Math.floor(Math.random()*26)];
        if(!letters.includes(l)&&!extras.includes(l)) extras.push(l);
      }
    }
    const allTiles=freeType?[]:shuffle([...letters,...extras]);
    let built=[];
    let submitted=false;

    // Pre-fill first letter at easiest difficulty
    if(showFirstLetter && letters.length>1) built.push(letters[0]);

    const render=()=>{
      const slots=letters.map((_,i)=>{
        const filled=built[i]||'';
        return '<span style="display:inline-block;width:36px;height:44px;border-bottom:3px solid '+(filled?'var(--accent)':'#cbd5e1')+';margin:0 3px;font-family:Fredoka One,cursive;font-size:1.8rem;text-align:center;line-height:44px;color:var(--text)">'+filled+'</span>';
      }).join('');

      let inputArea='';
      if(freeType){
        // FREE TYPE mode — no tiles, just a text input
        inputArea='<input class="decode-input" id="pqInput" maxlength="'+(word.length+3)+'" placeholder="type the word..." autocomplete="off" autocapitalize="none" style="font-size:1.4rem;text-align:center;margin:10px auto;display:block">'+
          '<button id="pqCheck" style="display:block;margin:8px auto;font-family:Fredoka One,cursive;font-size:1rem;padding:10px 24px;border-radius:12px;border:none;background:var(--accent);color:#fff;cursor:pointer">Check! ✓</button>';
      } else {
        // TILE mode
        inputArea='<div style="display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin:12px 0" id="pqTiles">'+
          allTiles.map((l,i)=>{
            // track used tiles properly
            let usedCount=0;
            for(let b=0;b<built.length;b++){
              if(built[b]===l){
                // find which tile index this corresponds to
                let tileCount=0;
                for(let t=0;t<=i;t++) if(allTiles[t]===l) tileCount++;
                if(tileCount<=usedCount+1) usedCount++;
              }
            }
            const isUsed=built.filter(x=>x===l).length > allTiles.slice(0,i).filter(x=>x===l).length ? false :
              built.includes(l) && allTiles.filter((x,j)=>x===l&&j<=i).length <= built.filter(x=>x===l).length;
            // simpler: check if this specific tile index is used
            const tileUsed=built.some((b,bi)=>{
              let count=0;
              for(let t=0;t<allTiles.length;t++){
                if(allTiles[t]===b){
                  if(t===i && count===bi) return true;
                  count++;
                }
              }
              return false;
            });
            return '<button class="choice-btn pq-tile" data-letter="'+l+'" data-idx="'+i+'" style="width:44px;height:52px;font-size:1.5rem;font-family:Fredoka One,cursive;padding:4px;min-height:auto">'+l+'</button>';
          }).join('')+
          '</div>'+
          '<div style="display:flex;gap:8px;justify-content:center;margin-top:8px">'+
          '<button id="pqUndo" style="font-family:Fredoka One,cursive;font-size:.9rem;padding:8px 16px;border-radius:10px;border:2px solid #e2e8f0;background:#fff;cursor:pointer;color:var(--text2)">⬅ Undo</button>'+
          '<button id="pqCheck" style="font-family:Fredoka One,cursive;font-size:.9rem;padding:8px 16px;border-radius:10px;border:none;background:var(--accent);color:#fff;cursor:pointer'+(built.length<letters.length?';opacity:.4;pointer-events:none':'')+'">Check! ✓</button>'+
          '</div>';
      }

      area.innerHTML='<div class="card" id="qCard">'+
        '<div class="question-text" style="font-size:1.1rem;margin-bottom:4px">🎧 Pop Quiz! <span style="font-size:.7rem;background:'+(diff<2?'#dcfce7':diff<4?'#fef3c7':'#fef2f2')+';padding:2px 8px;border-radius:8px;color:'+(diff<2?'#15803d':diff<4?'#92400e':'#b91c1c')+'">'+diffLabel+'</span></div>'+
        '<div style="text-align:center;margin-bottom:8px"><button id="pqPlay" style="font-size:2.5rem;background:none;border:none;cursor:pointer;animation:speakerPulse 2s ease-in-out infinite">🔊</button></div>'+
        (showSentence?'<div style="text-align:center;margin-bottom:4px;font-size:.8rem;color:var(--text2);font-weight:600">'+wd.sent.replace('___','<span style="color:var(--accent);font-weight:800">???</span>')+'</div>':
        '<div style="text-align:center;margin-bottom:4px;font-size:.8rem;color:var(--text2);font-weight:600;font-style:italic">No hint! Just listen! 👂</div>')+
        (showFirstLetter&&letters.length>1?'<div style="text-align:center;font-size:.75rem;color:var(--green);font-weight:700;margin-bottom:4px">💡 First letter given!</div>':'')+
        '<div style="text-align:center;font-size:.65rem;color:var(--text2);margin-bottom:6px">'+word.length+' letters</div>'+
        '<div style="text-align:center;margin:8px 0">'+slots+'</div>'+
        inputArea+
        '<div id="jokeArea"></div></div>';

      // Wire events
      document.getElementById('pqPlay').addEventListener('click',speakWord);

      if(freeType){
        const input=document.getElementById('pqInput');
        setTimeout(()=>input.focus(),100);
        const doCheck=()=>{
          if(submitted) return;
          submitted=true; this.answering=true;
          const val=input.value.trim().toLowerCase();
          if(val===word){
            input.style.borderColor='var(--green)';input.style.background='#dcfce7';
            this.popQuizWins++;this.onCorrect(wd);
          }else{
            input.style.borderColor='var(--red)';input.style.background='#fef2f2';
            input.value=word;
            document.getElementById('jokeArea').innerHTML='<div style="text-align:center;margin-top:8px;font-family:Fredoka One,cursive;font-size:1.3rem;color:var(--accent)">The word was: '+word+'</div>';
            this.onWrong(wd);
          }
        };
        document.getElementById('pqCheck').addEventListener('click',doCheck);
        input.addEventListener('keydown',e=>{if(e.key==='Enter')doCheck();});
      } else {
        area.querySelectorAll('.pq-tile').forEach(btn=>{
          btn.addEventListener('click',()=>{
            if(submitted||built.length>=letters.length) return;
            built.push(btn.dataset.letter);
            SFX.play('click');
            render();
          });
        });
        const undoBtn=document.getElementById('pqUndo');
        if(undoBtn) undoBtn.addEventListener('click',()=>{
          if(submitted||built.length===0||(showFirstLetter&&built.length<=1)) return;
          built.pop(); SFX.play('click'); render();
        });
        document.getElementById('pqCheck').addEventListener('click',()=>{
          if(submitted||built.length<letters.length) return;
          submitted=true; this.answering=true;
          const correct=built.join('')===word;
          if(correct){
            area.querySelectorAll('#qCard span').forEach(s=>{if(s.textContent.trim()&&s.style.borderBottom)s.style.color='var(--green)';});
            this.popQuizWins++;this.onCorrect(wd);
          } else {
            letters.forEach((l,i)=>{
              const spans=area.querySelectorAll('#qCard span');
              if(spans[i]) spans[i].style.color=built[i]===l?'var(--green)':'var(--red)';
            });
            document.getElementById('jokeArea').innerHTML='<div style="text-align:center;margin-top:8px;font-family:Fredoka One,cursive;font-size:1.3rem;color:var(--accent)">The word was: '+word+'</div>';
            this.onWrong(wd);
          }
        });
      }
    };

    const speakWord=()=>{
      if(!('speechSynthesis' in window)) return;
      speechSynthesis.cancel();
      const u=new SpeechSynthesisUtterance(word);
      u.rate=ttsRate; u.pitch=1.0;
      const good=getBestVoice();
      if(good) u.voice=good;
      speechSynthesis.speak(u);
    };

    render();
    setTimeout(speakWord, 500);
  },

  // ---- DODGE ATTACK (tap to dodge falling attacks) ----
  loadDodgeAttack(){
    const mg=document.getElementById('miniGameArea');
    const W=5,ROWS=6;
    let playerX=2,score=0,lives=3,gameOver=false;
    let attacks=[];
    const ATTACKS=['🔥','💧','⚡','🗿','❄️','🌿','💀'];
    const PLAYER='⚡';

    const render=()=>{
      let html='<div style="font-family:Fredoka One,cursive;font-size:1rem;margin-bottom:6px">Dodge Attack! ❤️×'+lives+' Score: '+score+'</div>';
      html+='<div style="display:grid;grid-template-columns:repeat('+W+',50px);gap:3px;justify-content:center;margin:0 auto">';
      for(let r=0;r<ROWS;r++){
        for(let c=0;c<W;c++){
          const atk=attacks.find(a=>a.x===c&&a.y===r);
          const isPlayer=r===ROWS-1&&c===playerX;
          let content='';let bg='#f1f5f9';
          if(isPlayer){content=PLAYER;bg='#fef3c7';}
          if(atk){content=atk.emoji;bg='#fef2f2';}
          if(isPlayer&&atk){content='💥';bg='#fca5a5';}
          html+='<div style="width:50px;height:50px;border-radius:8px;background:'+bg+';display:flex;align-items:center;justify-content:center;font-size:1.6rem;border:2px solid #e2e8f0">'+content+'</div>';
        }
      }
      html+='</div>';
      html+='<div style="display:flex;gap:10px;justify-content:center;margin-top:10px">'+
        '<button id="daL" style="width:60px;height:50px;border-radius:12px;border:2px solid #e2e8f0;background:#fff;font-size:1.4rem;cursor:pointer">⬅️</button>'+
        '<button id="daR" style="width:60px;height:50px;border-radius:12px;border:2px solid #e2e8f0;background:#fff;font-size:1.4rem;cursor:pointer">➡️</button>'+
        '</div><div id="daResult" style="margin-top:6px;font-family:Fredoka One,cursive;font-size:1rem"></div>';
      mg.innerHTML=html;
      if(!gameOver){
        mg.querySelector('#daL').onclick=()=>{if(playerX>0){playerX--;render();}};
        mg.querySelector('#daR').onclick=()=>{if(playerX<W-1){playerX++;render();}};
      }
    };

    const tick=()=>{
      if(gameOver)return;
      // move attacks down
      attacks.forEach(a=>a.y++);
      // check hits
      attacks=attacks.filter(a=>{
        if(a.y===ROWS-1&&a.x===playerX){lives--;SFX.play('hurt');return false;}
        if(a.y>=ROWS){score++;return false;}
        return true;
      });
      // spawn new attack
      if(Math.random()<0.5){
        attacks.push({x:Math.floor(Math.random()*W),y:0,emoji:ATTACKS[Math.floor(Math.random()*ATTACKS.length)]});
      }
      render();
      if(lives<=0){
        gameOver=true;
        document.getElementById('daResult').innerHTML='<div style="color:var(--accent)">Game Over! You dodged '+score+' attacks!</div>';
        if(score>=8){SFX.play('victory');this.fireConfetti();}else SFX.play('coin');
        setTimeout(()=>{
          const btn=document.createElement('button');
          btn.textContent='Back to Reading! →';
          btn.style.cssText='display:block;margin:8px auto;font-family:Fredoka One,cursive;font-size:1rem;padding:10px 24px;border-radius:12px;border:none;background:var(--accent);color:#fff;cursor:pointer';
          btn.onclick=()=>{clearInterval(this._dodgeTimer);this._dodgeTimer=null;this.loadMode(this.mode);};
          document.getElementById('daResult').appendChild(btn);
        },1200);
      }
    };

    render();
    this._dodgeTimer=setInterval(()=>tick(),700);
    // keyboard
    this._dodgeKeys=(e)=>{
      if(gameOver)return;
      if(e.key==='ArrowLeft'&&playerX>0){playerX--;render();}
      if(e.key==='ArrowRight'&&playerX<W-1){playerX++;render();}
    };
    document.addEventListener('keydown',this._dodgeKeys);
  },

  // ---- HARD BATTLE (trainer battle with battle music) ----
  _battleMusic:null,
  _battleMusicNodes:[],
  startBattleMusic(){
    if(this._battleMusic) return;
    SFX.init();
    const c=SFX.ctx;
    if(!c) return;
    this._battleMusic=true;
    // Epic 4-part battle theme with bass, melody, harmony, and percussion
    const BPM=140;
    const beat=60/BPM;
    const bar=beat*4;
    let section=0;
    const SECTIONS=[
      // Section A: Intense minor key intro (Am)
      {bass:[220,220,165,165,185,185,220,220, 220,220,165,165,185,185,220,262],
       mel:[660,0,784,660,0,554,660,0, 784,880,784,660,554,0,660,0],
       harm:[440,0,554,440,0,370,440,0, 554,660,554,440,370,0,440,0]},
      // Section B: Rising tension (Dm → Em)
      {bass:[147,147,165,165,185,185,196,196, 220,220,247,247,262,262,294,294],
       mel:[587,660,698,660,587,554,587,660, 698,784,880,784,698,660,587,554],
       harm:[440,494,554,494,440,415,440,494, 554,587,660,587,554,494,440,415]},
      // Section C: Triumphant bridge (F → G → Am)
      {bass:[175,175,175,175,196,196,196,196, 220,220,220,220,262,262,220,220],
       mel:[880,784,698,784,880,784,880,988, 880,784,660,554,660,784,880,0],
       harm:[698,660,554,660,698,660,698,784, 660,554,440,370,440,554,660,0]},
      // Section D: Dramatic finale loop (Am → F → G)
      {bass:[220,220,175,175,196,196,220,220, 175,175,196,196,220,262,220,196],
       mel:[880,988,880,698,784,880,660,784, 698,880,784,660,880,988,880,784],
       harm:[660,698,660,554,587,660,440,587, 554,660,587,440,660,698,660,587]},
    ];

    const playLoop=()=>{
      if(!this._battleMusic) return;
      const n=c.currentTime;
      const S=SECTIONS[section%SECTIONS.length];
      const noteLen=bar*4/S.bass.length;

      // Bass line — deep square wave
      S.bass.forEach((f,i)=>{
        if(!f) return;
        const o=c.createOscillator(),g=c.createGain();
        o.connect(g);g.connect(c.destination);
        o.type='square';o.frequency.setValueAtTime(f,n+i*noteLen);
        g.gain.setValueAtTime(.07,n+i*noteLen);
        g.gain.exponentialRampToValueAtTime(.01,n+i*noteLen+noteLen*.9);
        o.start(n+i*noteLen);o.stop(n+i*noteLen+noteLen*.95);
        this._battleMusicNodes.push(o);
      });

      // Melody — bright triangle
      S.mel.forEach((f,i)=>{
        if(!f) return;
        const o=c.createOscillator(),g=c.createGain();
        o.connect(g);g.connect(c.destination);
        o.type='triangle';o.frequency.setValueAtTime(f,n+i*noteLen);
        g.gain.setValueAtTime(.05,n+i*noteLen);
        g.gain.exponentialRampToValueAtTime(.01,n+i*noteLen+noteLen*.85);
        o.start(n+i*noteLen);o.stop(n+i*noteLen+noteLen*.9);
        this._battleMusicNodes.push(o);
      });

      // Harmony — soft sine pad
      S.harm.forEach((f,i)=>{
        if(!f) return;
        const o=c.createOscillator(),g=c.createGain();
        o.connect(g);g.connect(c.destination);
        o.type='sine';o.frequency.setValueAtTime(f,n+i*noteLen);
        g.gain.setValueAtTime(.03,n+i*noteLen);
        g.gain.exponentialRampToValueAtTime(.005,n+i*noteLen+noteLen*.8);
        o.start(n+i*noteLen);o.stop(n+i*noteLen+noteLen*.85);
        this._battleMusicNodes.push(o);
      });

      // Percussion — kick/hihat pattern
      for(let i=0;i<16;i++){
        // Kick on beats 1 and 3
        if(i%4===0){
          const o=c.createOscillator(),g=c.createGain();
          o.connect(g);g.connect(c.destination);
          o.type='sine';o.frequency.setValueAtTime(80,n+i*noteLen);
          o.frequency.exponentialRampToValueAtTime(30,n+i*noteLen+.1);
          g.gain.setValueAtTime(.12,n+i*noteLen);g.gain.exponentialRampToValueAtTime(.001,n+i*noteLen+.15);
          o.start(n+i*noteLen);o.stop(n+i*noteLen+.16);
          this._battleMusicNodes.push(o);
        }
        // Hi-hat on every note
        const noise=c.createOscillator(),ng=c.createGain();
        noise.connect(ng);ng.connect(c.destination);
        noise.type='sawtooth';noise.frequency.setValueAtTime(3000+Math.random()*2000,n+i*noteLen);
        ng.gain.setValueAtTime(i%2===0?.02:.01,n+i*noteLen);ng.gain.exponentialRampToValueAtTime(.001,n+i*noteLen+.05);
        noise.start(n+i*noteLen);noise.stop(n+i*noteLen+.06);
        this._battleMusicNodes.push(noise);
      }

      section++;
      // Clean up old nodes
      this._battleMusicNodes=this._battleMusicNodes.filter(o=>{try{return o.context.currentTime<n+bar*4+1;}catch(e){return false;}});
      this._battleMusicTimer=setTimeout(playLoop,bar*4*1000);
    };
    playLoop();
  },
  stopBattleMusic(){
    this._battleMusic=null;
    if(this._battleMusicTimer) clearTimeout(this._battleMusicTimer);
    this._battleMusicNodes.forEach(o=>{try{o.stop();}catch(e){}});
    this._battleMusicNodes=[];
  },

  // ========================================================
  // === NEW READING-FOCUSED MODES (active in GAME_MODES) ===
  // ========================================================

  // --- helper: speak text with best voice ---
  _speak(text,rate=0.75){
    if(!('speechSynthesis' in window)) return;
    speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.rate=rate;u.pitch=1.0;
    const v=getBestVoice();if(v)u.voice=v;
    speechSynthesis.speak(u);
  },

  // --- helper: render a sentence with each word tappable ---
  _tapSentence(text,size='1.4rem'){
    return text.split(/(\s+)/).map(w=>{
      const clean=w.trim();
      if(!clean) return w;
      return '<span class="tap-word" data-say="'+clean.replace(/"/g,'&quot;')+'" style="cursor:pointer;padding:2px 4px;border-radius:6px;transition:all .2s;display:inline-block;font-size:'+size+'">'+w+'</span>';
    }).join('');
  },

  // --- helper: wire up .tap-word click = speak the word ---
  _wireTapWords(root){
    root.querySelectorAll('.tap-word').forEach(el=>{
      el.addEventListener('click',()=>{
        const w=el.dataset.say||el.textContent.trim().replace(/[^a-zA-Z]/g,'');
        if(!w) return;
        el.style.background='#fef3c7';
        setTimeout(()=>el.style.background='',400);
        this._speak(w,0.7);
      });
    });
  },

  // === GATED READING: Río must tap each word IN ORDER left-to-right ===
  // Returns HTML where every word is a .gw span that must be activated in
  // sequence. onComplete fires once all are tapped. He has to actually
  // read the whole sentence, can't skip ahead.
  _gatedSentence(text,size='1.4rem'){
    let idx=0;
    return text.split(/(\s+)/).map(w=>{
      const clean=w.trim();
      if(!clean) return w;
      const i=idx++;
      return '<span class="gw" data-gi="'+i+'" data-say="'+clean.replace(/"/g,'&quot;')+'" style="padding:4px 7px;border-radius:8px;background:#fff7ed;border:2px dashed #cbd5e1;color:#94a3b8;cursor:pointer;transition:all .2s;display:inline-block;margin:2px;font-size:'+size+'">'+w+'</span>';
    }).join('');
  },
  _wireGated(rootEl,onComplete){
    const spans=[...rootEl.querySelectorAll('.gw')];
    if(spans.length===0){onComplete&&onComplete();return;}
    let nextIdx=0;
    const highlight=(el,color)=>{if(el)el.style.borderColor=color;};
    highlight(spans[0],'var(--accent)');
    if(spans[0]) spans[0].style.boxShadow='0 0 0 3px #fbbf24';
    spans.forEach(sp=>{
      sp.addEventListener('click',()=>{
        const i=parseInt(sp.dataset.gi);
        if(i===nextIdx){
          // correct order: reveal + speak
          sp.style.background='#dcfce7';
          sp.style.borderStyle='solid';
          sp.style.borderColor='var(--green)';
          sp.style.color='var(--text)';
          sp.style.boxShadow='';
          this._speak(sp.dataset.say,0.7);
          nextIdx++;
          if(spans[nextIdx]){
            spans[nextIdx].style.borderColor='var(--accent)';
            spans[nextIdx].style.boxShadow='0 0 0 3px #fbbf24';
          }
          if(nextIdx>=spans.length){
            setTimeout(()=>onComplete&&onComplete(),300);
          }
        } else {
          // wrong order: gentle shake + flash correct word
          sp.animate([{transform:'translateX(-4px)'},{transform:'translateX(4px)'},{transform:'translateX(0)'}],{duration:260});
          if(spans[nextIdx]){
            spans[nextIdx].animate([{transform:'scale(1)'},{transform:'scale(1.15)'},{transform:'scale(1)'}],{duration:400});
          }
        }
      });
    });
  },

          '<div id="jokeArea"></div></div>';

          const hint=document.getElementById('sbHint');
          if(hint){hint.textContent='✅ You read it! Now tap Next.';hint.style.color='var(--green)';}
          const btn=document.getElementById('sbNext');
          if(btn){
            btn.disabled=false;
            btn.style.background='var(--accent)';
            btn.style.cursor='pointer';
            btn.style.opacity='1';
            btn.textContent=pageIdx===book.pages.length-1?'I read the story →':'Next Page →';
          }

          if(document.getElementById('sbNext').disabled) return;
          SFX.play('click');
          pageIdx++;
          render();

        // comprehension question (no auto-read — only speak on wrong)
        const cs=shuffle(book.choices.map((c,i)=>({c,i})));
        area.innerHTML='<div class="card" id="qCard">'+
          '<div style="text-align:center;font-size:2.5rem;margin-bottom:4px">'+(book.emoji||'📖')+'</div>'+

          '<div id="jokeArea"></div></div>';
        area.querySelectorAll('.choice-btn').forEach(btn=>{

            const card=document.getElementById('qCard');
            card.querySelectorAll('.choice-btn').forEach(b=>b.classList.add('disabled'));

              this.onWrong({w:'storybook',joke:'No worries! Read it again and you will get it!'});
            }
          });
        });
        this.thinkFirst(document.getElementById('qCard'),2);
      }
    };
    render();
  },

      area.innerHTML='<div class="card" id="qCard" style="padding:16px">'+
        '<div style="text-align:center;font-family:Fredoka One,cursive;font-size:1rem;color:var(--accent);margin-bottom:10px">💬 Read the comic!</div>'+
        panelsHtml+
        '<div id="cmcQuestion" style="display:none">'+
          '<div class="question-text" style="font-size:1.15rem;margin-top:14px">'+comic.q+'</div>'+
          '<div class="choices">'+shuffle(comic.choices.map((c,i)=>({c,i}))).map(c=>'<button class="choice-btn" data-idx="'+c.i+'">'+c.c+'</button>').join('')+'</div>'+
        '</div>'+
        '<div id="cmcNextBox" style="text-align:center;margin-top:10px">'+
          '<button id="cmcNext" disabled style="font-family:Fredoka One,cursive;font-size:1rem;padding:10px 22px;border-radius:12px;border:none;background:#cbd5e1;color:#fff;cursor:not-allowed;opacity:.6">🔒 Read the bubble first</button>'+
        '</div>'+
        '<div id="cmcHint" style="text-align:center;font-size:.8rem;color:var(--accent);font-weight:700;margin-top:8px">👆 Tap each word in order!</div>'+
        '<div id="jokeArea"></div></div>';
      // Gate only the current (latest) panel's words
      const currentBubble=area.querySelectorAll('[style*="border:2px solid var(--accent)"]')[0];
      this._wireGated(currentBubble||area,()=>{
        panelDone=true;
        const hint=document.getElementById('cmcHint');
        if(hint){hint.textContent='✅ Great reading!';hint.style.color='var(--green)';}
        const btn=document.getElementById('cmcNext');
        if(btn){
          btn.disabled=false;
          btn.style.background='var(--accent)';
          btn.style.cursor='pointer';
          btn.style.opacity='1';
          btn.textContent=isLastPanel?'I read the comic! ✓':'Next Panel →';
        }
      });
      // older panels: tap-to-hear only (not gated)
      this._wireTapWords(area);
      document.getElementById('cmcNext').addEventListener('click',()=>{
        if(!panelDone) return;
        SFX.play('click');
        if(isLastPanel){
          // show the question
          document.getElementById('cmcNextBox').style.display='none';
          document.getElementById('cmcHint').style.display='none';
          document.getElementById('cmcQuestion').style.display='block';
          area.querySelectorAll('.choice-btn').forEach(btn=>{
            btn.addEventListener('click',()=>{
              if(this.answering)return;
              this.answering=true;
              const card=document.getElementById('qCard');
              card.querySelectorAll('.choice-btn').forEach(b=>b.classList.add('disabled'));
              const picked=parseInt(btn.dataset.idx);
              if(picked===comic.answer){
                btn.classList.add('correct');
                this.onCorrect({w:'comic',joke:'You read the whole comic! So good!'});
              } else {
                btn.classList.add('wrong-pick');
                card.querySelectorAll('.choice-btn').forEach(b=>{if(parseInt(b.dataset.idx)===comic.answer)b.classList.add('correct');});
                card.classList.add('wrong-shake');
                this._speak('The answer is: '+comic.choices[comic.answer],0.7);
                this.onWrong({w:'comic',joke:'Read the comic again and look closely!'});
              }
